body:
  text: 慈湖遺書别集類三宋提要臣等謹案慈湖遺書十八巻續集二巻宋楊簡撰簡有慈湖易傳已著録金谿之學以簡為大宗所為文章大抵敷暢其師說其講學純入於禪先儒論之詳矣其論治務最急者五事次急者八事大抵欲罷科舉以復鄉舉里選限民田以復井田皆迂濶不達時勢然簡厯官治蹟乃多有可紀又非膠固鮮通者葢簡本明練政體亦知三代之制至後世必不可行又逆知雖持吾説以告世世亦必不肯用不慮其試之而不驗故姑為髙論以自表其異於俗學霸術而已及其莅官臨事利弊可驗而知者則固隨地制宜不敢操是術以治之故又未嘗無實效也宋史本傳載簡所著有甲藁乙藁冠記昏記喪禮家記祭記釋菜禮記石魚家記及已易啟蔽諸書其目甚多陳振孫書録解題則稱簡遺書止三卷此本自六巻以前為雜文及詩七巻至十六巻為家記皆雜録論經史治道之説如語録之體十七巻紀先訓十八巻乃錢時行狀及真徳秀跋又編雜文一巻及孔子閒居解一巻於後謂之續集與振孫所記巻數多寡不合而集中家記内各條又有别標曰見遺書者疑先有遺書三巻初本别行後又裒輯諸編共成此集仍總以遺書名之猶之王質雪山集有三巻之本有四十巻之本歟乾隆四十三年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
