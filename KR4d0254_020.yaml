body:
  text: 慈湖遺書附録寶謨閣學士正奉大夫慈湖先生行狀先生諱簡字敬仲姓楊氏家世天台十世祖自寧海徙明之奉化後又徙鄞紹興末敵突淮右考避地慈溪因占籍焉曽大父諱宗輔大父諱演皆不仕考諱庭顯臞臞然儒而果毅有識量義所不可萬夫莫回屹砥柱頺波中奮自植立起門户繩已甚度飭弟子齊家有紀律書訓纍牘字字可佩然與物極平恕一言之善樵牧吾師自少志學弗得弗措省過嚴密毫髮不少宥至泣下至自拳象山陸文安公碣其墓謂年在耄耋而學日進當今所識四明楊公一人而已故任承奉郎纍贈通奉大夫妣臧氏碩人先生生有異禀清夷古淡淵乎受道之器誕降之夕猶居鄞祥光外燭亘天而上四廂望之以為火也輒集衆環向入小學便儼立若成人書堂去巷陌隔牖間一紙凡遨戲事呼譟過門聽若無有朔望例得假羣兒數日以俟走散相征逐先生凝靜几門如常日課未嘗投足户外既長任幹蠱主出入家用外終日侍通奉公傍二親寢巳弇燈默坐候熟寐始揭弇占畢或漏盡五鼓為文清潤峻整務明聖經不肻規時好作俗下語踰弱冠入上庠每試輒魁聞耆舊言先生入院時但面壁坐日將西衆閧閧兢寸晷乃方舒徐展卷寫筆若波注無一字誤寫竟復袖卷舒徐俟衆出不以巳長先人乾道五年以一經冠南宫選登乙科授迪功郎主富陽簿簿於邑號間冷先生誠以接物衆畏信之相戒奉約束惟謹走吏持片紙入市可質數千日諷詠魯論孝經堂上不動聲色民自化孚初先生在循理齊嘗入夜燈未上憶通奉公訓默自反觀已覺天地萬物通為一體非吾心外事至是文安公新第歸來富陽長先生二歲素相呼以字為交友留半月將别去則念天地間無疑者平時願一見莫可得遽語離乎復留之夜集雙明閣上數提本心二字因從容問曰何謂本心適平旦嘗聽扇訟公即楊聲答曰且彼訟扇者必有一是有一非若見得孰是孰非即决定謂某甲是某乙非矣非本心而何先生聞之忽覺此心澄然清明亟問曰止如斯邪公竦然端厲復楊聲曰更何有也先生不暇他語即揖而歸拱逹旦質明正北面而拜終身師事焉每謂某感陸先生尢是再答一語更云云便支離去八年秋七月也已而㳂檄宿山谷間觀故書猶疑終夜坐不能寐天曈曈欲曉忽灑然如物脫去乃益明淳熙元年春喪妣氏去官居堊室哀毁盡禮後營壙車廄更覺日用酬應未能無礙沈思屢日偶一事相提觸亟起旋草廬中始大悟變化云為之㫖縱橫交錯萬變虛明不動如鑑中象矣學不疑不進既屢空屢疑於是乎大進先生之至富陽也閲兩月無一士來見怪問之左右對曰是邑多啇人肥家不利為士故相觀望莫之習也先生惻然即日詣白宰謂兹壯邑於今為赤縣而土俗爾陋學道愛人宰其職矣且僚佐繫銜例主學事無以風動教化之絃歌吾邑子坐靡禀稍效尤俗吏束􅊜程賦役事笞棰吾食且不得下咽奈何宰唯唯遂破食補生徒文理稍稍即收之先生日詣學相講習又約宰凡稱進士優以示勸秀民自是欣奮恨讀書晚有自山出者尤朴茂來問學先生曰子姑習拱既數月曰可矣與之語孜孜窮日夜不厭先生憂去輒提篋以隨願卒學後擢第為名儒邑人爭相慕效文風遂益振故老至今德之服除以通奉公畏浙江濤受紹興府理椽便就飬奸狴必躬臨之端默以聽使自吐露囚情炯燭罔失毫末猾吏僅行文案手膠拳莫敢舞越部都臺府鼎立大抵承媚風㫖不暇問可否先生公平無頗惟理之從二府史觸怒帥送獄勘之先生白無罪可勘命勘平日先生曰吏過渠能免若今日則實無罪也必摘掬往事置之法某不敢奉命帥大怒先生歎曰是尚可為乎歸取告身納之爭愈力帥知不可屈遂已一憲使嘗舉職官一日緣兩造是非壓先生就已意先生趨庭抗辨捧還削憲莫能奪改容謝之每謂白事上官必從陳述有不合即退思思之而審堅守無所撓或大礙不見聽則决去而已朱文公持廋節薦先生學能治已材可及人居無何關升先是太師史越王薦引諸賢而先生居第二謂性學通明辭華條逹孝友之行閫內化之施於有政其民心敬而愛之得㫖任滿都堂審察僅一考即移注先生不欲文安公書來勉之不可親庭有命乃不敢違差浙西撫幹大尹張公枃雅敬先生先生亦渠渠與之盡幕中本無事及是多所委賴吏牘日相銜在庭天府澔穰類多戾契聱牙不易可辦先生雍容立决的中腠㑹莫不服為神明畿甸災意忷忷叵測白尹宜戒不虞遂委督三將兵接以恩信得其心腹出諸葛武侯正兵法調疑習之軍政大修衆大和悅先生於是益信人心至靈至易感動億萬衆之心一人之心也徒恃詐力相籠絡若虎豹然日憂其將噬大不可故每論元帥當以四海為一家撫士卒如室中人習正兵不可敗先生之規模也自入仕固未嘗祈人舉亦不效尤稱門生求腳色狀例遜謝不敢答而諸公爭推擁若恐後輒從部中得去剡章輻集溢數削返之改宣教郎知紹興鄞縣以外艱不往宰饒之樂平故學宫逼陋甚危朽相枝柱苟旦莫先生曰教化之原也可一日緩乎撤新之首登講席邑之大夫士咸㑹誨之曰國家設科目欲求真賢實能共理天下設學校亦欲教飬真賢實能使進於科目非具文而已然士之應科目處學校往往謂取經義詩賦論䇿耳善為是雖士行掃盡無害於髙科他何以為持此心讀聖人書不惟大失聖人開明學者之意亦大失國家教飬之意人性至善人性至靈人性至廣至大至髙至明人所自有不待外求人所自有不待外學孩提之童無不知愛其親及其長也無不知敬其兄見牛觳觫誰無不忍之心見孺子匍匐將入井誰無往救之心是謂仁義之心是謂良心即堯舜禹湯文武周公孔子之心即天地日月鬼神之心人人皆有此心而顧為庸庸逐逐貪利祿患得失者所熏灼某切惜之敢先以告每謂教飬兹邑猶欲使舉吾邑人皆為君子况學者乎誨之諄諄不倦剗除氣習脫落意蔽本心本自無恙其言坦易明白聽之者人人可曉異時汨於凡陋視道為髙深幽逺一旦得聞聖賢與我同心日用平常無非大道而我自暴自棄自㒹𡨕而不知有泣下者入齊舍晝夜忘寢食逺近為之風動初入境訪求民瘼則聞楊石二惡少以嚚健虛唱官府姦人無賴潮藪歸之起事端賊我良善或不才長吏反利之為鷹犬挾借聲熖生其爪角莫可誰何交事未久果狺狺然來搖牙庭下先生灼見姦狀趣提圄中加責罰諭以禍福利害咸感悟願終自贖由是足不及公門邑人銜化以訟為耻夜無盜警路不拾遺未三考以國子博士召紹熙五年寧宗皇帝即位之初年也二人者大率衆相隨出境外呼先生楊父泣拜戀戀不忍離既赴監講乾繇反覆數千百言發人心固有之妙欣欣然人自慶幸謂先聖贊易後未之聞也時御筆遵孝宗成規復三年之制先生奏陛下此舉堯舜三代之舉此心堯舜三代之心順此心以往則堯舜三代之盛復見於今日但臣深恨上行而下未效群臣衰服之餘常服則紫緋緑大非禮北人曩日嘗歎孝宗復古且謂金主亦欲依倣而行今陛下順聖心行之破羣臣非禮久例亦當溥及四夷心悅誠服豈不益光明偉特為萬世法歟趙忠定公汝愚定䇿宗英實贊初政推崇道學茅拔茹連公論翕然奮張謂我本朝統承二帝三王之脉非漢唐所可及者正在斯道昌明人知禮義是故國有元氣三綱九法賴以司命此皆纍聖培植及二三大臣相與主張之天下引頸朝夕望大平時主議者害公山立扼我其上造無端罪狀垢染公斥之去祭酒李公祥抗章辨之先生按學館舊事請列劄不許告同列人人相顧語難先生曰拚一死耳遂上書言臣與汝愚義合者也汝愚豈每事盡善至被不韙以出則舉天下皆能亮其忠也昨者危急變駭不可具道軍民將潰亂社稷將傾陛下所親見汝愚冒萬死轉危為安人情妥定汝愚之忠陛下所心知不必深辨臣為祭酒屬日義訓諸生若見利忘義畏害忘義臣耻之汝愚往矣不當復來今日之言不為汝愚發為義而發未幾亦遭斥諸生復激於義為先生辨又斥之一時端士正人例誣以僞若先生則見謂僞之尤者痛黜逐掃地不留根株而其禍滔滔矣主管台州崇道觀再任轉朝奉郎嘉泰四年賜緋魚袋朝散郎權發遣全州將陛辭擬二劄其一言天下惟有此道而已天以此覆地以此載日月以此明四時以此行人以此羣居乎天地之間而不亂是故得此道則治失此道則亂得此道則安失此道則危得此道則利失此道則害此萬古斷斷不可易之理自漢而下雜之以霸故治日少亂日多此心即道惟起乎意則失之孔子曰母意意不可微起况大起乎起利心焉則差起私心焉則差起權術心焉則差作好焉作惡焉凡有所不安于心焉皆差臣願陛下即此虛明不起意之心以行勿損勿益自然無所不照賢否自辨庶政自理民自安自化四夷自服此即三王之道即堯舜之道願陛下無安于漢唐規模其二言國家舉大事必上當天心上帝以為可戰則戰上帝以為未可則勿戰易曰天地之大德曰生上帝視南北之民一也惟無道甚則誅之未至於甚人心猶未盡離苟亟戰使南北無罪之民肝腦塗地豈上帝之心也哉必民心盡離如獨夫紂帝乃震怒前徒倒戈矣是為湯武之師故志曰行一不義殺一不辜而得天下有所不為公羊九世復讎之論非春秋本㫖臣願陛下成湯武事業又軍帥尅剝諸軍怨讟溢于聽聞陛下亟罷尅剝之帥擇用不以官職為意不受私謁之人則三軍之鼓舞士氣百倍更得元帥大賢大智習知將略者訓治諸軍數年後庶其可用廷議方易爾搖邊瑣口語籍籍莫敢遏其端萌故先生願懇陳之刀筆小吏狐鼠弄威福冒節鉞張甚先生趨修門間慫慂修尺牘答曰我無是也未及對論罷自後兵連禍結肝腦塗地語若合符識者恨先生扼不上聞為之痛惜主管建昌軍仙都觀嘉定元年上厲精更化首訪耆德除祕書郎轉朝請郎遷祕書省著作佐郎兼權兵部郎官先生平時日夜長慮無路以告于上輪當面對遂極言時弊陳經國之要首奏陛下亦知都城之內外有饑奪市食者乎有勢不能俱生沈子若女於江者乎都城之東有婦閔舅姑之請鬻身助給姑聞之自經死舅知姑死又自經死子歸知父母死又自死婦以舅姑及夫俱死又經死又有取小兒烹食者嗚呼痛哉近在輦轂之下而致此極又况淮民相食妻食夫尸弟食兄尸以至父子相食其尸陛下為民父母而有此群臣之罪也望陛下急詔大臣集群臣詳議內外多少財賦陷沒於贓吏之手多少財賦徒費於送迎而不思擇賢久任多少財賦費壞於科舉取浮薄昏妄背理傷道之時文諸軍虛籍不知其幾以虛籍之費濟饑民何為不可聞淮民之饑者欲渡江郡守遏之結怨饑民是激之使為亂又聞賑濟官以嘯聚申上司纍纍查不報昏繆若此而朝廷未聞黜陟臣大懼飬寇危社稷也又奏今之守令多昏而聽吏多懷私而徇利詞訟反是為非反非為是飲恨含怨無所告訴二稅已納者復追伏則因則絣訊或舉債或鬻産甚者鬻妻賣子陛下試思民情至是其怨當何如重以今歲旱蝗郡守不肻蠲稅害民弊政不可勝紀此不擇賢之故也在外官司以汚為常公取竊取對送互送一㑹至送千緍彼此本庫自支生辰有送子生若孫有送子弟又有送今國家患無財束手無䇿得賢則官庫無公取竊取之盜財不可勝用矣此又不擇賢之故也元凶妄肆小人道長風俗大壞今雖誅殛而餘風未殄陛下宜汲汲為計勿從士大夫庸庸苟且之論臣自知學以來熟思治務惟有一䇿每路擇一賢監司使監司各辟本路郡守守辟縣令守令各辟其屬先於本貫人本貫無人乃及外邑既得賢必久任擇賢久任則百事成不擇賢久任則百事廢擇賢久任則社稷安不擇賢久任則社稷危宰執臺諌知社稷安危在此共堅守此不以親故私情敗國家公義辟非其人并罪舉主此令一下人知仕進之路悉本實行不用虛文則舍惡從善舍僞從實吏姦頓掃民悅財豐矣自此因保甲漸修比閭族黨之制書其孝友睦姻書其敬敏任恤書其德行藝興其賢者能者肆成人有德小子有造舉明主三代之隆矣又奏古者六軍軍將皆命卿今諸將率從事武勇未熟復乎古先聖王之訓典未踐修乎詩書禮樂之實德則齊諸軍不過射刺繫戰耳今陛下宜精擇文武俱通之儒法古司馬以尹正之訓導之賞諸卒之孝者忠者善者則惡者潜化祈天永命鞏國祚於泰山在此而已殿司十三軍大盛宜析小半益以司馬餘卒以備三司則其勢均可以防後患三劄恫切上數俯首諦視至讀饑民相食處戚額久之人爭傳誦流入比境見者輒雪涕舉兩手曰此江南楊夫子也三年旱蝗詔求直言先生復上封事臣聞旱者災厲之氣三才一氣如人一身腹臟作楚則四體頭目亦為之不安人事乖厲則天地之氣亦感應而為乖厲孔子曰聖人有國日月不食星辰不悖海不溢河不滿溢川澤不竭連年旱蝗雖或由軍興殺人及流移死者多而其餘人事亦大有乖厲郡縣官所至贓汚怨讟充塞豈不感動天地而為旱蝗近者凶人謀為大逆天祐宗社幸即敗獲乃官司多非其人而無德教時文取士不考實行故放僻姦邪之風盛豈不感動天地而為乖厲為旱蝗旱蝗根本近在人心陛下雖精禱于宫中又分命備于群神略降雨澤未至宏濟者旱蝗之根本未除也臣臘月三劄所陳皆弭災厲消禍變之道願陛下與二三大臣熟計之天官汪公逹小宗伯章公頴咸相敬禮願親接聞誨言汪牒兼考功郎官江西隱士吳姓者漕司申請諡先生按吳有云安社稷而以庭幃在念不知為臣之道也孔子曰以孝事君則忠既違先聖訓且啓誘人使不念親又其子觀先儒語亂臣十人問太姒為誰吳曰武王母曰何故母亦為臣答曰率土之濵莫非王臣其子曰是尊無二上之意乎吳以是竒之竊惟有婦人焉當是武王后使臣母之說行是驅天下人子不母其母不孝則不忠不忠不孝天下大亂胥而為夷狄為禽獸難議諡章亦牒兼本部郎官先生舉賢不可梯級取實知其人即自舉之剡章既上然後取部示牒照所舉者嘗曰為國薦賢吾其職也而先私照牒於人且又剡章付之使自上此何理乎西府為親故問京狀先生難之至再三終不許後欲舉某氏某未審囑當路原善先生者問果否當路笑曰此老欲舉宜自舉吾有言即敗乃事矣除著作郎遷將作少監並兼職如舊三年面對有左曹郎官者為前班上眷記先生特格下左曹先生首奏陛下已自信有大道乎舜曰道心明心即道孔子曰心之精神是為聖孟子曰仁人心也此心虛明無體廣大無際日用云為無非變化故易曰變化云為虛明泛應如日月之光無思無為而萬物畢照陛下已自有此大道又聖性淡然無所好嗜宜清明舉無失䇿而猶有禍變云云者臣恐意或微動如雲氣之興故日月之光有不照之處舜禹相告猶以精一為難願陛下兢兢業業無起意不起意則自然知柔知剛知賢知不肖洞見治亂之機常清常明可以消天災弭禍亂次言今江淮湖湘之寇並作由賢不肖溷淆監司守令而下多非其人是非㒹倒尅虐不恤故下民怨咨聚為群盜陛下當精擇衆所推服正直不撓之人巡行天下黜陟監司守令昔先生范仲淹富弼亦言委路自擇知州委州自擇知縣仍久其官守異政者就與升擢臣深念時務莫先於擇賢久任所任既賢則餘不肖乃害民敗國之人不足深恤又次言改過聖賢之大德近世士大夫多以改過為耻故人亦不敢忠告王安石本有非常之譽諸賢兢議新法决於去位安石豈不動心致疑而决䇿不回者重於改過也故其末流小人類進禍及國家陛下取群臣之改過服義者表章升擢使凡建議不遂非飾辭則集衆智歸于一是國家何事不辦而堯舜禹湯之大道復大明於今日矣先生曩嘗口奏陛下自信此心即大道乎上曰心即是道略無疑二之色問日用如何上曰止學定耳先生謂定無用學但不起意自然靜定澄明上曰日用但勿起意而已先生贊至善至善不起意則是非賢否自明此日復奏陛下意念不起已覺如太虛乎上曰是如此問賢否是非已歷歷明照否上言朕已照破先生曰如此則天下幸甚問答往復漏過八刻先生出上目送久之兼國史院編修官兼實録院檢討官請改史法從編年之舊謂孔子作春秋書某年某月某日某事人讀之以為是者道也以為非者非道也如此而書大道自明自司馬遷改編年為紀為世家列傳使後世見事見人而不見道遷不知道故敢頓廢先聖法度後人又靡然從之故道不明於天下某等不敢苟從以壞聖朝大典後不果上先生凡兩章引年一丐祠皆不允已而面對所陳久未施行遂力求去得溫州先生每歎風俗之壞自上啓周禁群飲至執至殺後世雖甚不美尚賜酺有時不縱為羣飲事倡優下賤人道所不齒顧貨視之以媒飲者冶容列肆導淫釣利傷風敗俗莫此為甚到郡之明日妓羣賀即戒之具狀來衆亦未諭也至則皆判從良去異時督賦之吏星馳火駕上下相束皇皇不能以朝暮至是寂無一跡歷縣庭獨首移文罷妓籍首訪賢者禮致之示標表首崇孝飬明宗族相恤之令首行鄉紀郊周官書敬敏任恤之類書善不書惡願與士夫軍民共由斯道上下呼舞載路如脫湯濯清波如從寒谷中生春美詞訴類局於日分難遽達先生架大鑼㦸門外令訴者自鳴鳴即引問立剖决無時每受詞採訪縣官賢否以至不一問之言人人同乃行黜陟文移僚屬例書名不押字据案方書判有喏于庭者無問誰何即釋筆拱答揖入言苟是雖賤𨽻必敬聽於理未安雖至親不為撓有私􅚖者五百為羣過境內分司幹官檄永嘉尉及水寨兵捕之巡尉儇挑易事不白郡先生驚曰是可輕動乎賊徒五百合家族何趐二千口拒捕相殺傷變在頃刻耳萬一召亂貽朝廷憂百爾其死奚贖也且兵之節制在郡將違節制是不嚴天子命違節制應斬建旗立巡尉庭下召手兩行夾立郡官盛服立西序數其罪命斬之郡官堵進為懇致悔罪意良久乃得釋奏罷分司其紀律如此或訟售産寓公負其直若千先生曰是固名流有文且長上位尊顯何得爾對曰今所訴行也文何以為語對曰益苦受其狀既而麏至者十八人同所訴即命吏籌計官帑人給之䄂衆詞即其家語曰某知公必無是也是在幹者精誠所感寓公為動則不得已吐實先生曰某知公必無是也幸出幹者屬吏寓公靳之竟追斷償所負瀕海膠禁甚嚴啇人廋稅闌出海時副端方以威福奴視宫府二子新喪母歸輒衰衣造庭挺身自冒先生從容書狀尾曰楊某老繆不堪為郡預乞一章放歸田里竟坐犯者如法府第障官河立僦屋扼舟人喉襟巷居者苦溉濯而官失虞火之備纍政氣咽咽不得吐有言者先生命廂官立毁之廂官懾怯莫敢前曰汝不食天子粟不為吾用邪科首械之往遂即日撤去滿城歡踊勒石名楊公河楮劵之稱提也所至嚴酷以往後惠文從事告訐成風破家者相踵先生寬平不迫市價自登天子下使者郡饑察使於先生為先世契出郊迎不敢當從間道走州入客位先生聞之不敢入往傳道數四乃驅車反將降車使者趨出立㦸門外先生亦趨出立使者外頓首言曰天使也某不敢不肅使者而契家子禮有常尊先生曰某守臣使者銜天子命辱臨敝邑天使也某不敢不肅遂從西翼偕進禮北面東上先生行則常西步常後及階莫敢升已乃同升自西階足踧踧莫敢就主席使者曰邦君之庭也禮有常尊先生曰春秋王人雖微例書大國之上尊天子也况今天使也持之益堅使者辭益力如是數刻使知先生終守正不渝乃曰某不敏敢不敬承執事尊天子之義即揖而出既就館先生乃以賔禮見儀典曠絶邦人創見之莫不瞿然竦觀屏息使者友告于朝曰稱提若永嘉可為法矣後憲臺亦以議察奉朝㫖行郡先生禮遜之如初然事體異天使升阼階西向坐不終辭故事歲擷朱欒蒸馨木而化之曰柑香分遍朝路號土物名品又蠲楮真柑介饋費大苛擾悉削去食用甚菲設厨生埃語家人曰吾儒素為天子任撫字敢以郡為樂羞赤子膏血自肥乎雖不督賦而財未嘗匱不設法不立額而課未嘗虧蓋由亷儉自將不費於無藝中孚感物而人自化服不忍欺也士咸向方知務已學有冒同姓登科者既數年矣忽大感悟詣先生繳納出身間貴遊狃聲樂事敖放蹐然難畏相戒曰老子無乃聞乎悉庋置之一名卿治第甚華中有堂尤偉麗固常日交賔之所先生往謁特委蛇延之别館猶愧發顔間豪侈頓消兼并衰止閭巷雍睦無忿爭聲諸色訟者雖逺涉甘心到郡庭受賭是杖杖之終無怨軍民懷戀有父母慈家家肖像祀之願阿翁夀五年除駕部員外郎去之日老稚纍纍爭扶擁緣道曰我阿翁去矣將奈何傾城出盡哭有機户嘗遭徒亦手織綿字為大帷頌德政葉侍郎適書别先生云執事二年勤治公私交慶惠利所及戴白老人以為此未有載於竹帛形於圖繪雲聚山積歡沸井里此實録也後十餘歲上庠知名士猶極談邦人去思未艾且謂當時真有三代之風更久任則一乘好矣改除工部上殿言臣有當今第一急務告于陛下世俗常情喜順惡逆故其相與率多奉承雖於同官明知其過而不敢言恐拂其意終將害已習以成俗牢不可破故雖明知吏部注授不問賢不肖而不敢革恐拂不肖者之情也雖明知擇賢久任為上䇿而不敢行以圓多闕少恐不賢者不任而拂其情也以至中外獄吏箠楚取賂以直為曲寃苦無告當職憚煩受成吏手同官拱默不復審聽囚辭州縣承帖吏卒困苦小民萬狀同官雖知不敢告長官亦視為常恐拂其屬姑容之上官剛德始或案奏其漏網者多矣民怨吏卒怨官遂怨及朝廷臣大懼中外積怨之久一夫吠呼從之者如歸市今聖朝雖有善政猶以一杯水救一車薪之火節節盜起皆乘民怨願陛下明諭大臣有長官能受逆耳之言小官喜於聞過或知過能改特表章之布告天下切勿以為小善而忽之也堯舜舍已從人成湯改過不吝改過之善惟孔子知之後世罕知非表章布告使天下改觀則衆以改過為耻此誠治亂安危所繫人性本善朝廷重賞導之於前御史監司繩之於後庶幾願聞過求忠告者多盡掃喜順惡逆之私情善政盡舉弊政盡除民怨自消禍亂不作上嘉納之除工部員外郎六年輪將對先生謂五十年深思熟慮無出擇賢久任之上䇿既纍告於上矣他何言即此說行天下事自無不治此而未竟又將旁舉細務姑嘗試具奏牘某不能是也君子於其言無所苟而已况告君乎復詳劄申斯㫖除軍器監兼工部郎官轉朝奉大夫先生不樂用磨勘初員即時遲數歲不轉一故舊自爾相料理此日亦部長二白堂轉之先生猶申省乞寢免除將作監兼國史編修官兼實録院檢討官七年以兩院進御集實録轉朝散大夫金大饑北民繦屬歸我蜂聚蟻壅日數千萬計邊吏間不知大體列弓弩臨淮水射之退先生戚然曰得土地易得人心難三代之得天下也得其民也况薄海內外皆吾赤子不幸中土人落腥羶一旦饑驅故民出塗炭投慈父母顧與之靳斗升粟而迎殺之靳脫死乃速得死豈相上帝綏四方之道也哉即日上奏哀痛言之不報後十日當面對復謂方今上䇿無過擇賢久任纍白廟堂亦已寢知擇賢久任之味云且有驗矣但朝廷承襲久例科舉取士專尚虛文大壞士子心術吏部注授專以資格不考才德郡守例二年為任知縣三年餘京官選人各有定例不肖者前後踵接故妄作害民致怨招禍大盜纍起朝廷又憚改作甚非祖宗所望聖子神孫之意今兵帥多非其人軍人懷怨有語謂用命者無恩澤不戰而走者擢用將帥全才難得其有智勇不刻剝得士卒心者不可謂無楮劵大失信民對泣痛怨後雖稍寬而有稱提州郡過嚴民甚寃苦又鹽法纍改失信舊以年月日次第支鹽今定舊鈔二分新鈔八分故舊鈔幾於無用客子怨深至骨軍器物料尚缺客子若千萬緡不知已未支還又放散軍人失所深怨不知已未根刷收拾最有一大利害習俗常談以大公至正之論為迂闊以趨時苟且權譎之術為通才權術苟且暫遣目前而人心不服上帝不與禍其在後此國家治亂安危所繫孔子曰一物失理亂亡之端苟違此道民畔如歸惟陛下明察靜思大臣亦虛已求言聞過願改君臣同心則天下被如天莫大之恩已乃歎曰吾亦老當去矣猶未已邪㑹有疾遂連乞假先生自永嘉後告老丐祠之章又十餘上每切切平道義謂有國者由乎道義則上當天心下合人心有家者由乎道義則上可以事君親下可以臨民某踰七十又幾年三入修門四經陛對言無可採擇不被於天下徒綴班列不去義乎不義乎至此又極言當去之義愈明愈確而請愈力遂除直寶謨閣主管成都府玉局觀十二年除直寶文閣亳州明道宫再任十四年除祕閣修撰紹興千秋鴻禧觀十五年特授朝請大夫右文殿修撰南京鴻慶宫賜紫衣金魚十六年除寶謨閣待制提舉鴻慶宫賜金帶十七年皇上御極除寶謨閣直學士提舉仍舊洊賜帶寶慶元年朝議大夫慈溪縣開國男食邑三百户尋授華文閣直學士提舉佑神觀奉朝請親灑宸翰屢頒詔㫖謂先朝耆德朕心素所簡記令所在軍州以禮津發赴行在先生卧病控辭至于五六二年授敷文閣直學士加纍中大夫乃提舉鴻慶尋寶謨閣學士太中大夫致仕三月二十三日薨于正寢享年八十有六先生清明純一無生死異屬纊之夕怡然如平常時遺奏聞特贈正奉大夫官其後如格賻銀絹二百計告詞有云作覬來歸胡不愈疾士歎明師之失國奚黃髮之詢學者觀之為之悲慟鄉閭孺慕走哭者交道公卿大夫士無遐邇弔奠者交踵四朝書舊百世宗師生榮死哀不愧不怍娶林氏封令入二子恪承務郎㳂海制置司准備差遣克承家學勉進未艾㦉早亡女三嫁進士孫誼宣教郎知湖州德清縣童居善宜倅舒公諱璘之子銑孫男五野基在堂孫女二長嫁將仕郎韓夑曾孫金以三年四月乙酉葬邑之五峯嗚呼三代衰聖教熄異端邪說爭鞭駕於天下其後傳注以為經章句以為學洙泗家法徒存紙上之空言穿裂剝蝕舛千稂莠學者信之愈篤即所以遺害者愈深求其真得我心之同然洞照古聖于千載之上無是理也於赫我聖篤生賢哲而先生又挺出諸儒後伏羲肇畫初無文義可傳孔氏遺書不從言語上得本心本聖無體無方虛明變化無非妙用斯道也堯以之安安舜以之無為禹以之行其無所事湯以之懋昭文王以之順帝則武王以之訪洪範周公以之師保萬民孔子以之為剛為定為繫為筆削褒貶是之謂中是之謂極是之謂秉彛之則茫茫千古智探巧索如瞶商律如膜指杓而先生得之斯道於是大明開後學之夷塗掃羣迷之浮論有功聖門大矣蓋由天資醇實渾然不雜是故立志也剛進學也勇而行之也有力既大省發終身以之勉競無須臾微懈且又克永厥夀習久益熟遂造純明之盛若先生真所謂天民先覺者歟其歸自胄監也家食者十四載築室德閏湖上更名慈湖館四方學子于熙光詠春之間而啓迪之於是始傳詩易春秋傳曾子始取先聖大訓間見諸雜說中者刋訛剔誣萃六卷而為之解謂人皆以易為書不以易為已以易為天地變化不以易為已之變化故面墻者比比天地我之天地變化我之變化非他物也私者裂之私者自小也先生是以有巳易人皆徇目為見徇耳為聞而不明夫哀樂相生不可見聞之妙不明夫禮樂無體無聲之妙先生是以有間居解人心自明人心自靈夫人皆有至明至靈廣大聖智之性微生意焉故蔽之有必焉故蔽之有固焉故蔽之有我焉故蔽之聖人不能以道與人能去人之蔽耳如大虛未始不清明去其雲氣則清明是性人所自有不求而獲不取而得先生是以有絶四紀學者不反其所自有而或陷溺於諸子百家之意說紛呶簧鼓疑似支離坐􅑂其中卒莫見道先生是以有啓蔽謂治天下其最急者五一曰謹擇左右大臣近臣小臣二曰擇賢久任中外之官三曰罷科舉而鄉舉里選賢者能者四曰罷說法導淫五曰教習正兵法以備不虞其次急者八一曰募兵屯田以省飬兵之費二曰限民田以漸復井田三曰罷妓籍俾從良四曰漸罷和買拆帛暨諸續增之賦及𣙜酤而禁羣飲五曰擇賢士教之大學教成使分掌諸州之學又使各擇井里之士聚而教之教成使各掌其邑里之學六曰取周禮及古書㑹議熟講其可行於今者三公定議而奏行之七曰禁淫樂八曰修書以削邪說先生是以治務蓋先生之學以古聖為的嘗言非大聖人終未全明故於子思孟子猶若有所未滿論治則三代之規模苟為漢唐事業雖隆貴所弗願焉其領玉局而歸也門人益親遐方僻嶠婦人孺子亦知有所謂慈湖先生巋然天地間為斯文宗主泰山喬嶽秋月獨明也始傳古文孝經傳魯論而釐正其篇次平生多所著述片言隻字無非發明大道散落海內未易遽集方裒之其已成編者甲槀乙槀及冠記昏記喪禮家記家祭記釋菜禮記石魚家記皆成書時受恩師門至深至厚自顧庸淺何能發揮然先生德業建諸天地而不悖質諸鬼神而無疑百世以俟聖人而不惑初不以人言而輕重可否也既葬有日乃弗獲巳奉同志之命姑誦其所聞謹狀寶慶三年正月十五日門人嚴陵錢時狀文忠西山先生真公跋文元公行狀後慈湖先生將葬叔謹書來命德秀曰先君之墓子其銘之先生之門人建昌傅君正夫不逺千里訪豫於粵山之麓亦以是為請竊伏惟念嘉定初元先生以祕書郎召德秀備數館職始獲從之遊見其齊明盛服非禮不動燕私儼恪如臨君師朞功之戚下汨緦麻服制期一以經禮為則而容色稱之平居接物從容和樂未始苟異於人而清明髙逺自不可及同僚有過微諷潜警初不峻切而聽者常􅋏然一日見謂曰希元有志于學顧未能忘富貴利逹何也德秀恍然莫知所謂先生徐曰子嘗以命訊日者故知之夫必去是心而後可以語道先生之於德秀可謂愛之深而教之篤矣惜其時方繆直禁林役役語言文字間故於先生之學雖竊聞一二而終未獲探其精微憂患以來粗知向道思欲一扣函丈求其指歸而不可得矣嗚呼先生已矣德秀何所據以為進德之地也夫未能深知先生之道而欲傳其心於百世之下此德秀之所不敢也雖然有一焉蓋今傳後之文有狀有銘而又或有表先生之門賢哲甚衆今狀其事者既有人非髙第不可也如德秀者或使之序其梗槩而表於墓門則其責差輕而可勉正夫幸以為然則願復于叔謹而還以命焉故書于行述之後以俟行述者正夫所纂正夫蓋有得于先生之道者也故其言言皆實録云寶慶丁亥七月朔日建安真德秀跋慈湖遺書附録
