body:
  text: 慈湖遺書卷四宋楊簡撰祝文謁宣聖文具位楊某敢釋菜于至聖文宣王某觀戴德所記先聖謂忠信大道某不勝其喜且慰以某自幼而學壯而始覺覺此心澄然虛明無體廣大無際日用云為無非變化乃即日用平常實直之心即大道而不敢輕以語人懼其不孚且笑侮及觀戴德所記聖言以為證曰乃今可以告學者矣學者亦因是多覺此先聖如天之大惠布流四方益傳諸後茲分牧東嘉又將以告東嘉人士當有覺者覺者自覺覺非外取即日用平常實直之心事親自孝事君自忠于夫婦自别于長幼自序于朋友自信日用萬變自無適而不上當天心下合人心此先聖如天之大惠言之不可盡質頌之不可盡者也敢告尚饗謁先聖文祗惟夢奠兩楹垂光萬世天有四時春秋冬夏風雨霜露孰非先聖之教地載神氣神氣風霆風霆流形庶物露生孰非先聖之教道不逺人人之為道而逺人心之精神是謂聖聖訓昭明某覺此篤信此兹分牧東嘉將以此告東嘉人士以日用庸常即大道惟毋動意立知如興雲氣自翳其光明當有覺者某內外親故二十年來亦多覺者亦盛矣敢告先聖祝文某洪惟先聖之道廣大昭明無所不包統無所不貫通在天為乾在地為坤在日月為明在四時為變通在萬物為生在某為心心者某之所自有而先聖之道在焉實廣實大實昭明實無所不包貫順而逹之萬善畢隨支而離之百非斯集某敢不敬養敬保以敬事先聖寡過誠難况于某又况于為今之邑必有繆差惟明神惠相之紹興府元日釋菜先聖大哉一元洞貫三極在乾資始在坤資生在時為春在辰為寅在日為正月之吉在人心為仁君以此尊臣以此卑父以此坐子以此立兄弟以此友夫婦以此别舉天地之間非此不能以生活一郡之政非此不能以行此某本心之所自有而先聖先得我心之所同某敢不夙夜勉勉守之以敬罔敢怠忽益謹其所自出以求全夫喜怒哀樂未發之前先師兖國公永惟人心之危可懼可畏一失其御瞬息千里先師從容終日如愚至于三月曽莫之違偶有過焉不及于二偶有怒焉不至于遷此心微動不逺而復此後來學者之所以不可及而某中心之所依歸戰戰兢兢如臨深淵如履薄氷惟恐內負此心上負先師先師鄒國公某少時讀公之書首見何必曰利亦有仁義之論口誦心惟歎息玩樂謂他日可以舉而措之天下筮仕以來驚世變之不同嗟流弊之非一日欲盡革之而難于亟欲循循焉又于心中不安惟公英靈百世不泯何以惠相于我後學使此心無愧于古之人無愧于天地祖象山先生辭某所以獲執弟子之禮于先生門下四方莫不聞矣某所以獲執弟子之禮于先生門下四方實未之知豈惟四方之士未之知雖前乎此千萬世之已往後乎此千萬世之未來盈天地兩間皆髙識深智之士竭意悉慮窮日夜之力亦將莫知又豈惟盡古今與後世髙識深智之士莫能知雖某亦不能自知壬辰之歲冨春之簿廨雙明閣之下某本心問先生舉凌晨之扇訟是非之答實觸某機此四方之所知至于即扇訟之是非乃有澄然之清瑩然之明匪思匪為某實有之無今昔之間無須臾之離簡易和平變化云為不疾而速不行而至莫知其鄉莫窮其涯此豈惟某獨有之舉天下之人皆有之為惻隱為羞惡為恭敬為是非可以事親可以事君可以事長可以與朋友交可以行于妻子可以與上可以臨民天以是覆而髙地以是厚而卑日月以是臨照四時以是變通鬼神以是靈萬物以是生是雖可言而不可議可省而不可思孔子曰吾有知乎哉無知也文王順帝之則亦自不識不知况于某乎况于四方之士乎故聖人遏絶學者之意以有意則有知遏絶學者之必以有必則有知遏絶學者之固以有固則有知遏絶學者之我以有我則有知愈知愈離愈思愈逺道不逺人人之知道而逺人不可以知道不知猶逺而况于知乎故夫先生平日之論非學者之所知非某之所知雖然先生之道亦既昭昭矣何俟乎知仰觀乎上先生確然示人易矣俯察乎下先生隤然示人簡矣垂象著明者先生之著明寒暑變化者先生之變化書者先生之政事詩者先生之詠歌禮者先生之節文春秋者先生之是非易者先生之變化學者之所日誦百姓之所日用何俟乎復知何俟乎復思勿思勿知不可度思矧可射思今先生釋然而化矣又豈學者之所知某聞先生之訃慟哭既絶而復續續而又絶絶而又復續不敢傷生微聲竟哭亟欲奔赴病質岌岌度不可支循循歷時荒政方殷今也略定氣血微強矧聞襄大事之有期求檄以來庸暢中腸之悲一奠祖行薦以此辭先生之道不可思此哀亦不可思代李伯誠祭象山先生文某于象山先生文安公受罔極之恩片言頓覺如脫桎梏清明光大到于今日用云為變化夫人之喪承訃後時今既襄奉既祥禫矣茲敢敬致三獻之禮于文安公暨夫人几筵之前日月遷流斯覺未嘗流死生雖異斯覺未嘗異言辭有極斯覺無極欲報之德昊天罔極奠徐子宜辭别去辭色惟十五年謂當合并可以從容奉話言胡為寢疾繼以訃傳傳訃惟審某當哭于寢門之外時疾作不可如志嗚呼哀哉子先我覺導我使復親象山以學某即從教自是亦小覺虛明靜莫變化云為不可射度知及仁守聖訓具在某尚欲與子冝共講仁守之力道阻且長而遽永寂哭以遣奠匪邇匪逺奠髙處約辭同舍弟朝請郎行祕書省著作佐郎兼權兵部郎官楊某謹奉奠于故同舍兄處約髙公運幹哀哀處約盛廨近在關外而自坤徂艮亦既數里初不知處約有疾作近莫俄承訃于邑子念即奔赴而轎卒已散去度再集不可往返哀哀處約某與處約同齋舍又同州里某被命此來甚久不知處約官于此納謁既晚嗣勤報訪自是一獲再奉周旋而處約遽至于此哀哀處約幽明判矣德性虛靈曩豈生今豈死一奠告哀斯哀至矣祭孫元禮尊人維紹熙四年嵗次癸丑二月戊戌朔奉議郎知饒州樂平縣楊某謹遣致一奠之禮于故明仲孫君至契嗟我明仲生長富春之山谷間曰龍門富春人士絶少國家三歲舉士能秉筆具文者不踰五十其能務實不務文求諸內不求諸外有志于道者吾于龍門見二人焉曰明仲又明仲之尊行曰孚器其子弟從其教蒸蒸于善盛哉可謂難得矣而明仲純恪進德有證聞執事敬之一言日夜闕至右以運用其左猶拱其專如此如此者閲兩旬忽大喜喜止又驟悲悲止而泰然和平矣自是發言頓異曩時及其為里正也公移方急嘗曰出入阡陌奔走應辦憂勞苦辛則甚矣而實未嘗微動某至于今猶識明仲斯言明仲方日進不已忽焉大化天地間失此賢哲誠可痛嗟千里寓誠此誠不隔明仲清明終不可殞滅當聞某此言尚饗祭沈叔晦文友弟宣教郎新差知饒州樂平縣主管勸農公事楊某謹以清酌庶羞致奠于故友人沈兄叔晦通判國録嗚呼念哉朋友道喪為日久矣吾叔晦倡之切思義起某未離膝下時知有先訓而已出門逐逐不聞正言竊意世間不復有朋友之義及入太學首見吾叔晦始聞正論且辱告曰此天子學校四方英俊所萃正當擇賢而親不可固閉某遂從求其人遂得從其賢逰相與切磨講肄相救以言相觀而善皆吾叔晦之賜今棄我而往矣嗚呼痛哉嗚呼念哉其所以得門外之助不負先訓勉勉于今未至于自棄吾叔晦之力也豈不念哉豈不痛哉叔晦之賢豈吾一鄉所可得而私蓋天下共之世方習諛波頺不可起叔晦不然如底柱中流而峙正色立朝不肯靡靡學官發䇿無所回畏雖不旋踵而罷而亦足以起士大夫萎薾不振之氣嗚呼念哉某自聞先訓大舜從人禹拜昌言由喜聞過改過明白先君則然何止內訟盡以告人自怨自艾至于泣下至于自拳出門泛觀大難其人而叔晦亦嘗聞過伏義筆書而口宣某由是益服叔晦之髙念叔晦之賢孝友天資敬恭粹然處他人之所甚難獨從容乎周旋善言善行奚可悉數威儀文詞誠足以稱雄一世某竊以為由中而發當觀叔晦之中不當徇叔晦之外三十年相與相切之情三十年相與相切之義遵制之官不得執總而從柩一奠哭别嗚呼哀哉嗚呼痛哉祭袁之屏文白首如新傾蓋如故迹若不至甚洽而其心則甚親者某與之屏之謂也吾人義以為質惟義之為親全體忠信坦然而無藏有如之屏海內幾人先聖明忠信之為主本某亦深信質直之即道愛之屏之有此深敬深念曷物喻之何啻于已獲希世之寶所恨異邑不得朝夕從容相與周旋乎仁義道德之妙中道而往何去我之謂哉向如此今亦如此欲觀之屏之正體自之屏不能以自知而况于他人豈可以心而思耳而聽目而視祭舒元英文從政郎浙西安撫司幹辦公事楊某迪功郎新雍州教授髙宗商謹致奠于故友人元英舒兄嗚呼元英不謂元英之往如此遽也相望數百里不聞知疾狀昨晨家僕以書來轉得之陳氏姑謂元英往矣和仲兄謂轉聞多失實尚須審問既而應朝相訪道子約之語亦然嗚呼元英果往矣元英果往也耶元英居明之奉化某官浙西應朝又自越來同哭于此此吾三人者之形也非吾三人者之性也元英果往也耶元英得此必蒙養而存之矣萬物轉移此心不動日月遷流此心弗改庶幾乎復性中道而往嗚呼元英鄉曲子弟從元英學善心感動亹亹可觀使元英得志行之天下其感動當益廣而今往矣嗚呼元英事職有守奔赴不可望哭東南于黑龍潭嗚呼元英必饗此奠祭趙子欽辭具銜四明楊某謹再拜遣致一奠之禮于故友人趙兄子欽節推之靈嗚呼念哉子欽天族賢行推髙豈曰為異由道而行惟行乎庸衆所不能之中故人咸敬輿論崇褒一見之亟及易爻雖轉旋曲折乎隂陽九六之間難疑問答徐而聽之而亦有所謂闕而非思行而無勞孔子沒道學不明雜説羣嗷千載而下又轉而為文辭之靡靡竊假絢飾可閔可嘆何啻乎杯坳有如子欽窺見執中之幾于陶唐氏之堯矧著之履踐異禮義之哨哨匪徒説之呶呶某既獲戾去國不得從子欽于間暇之日奉朱絃疏越之音于寂寥忽曰子欽往矣哭幾于號道阻莫詣緘辭神交不可度思孰謂夫果有數百里之遙奠呂子約辭承議郎楊某謹遣致一奠之禮于故友人吕兄子約寺丞天地之間聲同者相應氣同者相求心同者相知夫人生而有耳目鼻口四肢者必其皆同惻隱同羞惡同恭敬同是非而獨謂必心同而後相知此有其故人性自善人心自同惟氣稟異所教習異枝分派流始有不可勝窮之同哀哀子約我心則同問學雖略異大致則同所同謂何其好善同見義忘利同學不以口而以心同夫天下惟有斯義而已矣是故子約誠意篤志深知乎某之心某敬子約敬子約不以利奪其義之胸中夫是以承訃望哭如對清明之神雅正之容病質莫奔緘辭寫衷中間合離如風轉蓬不復多述惟哭某同此同萬古無窮此哀亦萬古無窮奠舒元質辭承議郎楊某謹致于故友人元質舒兄通判嗚呼昔孔子沒既葬他日子夏子張子遊以有若似聖人欲以所事孔子事之夫有子能使同門諸友斂袵而師之其賢可想而知已而曽子獨不可曽子斷斷乎非好為已勝者裼裘之失言出祖而失禮速貧速朽之失旨諸賢知之曽子亦自知曽子何所見于此而獨異哉皓皓之論曽子自言曽子自知他人安能盡知他人寥寥乎千載之下知曽子者有幾知自信者有幾吾元質亦庶乎自知自信矣而知元質者有幾元質豈有以異乎人哉亦不過不失孔子所謂忠信之主本而已矣忠信人所自有而自知其為主本者無幾元質之朋友則知元質矣亦安能盡知新安從遊之士蒙被元質之啓佑聞亦有知元質者矣亦無幾平陽之民感元質撫字之愛服元質惻怛之誠矣知元質者為誰吾鄉萬口一辭曰吾元質忠信士也吾鄉多士知元質者亦屢見其人矣而自萬衆言之則亦無幾爾嗚呼已矣某獨念不獲與元質俱終其學俱進其發憤忘食之篤念以緝熙于光明嗚呼已矣元質享某之奠元質之心惟某知之嗚呼元質嗚呼元質已上甲藁慈湖遺書卷四
