body:
  text: 慈湖遺書卷十九宋楊簡撰先生曰勿盡信非聖人之書某少不明於是非為非聖之言所誤惑不知其㡬年後乃知非大聖人終未全明戒之哉又曰學者當先讀孔子之書俟心通德純而後可以觀于史學者道心未明而讀非聖之書溺心於似是而非之言終其身汨汨良可念也孔子之言奚可不精而思之熟而復之今孔子之言出於學者之所記錄猶或失真况於非聖之書其害道者多歟孔子閒居觧孔子閒居子夏侍子夏曰敢問詩云豈弟君子民之父母何如斯可謂民之父母矣孔子曰夫民之父母乎必達於禮樂之原以致五至而行三無以横於天下四方有敗必先知之此之謂民之父母矣子夏曰民之父母既得而聞之矣敢問何謂五至孔子曰志之所至詩亦至焉詩之所至禮亦至焉禮之所至樂亦至焉樂之所至哀亦至焉哀樂相生是故正眀目而視之不可得而見也傾耳而聽之不可得而聞也志氣塞乎天下此之謂五至子夏曰五至既得而聞之矣敢問何謂三無孔子曰無聲之樂無體之禮無服之䘮此之謂三無子夏曰三無既得略而聞之矣敢問何詩近之孔子曰夙夜基命宥宻無聲之樂也威儀棣棣不可選也無體之禮也凡民有䘮匍匐救之無服之䘮也子夏曰言則大矣美矣盛矣言盡於此而已乎孔子曰何為其然也君子之服之也猶有五起焉子夏曰何如孔子曰無聲之樂氣志不違無體之禮威儀遲遲無服之䘮内恕孔悲無聲之樂氣志既得無體之禮威儀翼翼無服之䘮施及四國無聲之樂氣志既從無體之禮上下和同無服之䘮以畜萬邦無聲之樂日聞四方無體之禮日就月將無服之䘮純徳孔明無聲之樂氣志既起無體之禮施及四海無服之䘮施于孫子子夏曰三王之徳參於天地敢問何如斯可謂參天地矣孔子曰奉三無私以勞天下子夏曰敢問何謂三無私孔子曰天無私覆地無私載日月無私照奉斯三者以勞天下此之謂三無私其在詩曰帝命不違至於湯齊湯降不遲聖敬日躋昭假遲遲上帝是祇帝命式於九圍是湯之徳也天有四時春秋冬夏風雨霜露無非教也地載神氣神氣風霆風霆流形庶物露生無非教也清明在躬氣志如神嗜欲將至有開必先天降時雨山川出雲其在詩曰嵩髙惟嶽峻極于天惟嶽降神生甫及申惟申及甫惟周之翰四國于蕃四方于宣此文武之徳也三代之王也必先其令聞詩云明明天子令聞不已三代之徳也弛其文徳恊此四國大王之徳也子夏蹶然而起負墻而立曰弟子敢不承乎禮樂之原即五至五至即三無三無即五起五起即能先知四方之敗者道不可言孔子欲無言不得巳而有言曰原足矣何必言五至五至多矣又何必言三無子夏沉溺於文義之淵藪斷非一語之所能曉敷而明之曲而暢之庶㡬或觸其機也何謂至人皆有心志即志即至無所復至凡志之有所思焉有所感焉思亦何所思感亦何所感思無所思人自以為思感無所感人自以為感倐然而思無所起思而又思無所止人自以為止所止者何所厥思亦何物執之而無得視之而無睹莫究厥始莫窮厥終莫執厥中是之謂大同倐然而感感無所起感而又感感無所止人自以為止所止者何所厥感亦何物執之而無得視之而無睹或曰氣氣亦中無有或曰心心亦無本體莫究厥始莫窮厥終莫執厥中是之謂大同若然則由志而為詩詩亦然也發於禮儀禮亦然也於是乎樂生不知手之舞之足之蹈之則樂亦然也人情亦豈能終月樂終年樂亦有哀焉有所惻焉則哀有所傷焉則哀或哀焉或樂焉哀樂相生其變萬狀於戯至哉孔子曰此雖使正明目而視之不可得而見也傾耳而聽之不可得而聞也哀雖至於哭顔淵慟矣而不自知樂雖至於孟子喜而不寐亦不可見不可聞也哀樂必有物非不可見也哭笑必有聲非不可聞也而聖人斷然曰不可見不可聞衆人之樂皆不可見不可聞也而衆人自以為可見可聞也衆人之哀皆不可見不可聞也而衆人自以為可見可聞也哀與樂名也聞與見亦名也惑其名者失其實也是名即實是實即名名與實亦名也惑其名者失其實也志即詩詩即禮禮即樂樂即哀志氣即天地謂之充塞非過論也謂天地合徳可也謂範圍天地可也其曰充塞乃因人心狹固井蛙不可以驟語海姑為是言也聖人之言不可以一定論也或曰禮樂之原或曰五至或曰三無或曰致或曰行縱而言之錯而論之無不可者聖人曰五至吾曰六曰七可也聖人曰三無吾曰四曰五可也詩與禮與樂類也忽繼之以哀何也深明夫一體無二縱而言之錯而論之無不可者是故無聲之樂即無體之禮無體之禮即無服之䘮樂未嘗無聲必曰無聲非無聲也即聲也禮未嘗無體必曰無體非無體也即體也䘮未嘗無服必曰無服非無服也即服也聲即無聲體即無體服即無服本無所異何必言同唯人徒執其聲故曰無聲徒執其體故曰無體徒執其服故曰無服詩曰夙夜基命宥宻命何所基命何所始始無所始無所窮際謂之極寛極宥可也不可得而見不可得而聞不可得而思謂之至宻可也曰基曰宥曰宻皆名也惑其名者失其實也聲即無聲天下之至實也而徇名與聲者惑之聖人曰無聲所以破學者牢不可破之定見也非以無聲為定論也又慮學者無從而求之使窮其本始得其始則得其終矣夫曰基命所以原始也原聲所始始無所止莫究厥始莫窮厥終莫執厥中無聲之樂日聞四方果日聞四方矣無聲即聲無體即體無服即服服無本末無粗精威儀實無體其曰不可選也是誠不可選也凡民有䘮匍匐救之是固無服之䘮也即齊斬功緦之道也於父斬衰於母齊衰兄弟期降而功緦哀誠有等差皆一心之為也即匍匐救䘮之心以䘮其親則為齊斬為擗踊為毁瘠一也非人之所為也天也天即人人即天地即日月即四時即鬼神即禮樂之原原無所本亦無所末本末之名因人心而生本末之實不以人心而異人謂之本則亦姑從而謂之本人謂之末則亦姑從而謂之末人謂之天則亦姑從而謂之天人謂之地人亦姑從而謂之地人曰日月吾亦何得不謂之日月人曰四時吾亦何得不謂之四時人曰禮則曰禮人曰樂則曰樂人曰人則曰人人曰道則曰道曰氣則曰氣曰志則曰志曰有曰有曰無曰無號名紛然意慮雜然而未嘗不渾然寂然也人自以為紛然雜然也故曰即哀樂之相生而實不可見不可聞也此非徇名者之所知也亦非徇實者之所知也實無所徇實無所實棄名而求實非實也棄實而言名非名也實非學者之所知也名亦非學者之所知也知則不知不知則知知則亂則昬不知則清明則無所不知孔子曰吾有知乎哉無知也文王不識不知順帝之則子貢以為多學而識之聖人以為非孔子又曰天下何思何慮學者苟有意焉夫子必曰毋有必焉必曰毋有固焉必曰毋有我焉必曰毋㣲有意度如雲氣之蔽太虚矣四方有敗安能先衆人而知之先知四方之敗者必其不識不知者也孔子曰不逆詐不億不信而亦自先覺何也意慮不作而本清本明之性自無所不照故也此非口舌之所能道也此非思為之所能到也人心自清人心自明人心自無思無為人心自寂然不動思未嘗思人自以為思為未嘗為人自以為為清也明也無思也無為也寂然不動也知也不知也皆名也惑其名者失其實也子夏聞三無之論曰言則大矣美矣盛矣言盡於此而已乎是子夏未領吾聖人之㫖也聖人之㫖非美盛所可得而言也亦非言所可得而盡也故孔子又啟之曰君子之服之也又有五起焉服而念之暢而明之五起非有五者之不同也五起猶五節加焉而六可也損焉而四亦可也縱而言之錯而論之無不可者無聲之樂氣志不違氣志即樂匪異匪違無體之禮威儀遲遲威儀遲遲不可度思無服之䘮内恕孔悲其恕其悲孰得而知無聲之樂氣志既得得匪有得亦匪無得無體之禮威儀翼翼威儀翼翼順帝之則無服之䘮施及四國三者一㫖三者一徳無聲之樂氣志既從何異何同昭明渾融無體之禮上下和同此敬此恭何所不通無服之䘮以畜萬邦有安無危有福無殃無聲之樂日聞四方人皆聞之而曰不知無體之禮日就月將不勉不強從容有常無服之䘮純徳孔明皜皜精白禮樂同情無聲之樂氣志既起斯起即止變化不已無體之禮施及四海此道大通無逺弗届無服之䘮施于孫子禮亦如此樂亦如此三王之徳如此天地之徳如此日月之明如此天無私覆地無私載日月無私照人無私喜怒天地日月即人人即天地日月以為異者耳目思慮之所及也以為同者非耳目思慮之所及也非是有非非及不及天人無違故帝命之人而違天私意作之故天命去之得此道者謂之聖聖無不敬敬非人為是謂日躋為則墮矣莫克進矣進亦匪進人言曰進姑亦曰進是進無思是進無為自然昭明自然暇怡寂然渾然融融遲遲所以順帝則者在斯所以作式于九圍者在斯天有四時春秋冬夏風雨霜露寂然渾然其教我也昭然自地而上莫非神氣神氣之可指者如風霆風霆作而芽甲形庶物露生寂然渾然其教我也昭然其在我也為百骸為九竅為視聽言動為氣志嗜欲寂然渾然又何其清明又何其如神也即人即神姑曰如神何以騐其神嗜欲將至有開必先天欲降雨山川先雲宣王未出而臨􅊩天下也而嶽先降神生甫及申何為乎其神至如此道通為一其心甚神神無方體易曰範圍天地天地在吾心量中也子思曰大哉聖人之道洋洋乎發育萬物萬物者聖人實發育之也此道非聖人獨有而衆人無也天下之所同也自此而上千萬億年皆此心也自此而下千萬億年皆此心也天者宣王之髙明地者宣王之博厚山川宣王之流峙雲雷風雨宣王之震動散潤嵩嶽宣王之嵩嶽申甫宣王之申甫在古不為先在今不為今在後不為後渾然寂然昭然不澄治而常清不思慮而常明何獨聖人為然又何獨宣王為然樂平有老士王者曩數年夢令遣胥致命俾成先聖之宫且召之食期日二十有七至是黙符曩夢期日正同故王老感異捐金特盛此亦王老之有開必先也於戯人皆有是至靈至神古今一貫之心即天地之道即禮樂之原即文武之徳即三代之徳而不自知貴不自知愛殊可念也能自知者千無一萬無一自知誠鮮而常知常明者又鮮自知者孔子謂之知及之常知常明者孔子謂之仁能守之自知非意慮之所及亦非捨意慮之所為意慮交作如四時之錯行如日月之代明人皆有是明徳而不能以自明能自明而又不能常明有時乎昬則不可以為仁仁者覺之謂醫家者流謂四肢不覺為不仁先儒嘗舉此以明仁無一物之不覺無一事之不覺無斯湏之不覺如日月中天如水鑑昭明常覺常明自覺自明晝夜通貫顔子進乎此故曰其心三月不違仁其餘日月至者如仲弓之徒亦可以言仁惟日月之外亦昬亦違可以言仁不可以言盡仁顔子㡬於盡仁矣孔子六十而耳順則江漢以濯之秋陽以暴之皜皜乎不可尚已附錄曾定遠既刋先生已易又刋所觧孔子閒居閒居真聖人之言伊洛諸賢未嘗及之道之不明也我知之矣不肖者不及賢者又過之中庸庸常也弃日用平常而起乎意説吾不知之矣嘉定元年十月六日彦悈敬書熠頃侍教於知丞趙公嘗言楊先生昔著孔子閒居觧熠請之而未獲近乃寄示誠足以開悟後學因鋟木以傳之夫孔子之言見於六經論孟者人所尊信推雜出傳記者雖戴聖所傳人猶未之盡信推大學中庸先儒所推尊故學者講誦至若孔子閒居昔賢未嘗留意今先生首發明而誨觧之得非所謂五至三無皆斯人良知良能苖裔發見於心端誠可體察而用力者歟彼㘴談髙遠而不隠諸内心者可以自省矣嘉定戊辰十一月甲子學生廬陵曾熠謹書四明楊先生已易先生挈古聖所指詔學者遂成此書知有此書者衆好者鮮彦悈事先生舊矣負丞言水邑士曾定遠篤信好學久藏此書一日擕示彦悈曰先生推明心量之大使人讀之萬善備具思與朋友共將刋諸版俾彦悈書于後噫定遠其有得於先生之言乎彦悈起敬起恭以謂聖人之易不離先生此書不離定遠篤好欲刋之心不離刋者之手不離觀者之目不離誦者之口不離聽者之耳又不離不刋不觀不誦不聽者之耳目口手斯㫖彦悈實有覺於事親從兄喜怒哀樂兢兢業業日用之間先生字敬仲嘉定元年六月六日學生承事郎知吉州吉水縣丞趙彦悈敬書楊先生已易曩先生宰樂平時嘗加改訂熠得其本因謁知丞趙公是正之鋟木以詒同志或者猶謂先生復有所改近趙公為轉致諸先生之前而先生不復加損則此為定本矣夫六經論語之書言天下之義備矣迨孟氏興而復出性善飬氣之説自孟氏沒更秦歴漢以至于今前聖之意隠然而未發者乃有橫渠之西銘雖然西銘之意認天地為一家而已易一書悟天地為一已其流行發見精粗畢備厥功益大學者誠能沉潜而反復之於其一理渾然之中知其萬理森然莫不具在反諸吾身覺其機之動而體驗推放之雖馴造聖賢之域可也嘉定戊辰十月甲子廬陵曾熠謹書楊先生囬翰簡咨定遠契好長書細楷遠以見示備著深情跋語及大學簡所未安大學非孔子之言定遠曰體察曰隠諸内心是未信此心之即道故更體察更隠也體察與隠皆起意孔子戒學者毋意曰内曰外皆起意此與大學同病曰止曰定曰静曰安皆意也孟子曰勿正心而大學曰正其心又曰先誠其意先致其知又曰在格物皆意也益可驗者篇端無子曰定遠更需餘言然已易閒居觧亦詳矣略復不縷縷簡咨熠再以書叩老先生其略云平常正直之心雖人所固有然汨沒斵䘮所存者㡬希平時憧憧徃來於利慾之塗而牛羊斧斤若是其濯濯幸而聞大人先生之言是為之涵飬為之克治待其膠擾之暫息清明之復還於是良心之苖裔善端之萌蘖時時發見焉必也體而察之隠而度之持循執守久焉而後安止精熟不失我心之本然今懼其起意也不敢體察不敢隠度坐聽是心之所發則天理與人情並行真誠與偽念交作果何以洞悉其然否恐放其心而欲求者不可以如是竊嘗深念欲遵先生之教全其平常正直之心不體察不隠度不起意於中又不可汨然無所事若枯槁者之為也熠輒欲於此加閑邪之功可乎使邪既閑而平常正直之心自見如雲隂觧駮而日月之體自明由是坦然由之而無疑沛然行之而莫禦下學之用力果可以如是否乎老先生復賜書畣云簡咨定遠契好兹又得手帖備見問辨不鹵莾然定逺謂汨沒斵䘮所存者㡬希待其膠擾之暫息清明之復還是定遠猶未自覺自信易曰百姓日用而不知日用豈無膠擾易曰變化云為膠擾乃變化即天地之風雨改冥君子見善則遷有過則改孔子曰吾未見能見其過而内自訟此皆道心之變化定逺豈自旦達暮皆為邪改邪足矣孔子曰改而止邪改即止不可正其心反成起意是謂揠苖所謂芸苖乃去惡草即改過已易閒居觧並收已四月廿三日簡啟熠刋已易閒居觧因紀歲月僣書數語於卷末嘗以書請益老先生徃復之間兩蒙報教始謂平常正直之心即道而體察隠度者未免起意再謂日用變化豈無膠擾但當改過遷善而止熠反復敬誦老先生之言乃知此心虛明萬物萬化盡在其中君子所以用力於仁學而不厭者必有事焉初非臆度料想之謂也輙合已易閒居觧為一帙并以二書刋其後敢不服膺以無負老先生循循之誨嘉定己巳六月望曾熠謹書慈湖遺書卷十九
