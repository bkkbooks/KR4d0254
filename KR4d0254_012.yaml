body:
  text: 慈湖遺書卷十二宋楊簡撰家記六論孝經孔子曰夫孝天之經地之義民之行天地之經而民是則之夫天之不可以俄而度如彼地之不可俄而測又如彼而民何以則之謂民則不惟聖賢凡民皆在其中然則凡民何以則之也身體髮膚受之父母不敢毁傷是則之也是天地之經也居則致其敬養則致其樂病則致其憂喪則致其哀祭則致其嚴是則之也是天地之經也自膝下嬉嬉皆知愛其親愛其親之心曰孝是愛其親之心吾不知其所自來也窮之而無原執之而無體用之而不可既不勉而中不思而得洞焉通焉廣大而無際天之所以健行而不息者乃吾之健行也地之所以博載而化生者乃吾之化生也日月之所以明者乃吾之明也四時之所以代謝者乃吾之代謝也萬物之所以散殊於天地之間者乃吾之散殊也吾道一以貫之果吾之所自有也人皆有之而自省自信者寡也志曰聖人之道發育萬物又曰聖人先得我心之所同然也孩提之童無不知愛其親及長無不知敬兄敬兄即愛親之心也壯而事君無不知忠於君忠於君之心即事親之心也無二心也無二道也及其臨民博施之心又不期於生而自生即愛其親之心也此無二心也無二道也泛焉應酬縱焉交錯愛敬互興哀喜怒樂無二心也無二道也仁此謂之仁冝此謂之義履此謂之禮樂此謂之樂知此謂之知古人以禮言之故曰禮本於大一分而為天地轉而為隂陽變而為四時列而為鬼神又以哀樂言之故曰哀樂相生正明目而視之不可得而見也傾耳而聽之不可得而聞也又曰無聲之樂日聞四方此即天之經也此即地之義也謂民之則之非則乎彼也昏昏者滿天下不可不以漸通也漸以通之庶乎其聽也明目不可見傾耳不可聞所以告子夏非以告衆人也孔子曰天有四時春秋冬夏風雨霜露無非教也簡亦曰無非教也孔子曰地載神氣神氣風霆風霆流形庶物露生無非教也簡亦曰無非教也不敢惡於人者此也不敢慢於人者此也在上不驕者此也制節謹度者此也不敢服非先王之法服者此也不敢道非法之言者此也不敢行非法之行者此也愛於母敬於君而兼敬愛於父者此也因天之道因地之利謹身節用以養父母者此也是三才之所同也人性之所自有也人性之所自有而為悖為亂者動於意而昏也孔子每每戒學者毋意絶其昏亂之萌也意欲不作清明和融為愛敬為博愛為敬讓為不敢為不驕不溢為德義為禮樂為不敢遺小國之臣為不敢侮鰥寡為不敢失於臣妾為不敢從父之令懼其父得罪於鄉黨州閭為補君之過為哭不偯禮無容皆此心之變化一以貫之也不可以為彼粗此精也曰粗曰精者意也非吾所謂無所不通者也其物似十百千萬其實未嘗十百千萬也故曰孝弟之至通於神明光于四海無所不通詩云自西自東自南自北無思不服此之謂也此心之神無所不通光明如此由此謂之正學失此謂之僞學而章句陋儒取孔子所與曾子之書妄以己意增益之曰開宗明義章曰天子章曰諸侯章取混然一貫之㫖而分裂之又刋落古文閨門一節破碎大道相與妄論於迷惑之中而不自知此惟心通內明乃克决擇孔子曰夫孝天之經地之義民之行此道通明無可疑者人堅執其形牢執其名而意始分裂不一矣意雖不一其實未始不一人心無體無所不通無所限量是故事親之道即事君事長之道即慈幼之道即應事接物之道即天地生成之道即日月四時之道即鬼神之道孔子曰孝弟之至通於神明光于四海無所不通詩云自西自東自南自北無思不服闕六合之間一而已矣曰天曰地曰神曰鬼神其名殊其實同惟同故無不通無所不應自私自蔽始隔始離私去蔽開通應如故見訓語子曰夫孝德之本教之所由生也復坐吾語女身體髮膚受之父母不敢毁傷孝之始也立身行道揚名於後世以顯父母孝之終也夫孝始於事親中於事君終於立身大雅云無念爾祖聿修厥德人咸以身體髮膚為己不知受之於父母孔子於是破其私有之窟宅而復其本心之大公人莫切於己莫愛於己因其愛已而啓之以受之父母則愛出於公因其不肯毁傷而轉曰不敢則公而不私困而不拂聖人循循善誘發明人心本有之道德行之以立其身則身為公器而不私名揚於後以顯父母則名為公名而不私夫人之所以失其道者私而已矣以此大公至孝之心而事君無二道也言事君所以明此心之通又引大雅念祖自父母而通之於祖亦明此心之通無念念也聿語助也見訓語子曰昔者明王之以孝治天下也不敢遺小國之臣而况於公侯伯子男乎故得萬國之歡心以事其先王治國者不敢侮於鰥寡而况於士民乎故得百姓之歡心以事其先君治家者不敢失於臣妾而况於妻子乎故得人之歡心以事其親夫然故生則親安之祭則鬼享之是以天下和平災害不生禍亂不作故明王之以孝治天下如此詩云有覺德行四國順之此章發明道心之至和何其深切著明也此心虛明變化至和至順為孝為弟為博愛無一㸃己私置其中如春風如和氣如簫韶九成之音可言而不可盡烏呼至矣簡每誦此章每每樂生亦如春風和氣油然動於中而自不能喻如身在唐虞三代之盛世其親安鬼享天下和平災害不生禍亂不作灼知其可致聖人非虛言斯道天地同之四時鬼神從之宜四國順之見訓語子曰昔者明王事父孝故事天明事母孝故事地察長幼順故上下治天地明察神明彰矣故雖天子必有尊也言有父也必有先也言有兄也宗廟致敬不忘親也修身順行恐辱先也宗廟致敬鬼神著矣孝弟之至通於神明光于四海無所不通詩云自西自東自南自北無思不服愛敬父母之心即天地之心天地之變化孔子循循善誘姑以類言父天母地明猶察也謂曉逹也明王之事父母孝異乎未明者之孝未明者之孝雖孝而未通故於事天不明其天事地不明其地不特不明其天地亦不明其父母雖知父母之情意不知父母之正性人惟不自明己之正性故亦不明父母之正性亦不明天地之性人皆曰我惟知父母不知天地此不知道者之言明者觀之父母即天地人生而執己私起意彼此牢不可解一日醒覺吾性清明廣大無際無畔誠不見其有天地之殊苟未明通則事父母實不識父母况能事天地孝子之心即天地之道惟不自知故易曰百姓日用而不知於天地明察則神明彰著融一無間不可度思矧可斁思天子祀乎明堂釋奠先老有尊也言有父也食三老五更有先也言有兄也宗廟致敬不忘親也修身慎行恐辱先也至孝之發用即天地之變化也致敬於宗廟鬼神實在實著融明靜虛是謂孝弟之至道心見諸事親謂之孝見諸事長謂之弟渾然神明本無間隔如日月之光光于四海而非思非為無所不通引詩為證所以無思不服者以東西南北之心同此道心故默感而應也有道則應無道則離易曰聖人以神道設教而天下服矣以此道至神無所不通故也見訓語慈湖遺書卷十二
