body:
  text: 慈湖遺書卷十六宋楊簡撰家記十論治務論治道論封建論兵方今治務其最急者五一曰謹擇左右大臣近臣小臣二曰擇賢久任中外之官三曰罷科舉而鄉舉里選賢者能者四曰罷設法導淫五曰教習諸葛武侯之正兵以備不虞其次急者八一曰募兵屯田以省飬兵之費二曰限民田以漸復井田三曰罷妓籍俾之從良四曰漸罷和買折帛暨諸續增之賦及𣙜酤而禁羣飲五曰擇賢士聚而教之於太學教成使分掌諸州之學又使各擇邑里之士聚而教之教成使各掌其邑里之學六曰取周禮及古書㑹議熟講其可行於今者三公定其議而奏行之七曰禁淫樂八曰修書以削邪說何謂謹擇左右大臣近臣小臣周公作立政之書専言王左右常伯常任凖人綴衣虎賁為出治之本至於默然良久太息曰甚休而人主知以是為憂恤者鮮哉蓋周公深知熟諳治亂之機在此而不在彼在近而不在逺的然無疑確然無易故特而言之其情狀切至至於此近治而後逺治近臣賢而後逺臣賢小臣雖卑賤而人主之德性實薰染漸漬於左右親近孔子謂居室出其言善則千里之外應之居室出其言不善則千里之外違之治亂安危之機皆自乎近可不謹乎講筵宜擇有道盛德之士使得從容問答又使忠信秉正之士得應奉代內侍之雅事內侍內人有一語一事之善上即稱善或有賞宫閫善心興起則小人無隙可投君子可以安民安宗社安何謂擇賢久任中外之官今夫官不擇賢不久任之害人皆知之所患員多闕少今選人三年為京官二年為任吏部猶病其冗而况於久任則何以處夫至多之員故士大夫一聞久任之說不復長思輒以為不可行不思國家設官分職將以治民治國非徒欲給飬天下逐逐羣羣無德無行之士也士大夫不念夫下民被害怨及朝廷苟曰久任之不可行蓋不以國事為家事視國之利害終不如己家利害之切故不復深思亦其人自度其德之非賢其才之無能知其必不在選用之內故决然以久任為不可或又曰懼失士大夫之心吁士大夫之賢者能者國家既選而用之其不賢無能者奚足恤賢者甚無幾不肖者滿天下不肖多臨民故多怨嗟郡邑無久逺安固之備其患不可勝言送往迎來徒勞徒費居官不為長久之計貪墨以為待闕之資雖間有賢者方諳物情利病又已將代而治歸裝守禦無素備冦至輒潰民知其不久於位不服從其教令奸頑好訟俟新更訴幸新至未諳情僞姑肆其欺擾害善良無有巳時使久任則不敢矣官司數易苟且圖書散亡夲末無考吏弊滋蠧民病滋深怨積於中安保他日無一夫大呼同聲相應禍有不可言者是故當今治務擇賢久任為急宜升縣為州大州為監司各辟其屬謹簡乃僚先王令典縣稱百里奚止百里久任雖非世繼亦幾於古之侯國事力不可太厚立法當關盛衰故必縣升為州大縣即大州凡州皆得専逹於朝苟非其人則罷去無古者諸侯難制之患其甚賢有功者有褒焉有賜焉有增秩焉有貼職焉雖終其身可也必不可不升於朝則升何謂罷科舉而鄉舉里選賢者能者自漢以來古道滋喪學徒陷溺於經說琢壞道心不務實德唐鳥獸行君臣相與其勢競趨於粉飾華藻十八學士以詩咏為事業劉考功加進士以雜文幼能就學皆誦當道之詩長而博文不越諸家之集六經未嘗啓卷三史皆同掛壁本朝雖不廢經史而虛文陋習尚踵餘風士子所習唯曰舉業不曰德業高科前列多市井無賴子弟篤實端士反見黜於有司何以德行為文華而尊榮相師成風淪肌浹髓欲使事君而君獲其忠使臨民而民不被其害可得哉雖間得其人而亦無幾仕宦大槩惟羣飲惟求舉惟貨惟色惟苟且甚者民思寢處其皮而食其肉或曰鄉舉里選善矣任選之官牽於私壓於勢賢者不舉不肖者舉矣能者不選無能者選矣曰既擇賢則舉選之官賢矣自無私私則罷黜終其身不得復用敢乎哉况監司賢察官賢敢私乎哉况今日罷科舉行鄉舉里選之制天下士心即趨於善而况於舉選之官乎或曰詩賦經義論策亦無害於取士奚必革曰駢儷之文大不典雅惟助浮華不可不罷經義論策雖不必於廢而襲今時文可笑之式則亦不可為士而言辭大不成文亦難斷不可糊名棘圍月書季考唯考實德實行言辭不拘鄉里自有公論三嵗大比興其賢者能者以禮禮賔之獻賢能之書于朝三省奉其書獻于上周禮王再拜受之登於天府今若未能遽行拜禮則聖躬宜興以敬受取書藏於至尊嚴之所何謂罷設法導淫周書痛禁羣飲至於殺之漢律猶禁羣飲罰金四兩施大恩則弛其禁謂之酺至五代猶有酺知其猶有禁也今既縱民羣飲又群官婢盛妝麗服飾花木之房導民為淫蓋自夫犒設軍將之法嘗用官婢今乃用以導民羣飲官司沿襲不知愧耻殊可怪嘆而進言之臣未敢請革者亦有說行都繁麗淫侈之地恐一日不設法則飲者必頓减課入必大匱大軍乏支禍在朝夕故不敢輕罷循仍到今然某究知情狀利害曲折甚久行都諸庫設法課利反少諸店不設法課利顧多以飲者憚庫設法支費多某為樂平為東嘉皆罷設法酒禁亦寬而酒課無損何謂教習諸葛武侯之正兵以備不虞夫舉明主於三代之隆士君子至願而武備不修空談不詳慮為宋襄為成安貽笑百世不可李衛公入對太宗曰陳數有九中心零者大將握之四靣八向皆取凖焉陳間容陳隊間容隊以前為後以後為前進無速奔退無遽走四頭八尾觸處為首敵衝其中兩頭皆救數起於五而終於八此何謂也靖曰諸葛亮以石縱橫布為八行方陳之法即此圖也臣教閲必先此陳世所傳握竒文蓋得其粗也八陳本一也分為八焉黃帝始立丘井之法因以制兵故井分四道八家處之其形井字開方九焉五為法天四為法地靖曰臣討突厥西行數千里若非正兵安能致逺項羽所以敗於垓下者以不習觸處為首之法故為孔費二將軍夾攻其兩旁韓信反力攻其前三靣受敵故敗也武侯之七擒七縱孟獲者此法也今州郡教閲猶有古制其圓陳此法也將敕圓陳咸內嚮者諛佞特改舊制曰捉將團非正兵之法也有曰弩鬪鎗者此法也顧知者鮮以為古法不可用者所至如是也今七書首孫子孫子善用兵者譬如率然率然者常山之蛇也擊其首則尾至擊其尾則首至擊其中則首尾俱至孫子之書非無善者而率然之喻驗其不逹正兵之法正兵者不可敗之法也馬隆用此法以三千餘人而平涼州謂竒兵在陳內唐太宗善用兵猶不知此法某屢聞兵將官知此法者殊不易得古者六軍軍將皆命卿孔子曰我戰則克學者不可不講習他日得君行道有文事而無武備不可何謂募兵屯田以省養兵之費古者兵出於農無坐食之費今國家財計大槩十九養兵今將理財罷橫斂不屯田何以省費法當因募補籍之兵而新其制曰吾授爾田以為衣糧之資兵多死亡補以屯田兵則費可漸省得良將善教之可用也况諸州守久任則守禦自備大軍亦可漸减何謂限民田以漸復井田諸儒言井田詳矣田不井則貧富不均貧民仰不足以事父母俯不足以育妻子樂嵗終身苦凶年不免於死亡救死不瞻奚暇治禮義無禮義則亂亂則國危限田井田之漸也初限以寬在限外者可減不可增民析産異戶無時無之漸析則漸均矣再立限漸減又幾年則又漸析漸均矣何謂罷妓籍俾之從良壞亂人心莫此為甚盛妝麗色羣目所矚少年血氣未定之時風俗久壞其能寂然不動者有幾至於名卿才士亦沉浸其中不知愧耻每每發諸歌詠舉世一律不以為怪人心蠧壞邪僻悖亂何所不至前代亂亡之禍皆基於人心之不善周家德行道藝之俗成而綿祚八百後世君臣胡得無懼而官僚士夫中懷大欲襲循流俗重於罷去致國家受末流之禍嗚呼痛哉何謂漸罷和買折帛暨諸續增之賦及𣙜酤而禁羣飲所謂和買初未嘗不給錢今直取於民又不止於直取而已又俾納折帛每匹六貫五百其價大過於絹直至於夏稅折帛則每匹七貫以折為名實强取多此類奚可殫舉𣙜酤雖非强取而壞亂人心為甚酒誥諄諄禁羣飲至於殺今反導之羣飲世以酒為狂藥民為邦本本固邦寧士大夫當愛護邦本愛護人心使毋致於壞亂右所條邦賦國家方資以給軍未能省費未可省賦次第而舉可也故次於省兵費之後禁羣飲不禁禮飲何謂擇賢士聚而教之于大學教成使各掌其邑里之學自孔子殁學者異說到於今不勝其紛紛似是而非似正而邪各狥偏孤罕由中正不得大賢教救之則刑名者自刑名清靜者自清靜楊者自楊墨者自墨任俠者自任俠文華者自文華議論者自議論其孝弟忠信修謹之士雖未知道未至背道至於無忌憚之中庸雖亦罕見而不可謂無一二十年來覺於道者寖多古未之見幸多篤實吾道其亨乎孔子曰知及之仁不能守之雖得之必失之唯大賢可以司教何謂取周禮及古書㑹議熟講其可行於今者三公定其議而奏行之不以堯舜三代所以治民者治民賊其民者也不以堯舜三代所以治國者治國敗其國者也由漢而下其規模皆本以霸王道雜之霸以利王以義義利雜施猶不可而况於以利心為本乎上帝降𠂻于民若有恆性克綏厥猷惟后人主本職如此漢唐諸君安知此漢唐士夫孰深知此周六官分職皆為民極漢唐君臣所以治其民者皆極乎舜特命納言一官以治讒說殄行讒說不正之說殄行不中正之行訓方氏布訓四方以觀新物訓士民如訓子弟皆後世未之識未之知周官有比閭族黨之教有德行道藝之書漢唐無此政事也司市之屬不一而足市井小人皆教之以善道之以政漢唐無此政事也職方氏其任甚重其屬甚盛周知中國外域人民與其財用九榖六畜之數要周知其利害則無有一民不獲其所者矣漢唐無此政事也略舉數端則三代而上兩漢而下其規摹不同如冠如屨士大夫不能舉明主於三代之隆而襲漢唐治少亂多可耻之規摹顧又不逮漢唐殊可惜也某末學不敢企望三代諸聖賢而中心所安終不肯為漢唐規摹始亦不敢自必曩宰樂平後守東嘉略行己志頗有驗效於是益信其可行又信古者成人有德小子有造亦非高絶不可企及之事考諸古書固自有其道也固自有其政也舉而措之爾人性無古今感之斯應何謂禁淫樂孔子曰移風易俗莫善於樂蓋聲音之感人也易其入人心也深今之妓唱與夫雙韻鼓板之屬其氣志不為之浮動者有幾某初入大學聞太常古樂莊敬中正之心油然而生移風易俗於是乎切是故淫樂宜禁何謂修書以削邪說夫聚賢士而教之固已明聖道之大體指異說之謬誤而經子史集差失已久其惑亂人心已深不修成書則邪說不衰熄正道不開明人心乖亂人心乖亂則禍作國危孔子讃易道以黜八索述職方而除九丘以其害道壞人心不可得而已孔子曰詩三百一言以蔽之曰思無邪此思無邪至簡至易老師宿儒不知大道平夷反疑惑莫之解孔子不作序正以思無邪之道自發見於詩章之中無庸為贅自能興起人之善心奚必究見何世何人及衛宏作序冠諸篇端而學者見序而不見詩見其序說而不見思無邪之大㫖害道為甚使學者皆靣墻芣苡平常無說大道自明宏必欲求其說曲推穿鑿可笑摽有梅男女失時詩章甚明宏不詳觀雖失時而不敢萌淫奔之意不明此無邪之情而曲取以為及時此類不一戴聖何人其為曲禮記首言傲不可長亦可有而不可長歟是何言歟是何言歟又叙博聞强識於善行之先皆衰世小人之言此類奚可不削易大傳多非聖言害道者多左氏公羊榖梁三傳春秋雖因是有考而失聖人之志不一諸子史集是非混殽蠧人心為多可削者甚多掃雲翳昭日月斯任至重非得有道盛德之大賢同寅協心難乎有就已上見遺書或曰為治在轉其機而已矣其機一轉治功自成不必言三代之制也簡謂圗治而不本之三代之制終苟道也漢唐之治所以民不得其所者多禍亂多風俗不善享國不久者職此之由也如欲生民之皆安禍亂息風俗善國祚久長則三代之制不可不詳考熟講而圗復之也自漢以來公卿大夫不知王道無王佐之學雖有周官之書不能隨緩急次第以圗復之惟定雜霸之規模以周官為無用之空文就有慕而行之惟行其末不治其大者急者誠可為長太息也擇賢久任誠為當今大利或者憚於改為姑循其舊守宰數易曽無固志豈不思沿邊諸州軍守臣果能固守以當他日數百里之敵騎乎不能乎甚可畏也而猶憚於改為豈不誤國家大事乎闕少員多為今論治者之巨患而賢能之員殊不多也吾猶懼其不足以充數闕少員多非所患也古者王畿千里天子所自治者不過千里餘皆侯國後世人主德不逮禹湯文武而統理四海之內宜其治不及古然封建有春秋戰國之禍宜擇賢久任職方氏雖通理九州四夷而實分國以治晉人之覘宋者反報於晉侯曰陽門之介夫死而子罕哭之哀而民說殆不可伐也孔子聞之曰善哉覘國乎詩云凡民有喪匍匐救之雖微晉而已天下其孰能當之後世士大夫觀此雖知其善往往竊疑何以使天下之莫當也嗚呼至哉此道神靈通天地貫古今而况於人心乎即一驗百知宋之有政政者正也故孔子曰為政以德譬如北辰居其所而衆星拱之確信此者可以治天下國家矣子又曰敬一人而千萬人說所敬者寡而說者衆此之謂要道人性自善人心自仁其於父自能孝其於君自能忠其於天下事自能是是非非善善惡惡此之謂天下同然之心孔子曰心之精神是謂聖言乎人心之靈與聖人同也深惜夫人皆有至善至仁與聖人同然之性偶為利欲所昏遂迷遂亂遂惟利是從而不顧夫大義也人性自清明自廣大自中正自無所不善無動焉無作焉直而出之自不肯行不義自不肯殺不辜使行一不義殺一不辜而得天下自不肯為也此非獨孔子伊尹伯夷及古列聖如此舉天下之人心未動利欲之意則皆不肯如此也三代衰孔子沒義利之辨寖不明利欲之說滋熾秦漢以來人心益昏益亂有君如漢高出秦民於湯火之中大惠也大功也獨惜夫以利心為之遂陶冶一世之心術盡入於利欲秦之禍止於毒人之身漢之禍乃足以毒人之心嗟乎縱觀秦皇帝曰大丈夫當如此矣此何等意念而不自知其可愧史氏又從而侈言之也陽城潁川之民何辜而盡屠之也三川李由為秦守忠也何罪而斬之也類張耳者何罪而又殺之也啖秦將以利義乎非義也從三老董公仁義之說以利心從之也其處心積慮率利而為之約三章除苛禁非一出於義也四海之內塊土耳何足為意而自潰亂至此也孝宣曰漢家自有制度本以霸王道雜之此灼見高祖之心術灼見自漢高以下之規模高祖未嘗口傳面授於其後人也而後人默而承之如出一人何也利心之同習俗之成不以為異也吾深念夫漢以來諸君其性即堯舜禹湯文武之性也其本心之不肯為不義亦與堯舜禹湯文武同也有堯舜禹湯文武之心而以利欲昏之殊可惜也孔子以喻於義為君子喻於利為小人吾深惜漢諸君之不得為君子也吾非不樂於成人之美也漢諸君之善政善令出於義者吾所愛也而其出於利者吾不敢妄是之以亂惑後世也王通以仁義稱七制之主所以導後世入於利欲之途致禍亂於無窮也房𤣥齡杜如晦傳其學故𤣥齡首勸太宗用周公之迹以文其利心而如晦贊之决又使太宗不自以為耻欲史氏明書之以比於周公烏呼痛哉周公豈詐為隋帝詔太原西河鴈門馬邑民年二十至五十悉為兵伐遼以激民思亂之心者也周公豈亂巢妃而生曹王者也彼君臣之微情相與為奸利又相與勤施寬利之政以惠百姓以干其譽以欺一世故人咸以太宗為賢君房杜為良相一君二臣非無善者而總名之曰賢曰良則未可也以太宗為賢君是教後世之君為悖為逆為奸亂而文以飭之也以房杜為良相是教後世之臣為悖為逆為奸亂而文以飾之也痛哉吾懼君不得為君臣不得為臣父不得為父子不得為子兄不得為兄弟不得為弟夫不得為夫婦不得為婦天下之亂無時而已也此亦非有甚高難行而不可及者也使人心不起而為意則不入於姦利清明未嘗不在躬天下之所同也萬世之所同也皆不肯行不義殺不辜也雖祿之以天下皆弗顧也謂人之本心無此善者賊夫人者也謂己之本心無此善者自賊者也孟子所以諄諄必稱堯舜灼見人皆有堯舜之心病弗知耳弗信耳孟子知之而舉天下之人皆不知不信是以勞孟子之諄諄也吾徒不可以不熟講也不可以不自信也以此事君則可致君為堯舜之君以此治民則可使民為堯舜之民至易也至簡也或者終疑堯舜之不可及漢唐之未可輕議此乃悖逆姦亂之源也此說不可長見訓語世論有唐盛時房𤣥齡杜如晦魏徴賢名特著及考本末𤣥齡乃首發亂謀如晦贊决建成元吉謀害太宗元吉祕計又將并除建成社稷傾危民將塗炭此固可誅也然惟天吏則可以誅之秦王安得而誅之𤣥齡首謀借周公以文其姦其辭則周公也其情則非周公也以晉陽宫人私侍高祖周公固如是乎行不義殺不辜其諄諄號於天下則曰義師也天下之人心則未服其為義也自古君臣大抵同德德不同則不合不合則不能久此三臣者惟其與太宗合故深相得杜則早卒房魏則久於其位其所以合者非他也本以利雜以義正猶孝宣之言曰漢家自有制度本以霸王道雜之此豈惟漢之規模如此而兩漢三國晉南北朝隋唐五代之規模皆如此也幸而不遭變故其迹不露不幸而遭亟變履危禍則胥而入於姦利為悖為亂為大惡勢之所必至也人心自靈人心自明其隱然不安於中者即天下人心之所不服也其餘衆善誠有可觀論者樂成其美是以多稱其良不知夫義利之不明善惡之相掩啓姦雄自便之門開後世惡逆之路君子懼焉魏輔建成猶房杜之輔太宗也巢妃之穢三臣者熟視莫敢言魏雖言之僅使勿后使言而不聼則何不去至此而猶不去也夫是以太宗不親享太廟而不言也幸九成避暑不念太安之在暑而不諌也與騶子倡人比肩於朝行而不知耻也三臣者殆欲為鄉原而又不及焉者也而俗儒之論每槩稱其賢吾恐姦亂之禍接迹於來世未已也見訓語陸宣公可謂社稷之臣不可謂天民社稷之臣以安社稷為悅雖義可以已亦不已所謂天民者可則進否則退德宗昏疑猜忌其不可告語之狀昭昭為日已久矣宣公為宰相而進議不行已纍纍矣而猶强其所不欲犯其所甚怒其得死幸矣使諌官無陽城殆哉蓋其才有餘其學猶有不足誘人名利之論非正也宣公之意則善宣公之號則非執序遷之失說病久任之確論漢唐人物有如宣公可謂桂林一枝崑山片玉而猶不滿人意至此所以愈使人遐想三代之世也見訓語范氏唐鑑美太宗聼諌而曰雖過庸何傷乎豫心深所未安夫惟士大夫不知改過之為至善也致久主終耻於從諌堯舜舍己從人禹好善言仲虺稱湯曰改過不吝伊尹稱湯曰從諌弗咈孔子曰五十學易可以無大過曽子曰我過矣夫夫如是也子夏投其杖而拜曰吾過矣孟子切戒揠苖取藝苖藝苖改過而已學道之極終於改過無他竒功然則改過者聖賢之所尚進德之極致而范公輕言之默沮人主改過之心殊為不可道二是與非而已矣過則為非改則為是是則為賢為聖與堯舜禹湯文武周公孔子同道非則為愚為不肖與朱象桀紂盜跖同道是無二是非無兩非范公於一是之中而分為淺深過矣聖人復起不易吾言及考范公古文孝經說尤為蔽窒見訓語范氏唐鑑論明皇友愛曰苟能充是心則仁不可勝用也至於為人父則以讒殺其子為人夫則以嬖黜其妻為人君則以非罪殄戮其臣下是皆不能充其類也苟不能充其類則其為善豈不出於利心哉范公誠賢明皇誠有大惡因其不充類而遂謂其為善皆出於利心則不可春秋不以善掩惡不以惡掩善以明皇友愛之心為皆出於利心竊意萬世公論未必皆以為然方其為長枕大被殿設五幄與諸王更處其中之時雖非正禮謂之不出於誠心可乎人雖至不肖良心終不磨滅春秋於魯威書至至者至於廟是之也魯威大惡滔天而聖人是之者非是其弒君也是其至於廟也魯威至廟未必不出於利心而春秋猶書之而况明皇之友愛乎明皇不足惜而人良心之所發使不自知其為是不自知其即道則道心沮遏而不伸善心愈消不善之心將愈長吾為此懼故諄諄乎為是辨歐陽公作唐紀皆書其君曰大聖夫為唐臣猶曰不敢不書歐陽公宋臣而書唐君曰大聖是將以為後世之公言耶是誨天下後世胥為亂逆胥為鳥獸行也可乎正道不明姦邪雜說公行於天下學者不知其非此有國有家者之巨害未有發之者明哲之主一旦覺省痛禍亂之浸淫壞人心危國家則削除邪說若斯類者急於救焚拯溺可矣不知世稱名卿賢大夫者胡為思不及此也王明清揮塵録謂蔡元長父子既敗其門下士楊中立孫仲益之徒攻其姦惡不遺餘力觀此則亦譏誚楊孫太過矣又記蔡元長晚年語其猶子耕道曰吾欲得一佳士以教諸孫汝為我訪之耕道云有新進士張觷者遊太學有聲學問正當有立足可備其選元長領之涓辰延致入館數日之後忽語蔡諸孫云可且學走其他不必諸生請問其故云君家父子姦憍以敗天下指日喪禍惟有奔竄或可脫免諸生泣以訴元長元長愀然不樂命置酒謝之且詢救弊之策觷曰事勢到此無可言者目下姑且收叙人才改往修來以備萬一然無及矣元長為之流涕所以叙劉元城之官召張才叔楊中立之徒用之蓋由此也簡謂孔子曰苟有用我者期月而已可也三年有成楊張未能因蔡悔過之機導之十分誠實改過自暴其罪自求削奪盡反前為天豈不容人改過人心亦將大服社稷可以復安蔡氏亦保無虞見訓語本朝召命官謂之召唐謂之追聖朝可謂君使人以禮有三代之遺風唐陋矣見訓語嘗觀唐人本政之說不勝歎息既久曰比世士大夫議論略相似堯舜禹湯文武周公孔子沒道本平常人自無睹本政之說曰長民者發一號施一令民莫不悱然非矣謂不可守遽變而從之譬將適千里雖矻矻不可暨原其始固有啓之者聞於師曰古之君天下者化之不示其所以化之之道及其弊也易之不示其所以易之之道政以是得民以是淳其有作者知教化之所由廢抑詭怪而暢皇極伏文貌而尚忠質茫乎天運窅爾神化道之行也其庶矣乎吁斯言似正其實失之夫政之本固不在於發號施令失其本而事於末實德未孚實德未用而發號施令宜其悱然非矣孔子曰示之以好惡而民知禁古無不示之說易曰聖人以神道設教而天下服又曰聖人久於其道而天下化成者本德性而行之無非正道誠而無為久而無違默感天下同然之性故靡然化服是之謂神而非術也非為也禹曰克艱政乃乂黎民敏德克艱者不放逸之謂又曰安女止謂性本靜止不動此政本也此孔子曰為政以德也此伊尹暨湯咸有一德也此文王不識不知順帝則也書又曰惟幾惟康其弼直惟動丕應徯志幾者初之心發不失本止則康矣安矣又得正直之臣弼以行之則動而民咸應矣自漢以來罕聞正德之論故論治者惟睹其難德性人所自有士大夫自明其德者寡故無以啓其君見訓語漢唐苟就私刑亦明知人心之未深服岌岌乎曰安得猛士兮守四方而反者亦數起士大夫學業鹵莽大智不明不深知三代所以治天下之本末棄固安取岌殊可惜也漢唐豈樂於岌岌哉誠不知所為竭思盡慮所見止此漢宣曰漢家自有制度本以霸王道雜之自漢迄唐一律也本以霸者本以利也以利為本雖雜以王道人心豈服人心不服危亂之道也誠純於王道則人畢服四海之內仰之若父母矣夫誰與之敵見訓語董仲舒之告其君曰願設誠於內而致行之嗚呼誠豈可設也設則非誠仲舒尚不明己之心何以啓君之心孟子曰仁人心也又曰惻隱之心人皆有之恭敬之心人皆有之是非之心人皆有之又指齊王易牛之心曰是心足以王矣又言必稱堯舜蓋深知人性之本善故每每言之人心本善當時雖戰國之君而興起者衆或議武帝不能用仲舒豫謂武帝未可罪仲舒有可罪學者所治何事日夜口誦聖人之言心惟聖人之道今也己之心不自知奚以告君漢有君如文帝罷兵衛不私其子此古帝王之器質也惜乎其無臣賈誼誠美才其學踈未知道故帝亦窺見其短治天下之道本諸君心古聖王以我所自有之本心感天下所自有之本心書曰若有恆性克綏厥猷惟后禮樂刑政皆所以維持斯事今周禮一書可觀也士大夫不知道故不識禮樂刑政之原是故禮非禮樂非樂刑非刑政非政豈無善者大體失之皆非所以若恆性綏猷也失上帝所以命君司牧斯民之本職矣見訓語人心皆善皆正惟上之所以治其民者反以壞亂之故雖有本善之性如金混沙如雲翳月矣必如周禮所以治其民者治民而後庶幾乎不失上帝所以命我司牧之職而後成人有德小子有造而後兔置武夫皆公侯之腹心而後執訊連連攸馘安安而後漢有遊女不可求思嗚呼周禮之書至矣見訓語古聖王之所以教其民者每每因其日用而寓教焉書曰正德利用厚生惟和是謂三事生民之所日用非利用則厚生聖人於民利用厚生之中而寓正德車不雕器必度斑白者不提挈飲食必後長者童子不衣裘庶人耆老不徒食三易之占皆有書因致其教今周易之書具存其所以啓導人心至矣周官因賔興賢能而致德行道藝之教苟惟民之所不用而特致其教則難以至於因民之婚姻而致婚姻之禮以寓其正德因民之祭祀而為祭祀之禮以寓其正德後世之為教也徒恃詔令戒諭之暫聼暫觀其何能致化是無惑乎後世之風俗不如古也無浩歎乎後世之民不可化也終年耳目之所接心思之所及非淫聲則姦色非利欲則邪僞日夜沉浸乎匪僻浮蕩之中而欲以數行之詔令拔其久固之習難矣人心易感化以其性本善故也曩宰樂平政事大略如常間有施行而人心率嚮於善由是知人心果易感化若先謂民頑不可化則必無可化之理見訓語古者納言之官出納五言訓方氏誦四方之傳道布而訓四方以觀新物自比長而上無非師儒教之德行今之五家為甲甲有長又有小保長大保長保正副皆古制之道擇保甲之所推重者而長之倣古相教相紏禮敬其長又賔興其賢能則唐虞三代之化復行於今日矣今之通議大夫以上即古之上大夫周之卿周有卿而無上大夫今之大中大夫中大夫中散中奉即古之中大夫今之朝議大夫以下古之下大夫朝請朝散朝奉即古之上士今謂之員郎今之升朝承議奉議通直郎即古之中士今之京官宣教郎以下即古之下士今之選人承直以下即古之不命之士古簡而今繁爾非古制泯絶也大治之後徐釐正之古者論道經邦三公之職也漢則轉而為大夫為議郎矣漢大夫多至數十人議郎員益多夫以三代盛時猶難其人曰官不必備惟其人蓋論道者非聰明睿智深逹乎道者不能自秦滅先王之學士失教養故人才欲求其有如三代者絶無而僅有而况於有如三代之三公能論道經邦者乎諸大夫諸議郎所論大抵淺陋是無惑乎自漢而下不復有三代之治也漢雖有丞相御史大夫太尉為三公名則半存實則俱亡揮麈録載徐敦立語明清云凡史官記事所因者有四一曰時政記則宰執朝夕議政君臣之間奏對之語也二曰起居注則左右史記言動也三曰日厯則因時政記起居注潤色而為之者也舊屬史館元豐官制屬祕書省國史案著作郎主之四曰臣寮墓碑行狀則其家所上也四者惟時政記執政之所日録於一時政事最為詳備左右史雖二員然輪日侍立榻前之語既逺不可聞所賴者臣寮所申而又多務省事凡經上殿止稱别無所得聖語則可得而紀録者百司關報而已日厯非二者所有不敢有所附益新唐書載事倍於舊事皆取小說本朝小說尤少士大夫縱有私家所記多不輕出之簡竊謂左右史不可輪日所立之位不可去榻前逺二史因仍故事失於釐正先生嘗言治道只在擇賢久任又曰宰相貴知人知人甚難安得人人皆知但一路擇得一賢明監司使監司擇一路郡守使守擇諸邑令則得人久任而無不治矣久任則諸縣皆得上逹郡守亦止治附郭縣治國小闕諸儒論封建詳矣而猶有未深當乎人心者今具論之以俟明智者擇焉封建有一利一害利謂藩維固可禦冦害謂久則有背叛相侵伐屠殺之禍郡縣亦有一利一害利謂無背叛侵伐屠殺之禍害謂藩維不固冦至莫禦二者均有利害而封建之害重難救郡縣之害輕亦可使之無封建之害難救考之春秋戰國可覩已或謂用賈誼衆建諸侯而小其力之策則易制而夏萬國非不衆小至商侯國歸者三千周八百雖有不在其數中無數矣强凌弱小并大以至於浸寡勢也郡縣之害何以能使之無擇賢久任則亦可以固藩維亦可以禦冦亦封建之意也或曰封建公也郡縣私也吾今舉天下之賢者而郡縣之久任之其公猶封建也矧封之始公矣一再傳之後安能保其皆如父與祖之賢也亂禮虐民天子之六師未能亟至其國而移之也是乃所以成其私郡縣則審其果亂虐下一紙之令罷之矣不得肆其私也不至於必勞天子之六師也或曰封建則有百里七十里五十里之國有井邑丘甸縣都之夫數有百乘千乘萬乘之車數有五兩卒旅師軍之制而兵農可以合今能屯田營田限田漸寓兵於農則古亦可漸復也或曰封建古列聖之遺法置郡秦亂世之法舍三代而從亡秦不可此則不究事實以非亂是以惡掩善自古聖人非謂世襲至善斷不可廢侯國之封其來尚矣湯武豈能盡削而去之周所滅者五十國耳餘無大罪固不得而廢者勢也周之所封藩屏王室亦勢也使武王歷見春秋戰國之禍而又當秦已并天下之後未必以置郡為非也秦之亡也則有由盡掃先王之道焚書坑儒殺人如刈草菅然洊興大役民不堪命一夫大呼奔潰四出而不可收拾矣非罷侯置守之故也漢四百年唐三百年郡縣之亦足以綿長不為無效也或曰柳宗元匪人其言不足用也吁以人廢言君子不爾矧馬周亦言之李百藥亦言之不較是非利害民被禍之輕重而貪慕古之虛文受執古之實禍智者切哂矧今又補羣論之闕而為久任合封建郡縣之意而通之守令無罪終其身朝選上佐如古者一卿命於天子餘從辟召而責治效焉責貢士焉稱職則有賞增秩否則有罰鐫秩甚則罷縣統於州州統於帥府帥府統於朝廷帥守令皆逹於天子諸路州縣之大者析之可也縣不治并責帥諸路不治責御史宰相或曰任之莫久自歷代未之能改闕寡員衆何以處此曰才德之足以父母斯民寡矣吾猶慮其不足以充數夫何患况當漸舉比閭族黨之制分職多矣鄰里推服即可任世變風移人心本善改過移善即可任闕寡非所慮也聖人未嘗廢武備而後世之為將者至於用詐此天淵之不相及氷炭之不相入也自宋襄公成安君以好行仁義不逹其道致敗而後人懲創之者亦不逹其道遂謂古道不可復行於今是豈真不可行哉夫道一而已矣孔子曰君子喻於義小人喻於利君子於武事每求諸義每喻於義得義之趣小人於武事每求諸利每喻諸利得利之趣君子之兵豈若宋襄成安之為哉且彼二君豈真得仁義之道而用之哉由道而行何往弗利風后之握竒武侯之八陳未常用詐也自司馬懿莫之能當而况於餘乎馬隆李靖皆得正兵之法皆規八陳而用之皆根本乎黃帝丘井之制二子之為將亦古今名將之所畏仰然則正兵何畏乎大敵豈正道獨可行於古而不可行於今乎豈正道獨可行於平時而不可行於戰陳乎正道之足以倚辨如此足以致效如此而小人志不在道不得道義之趣苟於目前之利遂至於詐古志謂言不必信謂義在於變不可固也小人直狙詐而已矣以詐而勝既勝之後其禍方長求其如古者天子有道守在四夷不可得也求其折衝千里之外還師衽席之上不可得也自周衰道義不明義利雜施以詐術相魚肉可痛可念又自漢以來文武之道益離士大夫往往耻於言兵而狙詐狠暴之徒始得以攘臂於其間益肆其毒權謀益張忠信益泯良心益斫喪幾於磨滅矣相凌相詐相篡賊之風何時而已有志於善世之君子安得不精究乎風后之握竒武侯之八陳也見訓語漢高曰安得猛士兮守四方不知猛士安能守四方天子有道守在四夷諸侯有道守在四鄰韓信彭越黥布非不猛反以起亂夫武備不可已而非所尚也虎賁虎士所以行吾之德威也禮樂刑政有一不於德則人必有不心服者矣是為禍基自漢以來諸將多以智勇勇智如成湯斯善如後世則非道矣豈有不以其道而能安能治者乎諸葛之八陳李靖之正兵略近古矣見訓語今之五家結為一甲則周禮之五家為比為鄰也今小保長大保長保正副即閭胥族師黨正州長之類也縣令得賢久任行鄉舉里選德行道藝之法則比閭族黨之制可修矣所謂族師其賢可師者歟二十五家為閭百家為族百家之中必有賢者可師閭胥比長皆儒士故曰儒以道得民此都邑之法也周禮六鄉之制如此若六遂農民則所以教之者略其官亦降一等誠使鄉舉里選德行道藝之法復行於今則士民亦何敢為不善此勢之所必至也縣令苟狥私則廢之終身將不復亦何敢以私比閭族黨之制行則德行孝弟之俗成三代之治復見於今國祚之長亦可數百年漢唐之禍可息也嶽飛用兵有勝而無敗聞其欲有所舉也必盡召諸統制官環坐飲食之而與之謀先謀夫敵之所以敗我者至於六七備謀詳慮竭智共攻而終於無敗也乃行故飛每戰無敗見訓語今之樞密元帥即古之大司馬必得夫大公無私大智無我大勇無動之人而任之庶乎可以為吾民之司命用不仁者為帥僥幸成功其禍方長魏之司馬晉之劉裕其事可考見訓語蓋嘗竊笑世有御將之說說者每難之講其說者輒歸諸術且曰惟英雄之主善御將嗚呼既曰御將矣安得有善豈不危哉唐虞三代之君不御將將未嘗為亂後世以術御將術易窮將多亂蓋後世不用賢將而用智將勇將後世所謂智不本於正率出於術用任術徒勇之將授之以専殺用衆之權是使之為亂也夫既已使之為亂又為小術以御之彼一日覺之適足激怒凡曰御將者皆可笑也此其患起於儒者不知兵然世亦或有之苟得而禮用之可以措國於泰山之安奚俟於御將見訓語古志曰天子守在四夷天子卑守在諸侯諸侯守在四鄰諸侯卑守在四境簡初疑焉邈乎其不可以企而及意或謂時移世異古道不可行於後歟厥後忽省而言曰我愛彼彼如何不我愛我敬彼彼如何不我敬誠心感通四夷可使如一家然而舜誅四凶周公滅國五十其不可告語啓諭再三或于四于五有大義不可宥不得已用師則有法如後見訓語擇師周官六軍軍將皆命卿謂冡宰司徒宗伯司馬司冦司空即今之左右丞相樞密使知樞密院事參知政事同知樞密院事孔子曰古之治天下者必聖人三公論道經邦燮理隂陽官不必備惟其人三公聖人也伊尹與湯咸有一德武王師尚父周公然後可以作帥帥奉上帝之命以行上帝視天下生靈如子帥亦視天下生靈如子道全德備有一虧焉必於此乎受敗敵窺吾隙以投之兵如水器虛必入帥不能不動於色則以色誘之帥不能不屈於威武則以威武屈之帥不能不動於富貴則以富貴誘之帥之聰明知睿不能無所不照又不能稽於衆舍己從人則於其知所不及之隙以敗之帥好名則以名取之帥不能不動於玷辱則玷辱以動之此類不可殫紀始謀有友為平冦之策曰殱厥渠魁脅從罔治簡曰脅從罔治善矣願亦毋置殱厥渠魁一語於胸中足下置此一語於胸中口雖不言而精神之所發施行之所形見識之所在不可掩彼如足下欲殱之遣一刺客至如之何生靈皆吾赤子今守令不能一一皆得其人守令害虐小民小民困苦無告無所逃命聚而為盜未可遽取而戮之當諭之平之于再于三雖于五于六可也已上亦可也萬有一義不可不殺如殺吾之子則殺友不用簡言取七賊剮之或謂膾其心肝而食之彼雖嘗破縣未嘗攻州至是擁大衆欲取州以友在焉友及其未至用五六百騎摧其前鋒冦乃遁捷則捷矣亦危哉又聞冦果嘗遣刺客至所幸免於難免則免矣危哉何如用守在四夷之道諭敵諭敵之詞曰有國有家者必順承上帝之㫖乃吉乃福拂逆上帝之㫖必凶必禍此天下所共知上帝豈欲兩陳交鋒使無罪之民就死地今兹已令諸軍不得擅發一矢唯設布幔以待敵矢願同奉帝㫖同享吉福人皆樂生畏死願同奉帝㫖俾兩陳生靈均獲生全不惟兩陳生靈大喜兩陳諸軍之父母妻子兄弟甥舅親戚朋友鄰里不知其幾千萬人皆喜不惟兩陳諸軍之父母妻子兄弟甥舅親戚朋友鄰里皆喜見者聞者不知其幾萬萬幾億億皆喜然則上帝惡得而不大喜吉福惡得而不大至軍法軍法本於伍法五人為伍四人四隅長居其中長即四人之將也以此推之擊其左則左應擊其右則右應擊其後則後應以後為前以前為後四頭八尾觸處為首此不可敗之法也孫子謂紛紛紜紜鬪亂而法不亂混混沌沌形圓而不可敗似矣而又曰擊其首則尾應擊其尾則首應非也垓下之陳韓信得此法故勝項羽失此法故敗五伍為兩兩有司馬即此法也四兩為卒卒有長亦此法也整於百人易於算也自此而上皆五五卒為旅旅有帥五旅為師師有帥五師為軍軍有將皆五法之推也賞罰吳子謂能使衆整者智將也諸葛武侯之師止如丘山進如風雨整也能使諸軍不畏敵則整矣諸軍之愛敬主帥如父兄又賞信以誘於前必斬以俟於後則不畏敵矣必教習熟而後可生直孔子曰人之生也直罔之生也幸而免謂夫不直者當死其不死者幸而免也異哉衰世之言兵也曰兵者詭道也詭而勝者幸勝也適值夫彼之不善也非常勝之道也不直鬼神之所惡也上帝之所惡也不即死者幸也禍在其後也孔子曰好謀而成非謀為詭也正直之道中自有深慮逺計諸葛武侯不用詭而司馬仲逹畏之如虎李靖之取突厥止用正兵善謀者審諸此已上見訓語先生謂汲古曰武備曽講究否汲古曰愚陋未能盡逹惟知守戰之要當以將帥為要得人為先雖堅甲利兵高城深池不足恃焉漢有飛將軍則胸奴避之而不敢入境唐有王佐才則能提孤軍以取定襄汲古又嘗聞高宗皇帝聖訓云選用將帥下至偏禆必審知其才能然後用之將兵之官所繫非輕豈可不選擇先生曰建炎間如嶽都統欲有所舉必盡召諸兵官環坐飲食之而與之謀先謀夫敵之所以敗我者至於六七詳備乃行故有勝無敵又如德安守陳規備禦有方具見於守城録向者陳待制初鏤版於九江知某喜此書遂取以納東嘉郡庫即命為帙分遣士夫以廣國家武備汲古曰有是人則必能成是事但患無若人也先生曰是見誨語慈湖遺書卷十六
