body:
  text: 慈湖遺書卷一宋楊簡撰序周易解序夏后氏之易曰連山連山者以重艮為首商人之易曰歸藏以重坤為首周人之易曰周易以重乾為首周禮太卜之官曰其經卦皆八其别皆六十有四則卦之重也乆矣先儒謂文王重之非也孔子之時歸藏之易猶存故曰之宋而得坤乾焉於戱至哉合三易而觀之而後八卦之妙太易之用混然一貫之道昭昭於天下矣而諸儒言易率以乾為大坤次之震坎艮巽離兊又次之噫嘻末矣􅅀者易之􅅀也􅄲者易之􅄲也其純􅅀者名之曰乾其純􅄲者名之曰坤其􅅀􅄲雜者名之曰震坎艮巽離兊其實皆易之異名初無本末精粗大小之殊也故孔子曰吾道一以貫之子思亦曰天地之道其為物不貳八卦者易道之變也而六十四卦者又變化中之變化也物有大小道無大小徳有優劣道無優劣其心通者洞見天地人物盡在吾性量之中而天地人物之變化皆吾性之變化尚何本末精粗大小之間雖説卦有父母六子之稱其道未嘗不一大傳曰百姓日用而不知君子小人之所日用者亦一也惟有知不知之分春秋解序簡敬惟易詩書禮樂春秋一也天下無二道六經安得有二㫖以屬辭比事為春秋者國俗之所教習也非孔子之㫖也故孔子曰屬辭比事而不亂則深於春秋者矣不亂者不睹其為紛紛一以貫之也春秋之不亂即詩之不愚即書之不誣即樂之不奢易之不賊禮之不煩也一也孔子繼曰天有四時春秋冬夏風雨霜露無非教也地載神氣神氣風霆風霆流形庶物露生無非教也清明在躬志氣如神嗜欲將至有開必先天降時雨山川出雲見諸孔子家語而小戴所記乃脱簡於孔子閒居之後閒居之㫖已明繼此章為贅此言詩之不愚書之不誣樂之不奢易之不賊禮之不煩春秋之不亂㫖猶未白不可無此章以發揮也聖言至矣不可以思慮得也不可以言語索也孔子不得已而有言曰吾志在春秋於二百四十二年擾擾顛倒錯亂中而或因或作是是非非靡不曲當所是是道所非非道如四時之錯行如日月之代明皆所以明彰大道古諸侯無私史周官小史掌邦國之志費誓周書漢汝江沱之詩編諸二南自晉之乗楚之檮杌魯之春秋三史作而諸侯有私史矣孔子因之道之變也詩解序孔子曰小子何莫學夫詩詩可以興可以觀可以羣可以怨邇之事父逺之事君多識於鳥獸草木之名又曰興於詩立於禮成於樂又曰詩三百一言以蔽之曰思無邪又謂伯魚曰汝為周南召南矣乎人而不為周南召南其猶正牆面而立也與又曰誦詩三百授之以政不達使於四方不能專對雖多亦奚以為易詩書禮樂春秋其文則六其道則一故曰吾道一以貫之又曰志之所至詩亦至焉詩之所至禮亦至焉禮之所至樂亦至焉樂之所至哀亦至焉烏虖至哉至道在心奚必逺求人心自善自正自無邪自廣大自神明自無所不通孔子曰心之精神是謂聖孟子曰仁人心也變化云為興觀羣怨孰非是心孰非是正人心本正起而為意而後昏不起不昏直而逹之則關雎求淑女以事君子本心也鵲巢昏禮天地之大義本心也柏舟憂鬱而不失其正本心也􅅠柏舟之矢言靡它本心也由是心而品節焉禮也其和樂樂也得失吉凶易也是非春秋也達之於政事書也逮夫動乎意而昏昏而困困而學學者取三百篇中之詩而歌之詠之其本有之善心亦未始不興起也善心雖興而不自知不自信者多矣舍平常而求深逺舍我所自有而求諸彼學者有自信其本有而學禮焉則經禮三百曲禮三千皆我所自有而不可亂也是謂立至於緝熈純一粹然和樂不勉而中無為而成雖學有三者之序而心無三者之異知吾心所自有之六經則無所不一無所不通有所感興而曲折萬變可也有所觀於萬物不可勝窮之形色可也相與羣居相親相愛相臨相治可也為哀為樂為喜為怒為怨可也邇事父可也逺事君可也授之以政可也使於四方可也無所不通無所不一是謂不面牆有所不通有所不一則阻則隔道無二道正無二正獨曰周南召南者自其首篇言之亦其不雜者毛公之學自謂本諸子夏而孔子曰女為君子儒無為小人儒盖謂子夏又曽子數子夏曰吾與女事夫子於洙泗之間退而老於西河之上使西河之民疑女於夫子爾罪一也喪爾親使民未有聞焉爾罪二也喪爾子喪爾明爾罪三也夫子夏之胸中若是其學可以弗問而知而况於子夏初未有章句徒傳其説轉而至於毛乎齊魯詩今亡韓有其説韓毛亦有善者今間取焉先聖大訓序世稱先聖謂孔子簡祗惟先聖大訓自論語孝經易春秋而外散落隱伏雖間見於雜説之中而不尊不特有訛有誣道心大同昏明斯異毫釐有間雖面覿無覩明告莫諭是無惑乎聖言則一而記者不同也又無惑乎承舛聽謬遂至於大乖也夜光之珠久混沙礫日月之明出没雲氣不知固無責有知焉而不致其力非義也是用參證羣記聚而為一書刋誣闕疑發幽出隱庶乎不至滋後學之惑非敢以是為確也敬俟哲人審訂胥正曾子序聖賢之等不同聖賢之道同道也者所以明其無所不通之稱惟同故通不通無以謂之道孔子曰誰能出不由戸何莫由斯道也然則奚特聖賢之道同雖愚不肖之道亦同惟愚不肖由之而昏賢者由之而明聖人由之而大明易大傳曰百姓日用而不知孔子語曾子曰吾道一以貫之曽子曰唯子出門人問曰何謂也曽子曰夫子之道忠恕而已矣忠恕之㫖至於今人致其疑孔子歿子夏子張子㳺以有若似聖人欲以所事孔子事之强曽子曽子曰不可江漢以濯之秋陽以暴之皜皜乎不可尚已學者至是益疑烏虖夫何疑吾之所以事親者此也吾之所以事長者此也吾之所以應事及物者此也無所庸復致其思尚何庸復致其疑曽子以為忠恕而已而學者疑而逺之曰忠譬則流而不息恕譬則萬物散殊似大而小似通而窒正道不明意説陷溺曽子之書世罕傳誦小書幼紙訛脱為甚岌岌乎将遂泯絶而蔽學異説蔓延充塞甚者詞人墨客俳語戯論淫談穢辭則相與俎豆特書大冊溢案充宇痛哉人心安得不胥而入於昏謬熟爛愈陷愈下之汙濘謹取曽子之書參古本而釐正之間釋其疑義尚俟同志者相與扶持正道反人心歸之正慶元三年夏四月四明楊簡謹序㔾上訓語陳規守城録序古志曰天子守在四夷天子卑守在諸侯諸侯守在四鄰諸侯卑守在四境此道甚易知甚易行而自孔子歿孔子之徒又歿而士大夫率莫之思莫之行嗚呼人非木石我愛彼彼如何不我愛我敬彼彼如何不我敬即可使如一家四海之内皆吾赤子何忍取赤子而殺之然事有本末法關盛衰某有志於武備踰四十年前數年始得陳規守城録其言條理至詳某於是於守備頓省懐慮待制陳公初鏤版於九江今士大夫罕見此書見亦未必以為意待制知某愛此書取諸九江以納東嘉郡庫某即命多為帙將以分遺士夫以廣國家武備又慮觀者不本於四夷之守不得已故書鄉記序權發遣温州楊某深信人性皆善皆可以為堯舜特動乎意則雖日用平常實直之心無非大道此固不可得而書今姑倣周官書其敬敏任恤書其孝友睦婣有學邑官之賢者與主記之賢士又能書其德行道藝則尤其善者書善不書惡其敬其審某願與四邑之士夫軍民共由斯道嘉定三年冬十有二月已上甲藳慈湖遺書卷一
