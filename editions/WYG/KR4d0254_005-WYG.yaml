body:
  text: 慈湖遺書卷五宋楊簡撰行状象山先生行状先生姓陸名九淵字子靜其先偽姓至齊宣王少子元侯諱通始封平原般縣陸鄉因以為氏曽孫諱烈為吳令子孫遂為吳郡吳縣人自吳令四十世為唐宰相文公諱希聲是為先生八世祖七世祖諱崇六世祖諱德遷五代末避地于撫州金谿髙祖諱有程曽祖諱演並以學行重扵鄉里祖諱戬父贈宣教郎諱賀生有異禀端重不伐究心典籍見扵躬行酌先儒冠昏喪祭之禮行之家家道之整著聞州里母孺人饒氏生六子先生其季也先生幼不喜弄靜重如成人三四嵗時常侍宣教公行遇事物必致問一日忽問天地何所際宣教公笑而不答遂深思至忘寝食角總經夕不脱衣履有敝而無壊韈至三接手甲甚脩足跡未嘗至庖厨常自掃灑林下宴坐終日立于門過者駐望稱歎以其端荘雍容異常兒也五嵗讀書紙隅無捲摺六嵗侍親㑹嘉禮衣以華好却不受季兄復齋年十三舉禮經以告先生廼受與人粹然樂易然惡無禮者讀書無苟簡外視雖若閒暇而實勤扵攷索伯兄總家務常夜分起必見先生秉燭檢書伊川近世大儒言垂于後至今學者尊敬講習之不替先生獨謂某曰丱角時聞人誦伊川語自覺若傷我者亦嘗謂人曰伊川之言奚為與孔子孟子之言不類初讀論語即疑有子之言支離先生生而清明不可企及有如此者他日讀古書至宇宙二字解者曰四方上下曰宇往古來今曰宙忽大省曰宇宙内事乃已分内事已分内事乃宇宙内事又嘗曰東海有聖人出焉此心同也此理同也西海有聖人出焉此心同也此理同也南海北海有聖人出焉此心同也此理同也千百世之上有聖人出焉此心同也此理同也千百世之下有聖人出焉此心同也此理同也乾道八年登進士第時考官吕祖謙能識先生之文扵數千人之中他日謂先生曰未嘗欵承足下教僅得之傳聞一見髙文心開目明知其為江西陸子靜也其始至行都一時俊傑咸從之逰先生朝夕應酬荅問學者踵至至不得􅄰者餘四十日所以自奉甚薄而精神益强聽其言興起者甚衆還里逺邇聞風而至求親炙問道者益盛先生既受徒即去今世所謂學規者而諸生善心自興容體自荘雍雍于于後至者相觀而化猗歟盛哉真三代時學校也有一生飯次微交足飯既先生從容問之曰汝適有過知之乎生畧思曰已省先生曰何過對曰中食覺交足雖即改正亦放逸也其嚴如此先生深知學者心術之微言中其情或至汗下有懐扵中而不能自曉者為之條析其故悉如其心亦有相去千里素無雅故聞其大槩而盡得其為人嘗有言曰念慮之不正者頃刻而知之即可以正念慮之正者頃刻而失之即為不正有可以形迹觀者有不可以形迹觀者必以形迹觀人則不足以知人必以形迹䋲人則不足以捄人又曰今天下學者唯有兩途一途朴實一途議論嗚呼至哉足以明人心之邪正破學者之窟宅矣嘗攻切問者之疵問者不領惡聲輙至旁觀不能堪而先生悠然從容乃及他事淳熈元年授迪功郎隆興府靖安縣主簿未上丁繼母太孺人鄧氏憂服闋調建寧府崇安縣主簿八年少師史公浩薦先生之辭曰淵源之學沈粹之行輩行推之而心悟理融出扵自得得㫖都堂審察陞擢不赴九年侍從復上薦除國子正諸生叩請孶孶啓諭如家居教授感發良多十年冬遷勅命所刪定官同志之士相從講切不替僚友多賢相與問辨大信服先生自少時聞長上道靖康間事慨然有感扵復讐之義至是遂訪求智勇之士與之商確益知武事利病形勢要害人物短長十一年當輪對期迫甚獨未入思慮所親累請久乃下筆繕寫甫就厥明即對上屢俞所奏脩寛恤詔令書成有㫖改承奉郎十三年轉宣義郎親朋謂先生久次冝求去先生曰往時面對粗陳大義明主不以為非然條貫靡竟統紀未終思欲再望清光少自竭盡以致臣子之義距對五日除将作監丞後省疏駮得㫖主管台州崇道觀先生既歸學者輻輳愈盛雖鄉曲老長亦俯首聽誨言稱先生先生悼時俗之通病啓人心之固有咸惕然以懲躍然以興每詣城邑環坐率一二百人至不能容徙觀寺縣大夫為設講坐扵學宫聽者貴賤老少溢塞塗巷從㳺之盛未見有此貴溪有山實龍虎之本岡先生登而樂之結茒其土山髙五里其形如象遂名之曰象山自號象山翁四方學徙復大集至數百人從容講道詠歌怡愉有終焉之意扵是人號象山先生十六年詞秩滿今上登極除知荆門軍是年轉宣教郎又轉奉議郎紹熈二年九月初領郡事吏以故例白内諸局務外諸縣必有揭示約束接賔受詞分日先生曰安用是延見僚属如朋友推心豁然論事惟理是從先生家書有云每一同官禀事衆有所見皆得展其所懐辯爭利害扵前太守唯黙聽俟其是非既明乃從賛歎以養其徇公之意太守所判僚屬却回者常有之先生教民如子弟雖賤𨽻徒卒亦諭以理義接賔受詞無早暮下情盡逹無壅故郡境之内官吏之貪㢘民俗之習尚忠良材武與猾吏暴强先生皆得之扵無事之日往時郡有追逮皆特遣人先生唯令訴者自執状以追以地近逺立限皆如期即日處决輕罪多酌人情曉令解釋至人倫之訟既明多使令元詞自毀之以厚其俗唯怙終不可誨化乃始斷治詳其文状以防後日反覆久之民情益孚兩造有不持状唯對辯求決亦有證者不負自至問其故曰事久不白共約求明或既伏㑭各持其状去不復留案嘗夜與僚屬坐吏白有老者訴甚急呼問之體戰言不可解俾吏状之謂其子為群卒所殺先生判翌日呈僚屬難之先生曰子安知不至是凌晨追究其子蓋無恙也人益服先生之明有訴遭竊脱而不知其人先生自出二人姓名使捕至訊之伏辜盡得所竊物還訴者且宥其罪使自新因語吏曰某所某人尤暴吏亦莫知翌日有訴遭奪掠者即其人也乃加追治吏大驚郡人以為神初保伍之制州縣以非急務多下檢覈盜賊得匿藏其間近邉尤以為患先生首申嚴之姦無所蔽有刼僧廬鄰伍遽集擒獲不逸一人至是群盜屏息荆門素無城壁先生以為此自古戰爭之塲今為次邉在江漢之間為四集之地南捍江陵北援襄陽東䕶隨郢之脅西當光化夷陵之衝荆門固則四鄰有所恃否則有背脇腹心之虞由唐之湖陽以趨山則其涉漢之徑已在荆門之脇由鄧之鄧城以涉漢則其趨山之道已在荆門之腹餘有間途淺津坡陁不能限馬灘瀬不能以濡軌者所在尚多自我出竒制勝徼敵兵之腹脇者亦正在此雖四山環合易扵備禦義勇四千强壮可用而倉廪蔵庫之間麋鹿可至累政欲脩築子城憚重費不敢輕舉先生審度決計召集義勇優給傭直躬日勸督役者樂趍竭力工倍二旬訖築初計者擬費緡錢二十萬至是僅費緡五千而土工畢後復議成砌三重置角㙜増二小門上置敵樓衝天渠荷葉渠䕶險墻之制畢備纔費緡錢三萬又郡學貢院客館官舍衆役並興初俗習惰人以執役為恥吏唯好衣閑觀至是風一變督役官吏布衣雜役夫佐力相勉以義不專以威盛役如此而人情晏然郡中恬若無事荆門兩縣置壘事力綿薄連歳困於送迎藏庫空竭調度倚辦酒税先是日差使臣暨小吏伺商人于外檢貨給引然後至務務唯據引入税出門又入視官收無幾而出入其費已多初謂以嚴禁𣙜杜姦弊而門吏取賄多所藏覆禁物亦或通行商苦重費多由僻途務日入縮先生罷去之或曰闗譏所以防姦列郡行之以為常一旦罷廢商冒利必有至務者先生曰是非爾所知即日揭示俾徑至務復減正税援例是日税入立増有一巨商已遵僻途忽聞新命復出正路廵尉卒扵岐捕之先生詰得其實勞而釋之巨商感涕行旅聞者莫不以手加額誓以毋欺私相轉告必由荆門旁觀者詰其故商曰罷三門引減援例去我輩大害不可不報德税收増倍酒課亦如之荆門故用銅錢後以近邉以鐵錢易之銅錢有禁而民之輸扵公者尚容貼納先生曰既禁之矣又使之輸不可即蠲之又減鈔錢罷比較不遺人詣縣給吏札置毉院官吏民咸悦而郡亦貧而樂獄卒無以自給多告罷先生以僚屬訪察得其實遂廪給之朔望及暇日詣學講誨諸生郡有故事上元設齋醮黃堂其説曰為民祈福先生於是㑹吏民講洪範歛福錫民一章以代醮事發明人心之善所以自求多福者莫不曉然有感扵中或為之泣湖北諸郡軍士多逃徒視官府如傳舍不可禁止緩急無可使者先生病之乃信捕獲之賞重奔竄之刑又數閲射中者受賞役之加傭直無饑寒之憂相與悉心弓矢逸者絶少他日兵官按閲獨荆門整習他郡無所先生平時按射不止扵兵伍郡民皆得而與中亦同賞薦舉其屬不限流品嘗曰古者無流品之分而賢不肖之辨嚴後世有流品之分而賢不肖之辨畧先生之家居也鄉人苦旱郡禱莫應有請於先生乃除壇山巔除已雲交及至禱太雨隨至荆門亦旱先生每有祈必疎雨隨車郡民異之治化孚洽久而益著既踰年笞箠不施至扵無訟相保相愛閭里熈熈人心敬向日以加厚吏卒亦能相勉以義視官事如其家識者知其為郡有出扵政刑號令之表者矣諸司交章論薦丞相周公必大嘗遺人書有曰荆門之政于以驗躬行之效三年冬十一月語女兄曰先教授兄有志天下竟不得施以没女兄䀌然又嘗謂家人曰吾将死矣或曰安得此不祥語骨肉将奈何先生曰亦自然又告僚屬曰某将告終先生素有血疾居旬日大作實十二月丙午越三日疾良已接見屬僚與論政理如平時晏息靜室命掃洒焚香家事一不掛齒庚戌禱雪辛亥雪驟降命具浴浴罷盡易新衣幅巾端坐家人進藥先生却之自是不復言癸丑日中奄然卒郡屬棺歛竭誠哭哀甚吏民哭奠充塞衢道各有辭以叙陳痛戀之情柩歸門人奔哭㑹塟以千數郡縣扵其講學地為立祠先生遺文諸生已次第編紀先生生於紹興九年二月乙亥享年五十有四娶吳氏封孺人二子持之循之女一明年十有一月壬申塟于鄉之永興寺山距妣饒氏孺人墓為近先生之道至矣大矣某安得而知之惟某主富陽簿時攝事臨安府中始承教於先生及反富陽又獲從容侍誨偶一夕某發本心之問先生舉是日扇訟是非以荅某忽省此心之清明忽省此心之無始末忽省此心之無所不通某雖凡下不足以識先生而扵是亦知先生之心非口説所能賛述所畧可得而言者日月之明先生之明也四時之變化先生之變化也天地之廣大先生之廣大也鬼神之不可測先生之不可測也欲盡言之雖窮萬古不可得而盡也雖然先生之心與萬古之人心一貫無二致學者不可自棄紹熈五年二月十有六日門人奉議郎知饒州樂平縣主管勸農公事楊某状出甲藁墓誌銘銘張渭叔墓越之新昌張渭字渭叔某之為國子博士以言事罷歸也韓侂胄方用事時論誣善類曰偽學舉子文字由是大變不敢為理義之言如某見謂偽學之尤者而渭叔不逺數百里與其兄弟皆至願摳衣焉從容數月未嘗一語及舉子事業某扵是信其人與之語無他説大㫖惟本孔子之言曰心之精神是謂聖孟子仁人心也人心即道故舜曰道心日用平常之心即道故聖人曰中庸庸常也扵平常而起意始差始放逸渭叔領㑹無疑今其季汾清叔曰渭叔蓋頓有覺焉後移書曩所師寺丞吕先生先生甚善其有覺賀先君有子先生諱祖儉渭叔弱冠有俊譽富户欲妻之渭叔笑不顧以為論財夷虜之道後知玉牒趙共甫賢遂聘其兄之子雖甚窶安焉親故洪雨若之親喪未舉告渭叔命其室人傾囊周之衆人咸以爲難篤於好善勇於改過朋友之所共敬得年僅三十七而不禄實嘉定元年二月望日哀哉越三月而趙氏産男名堅老将以庚午正月戊戌塟於其鄉之董墺渭叔之父諱汝弼某已嘗銘其墓今又銘渭叔墓銘曰人心虚明變化云為不可度思渭叔覺斯宋母墓銘宋母者嚴陵王氏祕丞庭堅之曽孫吾友宋修叔之母節行一世罕儷四方士友尊而稱之曰宋母某事象山陸先生于今幾四十年矣近四五年始識修叔修叔澹然修潔亦承事陸先生冡子伯㣲亦言其澹然修潔修叔遽丁其母憂既葬持其所自記母王氏之行實再拜又再拜而請銘扵某某觀其四嵗喪母哀事繼母杜宜人以孝聞宜人愛同已出及禮如成人歸金華郴守宋子華之子沆字叔子三十而寡長子甡纔十有二次林即修叔生五嵗而有一月而朋始生既久或告以嵗月尚賖何恃能自守王氏泣曰女不讀禮乎信婦德也一與之齊終身不改夫死不嫁古志甚明甡年十有五六較藝郡庠數居前列王氏誨之曰女父無恙時講道於家未嘗强以語人而就問者衆每使學者熟味論語學而時習一章所學果何學所習果何習是弗之思詎可效舉子習小技角勝負止於科第而已耶一日具冠帔請扵舅乞擇大儒俾就學時吕太史祖謙名動一時遣之從逰大見稱許其舅欲以致事任甡王氏請曰傳長法也恐難以卑踰尊况孤寡之人越受恩榮萬一不克負荷則上孤慈祖之恩下失孀母之望不若聽其脩身俟命後甡登紹熈龍飛進士科以及禄養甡字茂叔不幸蚤死吕子約哭之為慟王氏通詩禮史傳不為辭章見世之婦若女以文章筆札傳於人者以為非處逆順事泰然喜慍其家三世衣無常主㸑無别膳少長良賤不聞忿爭皆王氏化之後居隆興開禧三年冬十有二月己巳以疾終夀七十有四明年嘉定改元冬十有二月壬申葬隆興之新建縣桃花鄉白鷺嶺孫男九自適自道自逄自迪自述自遜自逹自逺自逸四明楊某銘曰宋母節義秉心不貳此心即道學子疑貳半亭髙祖墓記朝請郎權發遣温州軍州兼管内勸農公事楊某字敬仲之髙祖考九府君諱論居于明州今為慶元府之奉化縣之忠義鄉之半亭殁而塟焉西子伯與季及其子孫多環而居之叔子無嗣仲子諱宗輔即某之曽祖考獨徙而居鄞故曽伯祖考及曽叔祖考之子孫從而徙焉者亦間有暨先大夫始又自鄞而徙慈溪先大夫乾道中嘗命仲兄甃九府君墓刻石為望屋其門今門圮北赴東嘉奠拜墓下感復興懐思復修興而食指衆新俸無幾方坎坎忽半亭曽伯祖下族兄百六府君之子子才子富子祥合計恊力作新門墻邑里改觀又族兄名居立石使億以書來欲某識其事某祗惟髙祖府君本性清明無體量廣大無際畔萬善本備不假造為日月運行雲雷風雨霜露即吾髙祖府君之變化也草木林生山川峙流人物羣居父慈子孝兄良弟弟夫義婦聴長惠幼順即吾髙祖府君之變化也有孔子之言為證曰心之精神是謂聖孟子亦道性善此萬古人心之所同五世介孫朝請郎權發遣温州軍州兼管内勸農事楊某不勝興敬興慕以書于永嘉郡齋蔣秉信墓銘舜曰道心明心即道動乎意則為人心孔子語子思曰心之精神是謂聖孟子亦曰仁人心也心可言不可思孔子知門弟子必多以孔子為有知明告之曰吾有知乎哉無知也知即思又曰天下何思何慮周公仰而思之夜以繼日即思非思孔子臨事而懼好謀而成即懼非懼即謀非謀如鑑之照大小美惡往來參錯具有而實無如日月之光萬物畢照入松穿竹歴歴皎皎而日月無思曽子曰皜皜謂此也日至非果有所至不動乎意澄然昭然一日之外或動乎意故曰日至自古到今知道者千無一萬無一故學者以知道為至聖人與人群居不得不因人為言月至亦非有所至澄然昭然一月之外或動乎意故曰月至顔子三月不動乎意故曰三月不違仁某得之先兄和仲曰同舍蔣秉信因聞歌朝中措之詞而忽有覺某厥後屢奉秉信周旋灼見秉信之果有覺非學者所知今其云亡其子行中求言以發其幽光秉信之光非幽所可間秉信諱存誠自其上世居四明郡城中小湖之西南曽祖諱俊明金紫光禄大夫祖諱琚大學諭父諱從儒者秉信幼不好弄母滕氏鍾愛之曰當成大器娶任氏盡以奩具助嫁諸妹全身布衣見人所行當扵理必賛必譽有違乎理必告必戒嘉定三年三月寝疾故舊訪問必謝曰萃聚許久今告違矣母哭母訝七日而殁實壬寅十有一月丙申葬于韓溪之青嶂嗚呼秉信之善人所共知秉信之心人所未知人皆有此心多不自知友人楊某書宋舒子德彰墓碣道之不明乎天下不知其幾世于茲矣道無不明人自不明孔子曰禹吾無間然矣菲飲食而致孝乎鬼神惡衣服而致美乎黻冕卑宫室而盡力乎溝洫又曰禹吾無間然矣此三者苟其志于善亦皆可能也而聖人稱禹之善何也道不離乎日用平常而已矣而學者率求之過率作意孔子又曰舜其大知也與好問而好察邇言隠惡而揚善人情率厭常而喜新翫平夷而尚竒偉此自古學者通患聖人知學道者率求之髙深幽逺特曰中庸庸常也平常也洪範曰王道平平聖誨諄諄聽者藐藐某之為樂平也舒同年之弟揚字德彰所居伊邇節朔相過暨某拜國子博士之命也延某于其别圃而餞焉于今幾二十年其子綸以訃告卒之日嘉定元年季春己丑塟之日是年十有一月甲辰墓在長城鄉饒娥廟冡之右麓新權知興國軍許公錫状其行曰孝友曰睦婣曰任恤曰文雅與鄉貢雖未仕而道無窮通無精粗無本末一以貫之綸請銘其墓某慮學者復扵孝友睦婣任恤之外求道銘曰德彰之行平夷大道之妙在斯百姓日用乎平常大道之中而不自知顧舍之而慕竒鄒魯卿墓銘某為樂平首得鄒夢遇某字之曰元祥元祥自有覺某從而滌其滓元祥之叔祖居徳興名近仁字魯卿又來訪道某與語從容翼日又與語良久忽覺厥後數欵語益信其果覺嘉定二年春至行都又從容累累歸未幾而疾作仲夏癸卯忽盥手振衣而坐召子曽曰吾心甚明無事可言爾輩修身學道則為孝矣言訖而瞑元祥以訃來予哭于寝門之内曽不憚修途至通名予意魯卿之子巳而問之果然予哭曽哭而拜予答拜唁問既久留終日知曽因元祥而又覺曽請銘其父墓在龍田山之阿魯卿祖諱聖徙嘉州文學父諱孟登進士科初尉建徳後隆興録參魯卿質直不事文飾以孝聞惡衣菲食窮居而樂和而敬或干以非義則介焉弗受告以有過則歛袵謝服所當為雖强禦弗畏以特恩為静江法曹再調龍陽丞娶董氏長子嶧次曽銘曰孔子殁月至日至者又殁誰其嗣之孟入聖域濓溪明道似之象山陸子則有之魯卿同之鄒元祥碣饒之樂平鄒夢遇字元祥四明楊某之宰樂平也夢遇與鄉貢自是相與從容後某以職事至蘭若夢遇見次言近覺某叩之知其覺矣而猶不無阻隨通之自是益澄明後又得夢遇之叔祖近仁字魯卿與之語厥明再語而頓覺末得比邑餘干之曹夙字叔達叔達留縣庠晝忘食夜忘寝旬有四五日而忽覺嗚呼盛哉自孔子殁學者率陷溺扵文辭論議喪其本靈而事意説寥寥二千載其自知自信者有幾若三子者可謂自知自信孔子曰心之精神是謂聖人皆有是心百姓日用而不知三子知之魯卿之子曽字伯傳比年亦覺嗚呼盛矣元祥事親至孝篤愛諸弟嘗語人曰事親從兄之際不思不勉無非實地變化云為弛張闔闢宇宙在吾手又曰渾然之中品節條理粲然以列又曰人皆以兀坐端黙為静吾獨以步趨應酬為静人皆以步趨應酬為動吾獨以兀坐端黙為動其舅謂元祥色温言約神定氣和喜愠不形動容周旋荘肅閒泰其處事一扵義理不可奪别後進德厥效廼爾久欲來見嘉定四年春赴禮闈罷而疾作不可來歸而畧平孟夏三日命二子扶坐艮齋自謂氣雖㣲而神則嘉時齋明喜甚哦曰嘉木扶疎兮烏鳴闗闗暑風舒徐兮庭中間間起視天宇兮浩乎虚澄還中堂與家人茗飲罷就寝而殁訃至永嘉哭于燕堂遣奠臘月其子自得使弟自厚來某對哭自厚再拜塟有日請志其墓銘之曰人心至靈自通自明元祥無能有所増唯不動乎意不昏其本靈鄒德祥尊人墓銘某自微省而灼知人皆有至善至靈至神至明之性與天地同與古聖賢同及為樂平尤欲使舉吾邑之人皆為賢為哲矧凡學者尤所屬意開其所自有明其所自有相嚮相信者甚衆而其自信而不復疑通逹而無阻留者亦寡矣金山之桐林有鄒生夢遇者初聽予言雖不違察其神聽其辭氣未以發紹熈四年秋予視旱過其鄉接語稍異於曩矣予從而剔其翳刮其垢渙然通貫他日留縣齋益欵益驗益信于益喜某以所教養斯邑之民功效僅僅獨扵鄒生自謂其庶幾夢遇自此無逸無間無雜則進扵日至月至南野居士諱雯字德顯者其父也雖弗獲接其辭色以氣類推之冝有善德今攷所状行知其孝于親友于兄弟居喪毀瘠哀敬雖功緦亦素服終月數里俗鮮儷祀其先必齋三日臨祭夕不寐與朋友交恭而忠淡而親居鄉惠和不失一夫歡心有干以非義亦弗受聞人之善不啻扵已有有啓益者躍如行之唯恐弗及告以有過歛袵謝服且覬其繼與人無尊賤一用吾情不虞人之欺人感其誠亦自不欺嘗有言曰正吾此心萬理畢見順理而出萬事自行不假調停了無滯礙日進而久愈熟以安賢哉冝其有子如夢遇也所居之南治圃日涉林壑清邃牓曰南野自號南野居士淳熈初慶朝錫類封初品紹熈三年十有二月十有二日以疾終享年九十妻洪氏亦以慶典封孺人夢遇将以紹熈五年十有二月庚申奉帷荒塟于詔原之司徒山求某銘其墓銘曰人性自善衆德自備無之斯闕有不為異故夫南野之德之美皆非自外至維彼蔽焉而闕者衆而後斯之為貴冢婦墓銘新除将作監楊子字敬仲之冡婦恪之妻馮氏名媛安字婉正孝友篤至静專無故不出户衣服不事華侈口不言財利寛厚慈惠知過能改明白不藏襲病久常情不堪婉正語其子埜曰我雖病實未嘗病生如死死如生嘉定六年夏六月十有七日安然而瞑無一言越明年祖奠遣奠而歸里至二月丙申葬于象山縣之崇仁里至西溪之玉峯之阿子三埜墓女湘銘曰嗚呼馮氏死生一致至哉斯言自古儒宗學子不知其幾千萬覺此者有幾不謂婦人而有此葉元吉請誌妣張氏墓某之至契葉元吉名祐之之母孺人張氏諱景昭故将作監丞諱允恭之女孺人孝敬明悟自幼不獨治女工常親書史事親竭情備養有孝女之稱後歸司農寺簿諱大顯字仲謨有異質嘗親薛士龍鄭景望官居守正民悦湖海羣冦仲謨每有韜畧用事者雖不行其策而輿論謂善孺人以夫家司計者倜儻廣費孺人長慮亟出玩服治田太湖上厥後祖業果告罄而孺人所治之田遂為祭祀伏臘之需祖姑適台倅孫君老而無子女子之子曰傳或疑其名孺人曰是出樂天之詩留與子孫傳孫君大驚他皆類此平居亦不切切讀誦過目輙記元吉謂其虚明靜一如鑑中象自然畢照未嘗作文章曰非婦人所當為從寺簿歴官中外言不及政曰非婦人所當為太湖之田雖不多孺人銖積寸累調度有方日需不闕醯醢殽核備具賔客至不知其為事姑如母惟所欲不問難易常儲以供而自奉甚約嵗時佐寺簿羞饋祀必躬以嚴必豐以潔如是者二十有四年姑殁獨春秋之事勤勞􅇶惕如初他皆付幼子米鹽靡密則二女為之曰他日為婦人亦所當知孺人言必端荘事必謹審髙明而色柔嚴正而氣和尊者不以貧賤廢禮卑者不以貴盛降意奴婢不笞困乏必恤二女擇配甚嚴或以為太過曰不然是家故嘗有了齋陳公為壻不可使俗壊其素風士之有學願請者令諸子與之逰而逺其張皇虚憍者雖或以科第進每以為戒故元吉曰祐之由是不敢苟專試業閉門不妄交某至吳元吉來訪執禮甚恭自言弱冠志扵學而未得其方凡先儒所視者依而行所訶者必戒如是者十有七年然終未相應中間得先生子絶四碑一讀知此心明白廣大異乎先儒繳繞回曲之説自是讀書行已不敢起意後寐中聞更皷聲而覺全身流汗失聲歎曰此非皷聲也如還故鄉終夜不寐夙興見天地萬象萬變明暗虚實皆此一聲皆祐之本體光明變化固已無疑而目前若常有一物及一再聞先生警誨此一物方泯然不見元吉弱冠與貢孺人不以為喜聞聲而大警悟孺人雖未喜而至扵甚及元吉見某後歸道某言且謂若不見先生止扵半途扵是喜甚某訪元吉孺人已疾病命二女聽扵屏間盡記某之言以告孺人舉手曰幸甚吾兒得此扵先生也吾死無憾矣垂絶神氣清明無一語之差時嘉定十有一年十有一月乙未終于正寝卜以明年正月庚午祔于吳縣至德鄉陸公原寺簿之墓子五男祐之輔之渙之二殀四女二殀其一許嫁迪功郎新台州寧海縣尉陳自牧孫男一潜元吉泣血請誌銘扵某遂為之銘銘曰孺人張氏識髙行懿孝敬至矣衆善兼美子頓悟覺常情大喜孺人雖喜以其微蔽逮其蔽除始不勝喜精明若此古今鮮儷錢子是請誌妣徐氏墓某扵淳安錢子名時字子是至契子是已覺惟尚有微礙某剗其礙遂清明無間無内外無始終無作止日用光照精神澄靜某深所敬愛後遣冢子槱奉書至并其妣徐氏家傳紀其孝敬燭疑事如見族人事有難決就問一言而定閨閫不嚴而治嵗大歉數日杵米給隣里有生子貧不舉者急諭止之給以酒米其捄活餓死不可殫紀棺梧野殀捐地數畝為蒿里其夫號筠坡翁字晦仲吳越文穆王九世孫夫婦德同行合子是起敬請誌銘其墓某與子亦嘗為至契銘其親墓今思孔子書嗚呼有吳延陵季子之墓異乎後世繁辭某已戒子孫我死後毋為誌銘子是欲其考妣之善譽垂扵不朽子是之子槱字誠甫亦近扵嘉闕文永嘉勸農文古者舜大聖人也而耕伊尹聖人也而耕耕者常情之所賤君子之所敬尤為本朝列聖之所敬故守令皆以勸農繫衘今争田之訟累累豈有田而不肯耕然大患有二其一風俗好奢故雖耕而終貧其二風俗好爭以好爭故雖耕而終扵貧人情豈惡富而喜貧哉風俗之所習尚舉一世皆以奢侈為美為榮父子兄弟意嚮州閭隣里意嚮無不趨扵奢無不羞扵儉今欲改奢而為儉其勢固難但奢則坐見貧困鄰里罕能救雖至親亦罕能救審思至此則泛泛羞儉喜奢之浮毀譽何足顧恤顔子簞瓢垂芳萬世崔烈雖富人謂銅臭願父老訓諭子弟勿循羞儉喜奢之浮毁譽自取貧困顔子有負郭之田六十畝尚簞食瓢飲今田家未必人人有田豈可不計度孔子曰君子無所爭老子曰天道不爭而善聖人情率喜爭豈以爭為美德私意作于中好已勝而恥扵下人故爭不思爭則非君子爭則為小人爭則違天道上帝所不與禍災隨之故好爭者多敗家遭刑願父老訓諭子弟切勿爭敗家遭刑自取貧困自陷於小人之域戒之戒之小人以求己勝為榮君子以求己勝為辱以求己勝者小人也天道虧盈而益謙人道惡盈而好謙鬼神害盈而福謙謙即不爭謙反尊而光今不與尊光而取虧害利害甚明願父老從容暇日審思詳慮與子弟共議切勿以奢為榮當以顔子簞瓢為榮切勿以好爭為榮當以不爭退遜為榮勿以老太守諄諄為虚文非真情此實老太守愛汝輩切至之實情講義吳學講義人心自正人心自善孩提之童無不知愛其親及長無不知敬其兄不學而能不慮而知人皆有惻隠之心皆有羞惡之心皆有恭敬之心皆有是非之心孔子語子思曰心之精神是謂聖人人皆與堯舜禹湯文武周公孔子同人心非血氣非形體精神廣大無際畔範圍天地發育萬物何獨聖人有之人皆有之時有古今道無古今形有古今心無古今百姓日用此心之妙而不自知以其意動而有過故不自知孔子曰改而止謂學者改過即止無外起意無適無莫蒙以養之孔子曰吾有知乎哉無知也文王不識不知孔子每每戒學者毋意意態有四必固我皆意也如蒙如愚以養其正作聖之功䟦䟦汪尚書達古字碑刻自正學不明士大夫以放逸為事業夫是以草聖之名出世俗所膾炙而不知古聖賢之所蹙額漢晉而降沈浸乎飄逸放肆淵海之中不自知其非其字畫其辭章議論皆自畧同故治日少亂日多哀哉且小學家推尊王右軍第一某熟觀諦玩美則美矣要無齊荘中正氣象無三代氣象然則今字畫宜何從古文世莫曉古文一變而為篆篆一變而為𨽻𨽻又變而為楷至扵楷不可復變矣而世為楷者其間亦或有飄逸放肆意態今能去飄逸放肆意態則正矣慈湖楊某敢奉上帝命鍼千載之膏肓而疾勢方張一齊不勝衆楚所恃以無恐者灼知舉天下萬世人心本善本正本清明本無放逸本與堯舜禹湯文武周公孔子同本與天地同俗習雖深固其本有者豈不隠然有感于中䟦厲氏李氏墓碣夫孝天之經地之義貞亦天之經地之義厲夫人李夫人一心而曰孝曰貞人自謂之姑婦同德闔族敬之某書之書雲萍録趙德淵親書後輿論謂數年前極有性氣及為僉判全不見有性氣永嘉徐良甫與德淵至稔熟言其喜怒不形扵色同徐良甫從少保墳所從容幾日德淵忽扵早食前驚曰異哉良甫問状扵是知其有覺某後見德淵德淵曰與籌今扵日用應酬都無一事只未知歸宿之地某曰不必更求歸宿之地孔子曰心之精神是謂聖人皆有是心心未嘗不聖何必更求歸宿求歸宿乃起意反害道孔子每每戒學者母意後再見德淵果平平不動乎意書馮師功沈公甫言先世暨馮師稔治初顔亮決䇿渡江馮師斬其筏而亮以死後又父子冒大險入峒而峒冦平其言海上火失燎帆之功曰此猶未足為難公甫屬某題其詩後某平生見人一言一行之善即興敬興愛矧馮師有安社稷之功三是宜書銘中庭召呼磬銘辭氣惟謹執事惟敬斯謹斯敬動中之靜得此為賢盡此為聖雲石銘有石而雲有扣而聲匪聲匪形大哉一靈慈湖書屏先聖有訓忠信篤敬參前倚衡虚明靜瑩曽子曰皜皜易曰蒙以養正又曰乾元曰性命孔子亦謂明目不可得而視傾耳不可得而聽馮甥請書屏學如不及猶恐失之馮甥請書于屏儆戒深意殊慰老懐㣲意雲興日月虧照古聖猶兢業吾甥其戒之慈湖遺書巻五
