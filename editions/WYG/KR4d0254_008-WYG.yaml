body:
  text: 慈湖遺書巻八宋楊簡撰家記二論書詩孔安國謂堯安安安天下之當安謂舜允塞信充塞上下謂天叙有典天次序人之常性謂惟和惟一羣臣當和一心以事君謂一哉王心能一徳則一心謂王道平平言辯治陸徳明又婢綿反傳註之謬至於此極而未有釐而正之者堯典恊和萬邦春秋傳禹會諸侯於塗山執玉帛者萬國此皆言其大略爾使不滿萬亦可以言萬其不止於萬或倍萬亦可以言萬猶言萬物物奚止於萬耶萬民民奚止於萬耶皆舉其大畧而言爾先儒故必欲整整其所謂萬數釋鄭康成謂尚書州十有二師者州立十二人爲諸侯師葢百國一師州十二師則州千二百國也八州九千六百國餘四百國在畿内則整整恰恰為萬國不少一不多一吁可哂哉其陋至此公羊說殷三千諸侯周千八百諸侯孝經說亦云周千八百諸侯此或據古志而言漢博士求其說而不獲遂為之說曰四海之内九州州方千里建百里之國三十七十里之國六十五十里之國百有二十凡二百一十國八州千六百八十國又天子之國内方百里之國九七十里之國二十有一五十里之國六十有三凡九十三國合為千七百七十三國以應周千八百諸侯之成數武王之興不期而會孟津者八百諸侯康成又遂為謂三有二則殷末千二百諸侯牽合可笑之状若此類奚可殫舉凡是皆起於不達道義無所用心故溺情於名數之末寖愚而不自知又以愚後世使學者弊精神於愚陋之說中則先儒於是為有罪而予諄諄之辯為不得已彼獨不思夫諸侯之建不知其所自始人羣生於天地之間皆有血氣生知不能以無欲欲則争争則闘則傷則殺其天性之美稍公且正者則足以服其比鄰比鄰歸之凡百取平焉則五有長十有長百有長千有長其徳愈大所服愈廣是故有小國之君有大國之君其為君為長者地醜徳齊莫能相尚其間有聖人出焉舉天下咸歸服之是為帝為王夫所謂為君為長者皆諸侯也大小之數多少之數豈得而預定旣弗克預定矣則又豈能新立法更易之増損之以合王制所言之數耶雖有更易世代武王克商滅國五十爾餘率因其舊則周所封建亦不多矣詎能盡更而易之雖有徳則加地有罪則削地其有功徳者固不數見有罪者亦不數見則加地削地亦不數見姑因其舊乃勢之常而漢儒乃為是等等差差不可小有増損之制亦不思甚矣康成為漢儒宗餘可觀矣此本不足辯習俗虚文為日乆固不得已少驅井蛙之惑堯典帝曰疇咨若時登庸益稷帝庸作歌曰勅天之命惟時惟幾又曰庶頑讒說若不在時尚書率以時為是葢古語也堯典上無所承忽曰誰乎嗟哉有誰順是者乎吾将登用之葢時即道也舜之所以光天之下者此也黎獻之所以有功者此也丹朱反此也禹荒度土功用此也臯陶祗叙此也祖考以此而来格群后以此而徳譲鳯凰因此而来百獸以此而舞庶尹由此而諧勅正天命惟此而已惟此為幾謂為庶政之㡬葢天地間惟有此道而已三才萬化萬物萬事萬理皆不出此道得此則吉則治失此則㐫則亂唐虞君臣朝夕之所謀謨經營無出此道是猶此也故當時相與詔告惟曰時猶曰此也時即道之異名此道非言意之所能名後乃取道路無所不通人所共由之義初無形體之可執至於曰時則尤不滯於言意妙哉時之為言也非大聖疇能為是言易多曰此此即時漆雕開亦曰吾斯之未能信是也是音之輕清者謂道也古罕言道虞夏之際始間言之舜曰若不在時又曰惟時惟㡬皆所以言道道之為言終不若時之為義渾然不分事理帝知若時者誠未易得故問其次誰能順予事者采事也次問事則知時道也互見訓語堯納舜于大麓烈風雷雨弗迷按孔叢子宰我問及此孔子曰堯旣得舜歴試諸艱已而納之扵尊顯之官使大錄萬機之政是故隂陽清和五星来備烈風雷雨各以其應不有迷錯愆伏明舜之行合扵天也孔叢子之可疑者不一臯陶謨曰兢兢業業一日二日萬㡬益稷篇曰安女止帷㡬惟康葢㡬者動之㣲也後世多事逺不逮唐虞然今朝廷一二日亦安得有萬事尚不及千百則知唐虞之時所謂萬㡬者指視聽言動念慮爾此斷斷乎無疑者而此言大錄萬㡬之政深有疑焉又改麓作録然則堯納舜于大山之麓使之主祭因名山升于天烈風雷雨弗迷者舜畢祭而烈風雷雨他所咸迷獨舜所行不迷言百神享之特佑焉故不迷史記亦云舜入山林川澤暴風雷雨舜行不迷堯以為聖若謂自舜錄大政而風雨始不迷錯則堯時迷錯乎後始皇封禪遇暴風雨豈非神靈示此以為驗乎孔叢子所云疑古好事者託辭又孔叢子書宰我問禋于六宗孔子曰所宗者六皆潔祭之也埋少牢于泰昭所以祭時也祖迎扵坎壇所以祭寒暑也主扵郊宫所以祭日也夜明所以祭月也幽禜所以祭星也雩禜所以祭水旱也禋于六宗此之謂也與祭法大畧同祭法首言祭天地即繼以埋少牢扵泰昭已下夫舜肆類于上帝類者葢類祭及地日月星之類聚祭而扵文祖之外又禋于三昭三穆歟古者天下為公惟讓于徳三昭三穆皆有徳可宗非如三代而下天下為家而傳於子三昭三穆未必皆宗也若孔叢子所言六宗則舜祭于上帝不及地而遂及山川無乃不可乎又孔叢子後章謂孔子欲猫得鼠琴音為之變甚失孔子好生之志此皆後篇託辭亦猶言堯瞽叟北面朝舜孔子曰扵斯時也天下殆哉之類乎舜典曰象以典刑者漢書所謂畫衣冠而民不犯也漢儒去古近宜有所傳後孔安國一人乃更其說曰象法也法用常刑不越法後儒又因别為說曰象民所犯輕重而加以常刑皆不明白釋象字不平正象畫也畫其所犯之典刑于衣冠而恥之而實不刑之且後世直加之刑猶恐其不革而欲畫衣冠以革之嗚呼此世淺丈夫所見乃爾稍致思焉亦何不可今固有至愚至姦惡而寧甘受杖恥扵示衆豈唐虞之世而人不恥之歟矧大聖人道化所感動耶矧舜典此章曰流曰宥曰鞭曰扑曰贖曰𤯝災肆赦皆寛恤之類惟怙終賊殺者乃刑之此刑乃正之用五刑若上言象以典刑非畫衣冠則無乃重復乎下言欽哉惟刑之恤哉則上叙寛恤乃其本㫖舜咨十有二牧曰食哉惟時柔逺能邇惇徳允元而難任人蠻夷率服民苟無食雖有常性饑困廹之必至斵喪故舜先食洪範八政一曰食孔子亦曰所重民食孟子曰救死不贍奚暇治禮義百畝之田勿奪其時數口之家可以無饑為王道之始農事之不可失時惟農家知之苟失其時雖種不粒既富而後可以言教民食足而後可以言徳化欲柔逺必能邇而後可徳性人所自有書曰惟民生厚因物有遷不隨物遷則不失其厚是謂惇徳惇徳之言所以勉十有二牧元即乾元坤元元者道之異名允信也誠也惇徳之至至扵信其果元是謂允元書曰徳元不失其厚不因物遷則可謂能邇矣其次又能難於任人以堯朝而有共工驩兜以四岳而猶薦鯀人之難知如此孟子曰左右皆曰賢未可也諸大夫皆曰賢未可也國人皆曰賢然後察之見賢焉然後用之如此任人必得其賢必能使逺方蠻夷柔服逺者猶服而况扵近者乎禹曰安女止惟㡬惟康其弼直惟動丕應徯志止即惇徳允元弼直即難扵任人動應徯志即蠻夷率服臯陶曰謹厥身脩思永即允元又曰庶明勵翼即任人故曰邇可逺在兹言乎致治之道在此不在彼也在邇不在逺也此萬世不可易之通論論治者無能越之子思論治天下國家亦以脩身為先尊賢次之後儒亦曰王者之道在脩身任賢而已見訓語舜命伯夷典禮而告之曰夙夜惟寅直哉惟清何謂也寅敬者禮之道禮曲折萬状而由道心行之實未甞曲折故曰直實未甞萬狀故曰清曰直曰清曰寅以三言明禮之一道後世道不明此等語多莫曉舜命伯夷典禮尚書曰三禮孔安國注云天地人之禮簡疑三者五字之訛誤歟按尚書多曰五禮其廵狩脩五禮臯陶曰天叙有典勑我五典五惇哉天秩有禮自我五禮有庸哉同寅恊恭和衷哉五典之外自有五禮則吉㓙軍賓嘉見諸周官者是歟且書中文字非古者不一如汝古必不加水大必不加㸃遜必不加之時日曷喪本或作害天佑下民作之君作之師惟其克相上帝寵綏四方有罪無罪予曷敢有越厥志或作天降下民惟曰其助上帝寵之四方有罪無罪惟我在昭我周王天休震動或作紹我周王見休在昔上帝割申勸寧王之徳或作上帝周由觀文王之徳尚書稱堯文思思者知藏於中深静不露也稱舜文明明者别賢否凡百敷見于外也故史記曰天下明徳自虞帝始舜命龍曰朕堲讒說殄行震驚朕師命汝作納言夙夜出納朕命禹曰予欲出納五言汝聽易大傳曰理財正辭正辭亦納言之謂此治教之急務而後世不聞葢五方之民風俗議論容有不同如周大夫原伯魯不說學閔子騫曰周其亂乎夫必多有是說而後及其大人此等議論豈可不納之于上而出命以正救之也周異端並作魯少正夘行僻而堅言偽而辯孔子誅之以邪說之足以亂人心也至若任俠輕生以周人之急有足尚者而敢於犯禁敢扵殺人似義而非正相師成風肆行無忌此豈一日之積哉上之人無以救其始稔成其俗古者一道徳以同俗執左道者有誅周官紏萬民之徳正其行廵問而觀察之訓方氏誦四方之傳道布而訓之以觀新物三五之世君人者以左右斯民若有常性為本務故設官分職出納而正教之奉天命子兆民本職如此叔世官廢而不修故異說興而莫之止孔子條為政之急務曰修廢官此其一也秦漢而降君臣安於功利三代舊政不復修舉而况扵有虞氏之政乎舜曰咨女二十有二人欽哉惟時亮天功夫舜所以咨命四岳九官十二牧者孰不曰皆人為之功而舜諭之曰欽哉惟時亮天功時是也亮信也是天也非一付之自然而不為也盡欽竭力惟無入扵意苟動於意即私即偏而非道心禮樂刑政一入扵人為則違道違天即可致患故書曰天叙有典天秩有禮天命有徳天討有罪箕子曰無有作好遵王之道無有作惡遵王之路王即天又曰無偏無黨無反無側箕子能辯之矣孟子曰禹之行水也行其所無事也是謂帝則是謂帝載由乎此則能懋勉則五品遜五刑明則直則清直而不温則失此寛而不栗則失此剛而虐則失此簡而傲則失此讒說殄行皆失此讒說者似是而非之說以其入乎意也殄行者太過殄絶之行以其入乎意也孔子訓子張以忠信篤敬立則見其參於前在輿則見其倚扵衡者天也曾子曰皜皜者純白無意象即此天也伊尹與湯咸有一徳者天徳也文王不識不知順帝之則者此也小心翼翼者此也此心不動則不放逸不慢易不私不偏日用純純動静無二道三才無二道書曰后克艱厥后臣克艱厥臣猗歟至哉此堯舜禹臯益相與講論之大㫖而後世君臣徃徃下視此等語以為特言其淺者耳特言其見扵臨政事者耳必别有妙者如惟精惟一允執厥中方可為至論吁堯舜禹臯益有二心乎臨民出政時有一心窮深極㣲時又一心乎人有二心且不能以為人而可以為堯舜禹臯益乎精一之論卒於欽謹卒於敬修謂欽謹敬修又特言其淺者則有淺有深謂之一可乎益曰戒哉儆戒無虞罔失法度罔遊于佚罔淫于樂又曰無怠無荒益豈侮其君謂不足以語夫深者而姑以其淺者告乎臯陶曰謹厥身修又曰無教逸欲又曰兢兢業業又曰同寅恊㳟何數聖人者無他竒謀偉論而諄諄惟以戒謹恐懼為首語也於乎堯之所以為堯舜之所以為舜禹之所以為禹臯陶益之所以為臯陶益豈非以此心而已乎戒謹恐懼此心存乎放逸慢易此心存乎知放逸慢易心易失則戒謹恐懼此心之存可知矣惟得此心者方知此心之出入惟識此心者方知此心之存不存不識此心者安知之也不知者胡不於戒謹恐懼時而黙察其所以然乎方戒謹恐懼時此心放乎不放乎紛擾乎不紛擾乎有計較乎無計較乎支離乎不支離乎此時之心可謂堯舜禹臯益之道心矣可謂精一矣可謂中矣可謂天下之所同然者矣是心也無私好無私惡無私喜無私怒無私取無私去可謂無偏無黨王道蕩蕩無反無側王道正直庶政庶事皆建此極設官分職莫匪爾極粒我烝民莫匪爾極臯陶之刑使恊于中豈非此極皇建此極而天下之民不恊于極者無是理也唐虞之所以比屋可封者此也成周之所以人人有士君子之行者此也謂克艱之語為特其淺近者遏絶天下後世之良心長後世非僻之心禹曰后克艱厥后臣克艱厥臣政乃乂黎民敏徳舜曰俞允若兹嘉言罔攸伏野無遺賢萬邦咸寧大哉舜禹之言其萬世不易之道乎帝王之道初無甚髙難行之事不過克艱一語而已而遂可致庶政之咸乂遂可致黎民之速化扵徳可以使野無遺賢可以使萬邦咸寧其道甚易其功甚大又甚敏然則後世何憚而不為學士大夫徃徃多歸過於人主而不知過在扵士大夫之不學也夫人主長於深宫輔而導之者士大夫而已漢髙以匹夫取天下羣臣以一權利輔之無足云者張子房亦一時翹楚借箸發難毋立六國後未害也何至深沮髙帝為善之心叔孫通首進大猾固不足以輔帝陸賈㡬開帝矣而謂湯武逆取順守此何等學術而可以事君也孝文欲禪賢有徳者而不敢專於子有司再請帝再却之又恥扵飭兵厚衞遂罷衞将軍觀此器度真二帝三王之用心也賈誼儒者帝所前席五餌鄙詐可恥可賤豈非士大夫之罪也武帝雖窮奢黷武㡬亡社稷然好儒甚有嘉唐虞樂商周之心而董仲舒學不知道三䇿所陳雖皆正言不達大本不能啟導君心固有之善唯曰仁義禮智信所當脩飭而已不知如何而修飭也又曰設誠于内而致行之夫誠者人心之所自有何以設為帝雖多欲而嘉唐虞慕三王之心亦帝之善心也人心本善因物有遷仲舒誠能因帝之善心順以啟之達而充之安知帝不可躋之三代之上也申公力行之言正矣不能如孟子因齊宣易牛之心而達之扵王道也士大夫誠未可亟歸過扵世主也帝亦頗恱仲舒之對矣末冊曰條貫靡竟統紀未終情狀亦可觀矣韓歆之死世咸罪光武光武誠有拒諫之罪而歆指天畫地亦不敬不克艱矣諸葛亮三國之英而勸攻劉璋立同姓之婦為后棄義亡禮亮猶如此則下焉可勿論矣唐房元齡首發亂謀杜如晦賛决二人熟視巢妃之穢而不言魏徵雖言僅使勿后三人者尚爾餘又可知馬周史稱王佐九成之諫卒謂業已成就宋璟堅正矣及明皇悔過璟又導之使委曲文過士大夫學術如此而遽議人主之難輔未可也道之不明也我知之矣道在邇而求諸逺事在易而求之難人心自善人心自明人心自神學士大夫旣不自知已之心故亦不知人主之心舜禹之心即是心已是心四海之所同萬古之所同克艱云者不放逸之謂也不放逸則不昏不昏則本善本明本神之心無所不通無所不治無所不化此道至易至簡見訓語簡自以為能稽衆舍己從人矣每見他人多自用簡不敢自用亦簡自謂能舍己從人意謂如此言亦可矣一日偶觀大禹謨知舜以克艱稽衆舍己從人不虐無告不廢困窮惟帝堯能是是謂已不能也三復斯言不勝歎息舜心冲虚不有己善雖稽衆舍己從人亦自謂不能嗚呼聖矣舜豈不能稽衆者豈不能捨已從人豈虐無告豈廢困窮無告常人之所不敢虐困窮常人之所不忍廢而今也聖人曰已不能嗚呼聖矣惟舜冲虚如此其至故益賛舜徳自廣運自聖自神自文自武皇天眷命奄有四海為天下君時簡年已六十有六平時讀大禹謨未省及此續思曲禮曰禮聞取扵人不聞取人者稱某人仁某人知某人孝友之類不敢取人者以㣲有品題之意歟見取扵人則不可曲禮斯義畧似禹謨益曰罔失法度當哉斯言三五盛際所以人皆有士君子之行者以法度備具故也後世所以人物衰喪間有賢者復多闕失以法度大廢故也學問之道雖曰求放心而已不在扵外貌然外貌斯須不荘不敬即失其所謂帝則豈有措身扵淫逸非僻之地而曰吾求放心足矣難哉近丹者必赤近墨者必黒自舜禹大聖猶有克艱之戒益曰戒哉儆戒無虞罔失法度又曰罔遊于逸罔淫于樂又曰無怠無荒而後世學道之士乍有所聞㣲有所覺忽覩髙明廣大徃徃下視舜禹益所為過矣氣質曾未及古中賢而遽抹略小節不復退思舜禹益用心之如何多見其不知量也見訓語唐虞之際六府以養民三事以教民秦漢而降不復聞三事之教矣大禹謨具言正徳利用厚生為三事而觧者已不知其說利用言器用之便利厚生言養生凡民切身日用之事無越斯二者即斯二者而皆有正徳焉如茅茨瓦器諫造漆器權量均一之類是利用之有正徳也老者衣帛食肉斑白不負戴扵道路之類是厚生之有正徳也生民日用非利用則厚生非厚生則利用今也咸有正徳則斯民耳目之所見手足之所用心思之所關無非正徳之事不知其所以然而黙化扵徳矣欲化民而不由三事未見其可後世為國者大槩兵財而已文物而已教化無聞焉故三事之說不傳唯晏子曰夫民生厚而用利扵是乎正徳以福之此稍不失㫖至扵申叔時曰民生厚而徳正用利而事節則失禹謨之㫖矣無惑乎三事之教扵今不聞也舜命臯陶曰民恊于中時乃功自後世觀之恊中不恊中此何等急務也湯誥首曰惟皇上帝降衷于下民若有恒性克綏厥猷惟后自後世言治者觀之衷為何物常性又何物所謂綏厥猷者又何如而綏之也箕子為武王陳洪範曰惟時厥庶民于汝極錫汝保極自後世觀之極者極至之道也民至愚無知何足以與此設諭告之彼又安知成王命君陳分政東郊成周曰時乃罔不變允升于大猷成周殷頑民所遷頑民淫􅊺叛怨尤其愚不可訓誨者自後世論之當棄之絶之而成王方欲使君陳升之于大道自頑民成王猶期之以大道而况於他乎於戯古先聖王之所以治其民者乃如此也古先聖王之所以奉天命為天司牧斯民者乃如此也天能生斯民而不能教之惟民生厚因物有遷無有以左之右之使無越乎極無失乎常性則縱所欲往大亂之道也是故有君焉以代其任謂之天子則天之所以命人君者非為君者設也天以降衷于民民有之是為常性率此常性而徃謂之道亦謂之猷又謂之大猷又謂之極不率此常性以徃則為姦為宄為㓂賊為大亂之道古先哲王知天之所以命我者在此知民之所以為治為亂者在此故夫一政一令之出無一不為乎此曰五禮所以防萬民之偽而教之中曰六樂所以防萬民之情而教之和曰刑刑者所以使民恊于中曰政政者所以使民無不正也中和正皆極也故唐虞三代盛時利用厚生無非正徳禮樂刑政無非大道左右有民懼民之或失此極也立我烝民莫匪爾極設官分職以為民極極者常道之異名言天下惟有此道不可得而加也立政立事莫非此極莫非中正上自朝廷下達閭里目之所見無非中正之色耳之所聴無非中正之音身之所履無非中正之行無姦聲亂色以賊其外無異端邪說以賊其内從容乎大道之中不勉不強而自有士君子之行比屋之民皆可封兎罝之夫皆好徳成人有徳小子有造古者何脩而得此民有良性無以賊之也民之有過有以防之也後世忿疾民之不馴上之人旣無徳以感動之乃為一切之政峻令苛法以痛䋲之将以禁民之過而反毒其良性反作其不肖之心迨夫治之不得則曰後世之民非唐虞三代之民也世移俗改日就澆漓刑政已脩而民猶如此亦付之無可奈何而已吁此豈後世之民果不可比扵三代之民也豈後世之民果日就澆漓果不可奈何也善夫魏鄭公之言曰若謂古人淳樸漸致澆漓則至扵今日當悉為鬼魅矣上之人賊民之良性而疾民性之不良上之人不善防民之過而忿民之頑田不井民無常産而欲民之有常心禮樂大壊淫靡輕浮之音淪浹乎民之肌髓而欲民之不蕩郷不舉里不選不教以徳行道藝而教以淺薄無用之虚文而欲民之不失徳是日授之以朱丹而惡其赤也日染之以皂墨而求其不黒也見訓語少時讀書竊自念古聖人之道髙明廣大不可以心思不可以意度當寂然不動感而遂通如曰惟精惟一如曰一徳略見深㫖其他大略曰欽曰敬曰謹曰克艱曰孜孜兢兢曰典常曰學于古曰奉天曰勤恤殊未省其實豈聖人姑致其謹循其常而其中固自有廣大髙明之妙耶豈帝王之治理如此而不及其精㣲其精㣲不多見於書耶至讀論語亦然惟見孝弟忠信力行學文平平常語所謂一貫之㫖亦未明白無隱之誨亦不終告豈聖人不輕出其秘耶何其莫可曉也及㣲覺後方悟道非心外此心自善此心自神此心自無所不通心無實體廣大無際日用萬變誠有變化無窮不識不知之妙而舊習尚熟乗間而起不無放逸扵是方悟尚書論語所載止合如此放心之戒果為要害此心㣲動百過隨之此心不動常一常明欽敬謹戒常妙常一治亂之機在此古道在此典常在此順此為勤反此為怠順此為恤反此為虐孝弟忠信乃此心之異名力行學文乃此心之妙用一貫之誨已詳矣不可更言無隠之誨已詳矣不可復說萬務錯綜無非大道不安厥止禍亂攸基見訓語舜戒禹曰敬􅁱其可願此可願即孟子曰可欲之謂善夫人之所願欲雖紛紛無窮大槩不出二端善與不善而已矣其善者可願其不善者不可願善即道心也即中也即精一者也顧人未之察耳孟子曰雞鳴而起孳孳為善者舜之徒也雞鳴而起孳孳為利者跖之徒也欲知舜與跖之分無他利與善之間也徐行後長服堯之服行堯之行即堯已此外豈復有深隠不可測識之妙哉即此可願之善自是至中至正至精至一不可識也不可測也使捨此善而欲求精隠深㣲不可測識之妙乃非堯舜之道臯陶曰慎厥身􅁱思永惇叙九族庶明勵翼邇可逺在兹後世之言治者徃徃率不信以謂後世難治與古不同治道必不可止扵此烏虖此後世所以終不及古也慎厥身則治道得矣禹謨所謂克艱政乃乂正謂此其有所脩當思乆永乆永則為道不永則非道道即恒性由此恒性悠乆不已斯乃誠實非由外假其施行則惇叙九族由親及踈親親有殺無非道者昧者不知以為惇叙九族而已非道也惟聖人知其為道易曰聖人乆扵其道而天下化成又况庶明皆賢哲勵翼無怠天子惟治邇而已由邇可以及逺此理灼然周公作立政惟言王左右常伯常任凖人綴衣虎賁即庶明之在邇者慎脩思永惇族公已稔言之矣聖人灼見事理由邇而已不必勞神扵逺逺不可忘而非所詳也聖人知要後世逐末見訓語先生曰書云兢兢業業一日二日萬㡬如何汲古對云儆戒萬事之㡬先生曰此說未是㡬㣲也一二日此心念慮之㣲可言萬也堯舜時太平無事如何一二日有許多事今朝廷每日敷奏亦不知甚多一二日斷無萬事臯陶曰無曠庶官天工人其代之葢有當為之事而後設官然則官奚可虚曠禮樂刑政無非左右斯民使無失恒性故湯誥曰惟皇上帝降衷于下民若有恒性克綏厥猷惟后孟子曰放勲曰勞之来之匡之直之輔之翼之使自得之又從而振徳之周設官分職以為民極極者大中至正天地人所同之道故庶官所職所施無非天地有毫釐不與天地相似則為逆天臯陶既言天叙有典天秩有禮天命有徳天討有罪所以明其無非天道不可作好不可作惡不可置毫髪私意扵其間後世庶官能若是乎汲古問書云天叙有典勅我五典五惇哉天秩有禮自我五禮有庸哉同寅恊恭和衷哉天命有徳五服五章哉天討有罪五刑五用哉政事懋哉吕東莱云勅者整齊工夫寅恭是典禮之根源典禮皆本于天惟君與天為一然後能惇之庸之若不同寅恊恭皆是虚文賞罰皆不可有我此心常勉勉不已不可有一毫止息纔有止息有我之心便生便非天心此說如何先生曰五典者父慈子孝兄良弟弟夫義婦聴長惠㓜順君仁臣忠不知者謂此五典人所為知者謂五典皆天叙也叙者有倫理也故親生之膝下孩提之童無不知愛其親者及其長也無不知敬其兄也其五典皆人心之所固有固有者天也勅者謹戒之謂惇者厚也人生本厚因物有遷始失其厚謹戒之使不失其厚爾五禮謂以吉禮事邦國之鬼神以㓙禮哀邦國之憂以賔禮親邦國以軍禮同邦國以嘉禮親萬民庸用也在人能用之此五禮皆人心之所不能自己者天人一道也寅有敬謹之意五典五禮行則君臣上下皆敬皆恭衷心也其心皆和同天地之間一而已五服章彩不同隨其徳之大小而賜之服惟當乎人心則當乎天心討有罪罪有五等用刑亦如之必合天下人心則合天心皆不可容一毫之私懋哉者是勉其無動乎意以行其私也汲古謂聖人所為未甞不天無毫髪人為五典曰天倫五禮曰天秩命有徳曰天命討有罪曰天討至于功曰亮天功民曰視天民招損受益以為天道任官惟賢以代天工其動静罔不純于天故無為而治者即天心之無思無為也先生曰是如此見誨語汲古問舜欲觀古人之象命禹作服日月星辰山龍華蟲繪之扵衣宗彛藻火粉米黼黻繡之扵裳是為十二章至周則升三辰扵旂而衣五章裳四章是為九章其取象增損不一而論多不同未明其義先生曰象服十二章以舜之聖猶未盡明命禹明之禹所明又不傳扵後後學何敢遽言家語云心服衮職其義可明人心即道神明廣大無所不通日月星辰皆光明無思無為而無有不照即此心之虚明光宅天下山以象静止不動而發生庶物龍以象變化不測而霈澤博施由是心而發諸禮樂政事煥乎其有文章則華蟲似矣清明澄蕩蕩難名即水之難扵形容姑繡以藻則水可見矣火之光照象此心之照用宗廟之彛尊以其行道致孝米以養人而君心常患乎不博粉而散之則其惠廣及黼為斧形鐡黒而刃白如此心之剛斷柔而無剛亦足召亂半白半黒者即天時之秋冬地之西北二者之間乃乾之次合於天道非出於人為黻形兩已相背其色半黒半青北黒東青東北艮位萬物之所成終成始是為冬春之際一嵗之分象此心之辯察是是非非也衮職如此豈可不心服之服事也當從事乎斯道也周雖升三辰於旂其在旂猶在服也九章即十二章之道也道一而已矣先生觀書闕汲古曰出納五言汝聽何如說汲古對曰孔安國云出納仁義禮智信之言吕東莱云五言樂之成言者今之三百篇詩是也詩出扵上者為出出扵下者為納出納作之於樂先生曰此不是東莱之說五言是五方之言出納即舜命龍作納言又周官之訓方氏誦四方之傳道正嵗則布而訓四方五方者幷中國也五方多所傳道者乃其方人士之所習言之害道者不可不訓而正之也誦其言於朝納也布而訓五方出也聖人之教民憂國如此後世不復有出納五言之官矣孔子曰修廢官舜曰庶頑䜛說若不在時侯以明之撻以記之此㣲覺治之大速故禹有俞哉之言後曰無若丹朱傲亦謂撻之遽㣲有傲忽庶頑之意意㣲起則浸而至於慢遊至於敖虐其末流安知其不至於罔水行舟之類甚言之所以懼舜簡初疑啓呱􅈱而泣予弗子惟荒度土功是惟勤勞扵事而已殆非至精後省所謂㣲動乎意者亦不過不急於土功而動念于呱呱若此類而已不動乎意則孰非精一兹未見其粗也見誨語帝堯光宅天下之光如日月之光無思無為寂然不動而自足以黙化天下之民自足以黙安天下之民文王之不識不知而徳化自足以及廣者此光也易言聖人以神道設教而天下服者此光也謂之神者言乎其不可以智知不可以力為也然此非於聪明文思之外復有所謂光也堯之聦明文思非出於人為非由於造作耳不蔽扵聲而自聰目不蔽於色而自明聰自無所不聞明自無所不見使胷中㣲有意有我則外物必得以蔽之惟其無意無我故虚故明故不得而蔽故無所不通文者自此而發有自然之文思者以此而思有自然之深智如四時之錯行如日月之代明無思無為而光被四表格于上下深悟孔子曰吾有知乎哉無知也則黙悟乎此矣見訓語益稷篇䕫曰戞擊鳴球搏拊琴瑟以詠祖考来格虞賔在位羣后徳讓下管鼗鼔合止柷敔笙鏞以間鳥獸蹌蹌簫韶九成鳯凰来儀夔曰於予擊石拊石百獸率舞庶尹允諧按明堂位言三代之禮樂而擊玉磬郊特牲言諸侯之僣宫縣擊玉磬孔安國謂球玉磬簡謂或戞或擊以鳴球玉或搏或拊以鼔琴瑟以此而詠歌歌永言而聲依永也以人聲為先而球琴瑟從之故曰以詠是時祭禮初行祖考来至虞賔天子之後在助祭位羣后徳讓亦以初就位故讓也讓出扵誠出於徳性也然後堂下之樂管鼗鼔與堂上之樂合作其一成也止以柷敔仲尼燕居言兩君相見之禮升歌淸廟下管象舞夏籥序興其次序亦與此同笙鏞亦堂下之樂驗諸周禮亦然大鐘謂之鏞其笙鏞之間作也鳥獸蹌蹌然而来至其九成而鳯凰来儀夔又曰於予之擊拊石磬也百獸率舞庶尹允諧舜徳格于上下感于神人以暨鳥獸而韶樂和聲又感動之是以其應敏速非分外事也道未始不一故也孔安國謂戞擊為柷敔殊未安下言合止柷敔安國又謂上下合止樂各有柷敔按爾雅所以鼔柷謂之止則柷所以止樂非合樂安國又謂搏拊者拊以韋為之實以糠樂記會守拊鼓周禮小師擊拊大師登歌令奏擊拊而故書附為付則付附拊特未定也明堂位拊搏玉磬揩擊大琴大瑟則拊搏所以擊之非器也荀子曰縣一鐘尚拊之大戴禮記曰縣一磬尚拊然則附或付或拊誠有其器器甚古矣而䕫曰搏拊琴瑟則拊非器也乃明堂位拊搏擊之謂其出指曰搏入指曰拊歟世亦曰拊琴而搏其聲搏然况下言拊石豈韋糠之謂也大戴禮記縣一磬其玉磬歟鳴球宜尚附韋糠之至甚古䕫偶不言歟抑擊拊周禮非虞禮歟若此詠歌有附尚於磬則宜居鳴球之先不宜居後然夔所言乃略舉所作致感應之效者非備言樂器也人聲玉聲絲聲不及逺故在堂上今鼓琴不在堂宇則聲大矣此亦可驗簫韶九成何為能使鳯凰来儀擊石拊石何為能使百獸率舞庶尹允諧帝舜扵是乎作歌曰惟是為㡬㡬㣲也動之微也是為感動之㡬也猶機焉其發甚微其應甚逺其道心之微乎其精一之神乎是㡬也可言而不可見可以畧言而不可以詳言欲知此㡬即元首之起哉是也即股肱之喜哉是也即百工之熈哉是也是㡬也為正為中為和為樂為治為熈為敬為欽為善為一臯陶所謂念哉者此也率作興事謹乃憲欽哉者此也所謂屢省乃成者此也所謂明所謂良所謂康者此也所謂叢脞所謂惰所謂墮者非此也見訓語簡讀伊訓至官刑曰敢有恒舞于宫酣歌于室時謂巫風敢有殉于貨色恒于遊畋時謂淫風敢有侮聖言逆忠直逺耆徳比頑童時謂亂風惟兹三風十愆卿士有一于身家必喪邦君有一于身國必亡臣下不匡其刑墨具訓于䝉士簡扵是驚念夫今常情庸俗其恒舞恒歌者亦寡恒畋者亦寡至扵殉貨色者多矣人徃徃未必知家必喪殉色而喪家者人亦具知至扵恒遊人固以為非大惡可恕學子習舉業時文而已輕浮縱逸徃徃戯侮聖言以為有司不以是去取若夫逆忠直逺耆徳則所至如是逺耆徳則自然比頑童矣其扵忠告者率不恱甚者繼以怒其於老成則曰昔之人無聞知縱不誚毁則亦不親狎矣望望然去之矣乃不知所以喪家者在是可不懼哉可不戒哉可不深念哉可一讀遂已不書已之所犯于坐右而日日觀省哉見訓語箕子曰思曰睿睿作聖孔子曰心之精神是謂聖孟子曰仁人心也後世學者率求道扵心外不悟吾心之即道也故易大傳曰百姓日用而不知子思亦曰率性之謂道殆不必言率也性即心心即道道即聖聖即睿言其本謂之性言其精神思慮謂之心言其天下莫不共由扵是謂之道皆是物也孩提皆知愛親及長皆知敬兄不學而能不慮而知非聖乎人惟不自知故昏故愚孟子有存心養性之說致學者多疑惑心與性之為二此亦孟子之疵洪範九五福不曰貴者何也皇極之道人所共有欲使庶民咸于此極則貴有限故不言唐虞之際比屋可封文王之時成人有徳小子有造豈能使人人貴哉故六極亦不言賤若夫富則有儉徳者皆可致不貧之謂富周官序言設官分職以為民極三代而上其扵民無貴賤無不教康誥曰人有小罪非𤯝乃惟終自作不典式爾有厥罪小乃不可不殺乃有大罪非終乃惟𤯝災適爾既道極厥辜時乃不可殺王曰嗚呼封有叙時乃大明服惟民其勅懋和若有疾惟民其畢棄咎若保赤子惟民其康乂簡觀書至是又觀首篇言文王明徳慎罸又憶念舜典𤯝災肆赦怙終賊刑而曰古先聖王之治天下不得已而用刑皆所以左右斯民使歸于正今大罪之𤯝災者固上奏而不殺至扵小罪非𤯝終自作不典式則斷斷乎不殺豈周公之嚴不如後世之寛哉而舉一世賢士大夫之論咸以為不可行何也然則賢士大夫當深思周公大舜之㫖夫刑者所以治民之不善使復扵善爾彼怙終不善則殺之也宜殺一人而衆人畏憚不敢長惡善心興起者不知其㡬也否則屏之逺方如疑則赦或罰可也雖然文王先敬忌明徳家既齊大小之臣無不一于正而後可以治民不然則亦未可故康誥曰不能厥家人越厥小臣外正而惟威惟虐乃非徳用乂先儒謂王城與成周為二地簡竊疑其不然紛紛于今葢本乎孔安國一人之說夫召誥序言成王在豐欲宅洛邑使召公先相宅洛誥序言召公既相宅周公徃營成周使来告卜則所謂成周即洛邑王城明矣而安國乃析為二者葢以周公曰我卜澗水東瀍水西惟洛食我又卜瀍水東亦惟洛食安國疑此卜二地遂謂瀍水之東為下都為成周與洛邑王城異自此說一立而後世諸儒不復審攷遂祖述不已而簡所以疑其不然者其情狀大體已著于前矣若夫卜瀍水東亦惟洛食者見龜所食墨亦依洛邑之吉爾亦之一言眀非二事王扵是拜手稽首以謝周公曰公不敢不敬天之休来相宅其作周匹休未甞及别為下都以遷殷頑民之意多士序曰成周既成遷殷頑民多士亦言于新邑洛又曰今朕作大邑于兹洛畢命亦曰周公毖殷頑民遷于洛邑則洛邑即成周豈不益明合召誥洛誥多士君陳畢命五篇之序讀之情狀昭昭又春秋左氏傳言王子朝入于王城沉周之寶珪于河益驗王城即成周昭二十六年冬十一月王子朝奔楚敬王入於成周甲戍盟于襄宫十二月王入於莊宫按昭二十三年王子朝入于王城秋七月鄩羅納諸莊宫則荘宫在王城中則成周即王城又明矣宗廟宜在王城事理益著又况敬王微弱既告于晉合諸侯以修所居之城矣又豈能營宗廟宫室郊社百司庶府賔館耶則益驗成周即王城非獨指瀍水之東益明左氏率好更辭既曰王城又曰成周乃其屬辭常法又孔頴達正義扵王城言今基址可驗而瀍水之東不言有基址可驗節節可審知成周與王城非異也周公既復政厥辟乃拜手稽首告王以立政之至要首曰王左右常伯常任凖人綴衣虎賁忽良乆而後歎曰嗚呼休兹知恤鮮哉休者歎美之辭謂夫兹乃致治之至要而后王知以此為憂恤而深慮之者亦鮮矣嗚呼兹誠立政之機要雖四海之廣夷狄之逺其治亂其叛服盡由於此王者誠能竭心盡情精擇左右大臣與夫親信近臣皆得其人如滌水之源其流𣲖不足慮矣如培木之本其枝葉無所患矣用力少而取効多其機甚近而其應甚逺豈不要且妙哉所謂休者以此雖然使自古世主皆知此為要皆知此為急皆能恐懼深憂詳察則必得其人必致治安不復有亂亡之禍夏可以長有天下商不得而代之商可以長有天下周不得而代之惟其知以為憂者寡也故周公首以戒成王恐王心之忽乎此也伯長也王左右伯長之官大臣也任信任也居王左右王所信任之官近臣也既為長伯既所信任必得大賢始居其職既為大賢不可輙易當常居其位故曰常伯常任至扵凖人典司法則亦可以次賢為之亦貴乆任而其體稍降其人易得不必以常為名綴衣掌帟幕小臣虎賁持㦸屏衛之士言至此則凡在朝列與夫侍御僕從葢盡舉之矣然亦不過王左右之所親近此誠可謂灼知立政之要領矣豈有大臣近臣皆大賢而其保任逺臣有不可信者乎豈有朝廷既治而外治有不舉者乎豈有侍御僕從罔匪正人而王心有不善者乎王心既善大臣近臣又皆善而逺臣有不善乎世主豈不知大臣近臣之不可不擇而周公深有慮於成王者葢略知所擇則所擇不精深􅁨深慮則所擇必精苟非明哲之主徃徃忽於其近勞神於逺且一意於擇近臣猶慮其或差而况勞思於耳目所不及之地難哉好詳而不好要必至於兩失好要而不好詳必可以兩得是故惟明王好要以擇近臣為憂知天下安危治亂盡在此則不敢以其違已而惡之不敢以其從已而樂之衆好必察衆惡必察虚中静觀既視所以又觀所由又察所安安者其乆也惟深慮乆察則雖有深姦隱情乆而自露歴觀自古亂亡之君大率以人違已而疏從已而親故賢者常逺不肖者常近而亂亡隨之雖中材之主苟知安危治亂惟在近臣深憂精察自然不敢輕易以從違為用舍周公大聖人灼見治亂之機在於知恤而已矣故深致其意特異其辭以啓成王難者曰舜闢四門明四目達四聰四方萬里之情要使盡達於上亦當察逺臣之賢否而兹止以左右為言殆亦不可徧也曰逺情誠不可以不通此謂通逺情非謂擇逺臣選擇逺臣責之于近臣而已逺臣之罪近臣之罪明主之所深慮者在左右而已周公致戒誠為切的見訓語先生謂汲古曰周公若曰拜手稽首告嗣天子王矣用咸戒于王曰王左右常伯常任凖人綴衣虎賁周公曰嗚呼休兹知恤鮮哉此說如何汲古對曰成王繼統周公攝政故致敬而告之曰嗣王代天作子非可輕也羣臣因公之言咸進戒于王則謂王左右之臣皆不可以非其人周公遂歎曰當此太平休美之時而知憂此者鮮汲古因又問如常伯常任凖人綴衣虎賁與嗚呼休兹說者多不同敬求其誨先生曰伯長也謂六官之長及三公當常乆其任故曰常伯其次在王左右常任事之人曰常任其在左右司法度凖則之人曰凖人庶職之繁言之不盡遽言綴衣虎賁之微則其間在左右之職盡舉之矣綴衣掌帷幄下士顧命出綴衣于庭虎賁謂虎士八百人掌先後王周公發歎而曰休者以前言之甚美也葢治道不逺近在王之左右左右苟得其人則君徳烏得而不正曰兹者公指所言左右之臣也今人言亦有此類休絶句兹亦絶句謂治要在此然知以此為憂恤者鮮使人君能憂慮乎左右之臣則不肖無自而入有治而無亂有安而無危聖人之言非不切至後世君臣如醉如夢故胎禍扵無窮見訓語世儒之言果斷惟曰處事當決無疑滯葢誤解周官惟克果斷乃罔後艱之語周官葢言功崇惟志業廣惟勤繼曰惟克果斷所以賛言志勤戒毋悠悠當如舜若決江河沛然莫之能禦也謂夫知之已審見之已明而又悠悠不勇進則不可非謂見未明知未審冒然勇徃也後儒所謂果斷乃此類耳異哉觀古書不達其㫖惟就已說既誤已又誤人謬以千里夫知已審見已明尚當詢謀况於未明未審而遽果斷哉簡深慮世說乆固遺禍無窮敢敬指周官上文以證見訓語書首言堯典舜典典常也舜曰惟精惟一一亦常也仲虺之稱湯曰率厥典又曰謹厥終惟其始所以勉之常也咸有一徳一篇伊尹所以丁寧訓諭太甲曰常厥徳曰一徳惟常故一惟一故常又曰終始惟一時乃日新又曰協于克一傅說告髙宗曰念終始典于學洪範曰皇極之敷言是彜是訓彛常也夫以皇極之道箕子為武王諄諄言之者乃在于彛之一言則常道之為道大矣成王命微子亦曰率由典常誥康叔又曰勿替敬典命蔡仲曰率乃祖文王之彛訓周官曰其爾典常作之師嗚呼古聖賢所以立徳所以出治無他竒巧所以每相誨告率不過典常之道自經學觀古聖人之道徳事業當有髙深竒異之論而書之所載惟曰常道豈古聖賢未肯盡剖胷中之秘而政事之外復有精微之㫖哉是不然孔安國不知道裂而殊之故以三墳為大道五典為常道不常何以為道不一何以為道道心惟微本精本一人心即道心心本常故合乎天下之公心而為政為事則其政可以常立其事可以常行不合乎天下之公心而為政為事則其政不可以常立其事不可以常行箕子曰無偏無頗遵王之義無有作好遵王之道無有作惡遵王之路無偏無黨王道蕩蕩無黨無偏王道平平蕩蕩平平之道即常道也無深無竒不怪不異平夷簡易而天下之道無越乎此由古到今有失此常典平夷之道而能有濟者未之前聞也漢孔安國謂魯共王壊孔子舊宅欲廣其居扵壁中得先人所藏古文虞夏商周之書及傳論語孝經劉歆謂孔壁中得逸禮有三十九書十六篇有又也即朞三百有六旬有六日之有也時世已有魯淹中所出之禮世謂之禮古經者七十篇文與孔壁之禮相似而又多三十九篇故曰有世所未見故曰逸亦猶世已有伏生之書與孔壁之書文相似而又多此逸篇之書非孔壁中止有此篇數也自大小戴已集此儀禮劉向别録亦見之向歆父子之校書秘府備見古文漢藝文志亦謂孔壁中得古文尚書禮記禮記者有禮又有記也即孔安國所謂傳藝文志又謂之古經五十六巻經七十篇記百三十一篇後又謂禮古經者出於魯淹中及孔氏學七十篇文相似多三十九篇葢世尊尚之故曰經實古傳子曰詩三百一言以蔽之曰思無邪學者觀此徃徃竊疑三百篇當復有深義恐不止此不然則聖言所謂無邪必非常情所謂無邪是不然聖言坦夷無勞穿鑿無邪者無邪而已矣正而已矣無越乎常情所云但未明乎本心者不知此不信此知此信此則易直子諒之心油然而生生則惡可已惡可已則不知手之舞之足之蹈之有正而無邪有善而無惡有誠慤而無詐偽有純而無雜有一而無二三讀周南召南必不面牆以興以觀以羣以怨無非正用不勞勉強不假操持怡然自然所至皆妙人能知徐行後長之心即堯舜之心則知之矣知乍見孺子将入井皆有􅇶惕惻隠之心即仁者之心則知之矣此心人所自有故三百篇或出于賤夫婦人所為聖人取焉取其良心之所發也至于今千載之下取而誦之猶足以興起也故曰興於詩孔子曰詩三百一言以蔽之曰思無邪又曰興於詩又曰人而不為周南召南其猶正牆面而立也與思無邪即興興則不面牆一㫖也自孔子夢奠於兩楹之間日至月至者相繼淪没孰有知此㫖者此㫖非子夏所能知也子夏子張子游以有若似聖人欲以所事孔子事之強曾子曾子獨不可曰江漢以濯之秋陽以暴之皜皜乎不可尚已曽子則知無邪之㫖矣子夏使西河之民疑其扵夫子其與無邪之㫖乖矣思無邪一語孔門諸賢盡聞之後世學者亦盡聞之而簡謂曽子則知之餘難其人何也斯事至易至簡如輿薪置其前而人自不見如鐘鼔震其旁而人自不聞如目不見睫以其太近如玉在其懐中而終日奔走索諸外詩三百篇多小夫賤婦所為忽然有感扵中發於聲有所諷有所美雖今之愚夫愚婦亦有忽諷忽美之言苟成章句苟非邪僻亦古之詩夫豈難知惟此無邪之思人皆知之而不自知起不知其所自用不知其所以終不知其所歸此思與天地同變化此思與日月同運行故孔子曰夫孝天之經地之義又曰禮本於大一分而為天地轉而為隂陽變而為四時列而為鬼神又曰哀樂相生正明目而視之不可得而見也傾耳而聽之不可得而聞也一㫖也今夫所謂毛詩序者是奚知此㫖求諸詩而無說無說而必求其說故委曲遷就意度穿鑿殊可歎笑孔子曰關雎樂而不淫哀而不傷此言關雎之音也非言關雎之詩也為序者不得其說而謂關雎樂得淑女以配君子憂在進賢不淫其色哀窈窕思賢才而無傷善之心今取關雎之詩讀之殊無哀窈窕無傷善之心之意樛木之逮下意指君子故曰樂只君子而序言后妃桃夭言昏姻夫婦之正序者無得乎正之㫖必推本諸后妃之不妬忌鵲巢之詩初無國君積行累功之意而序言國君積行累功甚者至於何彼穠矣之詩初無車服不繫其夫下王后一等猶執婦道以成肅雍之徳之情而序推而詳言之葢為序者不知孔子所刪之㫖不知無邪之道見詩辭平常無說意聖人取此必有深義故穿鑿遷就委曲增益雖傍依禮義粲然典雅之文而孔子之本㫖亡矣毛氏之學自言子夏所傳而史氏又謂衛宏作序自子夏不得其門而入而况毛萇衛宏之徒歟子夏之失未必至如此甚葢毛衛從而益之序本曰義先儒謂衆篇之義合編者謂今之所謂序者也猶未冠諸各詩之首後儒離而冠之學者見序而不見詩詩之有序如日月之有雲如鑑之有塵學者愈面牆矣今序文亦不必盡廢削其大贅者與其害扵道者置諸其末毋冠諸首或可也觀詩者既釋訓詁即咏歌之自足以興起良心雖不省其為何世何人所作而已剖破正面之牆矣其通達也孰禦昔者舜命禹亦昌言禹拜曰都帝予何言予思日孜孜夫都美辭也既自以所言為美而又曰予何言予思日孜孜爾故臯陶吁歎而問曰如何禹曰洪水滔天浩浩懐山襄陵下民昬墊予乗四載隨山刋木暨益奏庶鮮食予決九川距四海濬畎澮距川暨稷播奏庶艱食鮮食懋遷有無化居烝民乃粒萬邦作乂自或者觀禹斯言無說也無義之可索也而臯陶曰俞師女昌言嗚呼至哉惟禹能言惟舜臯陶能聽能知學者知此則知思無邪之㫖則知易書禮樂春秋之㫖則知天地四時鬼神萬物之㫖則知萬世千聖之㫖見訓語孔子刪詩三百篇未甞作序惟以一言蔽之曰思無邪簡取詩永歌之不勝和樂融暢如造化發育醇然粹然不知天地之在彼萬之不齊也不知其所始不知其所終也嗚呼至矣及攷序文大失本㫖如雲翳日如沙混金詩中無邪之妙自足自全雖不知何世何人所作無損扵斯妙也况序亦不能盡知其世與其人其間乖謬良多先生問汲古既醉詩云昭明有融曉此說否汲古對曰昭即明也融和也既明且和其徳備矣未知是否先生曰融一也昭明有融是澄然融一見誨語汲古問大雅假樂君子顯顯令徳中庸云嘉樂君子憲憲令徳詩假音暇却與中庸嘉字不同先生曰假者嘉音之訛曉此詩否汲古曰顯顯令徳宜民宜人受祿于天此言王有令徳則民從而天與之是否先生曰嘉善和樂葢君子之形容徳性之光輝徒樂而非善固非徳性之樂徒善而無樂亦非徳性之善既嘉善又和樂徳性之光輝自然而然初非有意于為善又為樂也此惟有徳者自知而非章句儒所能識也君子謂王道徳性人所同有惟不昏蔽是謂君子即嘉樂之容光其令徳已顯著顯顯者令徳之益顯人猶民也人又足以包諸侯諸臣由此徳性而發無所不宜無所不通人心亦在是故受祿故天保右之命之申而延之雖曰自天實自君子之徳性汲古又問干祿百福是成王求祿于天否先生曰干祿非干求也千字似干傳之微訛也闕疑則可謂干求則大不可十百為千千祿百福言其多也願王子孫蕃衍至于千億穆穆静黙之容皇皇精明尊大之容此亦言君子之形容徳性之輝光非有心于為静黙為精明尊大也徳性無思而其容光自然有若是穆穆皇皇之象也君王通稱宜者善之辭也不愆差不昏忘率由先王之舊章由徳性而發自不愆不昏自率由舊章葢自與古先聖王所施所行同也汲古又問威儀抑抑徳音秩秩無怨無惡率由羣匹如何先生曰威儀毎每有謙抑之容令徳之音秩秩不已人頌其善不一而足無怨之者無惡之者匹類也率由群類衆欲而行無已私也是皆徳性之所發如此先生曰道無先後小大覺焉者有先後小大汲古曰夫子告子貢曾子皆一以貫之子貢徒聞而不復問曾子能唯而不加辯此見聖賢之道無異而覺者有異焉如曾子與子貢弔季孫之母閽人以君在弗内俱入廏修容焉子貢先入閽人曰已告矣及曽子入閽人辟之卿大夫皆辟位公降一等而揖之此非容之謂也其覺與未覺自見于動容出處如此惟聖人一貫之妙不可言先生曰聖人循循善誘姑曰一曰貫天地内外人物有無變化萬狀未始不一不必言貫曾子未覺始言貫以啓之及既唯旣覺知此心日用無非此道故與人忠信恕人如已皆此道也子貢則不然億中方人豈知忠恕夫子屢啓之而終未覺先生曰詩云文王陟降在帝左右如何說汲古謂此只是天人一理詩曰上天之載無聲無臭儀刑文王天即文王也又曰不識不知順帝之則文王即天也其進退升降之間一而已矣先生是汲古因問穆穆文王於緝熈敬止如何先生曰文王不大聲以色故曰穆穆緝者緝理於思為微細之間熈有理順之義緝熈者進退精微之謂進徳之實非思也非為也惟可以言敬敬非思為也惟可以言止止非思為也寂然不動感而遂通而不屬于思為所謂不識不知者此也安女止者此也文王之所謂緝熈者緝熈此也惟不動乎意不屬乎思為故緝熈融釋猶雪之融於水猶雲之散於太空其緝熈於思為微細之間融釋於無思無為之妙如此豈不是美而可歎服哉故曰於惟其道心不識不知故聲音不大形色亦不大而見為穆穆也互見誨語慈湖遺書巻八
