body:
  text: 慈湖遺書巻十五宋楊簡撰家記九泛論學論文論字義論厯數自古人之知道者寡是以其言之害道者多就有知焉有偏全有淺深未全未深其言猶有害道然則非聖人之書誠雖讀孔子之言奚可不精而思之熟而復之今天下非聖人之書何限無非惑亂人心之具孔子之言出於古者所記録猶或失真而况於非聖人之書其害道者多矣學者當先讀孔子之書俟心通徳純而後可以觀子史學者道心未明而讀非聖之書溺心於似是而非之言終其身汩汩良可念也孔子之言奚不可精而思之熟而復之今孔子之言出於學者之所記録猶或失真况於非聖人之書其害道者多歟見訓語嗚呼今天地之間孔子之言無幾而非聖之書充棟宇非聖之言知道寡知道者而不盡其言猶足以害道然則害道之言滿天下不害道之言甚無幾學者誠不宜汎觀必遭眩惑唐虞有納言之官周有訓方氏易曰正辭為是故也見訓語百聖傳授唯曰一中初疑其膚近疑其庸又疑其若未免乎意而百聖一辭莫知其所為一日覺之百聖之切諭明告誠無以易斯人心即道故大舜曰道心本無可疑意起而昏為非為僻始知其有學者亦意起又從而過之凡思凡為皆離皆非故告曰中平平庸庸事親從兄怡愉敬恭豈學而能油然而生莫究厥始莫窮厥終應酬萬端忠信全功不習無不利曽子謂之皜皜簡亦謂之融融道固不離乎常故孔子曰中庸毋動乎意清明在躬自無所不通發育萬物人心所同覺者通患患在思慮議論之多而不行孔子忠信篤敬之訓見訓語學者初覺縱心所之無不元妙往往遂足不知進學而舊習難遽消未能念念不動但謂此道無所復用其思為雖自覺有過而不用其力虚度嵗月終未造精一之地日用云為自為變化雖動而非動正猶流水日夜不息不值石險流形不露如澄沚不動而實流行予自三十有二微覺已後正墮斯病後十餘年念年邁而徳進不進殊為大害偶得古聖遺訓謂學道之初繫心一致乆而精純思為自冺予始敢觀省果覺微進後又於夢中獲古聖靣訓謂簡未離意象覺而益通縱所思為全體全妙其改過也不動而自冺冺然無際不可以動静言於是益信孔子學不厭乃是知及之已後事是謂用力於知者雖動而得不動之妙終未及仁者常覺常明常不動之為至静故孔子曰知者動仁者静予何敢言仁用力於仁者也恐同志者復蹈前患故備記如右以舜大聖而猶不知十二章之象使禹明之以孔子大聖而猶不知魯廟此盖皆斷之説而後世之士耻於一物之不知亦愚矣詳於其所不必盡知而畧於其所不可不知故終身由之而不知其道者衆也見訓語孔子吹律自知殷後此豈心思推測之所能至哉如日月自無所不照如水鑑自無所不明也此心神明有甚於日月水鑑孔子稱子路不耻緼袍之善引詩不忮不求何用不臧子路終身誦之則其誦乆矣豈無以告孔子者子路既沒門人語及始曰是道也何足以臧於以見聖人廣大虚静如天地程伯淳云形而上者謂之道形而下者謂之器如若或者以清虚一大為天道此乃以器言而非道也伯淳斷然謂以清虚一大為天道為以器言甚善非知道者豈能道此然未能見易大傳形而上者謂之道形而下者謂之器非聖人之言随世俗流傳而遂信此亦有此未至伯淳謂顔子黙識曽子篤信得聖人之道者二人也此語亦有未安謂二子得聖人之道誠然然不當謂一人黙識一人篤信信者必黙識黙識者必信自不當分裂又不詳攷日月至焉者非得道何以言至所謂至者必如顔子之不違仁所謂不違仁者必無思無為寂然不動感而遂通動静一貫方可言仁方可言至然則孔門得聖人之道者亦不止二人而已伯淳言大人與天地合其徳日月合其明非在外也斯言甚善伯淳言惟神也故不疾而速不行而至神無速亦無至惟伯淳而後有此言伯淳謂至誠可以賛天地之化育可以回造化者誠有此也伯淳名顥門人尊之曰明道先生伯淳謂窮神知化化之妙者神也又差矣何精何粗何妙何不妙化即神或問仁程正叔曰此在諸公自思之將聖賢所言仁處類聚觀之體認出来雖然使未有論語孟子時無可類聚又將若之何孔子未嘗教人類聚類聚體認無非意路且孔子曰居處恭恭而已無意也執事敬敬而已無意也與人忠忠而已無意也微致意焉即迂曲即造為即不正直即不忠信所謂復禮復我本有之禮三千三百經條明白不留作意出門如見大賔使民如承大祭亦何意之有正叔又言性中只有仁義禮智四者幾曾有孝弟来異哉正叔之蔽一至於此孝弟仁義名不同耳强立藩籬固守名意䧟溺於分裂之學障塞聖人坦夷之道孟子謂徐行後長即堯舜之道以羊易牛即王者之心發明孩提愛親及長敬兄為不學而能不慮而知而正叔分裂體用而言之不可以為訓也伊川謂動容貌整思慮則自然生敬敬即是主一也主一則既不之東又不之西是則只是中苦也人性自善何必如此拘束孔子未嘗如此教人但曰居處恭執事敬耳但曰出門如見大賔使民如承大祭耳但曰約之以禮耳伊川之教固愈於放逸者然孔子曰過猶不及何則其害道均也或問熒惑退舍果否程正叔曰觀宋景公不能至是問反風如何曰亦未必然成王一中才之主聖人為之臣尚幾不能保非有動天之徳不能至也正叔未明道故有此論人心即道無所不通善心興起如其真切豈無感通之理而正叔謂景公不能至是又謂成王未必能然賊天下萬世之良心此説不可長堯舜與人同耳其不善之心既足以感動災異則其善心豈不足以感動而消弭之不知道者其輕有所立論哉濓溪通書亦尚有疵自明乎道者觀之可以一見决不勞多議今自二程尊師之其書盛行乎天下不得已姑指衆人之所未曉者言之濓溪曰元亨誠之通利貞誠之復於天下至一之中忽起通復之異説穿鑿為甚又曰誠精故明神應故妙幾㣲故幽異哉裂一道而三之誠未始不精何必更精誠即神神即幾或曰誠或曰神或曰幾皆所以明道心之妙如言玉之瑩又言其白又言其潤非有三物人之道心未嘗不誠未嘗不神其動之始曰幾此萬古人心之所同非聖人獨有之今周子又謂誠神幾曰聖人是謂衆人無之此正孟子所謂謂其君不能者賊其君者也謂民不能是賊其民者也孔子明道未嘗有精粗之論乃起於後學之意説孔子每每戒學者毋意為是之類也周子又曰洪範曰思曰睿睿作聖無思本也思通用也幾動於彼誠動於此吁洪範惟言思未嘗言無思而濓溪必取乎無思者是猶未識乎思也思曰睿明乎思未嘗不睿未嘗不妙未嘗不神此不可以有無觧何復取乎無思哉離思而取無思是猶未悟百姓日用之即道也孔子曰何莫由斯道也周子猶未悟思之即道思之即無思也况又裂幾於彼裂誠於此於至一之中而强分裂之殊為害道横渠牖銘云居則存其心曰存否繼否化否無意否張子則勤矣不草草矣惜乎其未觧觧者不如此曽子之日三省異乎是矣曽子之省不過不忠不信傳授弟子而實未嘗習之過皆芸苖改過未嘗助長如横渠乃揠苖助長之學也化者自化豈容問耶自省本心者自無意意豈屡省之所能無耶自省本心者自未始有間斷何患乎不繼耶堯舜雖有惟精惟一之功要非繼續之所可言孟子之存心又豈横渠之所云欲存愈不存欲繼愈不繼欲化愈不化欲無意愈不已不省吾心自善吾心自神吾心自寂然不動自無體無體則無始終繼不足以言之云為變化自不凝滯自不可致詰夫是之謂自化此不可以有無言而况於意乎此萬古人心之所同也顧自覺者寡耳孔子曰天下何思何慮横渠之書深自病其定性未能不動正以其學未免乎助長也故孟子曰天下之不助長者寡矣言心聲也其最著見者芭蕉詩有願學新心之句此未悟本心之至善而於心外求新心也墓誌有精魄反原之言夫血氣有聚散精神無所生孔子心之精神是謂聖神心無體即本即原死生一貫何以反為原始反終乃作易大傳者之言非孔子也與李和叔書曰天徳雖能盡其説然後大本可立天徳豈説之所能盡説之所可盡者尚不足以盡意而况於天徳乎大本豈可徐徐而立孔子所謂可與立不失其所本立也人之本心自寂然不動也子思問於夫子曰物有形類事有真偽必審之奚由子曰由乎心心之精神是謂聖推數究理不以物疑周其所察聖人難諸孔子斯言見之子思子之書世又謂之孔叢子世罕誦習烏虖聖人有如此切至之誨而不載之論語致學者求道於心外豈不大害簡謹取而為集語覬與我同志者或未觀孔叢子而偶見此書庻早悟此心之即道而不他求也至哉人心之靈乎至神至明至剛至健至廣至大至中至正至純至粹至精而不假外求也人皆有此至靈之心而不自知不自信偶昏偶蔽遂寖而至於惡積而不可掩罪大而不可觧大可惜也大可念也心無體質徳本昭明如日月照臨如水鑑燭物不必勞神而自能推見自能究知若馳神於彼周悉致察雖聖人不能何則勞動則昏不必逆詐不必億不信而自有先覺之妙也人皆有此靈見訓語曽子曰参嘗聞之夫子曰陽之精曰神隂之精曰靈神靈者品物之本也而禮樂仁義之祖也善否之氣治亂所起闕云云是故聖人為天地主為山川主為鬼神主為宗廟主云云天地之間非陽則隂非隂則陽隂陽之氣雖二而神靈之道則一風雷電霧雨露霜雪霰雹之所以變化者此也羽毛鱗介倮虫之所以生成變化者此也萬化萬物雖自神自靈而不自知惟聖人自神自靈而又自知自知則明明則通通則無所不通故四靈役於聖人聖人為天地主為山川主為鬼神主為宗廟主聖人之知如日月之明如水鑑之明非思非慮自明自照孔子曰不逆詐不億不信而亦先覺者此之謂也又曰天下何思何慮者此之謂也生而知之者上也學而知之者次也其次第不同而其知則一也其知無次第之差也是知至神至靈至精視聼言動何本何根愛敬和樂智慮應酬何終何始始不可得而知也終不可得而知也中亦不可得而知也順是而行之為善為治逆是而為之為否為亂知則順不知則逆吁人皆有至神至靈至精之心而不自知也孔子曰心之精神是謂聖中庸曰聖人之道發育萬物易大傳曰範圍天地之化故聖人之道無所不通聖人之事無所不行守日月之數察星辰之行序四時之順逆截十二管以察八音之上下清濁其道一也其事一也立五祀制五典和五聲合五味正五色成五榖序五牲其事整整其倫叙叙皆神靈之變化精一之散殊可觀而不可測可言而不可詰可以黙識而不可以容思夫是之謂品物之本禮樂仁義之祖歟先生曰人心何嘗不正但要改過不必正心一欲正心便是起意汲古對云此即孔子母意意一起即有過要無過但不起意便了意不起則此心安然瑩静虚明若子貢言君子之過如日月之食焉過也人皆見之更也人皆仰之此是改過後私意不起此心明照况此心明照愈於日月日月雖容光必照尚不及蔀屋之下此心則無所不照無所不通安有隠顯之間先生曰此説却是先生曰少年聞先大夫之誨宜時復反觀其後於循理齋燕坐反觀忽然見我與天地萬物萬事萬理澄然一片向者所見萬象森羅謂是一理通貫爾疑象與理未融一今澄然一片更無象與理之分更無間斷不必言象不必言理亦不必言萬亦不必言一自是一片看喚作甚麽句絶唤作天亦得唤作地亦得唤作人亦得唤作象亦得唤作理亦得唤作萬亦得唤作一二三四皆得先生謂汲古曰聖人猶兢兢業業豈學者不兢兢業業汝當庸言之信庸行之謹兢兢業業用力於仁為之不厭又曰學者切不可觀非聖人之書當師孔子之言先生曰學不可躐等亦不可操之太急故雖息焉㳺焉孫而順之無害於事但於其間不失敬心不失時敏之心則厥脩自然日進無疆易曰益動而巽日進無疆天下事皆然彼苦澁不易樂者必無成效汲古問聖賢言性何以多不同先生曰性字觧釋有不同如性相近與節性惟日其邁此是随俗泛言性質如易曰各正性命孟子道性善則言性之本孔子謂巧言鮮仁又謂辭逹而已矣而後世文士之為辭也異哉琢切雕鏤無所不用其巧曰語不驚人死不休又曰惟陳言之務去夫言惟其當而已矣謬用其心䧟溺至此欲其近道豈不大難雖曰無斧鑿痕如大羮元酒乃巧之極功心外起意益深益苦去道愈逺是安知孔子曰天下何思何慮是安知文王不識不知順帝之則如堯之文章孔子之文章由道心而逹始可以言文章若文士之言止可謂之巧言非文章見訓語天下有累數百年之風俗既成而不可㧞士生其中沉浸深入有不自省吾徒不可不疾而察之聖人曰衆好之必察焉衆惡之必察焉吾非求異於衆也誠有所不自安於中也自三代衰孔子沒義利之辨寖不明漢興君臣相與以權術取天下大畧本以利文之以義孝宣亦謂漢家自有制度本以覇王道雜之豈惟漢規模如此歴三國晉南北隋唐五代大抵一律豈惟人主規模如此士大夫惟上所好其規模皆如此豈無善者其畧則同後世之經術異乎孔子之經學矣後世之文章異乎三代之文章矣後世之字畫與鐘鼎篆刻不同矣一經說至百餘萬言大師衆至千餘人時為利禄之路則然取青紫有拾芥之喻指所蒙以稽古之力公言侈說不以為耻三代之時無此風俗也無此等議論也孔子曰辭逹而已矣書曰辭尚體要而已後世之為辭者大異㝠心苦思錬意磨字為䴡服靚粧為孤峯絶岸為瓊杯玉斚為大􅃵元酒夫子之文章不如是也夫子之所以教誨其子弟亦不聞有是説也甚者韓愈敢以孟子與司馬相如比而同之相如何人躋之至此専以文稱也以易為竒以詩為葩三極六爻之㫖如此乎三百篇無邪之義如此乎甚至於序送李愿有曰粉白黛緑者列屋而閑居妬寵而負恃争妍而取憐此何等法語而敢肆言無忌如是耶此無他舉天下之風俗皆然不以為異也故學者仰韓如太山北斗心服其文莫見其過至於字學尤足鄙咲書者六藝之一古所不廢然非學者之所急㳺之則可後世之為字畫者異哉皓首習之秘術不露此周孔事業耶嘗觀鍾鼎古文如精金羙玉齊莊冕弁使人起敬起愛真三代時風度也衰世所謂草聖者何哉以放逸為竒以變怪為妙後世之俊傑三代之罪人王逸少獨歩一時流芳千載蘭亭遺墨秘藏昭陵老師宿生無敢擬議雖則云然有聖言在衆好必察竊未所安如婦人焉清神䴡色雅服妙粧羙則羙矣而非公庭之所當言非君子之所好樂施之於晉宋以來則善施之於三五之上則悖何者無淳古質厚之體也無莊敬中正之容也書心畫也使逸少之書盛行而不少衰則人心風俗終不反朴終不可以庻幾三代吁可念哉累數百年來風俗如此習尚如此論議如此牢不可破如此今也一旦欲排萬衆之所嗜好盡反之於古殆猶回急注於懸崖止奔馬於峻坂徐而思之亦有可覬良心人所具有也堯舜與人同耳聖人先覺我心之所同然耳孔子曰心之精神是謂聖孟子曰仁人心也仁聖之性人所同有昏而蔽之如䘮其靈如塵積鑑本明猶在一日啟之光燭天地孟子言必稱堯舜於戰國之時今之時顧不勝於戰國之時耶豈戰國之人皆可以為堯舜而今之人皆不可也必不然也放情逸意固衆人所不能免而亦不可肆也父肆其欲子將甚焉上肆其欲下必倣焉倣而不已必甚甚而不已必亂至於亂則禍及其長上稽之徃史可想可戒然則放逸之習不可縱也莊敬之學不可廢也浮薄之務不可親也朴古之事不可厭也不惟不可厭而已又有樂焉人心即道至樂中存昏者失之明者得之無謂詩文之放逸非放於惡也無謂字畫之之縱逸非流於不善也商之木輅周之麻冕孔子獨意嚮之取其質也道二正與不正而已矣莊也敬也古也朴也善也皆正之類也不莊也不敬也不朴也不古也皆不正之類也故書曰與治同道罔不興與亂同事罔不亡故相如至於見賢韓愈至於宣滛豈不異哉差之毫釐謬以千里胡可忽也况所差猶不止於毫釐乎草聖之差逺矣宣滛之差不知幾千萬里矣無恠後世之禍亂相尋於無窮也明君良臣知治亂之岐於是乎分則烏得不戮力剗剔文士墨客滋蔓之邪説而無使啟亂也見訓語文士有云惟陳言之務去又有云文意切忌随人後近世士大夫無不宗主其説不知幾年於兹矣書曰辭尚體要不惟好異商俗靡靡利口惟賢餘風未殄近世王風好意滋甚以某言平常易以他語及世効之者浸多則又易之所務新竒無有窮也不思乃利口惟賢之俗士大夫胡為不省不告諸上而痛革之乃相與推波助瀾古者制字一而已矣其有轉音多後世所増益孟子凡與齊宣王言王皆如字耳而後儒讀者多轉為去聲非也夫齊宣王昬愚特甚使當日孟子牽作去聲言之宣王必不聼解况作去聲則不文後儒鄙陋好異音釋奚可盡信曲禮欠伸據方言俗音則如是耳而音釋家作邱歛反至於論語知者樂水仁者樂山並五教反則尤為害道夫五教反者好樂切著之謂也若夫知者樂水仁者樂山則不可以好樂切著為義也自孔子猶無得而形容姑托喻於水托喻於山而已聖人尚不得而言豈好樂切著之可言哉後世陋儒不知道拘於音訓家轉音一定之説至於害道殊為不可論語去䘮無所不佩口舉反則失君子不忍除䘮之本心反有惡其䘮之意尤其不可去䘮乃記者之言非聖言惟當如書言免䘮禮記言除䘮亦未安猶愈於去䘮口舉反之太甚也就去䘮定讀惟可口據反離䘮而去猶云可也大抵天下事自不可以一定論言欲信行欲果而子又曰言必信行必果硜硜然小人哉堯舜揖遜湯武征伐孔子序書桀受不書王不以征伐為非也然則天下奚可執一定而以為義且下字有上去二聲唐韻於上聲為降也於去聲謂行下也義亦相通耳今方言為消減降下亦作去聲然則音義亦無定論共字平去二音亦通選字上去二音亦通唐韻於選字二音無異而論語音唯從去聲曲禮供給鬼神音㳟或作供方音俗語率用平聲而論語子路共之居用反與僧釋語則同皆偏拘也通用可也盡信書不如無書誠哉是言簡自總角讀書音大為太者多也率從陸徳明音從舊從衆不復考究今老始致疑而考焉周禮大宰小宰樂官之大師小師祝官之大祝小祝史官之大史小史若此類皆當如字大小相對尚書周官立太師太傅太保兹惟三公論道經邦燮理隂陽官不必備惟其人少師少傅少保曰三孤貳公𢎞化禮之太牢少牢若此類皆當音太太與少對三公所以音太者三公論道經邦爕理隂陽官不必備惟其人乃任之尊之之至故音太牢祀天神亦尊其稱音太以三少少牢推之則三公太牢音太可知矣陸徳明於大牢初音如字次音泰陸凡百好異率類此今世所傳尚書凡太史皆音太者鼂錯漢儒随俗苟稱而不考諸周禮也古書雖音太者皆作大今尚書於太師太傅太保皆作太者鼂錯欲記音而加㸃歟抑後傳書者誤加歟史記太史公皆加㸃若非傳録者誤則司馬遷習漢儒之陋爾遷之誤多矣不止是曲禮六大曰大宰大宗大史大祝大士大卜陸徳明音云除大宗餘皆音太徳明好異又不考古故有此陋自鼂馬猶爾而况於徳明乎詩補音考究精愽然亦有過差桑中采麥訖力切采牟也引易林夌與得叶與國叶韋鋋叙志賦麥與則叶栁宗元榮門文麥與惕叶吕温觀野火詩麥與慼叶蓋不知京師語音麥音黙自與得國則惕慼叶今改作訖力切則全差矣山有樞有栲去九切陸機草木䟽云許慎讀栲為糗今人言考失其聲也爾雅栲山樗疏亦云許慎正讀栲為糗糗去九切言去九切特不明爾至於曰今人言考失其聲也差矣音轉而浸訛今九亦有苟者栲作苟切則通矣亦與糗同音非失其聲也今禮部韻則失其聲矣閩人又以九音狡斯干居焉切又矣居閑切亦可角弓胥逺於圎切亦差引易林逺與言叶韓愈閔已賦逺與漫與言叶然則從平聲盈元切則不差矣今作於圓切則失其母大差矣况又曰韓愈此賦用韻難知蓋愈此賦又用難為韻亦不甚叶故轉而為切曰漫彌延切難泥㳂切茲其所謂難知者歟大抵古人亦不拘乎切叶其大槩叶爾而補音必欲句切叶故礙而不通其於頌多曰未詳蓋頌不叶韻節南山人殆養里切又失母音作廷里切可矣所引楚辭天問與止叶九章與特叶龜筴傳與起叶易林與齒祉叶亦無相妨廷里切與今俗呼殆同母至於養里切則大差異母凡服字皆蒲比切雖引士冠禮服與徳叶秦泰山刻石與􅅚叶之罘刻石與徳叶碣石刻石與息叶詩一十有六無房六切者然安知非扶北切扶北與房六同母亦與徳飭息叶何必蒲北異母萊菔或名蘿蔔者方言特異乃作蒲北切今欲一切合異方之音無乃不可乎凡弓躬皆姑𢎞切亦失母古詩乃與朋叶楚辭九歌弓與懲叶引班固東都賦躬與稜叶崔瑗和帝文躬與懲叶然則經稜切可矣何必姑𢎞切又凡國字皆越逼切其所據亦不明白端的蓋意度牽合愛字許既切亦失母纓既切可矣尚書古愛字集韻許既切亦未可據信或以方言特異歟詩補音行葦大斗瞳庾切十升也溝洫志白渠之歌涇水一石其泥數斗且溉且糞長我禾黍補音所引證止此爾殊不明著何以驗其果瞳庾切白渠之歌大略叶爾亦有闗雎左右芼之鐘鼓樂之芼與略大叶爾而或讀芼如邈亦過矣抑話言與行行亦不甚叶又黄苟果羽切别無證驗徒以欲叶韻而為此切台皆必墨切亦曰叶韻爾無證凡此類皆難用抑孔昭之咲切靡樂魚教切為虐宜昭切皆無謂丁丑孟秋朔日食望月食汲古云日月薄食或謂天之定數非與先生曰日食雖因日月交㑹而厯家亦莫能皆中厯家咸服唐一行之精而一行所中十僅七八諸儒泛聞厯筭每中不究其詳遂歸之定數此言害道大戴記孔子之言曰古之治天下者必聖人聖人有國日月不食星辰不悖世罕誦習不知日月薄食實闗君徳三才一體元氣混全逮重濁下凝故輕清上浮重濁静止而積隂輕清上浮而生陽隂陽交而人物生故曰人者天地之心人道亂則天地之氣亦亂君人者其可不反而求諸己乎此心本與天地為一意作而昏始亂始悖唐虞三代之時歴年多無日食至太康失邦始日食厯家雖謂日月薄食可以術推音此衰世之術安能一一皆中汲古又問周官皷人救日月則詔王皷其救日伐皷取其有聲以壓隂氣而充其陽也如月食亦皷豈充陽乎先生曰此言皆未逹乎隂陽之實人知日之為陽而離為日不知離隂卦也如月之為隂而坎為月不知坎陽卦也以此推之隂陽之實則一三才一也人道悖逆其氣發於上而為日月之食則人心恐懼而皷於下其氣豈不應乎故皷人救日月則詔王皷見誨語厯家之好為欺罔也甚哉不知厯者率為其所欺及知厯者又復與之為徒欲自神其術故凡為是紛紛名數之浩繁参錯者大抵詭辭飾說務使人莫之遽解以自神竒而已矣獨司馬遷之厯書良為簡易特曰大餘小餘而已而亦不明著其説至於班固之志大初厯何其為欺之甚也大初立法之疏已不足道司馬遷悟其非不敢筆之於書復用古厯九百四十分而固尊稱八十一分之善又從而肆陳其飾説所謂大初厯之本法以一日為八十一分月行凡二十九日八十一分日之四十三復與日㑹而為一月如此言足矣何必秘其説而日月法二千三百九十二也二千三百九十二即二十九日又八十一分日之四十三之數也以月法二千三百九十二而四之弦望晦朔於是乎定爾又分何必復立通法五百九十八也此猶云可十九年而七閏初無深秘乃立為章嵗之名又曰合天地終數得閏法地數於十天數於九十九年而七閏耳何必詭為是强合之説自此積之至千五百三十九年而為統何法之有又何必言以閏法乗日法得統法其章二十七章而為㑹三㑹而為統初無闗乎以閏法乗日法也秘其本實之説詭飾偶合之文所謂章月二百三十五者十九年之月數耳殊不必言何必復立其數又何必言五位乗㑹數得章月也所謂㑹月六千三百四十五者二十七章之月數耳亦何必言又何必曰以㑹數乗朔望之㑹得㑹月也所謂統月萬九千三十五元月五萬七千一百五皆不必言也所謂章中二百二十八即十九年之中氣除七閏月之無中氣者其數如是耳所謂統中即統月之除閏所謂元中即元月之除閏徒為浩繁之數以助神竒之狀蓋不神其術無以言功於上功無足言則名譽不彰利祿患失此漢以来厯家胸中黙符之利心厯法精備世服大衍之為法其要在乎通法三千四十凡二十九日三千四十八日之一千六百一十三則月復與日㑹是為一月耳何必飾而為説曰四象之䇿又曰揲法八萬九千七百七十三揲法之數即二十九日與夫餘分一千六百一十三之數毎一日為分三千四十即得其數何竒之有何揲之有如曰四四揲之象夫四方其數而定弦望晦朔則明曰四分之以定弦望晦朔足矣何必為是詭飾之辭不務以明告天而専務以滋惑人周天三百六十五度三千四十分度之七百七十九太如此言周天度分豈不明白簡易何必易其名曰乾實又積毎度三千四十分而為一百一十一萬三百七十九太也日行不盡天度嵗差三十六分如此言嵗差又豈不明白簡易又何必變其名曰策實一百一十一萬三百四十三也所謂减法尤其無謂所謂九萬一千二百者三十日之數耳既不合日之行又不合月之行乃先布此數復减朔虚一千四百二十七是為揲法一月之數八萬九千七百七十三耳不必立此數可也所謂所差一萬七千一百二十四即十二月之朔虚一千四百二十七也朔餘一千六百一十三其數不可廢至於虚分一千四百二十七不必言可也又何必詭其名曰用差積其虚數至於一萬七千一百二十四若此之類奚可殫舉自時厥後諸厯迭興豈能果有所改作哉皆不過舄大衍之分或以八千四百為日法以四千四百五十七為朔餘或以一千三百四十為日法以七百一十一為朔餘其數自異其實即大衍之日法三千四十即大衍之朔餘一千六百一十三詭名飾詐以欺不知厯者忠信道䘮一至於此歐陽永叔既知其詭又備載其詭辭相與為欺何也豈詭辭為文士之常邪慈湖遺書巻十五
