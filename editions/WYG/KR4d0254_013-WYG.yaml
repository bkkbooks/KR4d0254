body:
  text: 慈湖遺書巻十三宋楊簡撰家記七論大學中庸言有似是而非似深而淺似精而粗足以深入學者之意其流毒淪肌膚浹骨髓未易遽拔者正以其與學者心術之病同故合夫學者心術之中其潔清無滓濁者寡矣孔子誨仲由曰知之為知之不知為不知學者以不知為知者徃徃如是盖其用力之久積學之深自以為窮高極遠蔑以加此惟無詰焉詰則必窮否則好已勝而已矣其中心亦豈能洞焉而無少留阻自近世二程尊信大學之書而學者靡然從之伊川固出明道下明道入德矣而尤不能無阻惟不能無阻故無以識是書之疵大學曰欲治其國者先齊其家欲齊其家者先脩其身欲脩其身者先正其心判身與心而離之病已露矣猶未著白至於又曰欲正其心者先誠其意欲誠其意者先致其知致知在格物噫何其支也孔子無此言顔曾亦無此言孟子亦無此言孔子曰忠信曾子曰忠恕孟子亦曰天下之本在國國之本在家家之本在身而已他日又曰仁人心也未嘗於心之外起故作意也又曰人之所不學而能者其良能也所不慮而知者其良知也又曰而勿正心豈於心之外必誠其意誠意之外又欲致知致知之外又欲格物哉取人大中至正之心紛然而鑿之豈不為毒又曰有所恐懼則不得其正有所好樂則不得其正有所憂患則不得其正孔子臨事而懼作易者其有憂患好賢樂善何所不可而惡之也是安知夫恐懼好惡憂患乃正性之變化而未始或動也又曰心不在焉視而不見聴而不聞食而不知其味孔子謂心莫知其郷而此必曰在正云者正意象之凝結孔子所以止絶學者之意者謂是類也又曰在止於至善夫所謂至善即明徳之别稱非有二物而又加止於之意禹曰安女止非外加止於之意也穆穆文王於緝熈敬止渾然圎貫初無心外作意之態也而大學於是又繼之曰為人君止於仁為人子止於孝為人父止於慈大禹之安止文王之敬止豈頑然無用之止哉其見於事親曰孝見於與子曰慈發於博愛曰仁見於恭曰敬而此曰君止於仁臣止於敬父止於慈子止於孝何其局而不通也又曰無所不用其極是又意說也致學於性外積意而為道異乎子思無入而不自得矣胡不觀箕子為武王陳洪範乎箕子之言極曰無偏無陂遵王之義無有作好遵王之道無有作惡遵王之路無偏無黨王道蕩蕩無黨無偏王道平平無反無側王道正直論極如箕子誠足以發揮人心之極矣盖人心即道作好焉始失其道作惡焉始失其道微作意焉輙偏輙黨始為非道所以明人心之本善所以明起意之為害而大學之書則不然曰無所不用其極曰止於至善曰必正其心曰必誠其意反以作意為善反蔽人心本有之善似是而非也似深而淺也似精而粗也又曰道盛德至徳可以言至也道不可以言盛也於道言盛是又積意之所加而非本也又曰知止而後有定定而後能靜靜而後能安安而後能慮慮而後能得吁此膏肓之病也道亦曷嘗有淺深有次第哉淺深次第學者入道自為是不同耳是人也非道也學者學道奚必一一皆同而欲以律天下萬世無益於明道而反壅之道無淺深無次第而反裂之人心自直自一自無他顧作而起之取而鑿之豈特大學之士不可以是告之雖小學亦不可以是亂之也小學雖未壯其良心固未斵喪也作是書者固將以啓佑後學非欲以亂後學而學者讀之愈積其意愈植其山逕之茅愈喪其正也孔子大聖其啓佑學者當有造化之功而三千之徒猶尚勤聖人諄諄絶四之誨有意態者則絶之曰毋意有必如此必不如此者又絶之曰毋必有固執而不通者絶之曰毋固其胷中隱然有我者存則又絶之曰毋我如是者不勝其衆故門弟子總而記之曰子絶四毋意毋必毋固毋我然則學者難乎脫是四者自古則然而况後世乎然則無訝乎大學之書盛行于今未聞有指其疵者不可不論也先生曰某少年不知禮記多非聖人語甚喜大學心有所忿懥則不得其正一章後因覺却於此章知非知道者所作夫忿懥則斷不可有至於恐懼若以威武恐懼則不可或君父震怒而恐懼何不可好樂而好色好貨則不可若好善好學何不可憂患如為貧而憂患失而憂則不可若憂其不如舜或憂慮國家則何不可盖不知道者率求道於寂滅不知日用交錯無非妙用覺則於日用應酬交錯間自無毫髮非禮處故大學無子曰者非聖人之言孔子曰心之精神是謂聖孟子道性善心未始不正何用正其心又何用誠其意又何須格物見誨語大學曰小人閒居為不善無所不至見君子而後厭然揜其不善而著其善人之視己如見其肺肝然則何益矣此謂誠於中形於外故君子必慎其獨也吁作大學者其學亦陋矣小人情狀如此何足發明慎獨之學哉苟不如此則遂可以為慎獨乎踈略亦甚矣學道者固如此乎簡少時不知大學非聖人語甚喜有所忿懥則不得其正一章後因有覺却於此章知其非知道者作夫忿懥則斷不可有至於恐懼特不可屈於威武而恐懼爾或君父震怒而恐懼何不可好樂而好色好貨則不可若好善好學何不可憂患而為貧而憂患失而憂則不可若憂道憂國何不可盖不知道者率求道於寂靜不知日用交錯無非妙用覺則於日用應酬交錯間自無非禮處故知大學非聖人之言益可騐者篇端無子曰二字中庸不偏不倚之謂洪範曰無偏無陂無黨無偏子曰人之過也各於其黨學者往往以中為實體而致意焉則有所倚倚即偏非中也堯舜允執厥中亦不過不偏不倚耳意微動則偏倚即謂不中既曰中矣而又曰庸何也至哉聖言可謂深切著明矣庸常也中道初不深遠不過庸常而已而智者自過之愚者又自不及賢者自過之不肖者又自不及切實言之曰庸常而已矣又曰庸言之信庸行之謹明其初無奇也所謂視者是也所謂聽者是也所謂言者是也所謂動者是也所謂心思者是也其有不思之時不言不動不視不聽之時亦是也故孔子曰誰能出不由户何莫由斯道也又曰百姓日用而不知而人自不知自不信如終日懷玉而索諸人此喻猶未切也正猶孩提未辨寒暖終日流汗而曰寒也人日用此道而自不知何以異此及其省也其言常言也其行常行也不必加㣲意焉不必損㣲意焉而渾渾融融蕩蕩平平皜皜之妙我所自有雖終日思慮而如不思慮也雖終日云為而如不云為也似動而未嘗遷也似靜而未嘗止也是妙也惟覺者自知而不可以語人雖强言之終不可以盡也故孔子曰中庸之為徳也其至矣乎民鮮久矣見訓語子思曰喜怒哀樂之未發謂之中發而皆中節謂之和中也者天下之大本也和也者天下之逹道也孔子未嘗如此分裂子思何為如此分裂此乃學者自起如此意見吾本心未嘗有此意見方喜怒哀樂之未發也豈曰此吾之中也謂此為中則已發之於意矣非未發也及喜怒哀樂之發也豈曰吾今發而中節也發則即發中則即中皆不容私大本逹道亦皆學者徐立此名吾心本無此名學者放逸馳騖於心外自起藩籬自起限域孔門惟曰吾道一以貫之未嘗分裂也書曰善無常主恊于克一吾心渾然無涯畔無本末其未發也吾不知其未發其既發也吾不知其既發故孔子曰吾有知乎哉無知也文王不識不知順帝之則知則失帝則矣事親事君非無知也應物從事非無知也周公仰而思之孔子臨事而懼好謀而成非無知也如四時之錯行如日月之代明油然而生忽然而止生不知所生而是非自明利害自辨止不知所止止無其所止無其事如此而知猶無知也如此而為猶無為也子思覺焉而未大通者也其卒章曰上天之載無聲無臭至矣此又分裂之意也孔子之言則不然曰夫孝天之經也地之義也明乎孝即天之經地之義未嘗分本末也又曰哀樂相生是故正明目而視之不可得而見也傾耳而聽之不可得而聞也即哀樂而發明其至未嘗外哀樂而發明其至也衆人自以為哀樂之可見可聞也孔子則以為實不可見不可聞也此惟洞逹者知之未至於洞逹者終疑也汲古問子曰中庸其至矣乎民鮮能久矣又曰中庸不可能何謂鮮能與不可能先生曰中庸能字此子思聞孔子之言不審孔子未嘗云能在論語止曰民鮮久矣無能字如子曰中庸不可能也此能是用意矣道無所能有能即非道見誨語孔子曰道之不行也我知之矣智者過之愚者不及也道之不明也我知之矣賢者過之不肖者不及也人莫不飲食也鮮能知味也子曰道其不行矣夫人心即道本不假求學者自昏誤求之外愚不肖罔然不自知固為不及賢知又加之意故又過之聖人歴觀天下自古人心不失之不及即失之過故為之屢言再歎而深念之也愚不肖之不及不足多論賢知者之過皆於清明無體無意中而加之意或有動之意或有靜之意或有難之意或有易之意或有多之意或有寡之意或有實之意或有虚之意或有精之意或有粗之意或有古之意或有今之意或有大之意或有小之意意態萬狀不可勝窮故孔子毎毎止絶羣弟子之意亦不一而足他日記者欲記則不勝其記故總而記之曰子絶四毋意毋必毋固毋我必如此必不如此固滯而不通行我行坐我坐衣我衣飲食我飲食儼然有我者存凡此皆意中之變態不省吾心虚明牢執氣血堅持意態守焉而不知其非固焉而不省其妄雖賢雖智難逃四者惟顔子自知其受病之所曰仰之彌高鑽之彌堅瞻之在前忽焉在後雖欲從之末由也已盖自知欲從之意去道猶遠至於三月不違仁則脱此患矣黙省寂然不動之妙何思何慮自清自明何高何堅無勞鑽仰何今何曩無體無意夫如是故三月如一日莫究厥始莫窮厥終變化云為如四時之錯行如日月之代明渾渾融融又如萬象畢見于水鑑之中夫是之謂仁又謂之道此道可以黙識而不可深思可以略言而不可詳議自省自信則終日思為而未嘗或動未省未信則終日靜默而未嘗少閑易曰百姓日用而不知孔子於此曰人莫不飲食也鮮能知味也視聽言動聖愚則同一明一昏聖愚斯異此誠非告語之所及也雖以孔子之聖亦末如之何已故良久而復歎曰道其不行已夫若夫於行言知愚於明言賢不肖者正以明夫行即明明即行今夫人之所以不行道者以其不明也是明也不以思是行也不以為不思即不為明猶强名而况於行乎此又非告語之所及見訓語先生曰孔子謂君子和而不流强哉矯汝以為何如汲古對云子路問强未明孔子何以如此荅先生曰矯者欲明故罔然無知既知而不學不能行其所知則危矣即入小人之域書云人心惟危起意為人心又曰不起意非謂都不理事凡作事只要合理若起私意則不可如事親從兄治家接物若子哭顔淵慟與見其過而内自訟此是云為變化非起意惟覺者自知汲古對曰不起意便是君子坦蕩蕩而無一毫之累若起意則是小人長戚戚而無片時寧一先生曰是見誨語或問及其至也聖人有所不能不知聖人亦何有不知也程正叔曰天下之理聖人豈有不盡者盖於事有所不徧知不徧能至纎息委曲處如農圃百工之事孔子亦豈能知哉何言之淺若此衆人皆能知之子思之分精粗裂本末知者獨得議之正叔不必論矣然而程之篤行亦豈易及不可不敬也但講學不得不辨明耳汲古問中庸云天地之大人猶有所憾故君子語大天下莫能載焉語小天下莫能破焉謂天地至大而有所憾者以祁寒暑雨之失中也君子之道中正不倚是以大而無或過故天下莫能破此説是否先生曰天地未離乎形君子足以範圍之也先生曰程明道謂至誠可以贊化育者可以囬造化誠有此也又謂惟神也故不疾而速不行而至神無速亦無至此言善見誨語孔子曰道不遠人人之為道而遠人不可以為道至哉聖言破萬世學者心術之蔽可謂切中人心即道學者自以為遠易曰百姓日用而不知惟其不知故人以道為遠則求道於心外不免於有所為道在我而求諸彼道不俟於為而求諸為夫是以愈求愈遠愈為愈遠萬古之學者其蔽一也舜曰道心明心即道易曰日用奚俟復求棄心而之外棄道而入意意慮紛然有作有為而益昏益妄矣至於昏妄是謂百姓日用而不知是終日懷玉而告人以貧終日飲食而自謂其饑渴也至近而自以為逺自有而自不認其有夫其所以不自知者昏也所以昏者動乎意也如水焉撓之斯濁矣不動乎意則本清本明之性自不昏矣變化云為如四時之錯行而自不亂矣心無質體無限量而天地範圍其中萬物發育其中矣此無俟乎辨柝而知之本如此也自覺自信匪思匪為孔子深惜夫中庸平易之道人皆有之因其為之是以遠之復戒之曰人不可以為道深知大患在乎為道而已執柯伐柯近矣睨而視之猶以為遠者終於二物也為道如伐柯終不近道然而舊習難於遽消有過不可不改則亦不為而已乎故孔子於是又曰改而止有過則改如有病則加之藥病去則藥可止人欲已盡則用力可止見訓語慈湖遺書巻十三
