body:
  text: 慈湖遺書卷七宋楊簡撰家記一已易泛論易易者已也非有他也以易為書不以易為己不可也以易為天地之變化不以易為己之變化不可也天地我之天地變化我之變化非他物也私者裂之私者自小也包犧氏欲形容易是已不可得畫而為一於戲是可以形容吾體之似矣又謂是雖足以形容吾體而吾體之中又有變化之殊焉又無以形容之畫而為􅄲􅅀者吾之􅅀也􅄲者吾之􅄲也可畫而不可言也可以默識而不可加知闕􅅀者吾之全也􅄲者吾之分也全即分也分即全也自生民以來未有能識吾之全者惟覩夫蒼蒼而清明而在上始能言者名之曰天又覩夫隤然而博厚而在下又名之曰地清明者吾之清明博厚者吾之博厚而人不自知也人不自知而相與指名曰彼天也彼地也如不自知其為我之手足而曰彼手也彼足也如不自知其為己之耳目鼻口而曰彼耳目也彼鼻口也是無惑乎自生民以來面牆者比比而不如是昏之甚者見謂聰明也夫所以為我者毋曰血氣形貌而已也吾性澄然清明而非物吾性洞然無際而非量天者吾性中之象地者吾性中之形故曰在天成象在地成形皆我之所為也混融無內外貫通無異殊觀一畫其旨昭昭矣厥後又繫之辭曰乾乾健也言乎千變萬化不可紀極往古來今無所終窮而吾體之剛健未始有改也言乎可指之象則所謂天者是也天即乾健者也天即一畫之所似者也天即己也天即易也地者天中之有形者也吾之血氣形骸乃清濁隂陽之氣合而成之者也吾未見夫天與地與人之有三也三者形也一者性也亦曰道也又曰易也名言之不同而其實一體也故夫乾彖之言舉萬物之流形變化皆在其中而六十四卦之義盡備於乾之一卦矣自清濁分人物生男女形萬物之在天下未嘗不兩曰天與地曰晝與夜曰夫與婦曰君與臣曰尊與卑曰大與小曰貴與賤曰剛與柔曰動與靜曰善與惡曰進與退曰實與虛博觀縱觀何者非兩一者所以象此者也又繫之辭曰坤坤順也明乎地與妻與臣與柔之類也然非有二道也坤者兩畫之乾乾者一畫之坤也故曰天地之道其為物不二則其生物不測又曰明此以南面堯之所以為君也明此以北面舜之所以為臣也又曰吾道一以貫之則夫乾坤之彖雖有大哉至哉之辨以明君臣上下之分而無二元也坤爻又曰直方大又曰以大終也又以明大與至之無二旨乾與坤之無二道也乾何以三一也天此物也人此物也地此物也無二一也無二己也皆我之為也坤何以三也天有隂陽日月明晦也地有剛柔髙下流止也人有君臣夫婦貴賤善惡也天下固有如此者也聖人繫之辭曰震明乎如此者陽為主自下而動且起也此我之變態也天下固有如此者也聖人繫之辭曰巽明乎如此者隂為主隂入於下柔隨之類也此又我之變態也天下又有如此者也聖人繫之辭曰坎言陽陷乎兩隂之中內陽而外隂水之類也此我之坎也天下又有如此者也聖人繫之辭曰離言隂柔不能以自立麗乎兩剛又外陽而中虛為火之類也此我之離也天下又有者陽剛止截乎其上故繫之辭曰艮艮止也明乎我之止也天下又有者隂柔發散乎其外故繫之辭曰兑兊説也明乎我之説也舉天地萬物萬化萬理皆一而已矣舉天地萬物萬化萬理皆乾而已矣坤者乾之兩非乾之外復有坤也震巽坎離艮兊又乾之交錯散殊非乾之外復有此六物也皆吾之變化也不以天地萬物萬化萬理為己而惟執耳目鼻口四肢為己是剖吾之全體而裂取分寸之膚也是梏於血氣而自私也自小也非吾之軀止於六尺七尺而已也坐井而觀天不知天之大也坐血氣而觀己不知己之廣也元亨利貞吾之四德吾本無此四者之殊人之言之者自殊爾人推吾之始名之曰元又曰仁言吾之通名之曰亨又曰禮言吾之利名之曰利又曰義言吾之正名之曰貞又曰固指吾之剛為九指吾之柔為六指吾之清濁為天地指吾之震巽為雷風指吾之坎離為水火指吾之艮兊為山澤又指吾之變而化之錯而通之者為六十四卦三百八十四爻以吾之照臨為日月以吾之變通為四時以吾之散殊於清濁之兩間者為萬物以吾之視為目以吾之聽為耳以吾之噬為口以吾之握為手行為足以吾之思慮為心言吾之變化云為深不可測謂之曰神言吾心之本曰性言性之妙不可致詰不可以人為加焉曰命得此謂之德由此謂之道其覺謂之仁其宜謂之義其履謂之禮其明謂之智其昏謂之愚其不實謂之偽其得謂之吉其失謂之凶其補過謂之無咎其欣然謂之喜其慘然謂之憂悔其非謂之悔嗇而小謂之吝其不偏不過謂之中其非邪謂之正其盡焉謂之聖其未盡焉謂之賢言乎其變謂之易言乎其無所不通謂之道言乎無二謂之一今謂之己謂之己者亦非離乎六尺而復有妙己也一也二之者私也梏也安得無私與梏者而告之姑即六尺而細究之目能視所以能視者何物耳能聽所以能聽者何物口能噬所以能噬者何物鼻能嗅所以能嗅者何物手能運用屈信所以能運用屈信者何物足能步趨所以能步趨者何物血氣能周流所以能周流者何物心能思慮所以能思慮者何物目可見也其視不可見耳可見也其聽不可見口可見噬者不可見鼻可見嗅者不可見手足可見其運動步趨者不可見血氣可見其使之周流者不可見心之為臟可見其能思慮者不可見其可見者有大有小有彼有此有縱有橫有髙有下不可得而一其不可見者不大不小不彼不此不縱不橫不髙不下不可得而二視與聽若不一其不可見則一視聽與嗜嗅若不一其不可見則一運用步趨周流思慮若不一其不可見則一是不可見者在視非視在聽非聽在嗜非嗜在嗅非嗅在運用屈伸非運用屈伸在步趨非步趨在周流非周流在思慮非思慮視如此聽如此嗜如此嗅如此運用如此步趨如此周流如此思慮如此不思慮亦如此晝如此夜如此寐如此寤如此生如此死如此天如此地如此日月如此四時如此鬼神如此行如此止如此古如此今如此前如此後如此彼如此此如此萬如此一如此聖人如此衆人如此自有而不自察也終身由之而不知其道也為聖者不加為愚者不損也自明也自昏也此未嘗昏此未嘗明也或者蔽之二之自以為昏為明也昏則二明則一明因昏而立名不有昏者明無自而名也昏明皆人也皆名也非天也天即道天即乾天即易天即人天與人亦名也大傳曰鼓萬物而不與聖人同憂此非先聖之言也憂即天萬物即天孔門之徒聞聖人之言而差之以己意參其間而有是言也此非吾孔子之言也吾道一以貫之此孔子之言也其曰易與天地凖此亦非孔子之言也何以明之天地即易也幽明本無故不必曰仰觀俯察而後知其故也死生本無説不必原始要終而後知其説也是皆非吾孔子之言也其徒之已説也神即易道即善其曰繼之者善也離而二之也離道以善莊周陷溺乎虛無之學也非聖人之大道也孔子曰易其至矣乎夫易聖人所以崇德而廣業也此孔子之言也聖人即易也德業即易也繼曰天地設位而易行乎其中又非孔子之言也何者離易與天地而二之也子曰之下其言多善間有微礙者傳録紀述者之差也其大旨之善也不繫之子曰者其言多不善非聖人之言故也乾即易坤即易其曰乾坤毁則無以見易易不可見則乾坤或幾乎息又曰形而上者謂之道形而下者謂之器其非聖言斷斷如白黑如一二之易辨也凡如此類不可勝紀善學易者求諸己不求諸書古聖作易凡以開吾心之明而已不求諸己而求諸書其不明古聖之所指也甚矣是古聖指東學者求西讀書者滿天下省己者千無一萬無一孔氏之門學者不知其幾而日至者無幾也月至者又無幾也三月不違者顏氏子一人而已他日子夏子張子遊以有若似聖人矣而況於不在孔門者乎幸有一曾子獨不然曰不可江漢以濯之秋陽以暴之皓皓乎不可尚已此豈訓詁之所能解也知之者自知也不可以語人也所可得而語人者曰吾無行而不與二三子者而已終不可得而言也曰吾有知乎哉無知者而已實無得以告人也何為其然也尚不可得而思也矧可得而言也尚不可得而有也矧可得而知也然則昏者亦不思而遂己可乎曰正恐不能遂己誠遂己則不學之良能不慮之良知我所自有也仁義禮智我所自有也萬善自備也百非自絶也意必固我無自而生也雖堯舜禹湯文武周公孔子何以異於是雖然思亦何害於事箕子曰思曰睿孔子曰學而不思則罔周公仰而思之夜以繼日思亦何害於吾事也庸言之信庸行之謹不可以精粗論也警戒無虞罔失法度正易道之妙也堯舜允執厥中執此也兢兢業業弗敢怠也禹之克艱不敢易也湯改過不吝去其不善而復於善也文王翼翼小心也信吾信謹吾謹警戒吾警戒執吾執兢兢吾兢兢業業吾業業艱吾艱改吾改翼翼吾翼翼無二我也無二易也既曰天下何思何慮矣而又曰執曰兢兢業業曰艱曰改過曰翼翼無思無慮者固如此乎但兢兢但業業但克艱而弗易但改過但翼翼方兢兢業業克艱而不易時此心果可得而見乎果不可得而見乎果動乎果不動乎特未之察耳似動而不移也似變而未嘗改也不改不移謂之寂然不動可也謂之無思無慮可也謂之不疾而速不行而至可也此天下之至動也此天下之至賾也象也者像此者也爻也者效此者也非賾自賾動自動也一物而殊名也一人而姓名字行之不同也此非沈虗陷寂者之所能識也亦非憧憧往來者之所能知也然而至易也至簡也或者自以為難近取諸身殊不逺也身猶逺爾近取諸心即此心而已矣曾子傳之曰夫子之道忠恕而已孟子學之曰仁人心也又曰惻隱之心人皆有之羞惡之心人皆有之又曰今人乍見孺子將入於井皆有怵惕惻隱之心非所以內交於孺子之父母也非所以要譽於鄉黨朋友也於戲此足以指眀人心之本良矣而學者往往遂領孟子之意而不復疑其有他者千萬而不一二也故孟子言必稱堯舜於以知孟子之言雖諄諄而當時之聽之者多藐藐此道甚眀甚易甚簡而人自疑自惑不信使當時聞言而遂信者衆必不至勞孟子諄諄如此也能識惻隱之真心於孺子將入井之時則何思何慮之妙人人之所自有也純誠洞白之質人人之所自有也廣大無疆之體人人之所自有也此心常見於日用飲食之間造次顛沛之間而人不自省也孔子曰造次必於是顛沛必於是子思曰道也者不可須臾離也可離非道也當曰道也者未始須臾離也非曰造次間為之顛沛間為之無須臾而不為也是心本一也無二也無嘗斷而復續也無嚮也不如是而今如是也無嚮也如是而今不如是也晝夜一也古今一也少壯不強而衰老不弱也可強可弱者血氣也無強無弱者心也有斷有續者思慮也無斷無續者心也能明此心則思慮有斷續而吾心無斷續血氣有強弱而吾心無強弱有思無思而吾心無二不能明此心則以思慮為心雖欲無斷續不可得矣以血氣為己雖欲無強弱不可得矣雖欲造次於是顛沛於是無須臾不於是勉強從事不須臾而罷矣況於造次乎況於顛沛乎書曰作德心逸日休作偽心勞日拙如此則亦偽而已矣非誠也孔子曰主忠信忠信者誠實而已無他妙也而聖人以是為主本或者過而索之外而求之故反失忠信之心即道心即仁義禮智之心即不勉而中不思而得之心通乎一萬事畢差之毫釐繆以千里不逺復此心復也頻復頻放而頻返也亦危矣然已復則如常矣無咎也得此則吉失此則凶無虞他日之吉凶但觀一念慮之得失當乾之初而不肯潛此心放也當五而不能飛此心固也當三而不惕此心慢也當四而不疑此心止也循吾本心以往則能飛能潛能疑能惕能用天下之九亦能用天下之六能盡通天下之故仕止久速一合其宜周旋曲折各當其可非勤勞而為之也吾心中自有如是十百千萬散殊之正義也禮儀三百威儀三千非吾心外物也故曰性之德也合內外之道也故時措之宜也言乎其自宜也非求乎宜者也孔子曰道不逺人人之為道而逺人不可以為道人之為道似善矣而孔子截截斷斷甚言其不可孟子窺之亦曰人之所不學而能者其良能也所不慮而知者其良知也孩提之童無不知愛其親者及其長也無不知敬其兄也此豈計度而圖之也此豈擬議而成之也擬議而成其變化此非聖人之言也學者之億説也孰知夫君子終日乾乾而非意也頻復獨復而非反也利於不息之貞而非升也震來虩虩非懼也其亡其亡非慮也何天之衢亨非通也括囊無咎無譽非閉也三日不食非窮也揚于王庭非得志也介于石非止也出門同人非往也吾終日用之而鬼神莫我識也聖智莫我測也雖我亦有所不自知而況於他人乎哉如秋陽之暴至白而無瑕也如江漢之濯至潔而無滓也混混乎無涯無畔無始無終也天地非大也毫髮非小也晝非明夜非晦也往非古也此非今也它日非後也鳶飛戾天非鳶也魚躍于淵非魚也天下被日月之明照而不知其自我也天下霑雨露之潤而不知其自我也天下畏雷霆之威而不知其自我也日夜行乎吾己之中而以為他物也其曰範圍天地發育萬物也非過論也孔子曰哀樂相生雖使正明目而視之不可得而見也傾耳而聽之不可得而聞也哀樂必有形哭笑必有聲而曰不可見不可聞何也此非心思之所能及也非言語之所能載也我之所自有也而不可知也不可識也書不盡言言不盡意未有知近而不知逺也未有知小而不知大也逺近一物也小大無二體也閨門之內若近而實逺也若小而實大也即敬即愛無不通矣有倫有敘無不同矣放之東海之東而準也放之西海之西而準也放之南海之南而準也放之北海之北而準也不可思也不可逺也己易終見甲藁汲古問三易經卦皆八何以所首不同或謂乾坤其易之門但當以周易為正果可如此説否先生曰今之言易者必本于乾坤陋矣但見周易之書不見連山歸藏之書故必首乾次坤不知連山首艮重艮故曰連山歸藏首坤故曰坤乾之義連山夏后氏之易歸藏商人之易至矣哉合三易而觀之而後八卦之妙大易之用混然一貫之道昭昭於天下矣三才皆易也三才之變非一則一非一則一或雜焉或純焉純焉其名乾坤雜焉其名震坎艮巽離兊皆是物也一物而八名也初無大小優劣之門也形則有大小道無大小德則有優劣道無優劣或首艮或首乾明乎八卦之皆易也易道則變一而為八其變雖八其道實一杜子春曰連山宓羲歸藏黃帝先生問汲古曰易卦諸彖言大矣哉曾講究否汲古對曰彖言大矣哉皆定卦不知當何如看先生乃指誨曰易卦諸彖言大矣哉者十二卦豫遁姤旅言時義隨言隨時之義豈他卦皆無時義哉豈他卦之時義皆不大哉坎暌蹇言時用豈他卦皆無時用哉豈他卦之時用皆不大哉頥大過解革言時豈他卦皆非時哉豈他卦之時皆不大哉六十四卦皆時也皆有義也皆有用也皆大也大矣哉蓋歎其道之大有言不能盡之旨事無大小無非易道之妙聖人偶於此十二卦發其歎非此十二卦與他卦特異也使每卦而言則不勝其言愚者執其言智者通其旨豈特六十四卦皆可以稱大矣哉雖三百八十四爻亦皆可稱大矣哉聖人於豫隨遁姤旅則猶有義之可言至於頥大過解革則既不曰義又不曰用止曰時而已矣何以曰大矣哉此正以明天地無一物一事一時之非易學者溺於思慮不求其義聖人於頥大過解革盡捐義用止言其時而歎之曰大矣哉使學者無所求索不容鈎深即時而悟大哉之妙則事理一貫精粗一體孔子何思何慮文王不識不知信矣互見誨語六十四卦皆可以言元亨利貞聖人既於乾言之又於坤言之又於屯言之聖人於此謂學者可以意通之矣故自蒙而下或言其一或言其二或言其三至隨又全言之臨又言之無妄革又言之亦偶於此數卦而復言非此數卦之特異也亦恐學者執乾坤屯之卦異於餘卦故復於此言之以破其疑於坤曰牝馬之貞者於以明地道也妻道也臣道也柔順勤行之正也剛陽在上無為而佚君之道也柔隂在下有為而勞臣之道也君臣之分不同而道則通也在君則剛則佚在臣則柔則勞一也天下之動貞夫一者也無二貞也子思曰天地之道其為物不二使牝馬之貞果劣於乾則屯不言牝馬又大於坤乎雖庸人孺子知其不然也而先儒率尊乾而卑餘卦非明乎易者也歸藏首坤則乾又劣於坤乎學者不知連山歸藏是以蔽於斯義或者又曰他卦言元亨利貞者彖釋曰大亨以正與乾坤不同何耶曰此亦會通之義也元有始義有大義以始明之可也以大言之亦可也乾彖亦曰大哉無不可者文言雖列而四之而又曰乾元者始而亨者也是又合元與亨而為一也彖舉乾元以統亨利貞則四德之名雖殊而實同也屯隨曰大亨貞又與餘彖不同亦隨卦發明大易之道不可以一端拘也六十四卦皆易也六十四卦皆元也皆亨也皆利也皆貞也聖人偶有所言偶有所不言隨意發明舉一隅三隅可反也書不盡言言不盡意欲詳其言雖伏羲文王周公孔子繫易之辭至於今不已猶不得而盡也且諸卦間有贊辭曰大矣哉者所以歎其道之至大所以明易之道也非獨此數卦者有易之道餘卦無也雖庸人孺子知其不然也自坎遁暌蹇旅皆可以言大矣哉而況於他卦乎元亨利貞猶是也今夫人一話言何從而始乎非元乎一念慮何從而始乎非元乎日用應酬變動不窮非大亨乎咸有利焉非利乎己則利乎物又有正焉正則行邪則否正則利邪則害自一人之身一日之中元亨利貞咸具焉而況於他乎一以貫之物物皆易事事皆易念念皆易句句皆易號名紛然變化雜然無一非易見訓語汲古問易乾卦云君子學以聚之問以辨之寬以居之仁以行之先儒謂學聚問辨進德也寬居仁行修業也此言如何先生曰學貴於博不博則偏則孤伯夷惟不博學雖至於聖而偏於清栁下惠惟不博學雖至於聖而偏於和學以聚之無所不學也大畜曰君子以多識前言往行語曰君子博學於文學必有疑疑必問欲辨明其實也辨而果得其實則何患不寬何患不仁然聖人垂訓所以啓後人後人問辨未得其實而自以為實者多矣故諄復而誨之誨之以寬則凡梏於己私執於小道者庶其有警孟子曰養而無害則塞乎天地之間此猶未足以盡寬之至大傳曰範圍天地之化庶乎其寬矣然此猶可言而及者猶有涯畔未足以盡寬之至孔子曰言不盡意又自謂吾有知乎哉無知也此非訓詁之所能解非心思之所能及然則寬即仁仁即寬而聖人復言仁者以人之學道固有造廣大之境未盡其妙而止輟溺於靜止而無發用之仁故卒曰仁以行之如四時之錯行如雷霆風雨之震動變化而後可以言仁未至於此則猶未可以言仁也見誨語坤六二直方大不習無不利直心而往即易之道意起則岐而入於邪矣直心而行雖遇萬變未嘗轉易是之謂方凡物圓則轉方則不轉方者特明不轉之義非於直之外又有方也夫道一而已矣言之不同初無二致是道甚大故曰大是道非學習之所能故曰不習無不利孟子曰人之所不學而能者其良能也所不慮而知者其良知也習者勉強本有者奚俟乎習此雖人道即地之道故曰地道光也光如日月之光無思無為而無所不照不光明者必入於意必岐而他必不直方大必昏必不利六三含章可貞隂雖有美含之以從王事弗敢成也地道也臣道也妻道也地道無成而代有終也或者往往於是疑其為小故聖人特發之曰智光大也道一而已初無大小六四括囊無咎無譽亦此道也方時閉塞義當括囊而謹易道之見於坤見於謹者也二言坤道正五言坤道之盛他卦之五多明君象至於坤則臣道也故五止言臣位之極盛黃者中之象言乎得其中道也故曰通理言理以明中非中自中理自理也裳者下服言乎正人臣之位居人臣之體也故曰正位居體明乎得道者必能守分而不犯此非設飾者所能由中而發發於文為故曰元吉文在中也言乎文非外飾乃自中誠而著也伊周之事人咸信之不疑其為非信其誠也王莽設飾故卒罹大禍初之履霜謹微之道也上之龍戰道之窮也皆易之道而有昏明邪正之辨也坤之用六即乾之用九九六不同而用同乾造始坤代終始終不同而其大則同故曰以大終也至哉之坤即大哉之乾也名分不同而道同也為妻為臣而失道則不永則不貞得其道者必永必貞二三四五皆能用六惟上六不能用六反為六所用為形體所使為勢位所動故凶初亦不能用六故為霜為氷為不善之積能辨之於早則能用之矣汲古問易蒙卦象曰君子以果行育德何以謂之果先生曰果者實之謂德性人之所自有不假於求順而行之無有不善有行實焉行虧則德昏矣德性無體本無所動本不磨滅如珠混沙而失其明如水不濁則性不失矣順本正之性而逹之是謂果行所以育德見誨語汲古問蒙何以養正先生曰蒙者不識不知以養正性見誨語需得其道必得所需需失其道必無後獲需待也彼此相孚則應矣人所需待多動乎意非光也光如日月之光無思無為而無所不照此之謂道如此則人咸信之故曰孚如此則得所需矣亨矣得所需亨通或放逸失正故又曰貞乃吉孚與光與正本非三事以三言發明道心一動乎意則不孚不光不正謂之人心故舜曰人心惟危明其即入於邪入於凶禍小畜柔得位而上下應之曰小畜健而巽剛中而志行乃亨以小畜大以臣畜君之道也畜有養義有止義以下畜上非勢之順者而有道焉非柔則不敬不順非得位則不可以有所行豈有居下位而可以行畜君之事者乎雖柔雖得位使人心不悅雖悅而不至於上下皆悅而應之亦不能以畜君天下事未有人心不悅而能行者而況於畜君乎故必上下之心咸應之乃可其德健則力足以行事而無困懾不繼之患巽則順入乎君心剛則物莫能變中則不偏不倚剛中兩言足以發明道心之本人臣能健能巽而中無其本亦不能致亨健矣巽矣剛矣中矣或所畜之君雖略相應而諌不盡行言不盡聽則臣亦不可謂得行其志亦不能亨於戲物情事理如上所序節節如此曲折如此乃易之道也雖柔得位以明六四之象衆陽咸應有上下應之象下乾健象上巽巽象剛中二五之象四五剛柔相得有志行之象非象自象道自道也此正易道之見於小畜六畫者然也象著其象彖發其義所謂柔也得位也上下應也健也巽也剛也中也志行也非每事而致其力也合是數者以發明易小畜之道得易道之全者自能當小畜之時盡小畜之義自與此彖辭無不合有一不合必於道有虧焉齊景公悅晏子之對作君臣相悅之樂其詩曰畜君何尤畜君者好君也此亦小畜之小亨也何者晏子猶未有剛中之大本故也易者天下之大道聖人之大道雖甚賢者未能盡也雖高明之士已得大本而物情事理委曲萬變往往踈略不能皆盡孔子自謂加我數年五十以學易可以無大過明知夫易者大聖人之事變應無窮之道晚年成德乃可學也汲古問先儒謂復其見天地之心乎此一句最不可以言語解而可以身反觀天地以生物為心人能於善心發處以身反觀之便見得天地之心此説如何先生曰三才之間何物非天地之心何理非天地之心明者無俟乎言不明而欲啓之必從其易明之所以啓之萬變萬殊不可勝紀難以明指陽窮上剝盡矣而忽反下而復生其來無階其本無根然則天地之心豈不昭然可見乎天地之心即道即易之道即人之心即天地即萬物即萬事即萬理言之不盡究之莫窮視聽言動仁義禮智變化云為何始何終一思既往再思復生思自何而來思歸於何所莫究其所莫知其自非天地之心乎非道心乎萬物萬事萬理一乎二乎此尚不可以一名而可以二名乎通乎此則變化萬殊皆此妙也喜怒哀樂天地之雷霆風雨霜雪也應酬交錯四時之錯行日月之代明也孔子曰哀樂相生正明目而視之不可得而見也傾耳而聽之不可得而聞也於戲至哉何往而非天地之心也見誨語汲古問説卦云離為甲胃何也先生曰剛在外以衛已取其外實中虛也汲古又問古之兵用皮為甲秦漢以來改用鐵豈非後人多好戰故以鐵為之乎先生曰函人為甲犀甲兕甲合甲革堅者支久惟甲之足以當矢刃者以其柔勝剛也後世易之以鐵豈古聖不如後人之智嘗以問諸軍將曰蠻人用皮甲若大國用之則不威重爾實不如革也見誨語衆人見天下無非異聖人見天下無非同天地之間萬物紛擾萬事雜並實一物也而人以為天也地也萬物也不可得而一也不可得而一者暌也暌異也故不可得而一者衆人之常情而未始不一者聖人之獨見非聖人獨立此見也天地萬物之體自未始不一也天下同歸而殊途一致而百慮惟人執其途而不知其歸溺其慮而不知其致夫是以見其末而不見其本轉移於事物而不得其會通聖人懼天下遂梏於此而不得返故發其義於暌之彖夫天穹然而上地隤然而下可謂甚相絶聖人則曰其事同也今考天地之事隂陽施生同於變化同於造物謂之同猶無足甚疑至於男女斷然不可以為一人聖人將以明未始不一之理則亦有可指之機曰其志未始不通也夫以男女之不可以為一人而今也其志則通通則一然則謂之一可也又豈特男女之若可以説合者為然舉天下萬物如鳶之飛至於戻天魚之躍乃不離於淵孰知鳶之所以飛者即魚之所以躍者也林木之喬聳砌草之纎短判然則性之不同而體質之殊絶也孰知夫木之所以為喬而聳者即草之所以纎而短者也苟於此而猶有疑則試原其始木之未芽草之未甲木果有異於草草果有異於木乎天者吾心之髙明地者吾心之博厚男者吾心之乾女者吾心之坤萬物者吾心之散殊一物也一物而數名謂之心亦謂之道亦謂之易聖人諄諄言之者欲使紛紛者約而歸乎此也汲古問益卦象曰風雷益君子以見善則遷有過則改或以為雷行風從相資而相益此説是否先生曰見善則遷有過即改當如風雷之疾如此則獲益也人誰無好善改過之心或有以為難而不能遷改者患在於動意闕則虛中無物如鏡如空何善之難遷何過之難改舜聞一善言見一善行若決江河沛然莫之能禦者以舜之道心精一故無有阻滯也先生曰聖人不貴無過貴改過汲古對云故夫子曰已矣乎吾未見能見其過而內自訟先生曰世之學者多溺於空寂以自訟為非道豈聖人以非道教人汲古遂蒙先生書七言以示誨云能見其過內自訟誰知此是天然勇多少禪流妄詆訶不知此勇不曾動又書六言云兢業初無蹊徑緝熙本有光明自覺自知自信何思何慮何營鏡裏人情喜怒空中雲氣紆縈孔訓於仁用力箕疇王道平平見誨語鼎彖曰鼎象也以木巽火亨飪也聖人亨以享上帝而大亨以養聖賢諸儒多求象外之義必求以木巽火之義又求聖人亨以享上帝之義又求大亨以養聖賢之義不得其義遂穿鑿其説不知彖辭所言甚明甚正不必他求鼎象也言鼎卦儼然有鼎之象有腹有足有耳有鉉以木巽火言其亨飪也即以木巽火即大易之道即亨飪即大易之道聖人亨於鼎以享上帝此外亦無説此即大易之道使有説則不足以享上帝矣胡不聞文王不識不知順帝之則乎養聖賢則不一而足所亨多矣故曰大亨自大亨之外亦無説此即大易之道也學者於易之書每求其説每求其義至於巽而耳目聰明以下則有義矣自鼎象也以下無義之可言也嗚呼天地間何物非易何事非易何義非易諸儒唯知有説有義之為易不知無説無義之為易説猶無可言義猶無可説而況於無説而強鑿其説無義而強起其義乎深悟無説無義之為易則庶幾乎入何思何慮之妙明大易一貫之旨矣易曰艮其背不獲其身行其庭不見其人云云善止者行善行者止知止而不知行實不知止知行而不知止實不知行知行止之非二而未能一一皆當其時猶未為光明人之精神盡在乎面不在乎背盡向乎前不向乎後凡此皆動乎意逐乎物失吾本有寂然不動之情故聖人教之曰艮其背使其面之所向耳目口鼻手足之所為一如其背則得其道矣雖有應用交錯擾擾萬緒未始不寂然矣視聽言動心思曲折如天地之變化矣惟此為艮惟此為止其所苟艮其面雖止猶動知其動而剛止之終不止也惟艮其背則面如背前如後動如靜寂然無我不獲其身雖行其庭與人交際實不見其人蓋吾本有寂然不動之性自是無思無為如氷鑑如日月光明四達靡所不照目雖視而不流於色耳雖聽而不留於聲照用如此雖謂之不獲其身不見其人可也氷鑑之中萬象畢見而實無也萬變畢見而實虛也止得其所者言不失其本止也非果有其所也非本不止而強止之也孔子曰言不盡意謂此類也使有我則有所矣夫天下何一物之不妙也豈獨無形者為妙而有形者不如耶豈獨無形者為道而有形者不道耶未始不一人自不一庭者堂之前兩階之間正人物交際之地而曰行其庭不見其人非果無人也不動乎意雖見而非見也見立則意動而遷矣非止也天地之變化豈有所動哉日月之靡所不照豈有所見哉孔子曰哀樂相生正明目而視之不可得而見也傾耳而聽之不可得而聞也洞覺者當無疑乎此也曰上下敵應不相與者以是卦上下皆敵初與四皆陽二與六皆隂三與上亦皆隂無相與之象也既曰敵矣何以言應非謂截然不與物應也雖應而不動也猶未嘗相與也苟惟不然則意起而私立物我裂而怨咎交作矣非艮止之道也易曰風雷益君子以見善則遷有過則改見善即遷當如風雷之疾有過即改當如風雷之疾如此則獲益人誰無好善之心往往多自謂已不能為而止人誰無改過之心往往多自以難改而止凡此二患皆始於意意本於我道心無體何者為我清明在躬中虛無物何者為我雖有神用變化云為其實無體知我之本無體則聲色甘芳之美毁譽榮辱之變死生之大變如大虛中之雲氣氷鑑中之萬象如四時之變化其無體無所加損何善之難遷何過之難改舜聞一善言見一善行若決江河沛然莫之能禦者以舜之胸中洞然一無所有故無所阻滯也易上下繫雖非孔子所作而其間得之於孔子者多矣其言道曰百姓日用而不知雖不繫之子曰而吾信其為孔子之言也其曰何以聚人曰財理財正辭禁民為非曰義此亦信其得之於孔子者也吾深念堯舜三代所以治天下之本旨不復見於後世深念自孔子沒似是而非似正而邪之辭充塞宇宙斯人相與沈迷於昏昏之中而正道不明也舜命龍曰朕堲讒説殄行震驚朕師周有訓方氏乃正辭之謂言之失正失實則作之於心發於其事卒以害道害道禍亂之原也正辭所以教之也聖人治天下禁民為非而已無他事也禮樂刑政一本諸此自子思孟子之言其失實者猶多而況於下焉者乎少讀易大傳深愛無思也無為也寂然不動感而遂通天下之故竊自念學道必造此妙及他日讀論語孔子哭顏淵至於慟從者曰子慟矣曰有慟乎則孔子自不知其為慟殆非所謂無思無為寂然不動者至於不自知則又幾於不清明懷疑於中往往一二十年及承教於象山陸先生聞舉扇訟之是非忽覺簡心乃如此清明虛靈妙用泛應無不可者及後居妣氏喪哀慟切痛不可云喻既久略省察曩正哀慟時乃亦菽然不動自然不自知方悟孔子哭顏淵至於慟矣而不自知正合無思無為之妙益信吾心有如此妙用哀苦至於如此其極乃其變化故易大傳又曰變化云為不獨簡有此心舉天下萬古之人皆有此心益信人皆與堯舜禹湯文武周公孔子同此心顧人不自知不自信爾子曰書不盡言言不盡意然則聖人之意其不可見乎子曰聖人立象以盡意設卦以盡情偽繫辭焉以盡其言變而通之以盡利鼓之舞之以盡神至哉聖言豈訓詁之所能解既曰書不盡言矣又曰繫辭以盡其言既曰言不盡意矣又曰立象以盡意於乎至哉似矛盾而非矛盾也似異而實同也聖人之言意豈盡不盡之所可言言盡亦可言不盡亦可云不盡者聖人之實言云盡者亦聖人之實言此唯智者足以知其解知其解者始信天下何思何慮始信孔子果無隱於二三子始信六十四卦卦卦齊一始信三百八十四爻爻爻不殊汲古問形而上者謂之道形而下者謂之器道隨寓而有如何分上下先生曰此非孔子之言蓋道即器若器非道則道有不通處易曰憧憧往來朋從爾思子曰天下何思何慮天下同歸而殊途一致而百慮天下何思何慮至哉聖言實語也而自孔子以來至於今知之者寡同歸殊塗取喻爾非實有歸有途也極上下四方之間古往今來萬物變化有無彼此皆一體也如人有耳目鼻口手足之不同而皆一人也自清濁分人指輕清而髙者曰天於是靡然隨之曰天指重濁而下者曰地於是又靡然從之曰地到於今莫之改而實一物也清陽濁隂二氣感化而為日為月為風雨人物於是生皆一也曰彼曰此曰動曰靜曰有曰無皆是物也何以思為何以慮為一致爾人自百慮故又申言曰天下何思何慮聖人多循誘罕言及此今欲破憧憧往來之惑不得已申言之以明聖心之實自聖人觀之一猶贅言何俟乎思慮子曰學而不思則罔為未覺者設也又曰君子有九思為未覺及覺而未全者設也堯之文思如晝夜寒暑之變化也臯陶曰慎厥身修思永以舜禹雖聖猶未至於堯之大聖也孔子贊堯曰大哉贊舜曰君哉不無小間也然孔子垂教奚可不循循善誘也言日月相推而明生寒暑相推而嵗成者將以形容屈信相感而利生使人知往屈非不利通其屈信之異見也又言尺蠖之屈以求信龍蛇之蟄以存身屢屢言屈非不利聖人知人好惡偏陷深固故諄諄然漸啓之又進之曰精義入神乃所以致用也利用安身即所以崇德也明道非無用於世即利用安身無非大道而人自不覺也大道坦夷如此而已過此以往無可言者故曰未之或知也惟覺雖通逹而未精未一故孔子為之不厭者窮盡其神用也前闕利用安身謂大略爾變化則不可勝窮無一云一為之非變化又言知化則聖道於是乎盡初疑序卦之為義似迂雜卦之為文似亂後乃悟序卦之義殊不迂雜卦之文殊不亂六合之間何物非易何事非易何義非易何言非易縱言之亦可橫言之亦可以坤為首為歸藏亦可以艮為首為連山亦可故五聲六律十二管旋相為宫則皆宫也五色六章十二衣旋相為質則皆質也五行四時十二月旋相為本則皆本也曰本曰質曰宫皆易之異名然則錯綜而言之何所不可序卦雜卦雖無子曰無害於道慈湖遺書卷七
