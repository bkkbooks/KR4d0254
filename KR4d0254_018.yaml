body:
  text: 慈湖遺書卷十八宋楊簡撰炳講師求訓某之行年二十有八也居太學之循理齊時首秋入夜齊僕以燈至某坐于床思先大夫嘗有訓曰時復反觀某方反觀忽覺空洞無內外無際畔三才萬物萬化萬事幽明有無通為一體略無縫罅疇昔意謂萬象森羅一理貫通而已有象與理之分有一與萬之異及反觀後所見元來某心體如此廣大天地有象有形有際畔乃在某無際畔之中易曰範圍天地中庸曰發育萬物灼然灼然始信人人心量皆如此廣大孔子曰心之精神是謂聖即逹磨謂從上諸佛惟以心傳心即心是佛除此心外更無别佛汝問我即是汝心我答汝即是我心汝若無心如何解問我我若無心如何解答汝觀此益驗即日用平常之心惟起意為不善用力急改過改即止切母他求故子曰改而止此心至妙奚庸加損日月星辰即是我四時寒暑即是我山川人物即是我風雨霜露即是我鳶飛魚躍無非我如人耳目鼻口手足之不同而實一人人心如此神妙百姓自日用而不知炳講師作此表軸求書故書恪請書吾鄉日有數語曰吾兩目散日月之光四體動天地之和步步欲風生雲起句句若龍吟鳯鳴其間周還中規折還中矩珠璣咳唾蘭蕙清芬此豈人力所能為哉天機妙運道體變通我猶不得而自知人又安得而詰我葉元吉請書臯陶曰兢兢業業孔子發憤忘食為之不厭又曰造次必於是顛沛必於是翁埏之請書孔子曰心之精神是謂聖人皆有是心心皆具此聖百姓日用而不知耳而况於同邑君子翁彥陽有夷齊之行非聖乎夫道一而已矣是者是道非者非道百姓所以不自知者自顧未能無過安敢言聖孔子曰改而止改過即止無庸他求某甚念人心皆與堯舜禹湯文武周公孔子同而多不自信故因其曾孫埏之請書書表軸孔子自衛反魯息駕于河梁而觀焉懸水三十仞圜流九十里魚鱉不能道黿鼉不能居有一丈夫方將厲之孔子使人並流止之曰此懸水三十仞圜流九十里魚鱉黿鼉不能居也意者難濟也丈夫不以措意遂渡而出孔子問之曰巧乎有道術乎所以能入而出者何也丈夫對曰始吾之入也忠信及吾之出也亦忠信忠信措吾軀於波流而吾不敢以用私所以能入而復出也子曰二三子識之水猶可以忠信之身親之而况於人乎某讀此不勝起敬而歎曰有如此切至之言先聖許可而諸儒未有表而明之者甚矣夫道之不明也不惟此章雖孔子主忠信之㫖亦未聞有發而揮之忠信之為德也至矣乎忠信之心人皆有之忠信無他竒巧亦無思慮直而行之此正孔子所謂天下何思何慮者其曰主忠信言乎所謂主本者忠信而已忠信乃大道之異名而人不悟也丈夫者得全乎忠信故出入乎波流之中若神使微起計度意慮即私矣即不實直矣忠信之為德也至矣乎禹履遺而不取冠掛而不顧淮南子以為禹之趨時然也陋哉淮南以已度聖不知其誣也孟子曰禹行其所無事此語近之要之禹之心豈言意之所能盡禹之心如四時之錯行如日月之代明樂平縣學講堂訓按學古字為即今孝字一字而兩音固多蓋古所以為孝者又為學音于以見古始造字意以謂學者孝而已矣自孝之外無他道也時有古今道無古今時有古今性無古今時有古今學無古今於孝之外復求學是有二道有二性也無乃不可乎夫孝天之經地之義民之行推而放諸東海而凖推而放諸西海而凖推而放諸北海而凖以孝事君則忠以孝事長則順朋友不信非孝戰陳無勇非孝斷一木斬一獸不以其時非孝仁者仁此義者宜此禮者履此信者信此樂自順而生刑自反而夫道一而已矣名雖不同學則無二德惟一動罔不吉德二三動罔不凶孝弟之至通於神明光於四海無所不通斯乃先聖一貫之道也書遺闕文儀蒙飬之功非有覺者莫知今文儀直諒明敏勇於義深有味乎如愚如蒙蒙飬聖功之㫖文儀殆已覺而未全無疑可更書前後曲折以告某見病當剗書遺桂夢協夢協謂心之精神是謂聖此聖人之言何敢不信但學者所造有淺深某謂道無淺深先聖曰改而止謂改過即止無庸他求精神虛明安有過失意動過生要道在不動乎意爾某局中祭先聖君臣之義不可廢也仕行其義固某等所當為懼無學也不學而仕古人耻之某等學不逮古人然有先聖之訓在幼而讀之略知趨向矣習是勝非他日不敢負也敢以敬告先師學之不可已也自少至老蓋不容一日廢不惟不容一日廢斯須不可廢也孔門好學先師一人求為孔門弟子於千百載之下者舍先師吾將焉歸某等誦詩書久堅此志自今以往未至於道不敢止也雖曰不可以政學向也不學及政而始學則所未聞向也學為政而不廢學可也敢告先師鄒國公惟公器大無近用尋在所直尺不可枉終身王道無有二說琢而小之萬鍾不受也千載之下此風可以立人某等雖不肖讀公之書有日矣敢不從公之後辭廟文欽惟心之精神是謂聖道發育萬物是謂聖道生天生地是謂聖道人有死生之殊道無死生之異世有古今之殊道無古今之異舊有告辭之章道無動靜離合逺無母意母我舉天下萬古神人之心皆若是秋祀禹廟某不可思充艱若時精一專欽惟聖帝道光萬世賴之秋有彛章酌獻豆觴假守攸司恭敬是將神之格斯其尚饗斯晉王右軍祠祝文右軍偃武正論百世不磨字畫纍我顧為慙德者所多後儒罕知治道往往以爼豆之事老生常談而翰墨瀟灑駿逸之態爭覩欣玩𬒮相屬肩相摩今茲針羣子之膏肓障千載之頽波右將軍本𠂻清明當知後世有四明楊某者發其正情唐顔魯公祠祝文魯公臨大節而不可奪發諸心畫莊敏肅括此風可以立懦夫振叔末今祠而祝之孰不仰之敬之某灼知其必可以感動吾民之秉彛何日忘之邑人求春秋祀董孝君詞夫孝人心之所同天地之所同鬼神之所同徴君用此心於千載之上吾邑人敬而奉之於千載之下豈惟邑人敬而奉之一郡之人敬而奉之豈惟一郡之人敬而奉之際天所覆凡在人倫中者有所不知知則孰不敬而奉之嗚呼至矣是謂至德是謂要道是謂人心之所同惟爾有神惠相之俾某既兹在位永保所自有之本心以對越明神以對越上帝縣學立大隱楊先生石㙜杜先生祠文欽惟道心無古今無淺深堯舜此心禹湯文武此心周公孔子此心天下萬世同此心惟放逸失之祗敬不違先生有之故文正范公禮敬之今兹建祠先生清明何所不照知百世祀之諸廟敢以一獻之禮告至於某神惟神之神上與天通下與地通中與人通通一至神無有二道大道甚夷不容微置意於其間某雖有此心未能無過敢不兢兢孜孜以保飬吾意必固我之初以敬事神土地俗曰土地古曰中霤州縣主社家主中霤某今家於此依神而居神無大小道通為一上下通天地旁通萬物神道如此人亦如此某敢不敬修其在人以敬事神祭中霤文維年月日敢敬告于中霤之神竊惟隂陽不測之謂神妙萬物之謂神視之不見聽之不聞洋洋如在其上如在其左右之謂神天以是生地以是成人以是誠中霤以是靈洞觀此機幽明一心爰敬爰祀孰知精祲尚饗饒娥仙聖至孝格天龍震于淵天猶敬之冝世稱賢是廟是享是崇是仰孝人所同同知所尚某長斯邑首訪而知雖無舊文當啓新儀一獻為禮神豈需此昭明孝道庸示百里祀社某敢用量幣柔毛剛鬛嘉蔬清酌庶羞致祭于社神惟神無名惟神無方惟神無為惟神無疆而化而生而順而行道無二順心無二神禮物攸叙齊明有融不可度思斯寂斯通后土勾龍氏維兹仲春修祀事於邑社惟神作配載在國典功著水土平易九州厥德無疆體合匪侔以薦以奠匪度邈是謂一神即人而神稷惟神無名惟神無方惟神無為惟神無疆而化而生百榖用成庶民用寧是典是興惟兹中虛之誠可以感通通為無窮又維兹仲春恭修稷祀惟神作配功在稼穡粒我蒸民莫匪是極頌曰斯文斯文在兹其辭恭其欲儉我其敬之立春祭太皥勾芒文帝出乎震大化兹始邑有彛典令率其屬肅敬以迎有酌有獻至神感通匪幽匪邈匪異匪合弗可度思祭雷師某敢用量幣柔毛剛鬛嘉蔬清酌庶羞致祭于雷師之神神氣風霆無非至教隱隱谹谹不可攬取莫究厥始莫窮厥終是謂至神與天地同有動有靜有敬有恭感通於無窮祭雨師至哉一氣升而為雲降而為雨萬古注焉而不盈萬物資焉而化生是有至神不可度測不識不知聖曰帝則到任謁社稷准令首謁社稷視壇壝敢敬致釋菜之禮欽惟至神無體無思無為而無所不通某敢不即無所不通一以貫之道以有事于社到任謁諸廟恭惟至神無所不通某假守于兹祗見祠下敢不即無所不通之道以有事於爾神誄詞禍灾之來惟人自取民愚莫惻良可憫傷大道洞然生天生地生人及物保合太和本無疵癘情僞兹動為非為僻為淫為邪於大道大和之中起乖爭悖亂之氣薰蒸流注疫癘斯起今兹禱祈衆心一誠道復見可以對越上帝可以感通隂陽可以轉乖厲之氣為大和可以變禍災為福祥即此一誠廣大貫通不可致誥有此神用不可不信祈雨東作方興民田盡稿膏雨雖至猶未通洽深念他時老稚轉死於溝壑某為此邑之父母不勝痛切惟明神哀憐之謝雨天道非逺不離人心人心匪殊是謂天道本無暌間奚假和同孰司雨暘之機妙在聲臭之表豈容報謝不可度思祈雨天人一致聖愚一性雨暘一機三才一氣本氣大和安覩乖厲民物紛紛意欲焚焚忿爭奪情僞萬狀為蠧為蠱為悖為亂感動上下愆錯隂陽豈天之為實人之咎是用齊禱起民敬心惟敬可以格天惟敬可以通聖惟敬可以致雨惟敬可以致一人具此敬不敬斯離敬斯復初不可度思矧可射思諸廟祈雨至神至寂曷往曷來舊章是稽載迎慈像願錫隨軒之澤終惠望霓之氓東作方興民田就稿一誠共禱雲雨崇朝千里歡顔重雲劇斂既獲感通之漸曷稽膏霈之期咎在人心固非天意願憫此改過遷善䆮䆮獲飬成就禮義生於給足惟大慈錫以沛然之澤社稷某以凉德受此民社而適愆陽靡神不宗蒙降霈澤惟神無名無方無為無疆化生順行百榖用成兹舉嘗祀尚惟神之靈雨暘以時以迄于三登社某德未純明雨暘愆舛靡神不宗既蒙應矣而四邑久稿尚虧一簣冒昧干神惟神無方化生順行益霈其雱厥後益時以迄于萬斯倉稷某以凉德被命受此惟稷有神司我下土幹旋生育無名無方無為無疆某也有罪而適愆陽神其昭明膏澤應誠尚惟神之靈以往為霖百榖用成諸廟祈雨某兹以愆陽為災闔郡危懼衆禱䖍䖍應亦纍纍簷溜已明忽復告止農事甚急過此無及某德未純某知罪矣惟神敷惠千里之氓錫以三日之澤生死骨肉判於旦暮某不勝懇懇禱禱之至奉安聖水文某兹迎聖澤闔郡危懼伏惟神龍察此切誠憫此無告神氣風霆變化刻頃錫以滂然之霖某曷勝懇懇禱禱顒顒傒傒之至海神祠山文天人一致何所不通人違乎天始不一致腹臟生疾頭目作楚某德未純政事愆違故雨暘亦愆惟神興慈運神機霈膏澤惠我有秋使四邑赤子不失乳哺護飬本有之善某不勝懇禱顒傒之至祈雪疏文敬以一奠之禮致祭于某神竊以時雪未應疫癘間作致禱舊章所不敢後欽惟此心無逺弗届至神感應上天同雲載零載積凝和敷瑞某不勝純誠至敬辭不能喻封贈告家廟孝曾孫某謹奉牲禮清酌庶羞祗薦恭惟祖德流光自天錫慶啓考妣登秩斯崇某不勝慕仰敢不小心畏忌思嗣前修垂裕于後受誥告廟介曾孫朝請郎行祕書郎某昨准上㫖除前職今兹拜誥命又考功增秩皆前世積善流光某敢不兢兢在時無忝所自尚饗冬抵臨安祫享文某進德未純未能寡過叨蒙新命備數學宮兹豈某之所自至致實惟上帝之遺訓未泯某敢不敬之承之禮曰大夫士有省於其君則于祫及其髙祖支子不祭祭必告於宗子某既告於小宗謹以嘉蔬清酌庶羞用薦祫焚黃祝文孝子某敢告考君贈朝散郎妣君贈安人既告于廟更題神主兹􅡒告黃謹以嘉蔬清酌庶羞祗薦墓几欽惟先德肇本天貺答之滋至未已敢不兢兢恪修率迪丕訓庶無墜遺緒上元設醮青詞敬以惟皇帝上無思無為無所不在無所不照知有感斯應不可度思帝降𠂻于民民皆有無思無為無所不照知之常性惟日用不自知私欲繁興禍災隨之某雖微覺未精未一謬當郡寄政理闕失回祿之禍災由人興匪天降之災咸自取臣不敢不勉惟帝興慈憫斯宥斯民在塗炭如切臣之肌惟帝興慈憫斯宥斯默醮青詞欽聞上帝無聲無象無動無靜無所不照知未嘗往未嘗來有感斯應無所不通流俗謂上帝自天而下設絹為黃道謂帝行其上至卑至陋不足以事上帝聞有默醮之法虛明廣大上帝憫民秉彛惟昏故比改過滋多加祐啓祥殄災息禍渾融大和不可射度禳火青詞臣欽惟上天不可以言而格惟善可以格溫民改過遷善者寢多臣德未純不敢荒怠惟上帝憫斯護斯保飬而扶持之俾毋罹其災拂亂其所為帝心融明有感斯應禱斯叩斯不可度斯設醮青詞郡郛洊災比屋懷懼民愚積釁匪天劇殃臣德未純無能昭假敬從輿議恭修醮禳大道渾融三才共貫有感斯應保全太和神之格思不可度思祈雨青詞虛明博大三才變化其中雨晹愆違千里危懼以請臣則有罪德未純明民雖無知性本靜止生死骨肉之機判於今日啜菽飲水之命懸於上穹錫以三日之霖解此四邑之急發道中之妙用若有機緘運物表之神功不動毫髮又愆陽為災民則有罪民愚罔覺宜宥以寬臣覺雖微亦粗安止曷未精一有愧純明臣不可赦尚蒙帝恩衆禱同䖍纍應敷潤未被沛然之澤不勝旦暮之憂千里嗷嗷一誠懇懇恭修碧玉太乙醮禮初禱輒應終日通洽甲乙丙夜如注如傾生死骨肉之恩感深至骨虛明變化之妙不可度思更祈三日已往之霖卒濟百榖時播之務施斛詞㫖敬以大道無形匪動匪靜萬古常寂無所不通惟彼迷途立我我所意興欲滋逐逐戀依沈魂滯魄昏昏莫知自囚自縳自苦自樂逐味逐臭百趣千垢法食普供道味靜深即味匪味曰深匪深湛然澄淵清明本心無思無為不識不知永嘉季春祈雨碧玉醮青詞後雨作改用三才一致人自愆違久旱衆憂兹焉貢禱纍蒙應矣未至􅗈然仰碧玉垂憫蒼生之無告赦臣知罪之故取民遷善之新啓醮初筵日庚申而奏夬澤終夕夜甲乙如傾四邑歡呼拜生死骨肉之大賜九天變化妙雲行施雨之神功更祈三日已往之霖卒濟有榖時播之務臣無任至感至禱激切屏營之至奠余兵侍辭具位楊某敬奉奠豫故修史給事侍郎余公靈筵某獲趨承之日雖無幾而獲趨承之義無二事職凡百有請有議溫乎其容怡然精粹問答坦夷正直平易尚未侍容莫識其涯涘瞻顔聽辭疇昨近爾胡為函報曰致其事厥明就車心軫疑二式遣問審天星采墜縞巾素裘哭于門內衣衾拜履既襲于地退而請庶幾平果之制領客固辭有志弗遂遂歸而載惟出辭寫意為奠為禮幽光如對哭而薦之願願饗是㑹奠邑宰鄭令君辭具位某謹奉奠于故令君於乎旱旻垂雨雷動風行而雲徂矣月明哉生已光照吾邑而旋促西馭之車矣嬰兒待哺哺及唇隅而奪其母矣隻言單語微施略為已傳誦百里百里士民謂有父母我者至矣於乎天乎天德好生好生之德既降遽斂而去之殊非天意蹙額相告不知所謂玉德孚尹令介石不二英萃外發姦宄消氣曾未滌龜民已蒙惠如何不淑天星忽墜良善無依凶狡無忌赬旌肇銘邑人殄瘁某等奉奠痛心殞涕奠林景初辭具位某使子某敬奉巵酒于故景初林公尊兄親至情深合并况頻啓胸吐心忱辭罄陳中庸之至不殺之仁篤實不孚踐之以身天胡困之千苦百辛家徒四壁甚於憲貧重以不淑遽焉訃聞望哭于室老莫函奔使恪奉襯哀𠂻阻申新卜湖濵山旋氣氲就封戒期胡敢憚勤已整竹輿啓行凌晨雨不少輟冷氣覺侵盥手以陽悲楚若針甚已不久感冒懼深緘辭以哭如對靈明祭潘叔昌知縣文某追惟向同學舍相過相與篤志實德務决疑阻厥後離羣不記何日聚㑹某宦浙右君猶處學僅一再見自是隔闊泯泯到任於乎念哉叔昌既登科官逰益南北矧某去國逺關靖處向一通問啓讀報帖如對芝眉紫宇不謂未幾而忽聞訃南望痛哭道里修阻衰病居約欲往而注再拜緘奠薦諸栗主於乎哀哉與叔昌訣矣於乎哀哉祭髙仲圓知丞文同里友楊某望哭再拜以上一奠之禮于故友仲圓髙子知丞靈前州里之賢有如仲圓萬口稱善忠信正直德繾綣相去四十里不得時見别去易久兹得行甫書忽以訃聞於乎哀哉善類淪沒正道寡無哭以遣奠哀哉於乎祭伯兄文介弟具位某謹以清酌羮羞祗薦于伯兄八七府君惟兄易簀今既周星禮雖有制而忠愛敬日日新又日新兄靈清明雖千變萬化不可度思寂然如水之清豈惟某心永欽百世之下凡心光內明者孰不興敬知嘉定之有人祝辭有盡愛敬終無盡饗祭願禪師文具位楊某敬致一奠于圓寂毒果宗人願禪師接辭纍纍洞見底藴妙藴非藴斯藴無盡相與切磋無如若何浮雲忽斷碧空無畔斗城老人送奠于逺奠安康郡太夫人辭具位楊某謹奉奠于故安康郡太夫人祖筵曰於乎哀哉道無不明人自不明天地之道為物不二人天地心三才一致自學子裂坤道於乾元之外置天地於人心之外而先聖之道始不明於天下雖古烈婦賢母載在簡䇿人所知敬而道終未明於乎哀哉夫人淑德懿行某夙昔而不得備知而辱在州里又辱知於尚書因尚書而獲修登堂再拜之敬望見榆屈之光退而得諸親知夫人慱觀古書中秉正德居既富且貴人所不敢仰望之地而至朴至儉服有人所不堪之衣某聞不勝起敬起慕曰夫人之賢行如此又尚書嘗道其燕侍之言確乎不動於勢利清哉偉哉今又獲尚書所狀行實啓讀熟復益視其所未知母儀坤德某灼知其為天地不二之道往往蚩蚩橫目未必咸知就知之不能無疑而某確信之斷斷乎無疑胡不考諸易乎日用而不知夫惟不自知是以人雖有道亦莫之知有奠在筵有銘在旌啇祝讀辭道由是明尚饗奠鄉相慶國太夫辭敬致奠于近故慶國太夫人靈筵其辭曰道以一貫無所不通其在朝廷其義如此其禮如此其在宗族其其義如此其禮如此其在州里其義如此其禮如此一也某等以州里之義為奠為賵致哀敬之禮于慶國太夫殯前皆用此道恭惟太夫人實以此道孕和育粹篤生元輔又以此道茂膺錫命備受嘉福某亦何敢不以此道為祝為辭古奠無辭奠之有辭幾年于兹有其舉之於義無違大道在斯至靈清明昭斯饗斯奠馮氏妹詞兄朝散郎主管建昌軍仙都觀某祗奉祖奠于亡妹百念八娘子某自總角以至於六十不知吾妹性質靈明不因言而始覺後觀古而默契比偕甥輩暫寓於吾室之西偏間得欵話話次始知靈覺天然萬古鮮􅓻士而能覺已足垂芳千世婦而能覺古惟太姒自兹以降以倬行稱於史固不乏求其內明心通惟龎氏母子及吾伯姊暨妹而妹乃生而明某所以每歎其未有與擬靈光溥其無際神用應酬卷舒雲氣亦猶鏡象參錯來備而澄明瑩然斯靖斯止方謂嫂婦輩朝夕依邇德意德言其有薰漬天胡奪吾妹之遽慟哭不勝再慟莫繼疾作纍日中既復常僅能朔哭今復甚病食損十九􅒒爾瘠甚祝告以翼日帷荒就道矣不可逺送忽哀寫此哀哉痛哉哀痛之極死生之變其與四時之錯行日月之代明何異吾妹靈光之妙正如此祖奠馮氏姊辭後父弟某謹致祖奠于亡姊百十九安人憶昔世父合居武康諸姊俱長某輩幼行男女則别同堂對房旦旦肅揖歲時奉觴姊雖有行歸寧則常獲依居眷深愛長日月如車轂俱焉鬢霜三遷數里家道寢艱安得徒步數數而登堂昨問姊疾姊猶為興坐榻良久某請安寢問答清明後聞復強謂福履益其綏將夫何遽然棄諸孤以行㑹哭家廟為位其旁姊七十某亦六十二一哭遂疾作踰月未平遽告啓期扶力而來哀不勝矣欲慟懼其傷生撙哭忍痛執奠涕滂於乎功哀至情豈一幅之辭可以盡道其中腸祖奠姪婦舒氏叔舅某兹祭奠于亡姪婦舒氏就封有期酌酒以告婦吾友西美之子來相姪懌旦旦登堂叙揖時節叙拜祀事相禮凡百惟肅近懌有覺轉以告婦乃克領㑹且曰特以分嚴有願陳於叔舅之前當益有啓明之意疾革又覺截不於乎哀哉於乎善哉懌復告某婦秉禮嚴默符先聖於乎姪有至德善行如此叔舅未之知乃今知之而遂隔幽明於乎哀哉叔舅朽質新年六十有六不可冒寒風酌奠以别辭噎莫繼哀哉哀哉哀哉哀哉奠孫甥子方舅某兹致祖奠于故孫甥子方吾甥始以夢中而覺夢中已拱逹旦猶拱目是心眀逹於日用舅剗餘礙喜甥之覺妻甥以冡女每每講講切謂甥用力於仁庶幾乎仁何夀之促雖有懷中之玉力未續續妻與子遽環而哭舅拘官守聞訃望哭既歸哭柩日月遄速今且奠甥老不可慟哭哀哉哀哉哀哉哀哉奠曹叔逹哀哉痛哉叔逹叔逹哀哉哀哉叔逹篤志于道晝忘食夜忘寢踰浹而忽覺二千年來覺者甚無幾比覺者雖滋衆而每思念吾黨之士叔逹未嘗不在懷中比裕甫逺來即訪動靜裕甫莫之知適通史使君書崇儒重道某備言裕甫叔逹之洞逹使君報緘曰叔逹物故矣哀哉痛哉哀哉痛哉老不能慟望哭敬遣斯奠哀哉哀哉宋楊公伯明封志於乎道非心思言論之所及雖聖人不能強人之明孔子大聖其所啓明惟顔子三月不違餘則月至日至當是閔子騫冉伯牛仲弓曾子諸賢餘不能強也他日子夏子張子遊以有若似聖人欲以所事孔子事之曾子曰不可江漢以濯之秋陽以暴之皓皓乎不可尚已厥後孟子得不學而能之良能寥寥千載無所考見我宋邵康節程明道至矣而偏象山陸夫子生而清明某先大夫顛沛而拱如初伯兄諱籌字伯明晚而頓覺不勉不思云為變化易簀之言曰昔猶今今猶昔有能覺斯隨意而適於乎斯豈庸衆所能知時嘉定三年二月庚申夀七十有八月甲申葬于慈溪縣之石臺鄉句容村孝順里王嶴先大夫墓左娶李氏葬同域子恬惟怟慥愈孟女歸顔衮仲歸舒後一日有覺至晦日又大通於乎子孫皆覺又皆兢業仁守足以垂名于後載之家傳亦垂不朽奚假志銘誠甫其以此紙告於父宋慈溪縣孫孝子墓志銘自古罕知孝之即道奚止不知孝之即道亦不知日用庸常之即道聖人患斯道之不明曰夫孝天之經地之義可謂昭白而學者習讀天經地義之言猶罕逹天經地義之㫖就窺近似終非本真孩提無不知愛其親斯愛不學而能不慮而知斯愛無躰貌不可推其所始又不可窮其所終百姓日用斯道而不自知不自信惜哉慈溪之金川雞鳴山孫孝子文舉名之翰少志于學孝行著于鄉母疾病且革文舉封體取肝為粥以進母越夕如辭而醒乃底于寧鄰里以其實上于縣縣上于州時郡侯嗣秀王聞而異之國大夫人亦願見命縣勸駕嗣王溫顔褒稱將聞于朝文舉曰本心救他無覬嗣王嘉其誠不奪其志致饋帖叙其事祖璿左朝議大夫知江隂軍父檯迪功郎處州青田縣主簿母陸氏封孺人某老矣思妣氏之不復見見妣氏之家賢婦則如妣氏存焉某既志舅氏墓兹又志舅氏之孫婦墓於乎傷今思昔尚忍言之蔣氏在母家志趣髙潔來歸外氏敬事舅姑默符禮經淑質凝重悉能先見閨門之內進退有度安心淡然不以處約為耻子女衆多人不堪其憂其心若固有之宗族敬之家用平和上下無怨克相夫子義訓諸子悉有成績嘗曰心自坦夷吾何慊乎哉疾甚命子曰吾其已乎勉其力學清明不亂如此生於紹興丁丑卒於寶慶乙酉葬于鄞之桃源封孺人子四曰夢祥曰元凱俱入學請舉升舍曰元哲曰元圭登癸未科修職郎新婺州司户參軍女三適里世魯文郁李正君姚鑰孫震亨巽亨夢祥領諸請銘某以外氏之義不敢辭乃引筆而銘之曰人心即道一貫不二外氏賢婦慈湖敬志宋翰林醫痊臧公墓志銘某之外曾王父臧公諱中立本毗陵之無錫人為儒而通於黃帝岐伯之道樂四明山水而徙焉今六世矣娶無錫承氏生五男子長諱師心次諱師旦次諱師顔是為翰林醫候纍贈從義郎次諱師文是為某之外父以文行升上舍貢禮部次諱師臯某自識事已不及見外王父母矣惟省總角侍母孺人歸外氏猶及見外伯祖母從義孺人倪氏諸舅環侍朱紫滿前今妣舅俱亡而諸妗又亡傷今念昔哀動于中比㑹從妗孺人盧氏葬從表兄屬某志銘從舅醫痊墓并叙二妗某屬卑德下懼莫之任表兄勉諭于再于三某不得而遜乃退考其行實已而歎曰正道之不明於天下也蓋自周衰以迄五代周六官分職皆所以為民極極者天下極致之道而天官之屬有醫師焉有疾醫焉蓋上士中士為之古之為士異乎後之為士古之士以德行道藝後之士大扺以文辭是故品流之論興而是非之實殽亂夫天下極致之道惟其是而已矣捨天下公是公非而虛文而侈是無惑乎後世之風俗日趨於敝而不反古也皇宋舉三代之遺制建百官一道德而習俗之固猶滯於流品之論豈其人猶或未有公是之實耶若吾外氏則有公是之實矣從義之戒子曰疾者之求於我當懷惻隱毋以利為也違吾言為不孝醫痊諱賔卿字雲叟從義之仲子也亦急於救物不以貧富貴賤二其心醫有能而無資公推挽俾盡所長藥必已給報必彼歸其不嗇不忘如此是非公是之實耶善無大小道無精粗公和而不同不妄言笑遇事若無所可否至大義所在則介于召公以謹厚聞于鄉郡太守多所愛重有故舊罹橫逆公憫其無辜思為一言其家忽盛金帛以請公正色却之曰女以物豢我吾不復為言矣其妻與子罹拜泣曰今不敢以纍清德卒白其寃後踵門來謝亦不之納斯固士君子常行而文辭之士間有不能是又非公是之實耶公孝友儒雅閨門雍穆初以侍從參奏試翰林院補翰林醫學纍轉至醫痊賜五品服隆興元年六月八日卒夀五十有五明年十有一月丙申葬于鄞縣桃源鄉之西山萬嶴合先室盧氏之藏盧氏順事舅姑睦於姒娣內外無間言紹興十有一年十有一月二十有九日卒夀三十有六丙寅九月乙酉乃克葬戊寅郊賚贈孺人醫痊再娶盧氏女弟亦封孺人後賜冠帔孝謹之行如其女兄壯年孀居遂棄鉛華終身德性淡然人奉之不喜忤之不怒是非榮辱不以動其心時時誦却除蔽惑滋成疾趣向髙明又是邪之句一日夢神人告之曰女夀五十二今以積德延七十六及屬纊之夕安然如寐實慶元三年十有一月二十有五日夀七十六符神人所告云明年二月甲申合葬于萬􅓝子男三皆儒學長諱泳紹興元年四月二十有三日卒次諱濟季諱沔淳熙十有五年七月十有二日卒女二長適承直郎州學教授盧子即從姈之從姪也次適里士陸檍孫男十有三本植登紹興四年進士科迪功郎常州晉陵縣主簿格登慶元龍進士科迪功郎新紹興府諸暨縣尉杞楷檯松棫枃柟棫枋枝孫女五長適贑教授子次適玉牒信郎通夫次適太學生史彌鞏次適里士舒濤次適里士章德甫曾孫男十有七元善元謹元吉元慶餘未名女十有五俱未行不勝含哀起敬而銘曰皇極之敷言是彛是訓道一以貫孰精而深孰膚而近胡不聞先聖之言曰中庸之為德其至矣乎庸常也猗與舅妗德性正順有皇極焉人毋易之自起遁離之病陳夫人墓志銘夫人陳氏昌陵宗室燕懿王七世孫修職郎慶元府鄞縣主簿名師䢼字共甫之妻也慶元二年九月乙巳夫人以疾卒于鄞之官舍既踰月共甫含哀以告四明楊某曰嬪年十八歸于師䢼執行婦道相宗事唯謹和上下嚴內外敬戒無違性行靜正不愧屋漏不悅華飾夙夜服勤至死居人所難堪之貧而安之賔至質衣治具儉而敬平居樂聞善言動心忍性故氣質日變以美師䢼貧而多病間歲講學武夷閩浙往來二千里或者獻疑納忠咸尼之嬪獨能輔吾志去之日不為兒女悲惟敬相勉曰願夫子德益進業益修瓶無遺粟妾餓死不悔也嘗假館於外閉門課子讀書餐粥不給非師䢼朋友之饋弗受其父母兄弟招之宴逰不往靜重有如此是以聞風者樂道其美至引以相警戒嗚呼今亡矣年止三十六生二男曰希韺曰希韶二女曰桂曰梅今將以其柩歸十有二月壬申葬于臨海郡城之東北望海山之原師䢼嘆其秉志之可嘉悼其降年之不永又愳師䢼或負斯人之所期也故述其大略以道其失助之悲且屬某銘其墓某聞其言中心敬生曰有賢婦若是宜書銘曰世觀夫人若力而為我觀夫人其自有之惟其有之是以安之斯有斯安豈惟夫人不自知雖百世無能知王德髙墓銘四明慈溪王德髙諱鎬為鄞人後徙慈溪曾祖諱發故䕫州巫山縣主簿纍贈朝散郎祖諱庭芳故朝奉大夫直祕閣致仕纍贈大中大夫考諱基故從政郎潭州長沙縣丞德髙忠信德行勢利紛華一不以動其心弱冠髙與鄉貢繼大學後登進士科尉江州湖口時歲不登郡委偕德安簿視荒德髙不憚履畝務寬下户簿趍郡上目太守怒其减及縣額之半擲於地簿遺書言使君意叵測德髙報勉其堅守且以罪自任邑民不勝感德既而韓使君入境問父老以邑官之賢否咸稱尉賢自是邑民之訴于郡者悉以委德髙德髙處决一一惟允無復異辭一日彎卒者獲三捕卒乃徭人之𨽻于池陽大軍官捕甚急懸賞至千緡是在法抵死自首則免第賞不行爾遂以卒自首聞於軍帥三卒遂免死南昌宰不事事即檄德髙兩易簿并攝縣比至縣視其囹圄充斥纍于廊廡者纍纍問之吏則曰是皆負官賦者德髙曰噫彼繫於此賦何從出悉召至庭下撫問喻曉與期而遣之吏執謂此皆頑民一縱不可復追弗聽皆羅拜而去遂相率如期而輸民訟之久不决者盡為之决遣里正之頑黠者於期㑹唯謹不敢違德安宰以事被鞫德髙又奉檄攝邑且俾盡有宰之月給德髙密以半遺宰之家未嘗以語人也湖口丞素相陵德髙不校暨官滿郡督過良窘為之極力調護以薦舉升從政郎授建康溧陽丞以慶典循文林郎覃恩循儒林郎民之訟之帥漕皆乞送清強官縣丞纍年滋蔓曖昧之訟一旦而平公不可槩舉至有密詣庭下以手加額再拜而去者漕使林公枅剛方疾惡所至竦畏始臨治所德髙逆諸境一見慰藉甚厚云得政聲於道路即面付民訟數十紙居亡何得替告歸時已六月漕欲少緩交割以下半年薦削相處對曰已交事漕悵然德髙恬不以為意厥後司糴行都適值積弊之後啇旅不通德髙始至即率同官力請于長明示以信酬直必時無掩阻牙儈必力效誠亦不忍欺衆啇感悗舳艫輻輳歲糴值百萬不勞而辦考滿以賞循承直郎後調㑹稽丞年踰六十精力不衰職事益不苟終更奉祠雖貧而樂親姻交舊宦逹寢多無求無請亷不近名直不忤物無町畦無緣飾吏能精敏法令明習事長官如父兄與同僚如朋友久敬不替御胥吏如家人視部民不啻如赤子御家詳整有法度氣貌方嚴而即之也溫虛心樂善好奬勉後進於人無賢否敬愛惟均族黨姆姻舅之家或有人所難處苟知之必忠告善道其人亦多感悟遷善仲子津治詩魁太學一時流輩推與家世衰落咸屬意俄夭折親黨不勝痛惜德髙雖哭之未嘗過為戚終日危坐凝塵滿席嘉定六年三月丁未以疾不祿夀七十有九娶孫氏再娶馮氏四子湜津準瀟女五皆以適人二孫杭桷女二諸孤將以十有一月丙申奉柩荒葬于慈溪縣金川鄉施㠗銘曰忠信正直寬裕明寂德髙有焉莫匪爾極某不欲從近世出名銜按溫彥慱墓志撰者亦不出名銜孔安國作尚書序不出名里王肅作家語序不出名里某鄉亦不出名銜今知非故改過慈湖遺書卷十八
