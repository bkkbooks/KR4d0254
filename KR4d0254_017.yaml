body:
  text: 慈湖遺書卷十七宋楊簡撰紀先訓吾家子弟當於朋友之間常詢自己過失此説可為家傳吾少時初不知己有過但見他人有過一日自念曰豈他人俱有過而我獨無耶殆不然乃反觀内索久之乃得一既而又内觀索又得二三已而又索吾過惡乃如此其多乃大懼乃力改賢者檢身不暇又豈敢見人之過心吉則百事皆吉聞過而意不逆百無一二千無一二喜於聞過豈非君子之人人間以爭為事吾家當以不爭為事所親者君子吾即君子也所親者小人吾即小人也小人多佞喜承順君子則恥之所親近未可不察豈可舍其違意而取其順己人皆知有一死而實不知果知之誰敢為不善人處不善之久則安於不善而不以為異人戒節要先於味蓋味乃朝晚之事漸漬奪人之甚於此淡薄則餘過亦輕君子處心尚恕不恕則與小人一間耳吾遇事則審而求其理不敢遽以私見定其去取故少過誤損人即自損也愛人即自愛也樂人之凶彼未必凶而已已凶矣人有不善習於性成其堅如鐵惟學者自覺能破此堅不然則其堅牢日甚邇日人精神多在外而不藏蓋奔兢利名所致觀之足以自警不善之心起則一身不及安一家不及安門首變易之資若已有資則寛與之直不可既欲其物又計較不已彼身即我身彼得即我得彼失即我失奢則財散儉則財聚此理也用度當儉不當奢亦理也學者要無我處幹喜晴喜雨此則庸流之情過則人皆有未足為患所患在文飾儻不文飾非過也志士之過布露不隱貪則有害於子孫而人且以是為子孫計不勝其誤矣喜談人短乃下俚氣味吾家不可有此處世免人怒責己為幸事安可責他人凡可怒者以其小人也然怒或動心則與小人相去一間耳人為景所奪則有喜不喜之心其喜在清風明月在畫堂花燭在玳筵綺席在異香美色飢時飲食寒時衣裘炎暑風凉凛冽火閣其不喜者天色晦昧人情背違柴門茅舍惡衣惡食不美人意處更省之此二者之心無自而生貪味則多饑貪財則多貧此身尚非我有外物亦何足道逐物之久猶如醉夢人在顛倒中以美為惡以惡為善以苦為樂以樂為苦知則為學不勞矣吾家子弟當急親賢廣置田園不如教子為善三代之治天下欲使民無失其善性而已更無二説時人心中自謂今且如此度日俟他時如意當取快樂不知今日無事即是至樂此樂達之者鮮讀書意或在名利則失聖人之意善學者以平昔所見屏之千里之外視已空空絶無所知而讀聖人之書則所學正矣怒人而人不畏以其失理也未怒而人已畏以其得理也人關防人心賢者關防自心天下之心一也戒謹則善放則惡學者或未見道且從實改過自己有道則人自化顔子簞瓢人知其貧誰知其富此簞瓢中萬事皆足學有進則知人間言語多失作事多失一言不敢妄發一事不敢妄為為物所逆而動心此怨天也學者以平昔所見置之千里之外故能舍己從人舍己從人未易見以己見根固而不自覺也人為舍宇等物遮了眼朝晚區區而不自知吾遇心忙則自行罰今己見作効人之大患在乎自滿而以己為賢故終其身學無所成善學者觀彼賢則知己之不肖彼逺大則知己之褊小彼有勇則知己之懦弱於此有恥則所學未有不成學者行已足矣無求於外此學之要説近來學者多偽至於臨死亦安排學道不可作兒女態慈愛恭敬可以修身可以齊家可以治國可以平天下安富尊榮由此而出為學及五分自休不得吾今為學自己之善惡與學力之多寡皆自知之此自知由吾初學深究無我所致蓋無我則虚明不以自己之惡為善亦不以學力之寡為多曩時觀彼學者自謂無我實未無我觀彼省此深有畏焉故今日有所濟不如意事人皆有之然善學者不以為意吾因片言戲謔自悔世間忙學者欲到不忙處吾深究無我已二十年今日見此患猶如山岳殆有甚焉吾乃自覺多以為幸學者有志氣無問性愚衝擊而開矣無問氣習衝擊而散矣學道貴專一一事未嘗遽然干預一言未嘗遽然出口使胷中閑靜靜極明生其道自見此心即道一體二明吾家子弟或忝科第未可遽入仕必待所學開明從而自試上不誤君上任委之心下不失民人倚賴之意九泉乃祖於此無憾矣世間如夢時人非不知但見煖熱又且去矣自古煖熱處誤却多少人學者常先虚己自古有誤認臆度為道浪度光隂蹉跎實學不知其幾東坡投老顧以養生為先追想其情使人恐畏微細習氣人不自知學者當審而求之吾為學至此亦不自知自前歲一病方知之今歲一病又知之吾覺此病非病乃教誨我也世間多材多藝者不少學者回顧己之愚拙未可以為愧材藝之士多為材藝所惑不能進學未若愚拙有心於道賢者徳重則服人也衆徳輕則服人也寡觀服人衆寡知己徳之重輕世間誰不被人瞞不甘被人瞞者亦少矣外事不可深必凡得失奉天命可也動心則逆天命禍將至矣先聖為魯司寇遂能使齊歸侵疆沈猶氏不敢朝飲其羊公慎氏出其淫妻慎潰氏越境而徙學者回顧己徳寧無愧怍福莫大於無禍今無事已是享福如不自知將恐禍患生近世學道者衆然胷中常帶一世間行所以不了達學道者多求之於言語所謂知道者只是存想大人君子興言立教皆奉天命豈有己意哉一堕人欲念慮顛倒舉止輕浮此語可謂甚善必欲使人從我者豈智者哉周公孔子天下後世皆歸之非使其歸也正欲説教住即住得正欲怒教住即住得如此即善孔子拱而尚右載之古書則知夫子常拱今人多忽之吾家當習熟君子有所養處富不驕處貧不憂無得失無逆順其心常一應酬不亂無所不容衆人中有存天焉可從衆則從衆學者虚已如無知遇事則謀於人如此者三年大智必發近世惟尚詞章而奪其正學是以家國乏人材惟小人喜聲譽夫大人者量含太虚天下如家聲譽復炫燿何人君子恭敬之心在内人皆知之禽獸亦知之人意思舉動隨生衣服時有衣服意思飲食時有飲食意思語黙靜動皆然似此意思役盡時人光隂也意中有新有久有喜有厭相生無窮坐久則厭以行為喜行久則厭以坐為喜觸目覩景無非意思皆由失已聖賢垂訓蓋使人求之已也人貧賤則忽之事微細則不謹若此者人以為常君子於此戰戰兢兢敬心無二學者成則無我欲如何不欲如何但由理而行盛暑有待秋凉之意隆寒有待春和之意好學者不如此處世取法於賢者則不費力一事賢則取法一事積則成功不必問細大利名即富貴崇高之事貪則為利名不貪則為富貴高崇邇日知學之不可緩至於寢食不安以此却得氣習日銷男女婚嫁人之大義也薄俗語及婚嫁意多不正心無所求則樂生此非親到者有所不知世問勞役朝而復暮牋賊其心人欲惺惺聞過則喜是乃翻小人為君子在瞬息之間學者或與小人較則所學已見其不逺吾自幼年以生計不足為憂復思古者樂貧之士處貧必得其理因讀論語有若言盍徹乎毎毎在懐一日忽有所得夫盍徹正而已矣宿昔之憂日見消釋而動止輕清蓋得理則無所施而不利復何憂哉古人以奢為恥今人以不奢為恥古人急於求友近世於此頗緩吾嘗誨骨肉家中雖窘束其使人以禮其待人以實天地之間鈞陶萬物而變化無窮者以其正也正之為義大矣無所施而不可學者常帶我行所以見道之難吾置物酬價不過往往心不安蓋以於理不安理即已也為學之門固不一苟逐迹則泥矣惟敬一門無迹可逐不容有所泥學者往往多怱之誠能養之以敬則日仁矣人之趨向為熟所奪苟或有學則熟者不熟生者不生是以自已於庶物之中作得主宰無貪戀則自然見道雖夫子不易吾言此身乃天地間一物不必兠攬為己曽子謂堂堂張也難與並為仁矣顔子無此等言語蓋有所未暇也顔子志大惟好學耳是以寡言非特地也顔子亦自不知好學者處世但欲了事耳與人交毎懐寛恕靡爭靡兢以其好學之篤心不逐物自然如此處高堂則氣寛居茅屋則氣隘對風月則氣清當晦昧則不爽類皆如此以其有我也尀耐之語起於心已失道矣人有過尚有改一路有過得改猶晦昧之得風大旱之得霖雨當天地隂陽不和之時而為之一新亦若此或者不達過作則惟恐人知安有不知之理設或不知潛伏於中此過必毒害已益甚過既不去使已終身為小人學者試思即以此斷其是非去留庶使改過之心有勇既改之則便可無愧或無公論必任私意順之則喜不順之則不喜是使人皆無公論也在家無公論則一家無公論在國無公論則一國無公論家國欲治其可得乎人生一世只忙迫一場便休人愛兒女太過其後翻成怨惡者蓋愛極則怨生乃自然之勢善養兒女則以理不以私意或謂兒女奴婢由我所治此乃無識人之所見治之不當自己先已失治豈能治人吾處世不敢輙嗔人亦不憎惡人常愛人常敬人造器用不必狥時俗求巧麗而勞心巧麗則器俗勞心則人俗自覺之功大矣雖不善一能自覺亦難停留矣不能舍己從人則智識日昧處世常見其難故人常在難中學欲得要則學不勞而成文詞為學道之蠧立家不在求富求富則家貧立國不在求富求富則國貧至於學道或務高求大則道愈逺財物大多反害子孫人罕知之為己之學有所不顧有所不恤如目前無人是以不求名有過不隠雖名位高敢北面再拜師於人以其實而有勇娶妻生子學周公孔子衣服飲食學周公孔子吾有公論於學大有所濟凡吾所見不正皆被公論收下好學之心一興則凡在吾身之不善自消至於面目塵埃亦去矣以實待人非惟益人益已尤大至誠則百行并生以實待人人必感動猶愛妻子雖無言妻子必知之人生不可被一區宅子幾畝田園貯却自己安靜之人飽多饑少由靜以養氣人之舉心神物即知耐事而未免胷中有停留未為盡善人心不明互有得失賢者所以尚恕矜伐有害於己而今人以為先世之才能儘爭惟有道之人無能勝者自己不得黨蔽他人不貪則百祥來集貪則衆禍生胷中無貪染目則明耳則聽吾見人好問則喜人惟顛倒故多憂不顛倒則常樂人有過旁人覺知者衆然不敢言者慮其意逆也學者能使人無以意逆憚吾則庶乎善矣好學之味言之不盡惡去善興佳况浸生吾飲饌不敢嘗時新衣服喜補綻於器用亦然無求新棄舊之意吾得此意敢保老景不為人所厭好學之心人皆有之其間所以不成就者有待來年之失也人以善歸己以惡歸人蓋欲己之勝也然卒於不勝少年性或敏慧詩書一覽自謂盡得之恃此而不求師乃人之大患財物是末事爵位是末事知此幾事是末則知本矣為學當以心論無以外飾人心至靈惜乎錯用却即事即學也即此下筆處即學也吾之本心澄然不動宻無鏬隙時人自己尚不識更向何處施為人知逐物之樂不知不逐之樂大中至正之道近在日用見於動靜語黙不必他求吾往者儘恃思量與夫言語今日頓覺前非蓋以馳求於外而不反本也君子無所欲亦無所不欲第由理而行耳人之處世何如此之難兹蓋獨任己智倚於一隅不得自然而與天理相違之所致也學者當如何未若以自己私見屏於千里之外使胷中了無所有則所謂天理者見矣天理即吾心也人方饑忽三盃殽饌莫被他謔盛暑炎燠風亭水榭薦盃以沉李浮瓜偃息以紗厨湘簟莫被他謔朔雪飄零入紅爐畫閤笑語之餘淺斟低唱莫被他謔皆為物所轉故不能逃有無難易人以目逐物為見以耳逐物為聞謂之分明不知乃大大不分明學者以所得填塞胷中中毒之深復不自覺顔子屢空還有此否畏天命則無所求而享安逸矣苟未及安逸則知貪求心未盡貪求心未盡則知未識天命也君子胷襟常無事常悦樂事即學也事學有二則學亦勞矣人切忌被人順了切忌被人不説吾往日常在昏昏中而不知衣服時不知飲食時亦不知行住坐卧時皆在不知中自謂吾了了惺惺後因覺此不知即非不知近世多貪逐利名彼此營營遂成風俗故不長人才凡有家者或棟宇可以居榖粟可以食更有園蔬足用若此則已屬於富矣惜乎人有所不知也是以人間得知足之樂者鮮道非言語之所及非思量之所至學者言多則散學力學有進時如龍換骨如鳥脱毛身與心皆輕安享福無己人知學進其處世如享醇酒怡怡融融有志可以奪造化人或有志學無不成無問智愚利鈍也人之舉動皆有妙用不奪於味飲食自然甘美不從事於味則已作主從事於味則物作主處世采取衆人之善而用之則不勞矣君子以國為先祖宗次之居官以民為先子孫次之食不語為學到日自然如此萬事由理耳人言由我故失立家有法度人不敢慢易交易之道我之心如彼之心則平矣貨一物者其價增置一物者其價减物初無補徒置身於小人之域外國使命乃賔客也賔客之義有愛敬焉至於論國事亦自有理以理從事則優遊不迫或有忌心或有勝心則與理相違故勞神故招禍興戎言語不可以化人惟心可以化人學問貴於見端的或者望風承受蓋為聰明所累知人而善用其人固可嘉矣然知自己而善用其己則學尤高非無我則不能也學欲至於無疑惑之地動靜語黙皆天性也人謂我為之是將黄金作頑鐵用耳學者涵養有道則氣味和雅言語閑靜臨事而無事處世遵承法度不失大人君子之體夫有變更者莫不慮其有失然遵承法度縱失所失亦輕或出於私見而有失則所失重大人君子於法度有變更者蓋不得已不逐物而得理此時如丸珠在盤無所凝滯善教人者今日能善其類他日國家取而用之則澤及天下善治國者必以徳教徳教行則治道成彼憂財用與畏夷狄者不足語此時論有以夷狄為畏財用為憂先公曰宰相優劣但以此考騐實心無所往而不可蓋實心一也可以應天下之萬變大舜之心即瞽瞍底豫之心瞽瞍底豫之心即大舜之心人以念慮為心是致為學疲勞或自覺則見本心矣吾往者質甚不美毎以小人自目所幸者有志復不自執己私有公論雖氣習如山岳如膠漆而常自覺一日氣習分離如巖崖崩倒如是者三日自後身浸輕矣天下之事惟一理哀公以年饑用不足問於有若有若對以盍徹夫盍徹正而已矣四時正則萬物生人倫正則天下治事無巨細凡有所成皆成於正子路亦曰千乘之國攝乎大國之間由也為之比及三年可使有勇且知方也子路苟不以財用養民焉能臻此後人之常患財用之不足故不以有若子路求之乎君子不以財用未足為憂而以此理為慮達之則超出物表而足以宰天下事物治道不足患欲言之時與無言之時同則學精矣有智則好問而樂無智則自用而憂中國伐夷狄當出於不得已如使長子殺季子也為安天下之民天使我伐之則伐之鋒刃之下有所殺傷如割已體常情喜一人未必可喜但與吾合則喜也怒一人未必可怒但逆吾意則怒之耳家事處置了則休不必留滯在心字畫雖小亦欲端謹閑書當與特書同道㑹是不㑹立家有道則隣里悦而歸之以是為驗學者或無志久久與流俗同女子不可多言笑事無大小有志者皆得之竊盜取地窟一鍫復一鍫不敢作聲不敢思量他事但一心求徹學者似之不患所學不成也古人毎事廉謹無求於人誰得此真味雖小兒不可令觀戲玩惡心未萌時與學成就時一般惟無憎惡人之心者乃能勸戒人有憎惡人之心者其勸人必不服古制散亡因論喪禮曰五服一也知一乃能知五知五知一乃能分别等差而不亂吾家稍整喪禮不必恤外議緦麻小功有疑則服大功一日閑步到蔬園顧謂園僕吾蔬間為盜者竊取汝有何計防閑園僕姓余者曰須拚少分與盜者乃可先公因顧欣然簡曰余即吾師也吾意釋然子弟讀禮不可以世俗諱忌特缺其禮令簡書之冊以示人君子仕宦或有陞擢自顧其材不足則辭之於義為當於身則榮才不稱職君子恥之汝輩謀屋先須築一片基址且道如何是基址務亷謹是基址學安靜是基址此一片基址極好若欲將錢急於營圖架屋便錯因及婁師徳唾面自乾語曰且道唾面從那裏來有對者俱未當意徐曰從動心處來此心纔動唾即劈面而來也人之本心本自寂然鄉土無鴈好事者㛰禮必欲致鴈使天地間都無鴈則聖人定禮亦必欲奠鴈乎當别有物也但以義通之耳受人寄托必周留神一日以墨汁潑粥而食粥罷謂簡輩曰吾向來惡粥色黒者今日微黒耳便起惡心故澆以墨治人不在威得理則人敬服如四三伯臨事通變寡怒人自不犯死之日隣里下淚不獨大底是學小底亦是學一語之差一事之不中雖極微小吾以為其大如天何故道却無大小後生不可呼長上字雖非當面亦不可吾向者嘗恨己過難除知他幾畨淚下幾畨自拳子弟可遊山不可下碁小兒許用胡哮不可放紙鳶他皆倣此奴婢病常令照管湯藥飲食兒女不責備他聰明小兒漸長欲行約速不可遽明年欲行今歲先諭之以寛為貴道無大小何處非道當於日用中求之衣服飲食道也娶妻生子道也動靜語黙道也但無所貪正而不邪則道不求而自得儻有志於學見賢者亦學也見不賢者亦學也喜樂亦學也憂苦亦學也學至此學乃吾之全體智我所自有不患無智此心不動日用常情物至自明事至自應如明鏡止水毫髪無差萬事無非天命不達則止見人為處世勞苦孟子曰臧氏之子焉能使余不遇哉女子事人能敬夫能奉祀事舅姑有道則為父母之榮往者申屠一郎以孝聞於鄉里豐消敏諸人多訪之母在堂未嘗不冠帶衫止皂帶有家者起不可不早食不可不齊於此可以觀家之興衰使財物寛餘當置産業一頃以充接延賢者與夫給助之費吾家命新生乳名不可務尖新吾今之樂不可量也當被竊盜其明日食罷從容曰吾夜來聞婢驚告有盜時吾心止如此已而告所亡物多吾心亦止如此今吾心亦止如此近世有以小道與其門人講習學者宗仰語録流行人服其篤行遂信其説其説固多矣而害道者亦多遺患頗深坐檻墜地他日語人曰我當正墜未及地時吾心怡然甚安先公平時常拱手拱而寢拱而寤一日偶跌仆拱手如故神色不動簡自少便見先公輕財好施他日語次簡曰大人輕財好施惠乃出於天資先公曰不然吾資吝嗇後知非而改故然淳熙十三年家書云汝勉吾為西湖之游吾已嘗遊今日無處不西湖無時不西湖人朝夕區區皆由有己及問其所以為已却又不識人好思量於此思量向有郡守以善聽訟稱有啞者執白紙遽令枷項示衆乃密使人伺之道路有云啞者誠屈昨日遭某人拳今日却枷項伺者以言入遂直其訟太守以為得計郡中亦稱之吾切不取是使部民習詐非善教也人心本自清明本自善其有惡乃妄心爾因其不達執以為我被客來作主迷失本心達血氣二字則無我矣賢者幹事謹終如始一事未畢彼事不為彼事功雖倍亦不顧十百千萬皆本於一一事辦則十百千萬存乎其中人之溺見在庸愚猶輕在高明之士則重此溺見不自覺惟他人知之近有一高明之士著地理圖志文書浩繁亦善第恐顔子未暇及此先公嘗言吾少時忿懥甚知非力改簡自童稚已見先公凡百容耐其後見有極微之人無禮先公怡然不以介意使有牧童呼我來前曰我教汝我亦敬聽其教嘗置小篋實豆其中以記過念多少毎自置多言之戒晚年益簡黙拱而行拱而坐湛然終日幾於無言毎曰吾今日一無思慮舉足不敬即為不敬一草不敬即為不敬人皆有一我故不見道雖名士難逃此患遂以聰明為道釋氏謂之認賊為子夫堯舜為天下後世知其名而堯舜所以為善今人㸃粧賢者之名歸已於堯舜有異矣儻得堯舜之心則無我無我則自然日進不待修為吾家當行七事好善平直謙虚容物長厚質朴儉約此可以成身可以成家而道在其中慈湖遺書卷十七
