body:
  text: 慈湖遺書巻十四宋楊簡撰家記八論孟子諸子孟子言舜傅說膠鬲困於心衡於慮而後作此正說孟子之學而非所以言舜精一之學非傅說厥徳脩罔覺之㫖也孟子謂伊尹治亦進亂亦進未當伊尹之心徒以就湯就桀之迹言之爾夫伊尹處畎畆之中樂堯舜之道雖湯再使人聘之未爲之起豈治亦進亂亦進意度哉無非惟義之從爾孟子言我善養吾浩然之氣養而無害則塞乎天地之間其爲氣也配義與道無是餒也夫人廣大與天地同體惟自乳稚梏束於氣血形骸之中失其本體之大孟子既明固有之心漸復本體之廣大故蔽漸脫體漸明廣大漸著孟子明見廣大漸著之體無以名言之曰是殆吾氣之浩然者也養而無害則塞乎天地之間然而非的也性體本大因蔽而小復因蔽去而大其實復我本有之大耳非體有消長也自人物言之謂之性自人物萬化莫不由之而言謂之道自其絪緼和育發逹言之謂之氣自其萬事各有宜謂之義自其惻隐謂之仁自其恭敬謂之禮自其誠實謂之忠信其實一物特所從言之異非果有紛紛實殊本不可同之體也鑑中之氣水中之形性中之變化有小有大有消有長有動有静有實有虚有多有寡有異有同變態萬狀不可勝窮而實一性也一貫也凡是皆人性所自有惟衆人蔽之君子明之其蔽也似無其明也似有非衆人本無也孟子又曰其爲氣也配義與道道即義不可言與氣即道亦不可言配孟子謂㳺聖人之門者難爲言豈有自覺其言之未能無疵乎孟子曰養心莫善於寡欲雖有不存焉者寡矣且心非有體之物也有體則有所有所則可以言存心本無體無體則何所存孟子之言存乃存意也存我也有存焉有不存焉非其真者也人心即道喜怒哀樂神用出入初無體之可執至虚至明如水如鑑寂然而變化萬象盡在其中無毫髪差也彼昏迷妄肆顛倒萬狀而其寂然無體之道心自若也道心自若而自昏自妄也一日自覺而後自信吾日用未始不神靈也未始動摇也不覺其未始動摇者而惟執其或存或不存者是棄真而取偽也此不可不明辯孟子曰天下之言性也則故而已孟子此論足以開明人心學者之蔽二智與故而已去智與故循天之理莊周則云則知孟子之時智故兩言聨稱通義率以爲常故孟子於此始言故忽繼之以智不患乎人莫之曉千載之下時移事改言語浸差學者罕言智故故莫之曉不知孟子之時以爲常談故者事故智者智慮易大傳曰無思也無爲也爲即故思即智學者之蔽非思則爲非智則故言其不出於此即出於彼其蔽同其受病之源同故學者常言智故不以爲異此二者足以盡天下萬古學者之蔽矣此道坦然不假思索不勞作爲人性自善人性自明人性自具仁義禮智自具萬善何必他求何必更思何必更爲故孟子曰人之所不學而能者其良能也所不慮而知者其良知也孩提之童無不知愛其親也及其長也無不知敬其兄也親親仁也敬長義也不學而能不慮而知何假思爲不屬智故天下之言性者則異於是矣其所言者必有故焉必用智焉或有利心心有所欲之謂利自善性流出順逹而無阻滯無支離則無思也自仁自義自禮自智何故之有何作爲之有何更以智爲何更以思慮爲然孟子所以惡夫智者惡其鑿也如智者若禹之行水也則無惡於智矣禹之行水也行其所無事也滌九川䟽萬水八年於外三過家門而不入其勤勞多事如此而孟子以爲行其所無事者禹曰安汝止安汝止者如四時之錯行如日月之代明不屬智故也雖思而不支雖爲而不離也是以日應無窮之事如無一事也惑而遂通而無思無爲也禹之智如此雖曰智猶未嘗用智智有邪正有小大有是非故孟子於此致其議至於故之爲言則斷不可以爲性不必致議天雖髙星辰雖逺苟求其故則雖千嵗之日南至北至善厯者可以坐測而籌之殊不難惟此乃言性也非故也故不可以故言之舉天下無迯於智故是以舉天下皆不知性孟子所以毎言必稱堯舜者以天下不知人之性善故率以堯舜爲不可及率堕於智故也孟子曰學問之道無他求其放心而已矣學者皆知所以求放心而不知何者爲心何者爲放何者爲求也不明乎善不誠其身矣要先明吾之本心然後能知放知放則知求之矣吾之本心無他妙也甚簡也甚易也不損不益不作不爲感而遂通以直而動出乎自然者是也是心與天地同功用與四時同變通喜怒哀樂無不中乎道則亦更何求也惟蔽於物而動其心於是始放而之他矣故於是貴於求然人心至於放鮮有知所以求之者彼且以爲爲悖亂爲奸詐爲淫佚爲暴酷者吾之本心然也一旦欲使之勿如此遂有束縳廹急之患則曰殆不若姑縱之而聊以自適也不知此心之放於外離乎我而逐乎物者之妄心則然吾本心何嘗如此哉知我本心廣大虚明直方剛健外物舉不可入其門則苟求之固在我矣亦何憚惟其不知也故天下之爲小人者舉不可深罪人孰不欲爲君子爲善人不知吾心之本善也不知乍見孺子將入井其怵愓惻隐之心即吾本心也不知徐行後長者之心即吾所自有之良心亦堯舜之心也既不知吾良心本若此坦易或求之則又苦廹而求之他既求之他則無斯須安者其必至之勢也孟子謂志至焉氣次焉持其志無暴其氣配義與道與存心養性之説同孔子未嘗有此論惟曰忠信篤敬參前倚衡未嘗分裂本末未嘗循殊名而失一貫之實也又惟曰吾有知乎哉而已曰何有於我哉而已曰哀樂相生正明目而視之不可得而見也傾耳而聼之不可得而聞也而已曰志氣塞乎天地而已盖曰志曰氣曰義曰道曰心曰性曰哀曰樂曰忠信曰篤敬名殊而實一明者觀之渾然寂然本不可以名言聖人因人言而隨之言大㫖未嘗判裂此惟内明大通者知之雖小明而未大通猶蔽斯㫖噫學者生而習聞人言如是者謂之志如是者謂之氣如是者謂之義如是者謂之道如是者謂之性謂之忠信謂之篤敬謂之喜怒哀樂牢不可觧一旦告之未始不一之説其聼必惑惟自明者自知自信孔子言志氣塞乎天地志氣亦天下之常言未嘗專指言氣也而孟子則專言乎氣矣孔子言塞乎天地不言曩小而今大孟子曰我善養吾浩然之氣養而無害則塞乎天地之間則言曩小而今大曩小而今大者意也氣之實未嘗曩小而今大也孔子曰春秋冬夏風雨霜露無非教也神氣風霆風霆流形庻物露生無非教也或曰天地或曰神氣或曰氣志或曰人物一物也一物而殊稱也或曰孝弟亦是物也或曰道義亦是物也或曰禮樂亦是物也故曰夫孝天之經地之義又曰眀則有禮樂幽則有鬼神範圍天地者此也發育萬物者此也安得曩小而今大也孟子據其所親歴而言惟覩曩之梏束誠覺其小今之開豁誠見其大不知渾然一貫之妙初無形氣之殊人自昏執人自狹小其蔽漸釋故覺漸大其實不然譬之鑑有塵翳之乃失其眀漸去其塵其眀浸廣非本眀之有小大由去塵之有次第也孟子曰說大人則藐之勿視其巍巍然無乃不敬乎又曰自反而忠矣其横逆猶是也君子曰此亦妄人也已矣如此則與禽獸奚擇哉此亦不敬聞之孝宗亦不以爲然孟子謂楊子取爲我㧞一毫而利天下不爲也此非楊子之本心楊子曰伯成子髙不以一毫利物舍國而隱耕古之人損一毫利天下不與也悉天下奉一人不取也人人不損一毫人人不利天下天下治矣楊非取爲我惟不取不與各安於無事而已矣亦老子使民至老不相徃来之意非大中至正之道人皆有道心皆有愛人利物之心如天地之春乃變化之神用而老子楊子欲絶滅之是猶未免於意必先生謂汲古曰孔子言操則存舍則亡出入無時莫知其鄉惟心之謂與此説如何汲古對曰此言人心操則存在此舍則失之所以出入無定處孟子引此說以眀此心之不可失也先生曰孔子此言盖謂操持則在此不操持而舍之則寂然無所有忽焉而出如思念外物外事則逺出直至於千萬里之外或窮九霄之上或深及九地之下又忽焉而入如在乎吾身之中然而心無形體無形體則自然無方所故曰莫知其鄉言實無鄉域也聖人此㫖未嘗貴操而賤舍孟子悮認其語毎毎有存心之說又有存神之説失之矣使果有所存則何以爲神見誨語汲古問夏后氏五十而貢殷人七十而助周人百畆而徹徹者徹也盖兼貢助而通用也若謂周制畿内用貢法邦國用助法何以攷之先生曰鄭康成謂周畿内用夏之貢法邦國用殷之助法此亦意說初無證驗雖云據詩春秋孟子亦不無疑魯宣十五年初稅畆言稅民夫自開闢零畆之田爾初不見其爲助也詩曰雨我公田遂及我私孟子曰惟助爲有公田由此觀之雖周亦助也孟子亦不過因詩而意之爾今攷周禮未見其有助法然則所謂雨我公田者殆官有間田之属役民以耕者作此詩爾周官化治人皆有士君子之行故詩有此先公後私之誠心役民歲不過三日互役之以治官田如合方氏尚同天下之數噐度量而乃行二法乎况無的然無疑之證大田詩云雨我公田遂及我私乃幽王時詩非侯國之詩不可以此證侯國之助法見誨語老子曰致虚極守静篤萬物並作吾以觀其復夫物芸芸各歸其根歸根曰靜老子之於道殆入焉而未大通者也動即靜靜即動動靜未始不一貫何以致守爲何以復歸爲見訓語老子曰視之不見名曰夷聽之不聞名曰希摶之不得名曰㣲此三者不可致語復混而爲一其上不皦其下不昧繩繩不可名復歸於無物曰混曰復歸疵病大露混而爲一不知其本一也復歸於無物不知虚實之本一也老子又曰執古之道以御今之有未悟古今之一也凡此惟大通者知之信之未大通者終不知終疑也此不可以思慮及也不可以言辭盡也曰有曰無曰動曰靜曰古曰今曰萬曰一名言之不同也昏者則云爾也老子又曰大曰逝逝曰遠遠曰反道體寂然何逝何反學道而未通者自作此意度耳道不如是也孔子曰誰能出不由戸何莫由斯道也動者道也靜者道也有者道也無者道也古者道也今者道也萬者道也一者道也孔子又曰吾道一以貫之未嘗異動静有無古今萬一而爲殊也老子言道大天大地大王亦大域中有四大而王居一焉人法地地法天天法道道法自然夫三才之道一而已矣而老子裂而四之其言法天法道法自然尤爲誣言瑕病尤著以他語驗之老子不可謂無得於道而猶有未盡焉爾莊周寓言陋語良多仁義蘧廬之論惟覩夫二未覩夫一也亦祖夫歸無之學而未大通者也周又曰爲是不用而寓諸庸意說也曰不用曰寓皆意也又曰有以爲未始有物者至矣盡矣不可以加矣此又意説也未悟有無之一也又曰仁義之端是非之塗樊然殽亂是又惡動好靜䧟溺之巨病也似廣大而實小也似髙明而實卑也又妄謂顔子忘仁義忘禮樂坐忘此乃老莊棄動趨静之偏蔽而謂顔子亦然其言似髙妙而未免於不一足以惑亂學者見訓語孔子問禮於老聃恐非莊子所謂老聃者何以眀之所言絶不類也豈有與孔子議禮如此之詳而又以禮爲亂之首也莊子所言老聃皆痛絶仁義莊子曰以其知之所知以養其知之所不知莊周何其意態之多也孔子曰入孝出弟謹信汎愛未嘗有意度也莊子鑿空爲有又屈曲其蹊又曰知其不可柰何而安之若命惟有徳者能之有徳者不如是也以爲不可柰何者非能安者也非真知命者也天命之妙不可以人爲叅也曰天曰人非知天者也亦非知人者也天人一道也隨世而曰天曰人可也吾心實曰天曰人非也莊子曰一宅而寓於不得已又曰不忘其所始又曰以無爲首是皆意慮之未息也孔子曰天下何思何慮未嘗有周之繁説也而萬世自莫得而闚之莊子又曰勞我以生息我以死是又思慮之紛紛也是又樂死而厭生也樂死而厭生與貪生而懼死同桑戸之歌曰而已反其真而我猶爲人以死爲反真以生爲不反真其梏於生死又如此豈若孔子之言曰未知生焉知死眀乎生死之一也莊子又曰汝神将守形形乃長生既諄諄言無物之妙矣兹又守形陋矣又自矛盾矣子思子之書載衞公子交見於子思曰先生聖人之後執清髙之操天下之君子莫不服先生之大名交雖不敏竊慕下風師先生之行幸顧恤之子思曰公子不宜也夫清髙之節不以私自累不以利煩意擇天下之至道行天下之正路今公子紹康叔之緒處戰伐之世當務収英雄保其疆土非所以眀否臧立規檢脩匹夫之行之時也嗚呼是殆非子思之言也夫道一而已矣君以此使臣臣以此事君公子以此爲公子士以此爲士一也今異而言之無乃不可乎况乎眀臧否立規檢矜持務外非由中而生者是殆非子思之言也不然則子思之學陋甚矣何以能作中庸中庸雖不無瑕病不至如此蔽陋之甚也孟子曰盡信書不如無書子思年十六而辱宋大夫樂朔㡬不免曾子亦謂其有傲世主之心老萊子亦言其性大剛而傲不肖然則子思亦未能無我矣惟未能無我故中庸之書亦不能無意孔子毎戒學者曰毋意又曰毋我予自㣲覺而已深疑子思之言曰夫婦之愚可以與知焉及其至也雖聖人亦有所不知焉夫婦之不肖可以能行焉及其至也雖聖人亦有所不能焉以予所覺心中初無淺深前後精粗之異而子思異之殊覺其礙此乃予未覺之日所見既覺則無是見也乃悟孔子曰吾道一以貫之又曰吾有知乎哉無知也若孔子之言若合符契而子思又曰道也者不可須臾離也亦覺其未安當曰道也者未始須臾離也不當言不可不可云者乃以意爲之孔子所以每每戒門弟曰毋意爲是類也自孔子殁而大道不眀自曾子殁而道滋不眀孟子正矣而猶䟽荀卿勤矣而愈逺董仲舒號漢儒宗而曰道者所繇適於治之路也仁義禮樂皆其具也又曰仁義禮智信五常之道王者所當脩飾也五者脩飾故受天之佑嗚呼異乎孔子之言道矣自知道者觀之惟有嗟憫而自漢以来士大夫學識畧同孔子曰誰能出不由戸何莫由斯道也由戸爲喻爾何莫由斯正實無瑕仲舒支離屈曲不知仁義禮樂乃道之異名而以具言則離之矣不知仁義禮智信皆人心所自有不假脩飾臯陶謨慎厥身修思永修其永永不變者仲舒所言脩飾能永乎仲舒曰陛下設誠於内而致行之則三王何異哉禹曰安女止謂人性本静止安之不動而已矣何以設爲文王不識不知何以設爲孟子道性善又仲之所未知也以此事君乃反汨亂其君本有之德性諸儒雜説蕪論所至如是能知其非者有㡬就有知其非者又不得行其道於天下而欲望復見三代之治難矣仲舒又曰道之大原出於天天不變道亦不變是以禹繼舜舜繼堯三聖相授而守一道亡捄弊之政也吁咈哉道無本末何出何入天者即此道之健行清明者也而仲舒離而爲二舜誅四凶亦捄弊矣初不害於三聖之一道誣言曲説今學者靡然從之道何由而眀人心何由而復於正王通之學陋甚其言曰大哉周公遠則㝠諸心也心者非他也窮理者也故悉本於天推神於天盖尊而遠之也故以祀禮接焉近則求諸已也已者非他也盡性者也卒歸之人推鬼於人盖引而敬之也故以饗禮接焉通之妄至此殆不足辯惟其羣弟子宦逹尊稱其師書行於世其言亦足以惑亂學者聖人之道即天地之道奚特聖人三才一貫也故孔子曰夫孝天之經地之義民之行又曰人者天地之徳鬼神之會又曰人者天地之心而通曰逺則㝠諸心是誣聖人也又於心外復求理復求天是自誣也窮理盡性以至於命乃說卦之文未嘗繫之子曰則知非孔子之言也曰窮理曰盡性使明者言之辭旨承連自無瑕病而通分裂如此良可笑也通又曰顯仁藏用中古之事也杜淹問藏之之説通曰冺其迹閟其心可以神會難以事求斯其説也通之陋至於此今有司毎出題於其書以試舉子又時文習尚順題罕有駁議而通之書依倣聖言竊取其近似而實非也學者多爲所欺故靡然從之孔子曰天下何思何慮而通曰仁亦不逺姑慮而行之孟子曰仁人心也通之病蔽甚著孔子雖曰仁遠乎哉我欲仁斯仁至矣此大畧明人之不逺耳欲之爲言亦常言初無深用思慮之意通不會聖人之㫖倣而言之自謂無悖矣不知氷炭之不同也又曰仁義其教之本乎先王以繼道徳而興禮樂者也通乃傚易大傳一隂一陽之謂道繼之者善也遂妄意仁義為非道妄意禮樂出於仁義之下不知仁義禮樂乃道徳之異名先王順道而行非能有所作而次第之也繼善之言大傳不繫之子曰之下則非孔子之言也通又曰不以霍光諸葛亮之心事其君者皆具臣也霍光隂妻邪謀非忠也劉備受劉璋賔客之禮而反目奪之亮輔之又立同姓之婦為后此何心也霍葛誠有他善可愛可敬而王通槩取之則不可也房𤣥齡杜如晦傳其學輔太宗殺建成元吉亂巢妃亦通此等學術議論有以啓之也李宻問王伯之畧通曰不以天下易一民之命此論正矣惟餘論則駁滋惑後世不得已致辯道無窮無方學者自有淺深有不盡昔孔子遇程子於途與語悦之取其善者爾非盡與孔子同也程子名本號子華子程子固曰仲尼天也本也何足以望夫子程子曰我之百骸九竅毛髮膏澤藏腑肝鬲吹嘘吸引滋液吐納無非道也斯言善矣其曰上氣曰始中氣曰元下氣曰𤣥𤣥資於元元資於始始資於初太貞剖割斯則蔽矣夫太貞者道之異名爾何得言剖割道一以貫孔子猶欲無言而况於本無可言之中而强裂初始元𤣥四者之名其曰孰究其所以來誰使其所以然未見其疵也而繼曰因其然也意狀可覩已而又曰然不然也然乎然不然乎不然言雖似深實積意説又曰吾亦不知所以然也此庶幾矣猶有所倚也其之齊知齊國大危答景公之問一本諸道深知非道無以已亂也善矣列子道壺丘子林之言曰有生不生有化不化不生者能生生不化者能化化生者不能不生化者不能不化隂陽爾四時爾不生者疑獨疑獨其道不可窮壺丘之言似實而非夫天下氣化物理一貫無二而壺丘裂而二之孔子曰哀樂相生是故正眀目而視之不可得而見也傾耳而聽之不可得而聞也孔子之言實理也眀乎此則壺邱之蔽可觀矣隂陽四時生化皆不可見不可聞也即不生不化者也皆非有無所可言也列子曰天地無全功聖人無全能萬物無全用列子雖能御風而行乃清虚之功其於道則未也物物皆全心心皆全列子知異而不知同不知一以貫之之妙聖學之不傳學者之過也學者之過在於不求之心而求之名也此心之中孝弟忠信仁義禮智萬善畢備惟所欲用無非大道其見於事親則謂之孝見於從兄則謂之弟見於事君則謂之忠見於朋友則謂之信居家而見於夫婦則謂倡隨居郷而見於長㓜則為有序是心之發雖紛紜萬殊而非萬殊也一氣運而為四時其始逹謂之春盛長謂之夏肅殺謂之秋冬時雖四而氣一也欽明文思一堯也温良恭儉一夫子也今夫見孺子入井而怵惕隱惻者仁也及遇大賔則又陞䧏揖遜而為禮此時也豈一人而二心也耶嗟乎學者藩以私情蔀以小智絶聖人之大道昧人心之固有持異端邪説而欲立乎清虚無為之境吁可傷哉荀卿子言性惡而自背馳聽訟兩詞不同靜聽久之而真情自露荀卿曰人之性惡其善者偽也其大畧篇則曰雖桀紂不能去民之好義然而能使其好義不勝其欲利也夫不能去民之好義則人性之本善騐矣見訓語先生問汲古曾看老莊之書否汲古對云老莊非聖之書多害道特以聲律為習不容盡廢因問道體至大何所不該老子四大之説似亦支離先生曰三才無二道老子却裂而四之如言人法地地法天天法道道法自然尤為誣言意説瑕病尤多以他語驗之不可謂無得於道惟其有蔽故猶有未盡汲古問老子言禮者忠信之薄而亂之首是不知其禮矣而家語乃云夫子聞其通禮樂之原而往師之又云問禮於老𣆀先生曰聖人無常師師其是不師其非也先生曰師者所以傳道也道非自外至所以啓吾心之所自有也教者豈能於學者所自有之外别取一物而教之耶亦使之復其所固有爾若使之不由其誠則所教者皆外物無與學者事也故記曰今之教者使人不由其誠教人不盡其材汲古嘗見張横渠云不盡材不由誠皆是施之妄也教人至難必盡其材乃不誤人若曰勉率而為之則豈由誠哉先生曰是汲古問先儒謂董仲舒云正其誼不謀其利明其道不計其功此董子所以度越諸子此説如何先生曰董仲舒學不知道如曰仁義禮智信所當脩飾又曰設誠於内而致行之此道人心之所自有何以脩飾設為其不逹大本如此互見誨語慈湖遺書巻十四
