body:
  text: 慈湖遺書巻十宋楊簡撰家記四論論語上子曰學而時習之不亦説乎知學之道者以時習而説不知學之道者以時習為勞苦勞苦則安能時習時習必不勞苦今學者欲造無時不習之妙斷不可有毫釐勞苦之状當知夫學問之道無他求其放心而已矣但夫放逸則勞他求他求則成放他求則成勞是心有安有説無勞無苦是心初無竒初無心則吾目視耳聽手持足履口語心思之心此心非物無形無限量無終始無古今無時不然故曰無時不習時習之習非智非力用智智有時而竭用力力有時而息不竭不息至樂之域有朋自逺方來不亦樂乎此愛人之心也此廣大之心也此不自私之心也有朋自逺方何為乎來也以好善之心來也則吾樂與共之樂吾之善盖有不自知其所以然而然此樂天樂也非人樂也楊朱㧞一毛利天下不為固無是樂也此則異端之道非天地大公之道也荘子謂楊朱得道於老耼則亦非碌碌者朱盖知有己而已不知他也見天地間未始有一物而不見天地間未始無萬物也知一而不知十百千萬也知静而不知動也溺心於小而不知大也然而此非碌碌者所能知故天下靡然從之而無君之説遍天下非孟子不能闢非知夫子朋來而樂之意無以知孟子所以闢楊墨之意人不知而不愠不亦君子乎人不知而不愠雖賢者容或有之此愠不必暴見於外苟動於念慮間即謂之愠已子思曰遁世不見知而不悔惟聖者能之易曰遁世無悶不見是而無悶謂之潜龍之徳非德之純而無毫釐外馳者至是乎子曰學而時習之不亦説乎有朋自逺方來不亦樂乎人不知而不愠不亦君子乎學者多疑所習者何事必有其説吁使所習之有説則必不能時習矣時習者言乎時時而習無時而不習也使所習有説則必有意意作必有時而息至於息則非時習也惟其無意也故能時時而習時習之習乃不習之習易曰不習無不利今學者患乎習之不能時者正以其以思慮而習以智力而習故不能時也使果有説果有可言之事則孔子已明言之矣孔子無所言正以明時習之習非學者作輟之習也正以明學者本有之心即道而無俟乎復為也作輟之學安得有悦非智非力無作無輟之學故有無窮之悦樂也或者又曰孔子言弟子入則孝出則弟謹而信汎愛衆而親仁行有餘力則以學文若斯之類是乃所習之説吁是又實未識所謂孝弟謹信汎愛親仁學文者也方子之事親時愛敬之心自生不知所以然此則孝也使作意曰吾将以學為孝也則亦偽而已矣非真心之孝也孟子曰人之所不學而能者其良能也所不慮而知者其良知也孩提之童無不知愛其親及其長也無不知敬其兄也使胷中有意有説則失其所以為真孝真弟矣不真則偽偽則終於失孔子誨學者使出入之間無非孝弟則真而不偽不思不勉而自愛自敬矣謹則無放逸無思慮信則允塞亦安得有思慮惟如此者乃能汎愛其不能汎愛者必其思慮紛擾私意横生則不虚明不廣大也孝弟謹信汎愛無非道心之所發見自然喜於親仁自然與仁者同心自然謙虚不敢自足其有不親於仁必有私意必有阻隔但順此孝弟謹信汎愛親仁之心而行謂之由道而行行之既熟為有餘力乃可學文文非道外之物文學之事皆此道之精華日用之妙何往而非一貫但聖人設教之序當自孝弟始當自㓜而逹之通則悟其本一一則無時而非習矣伯成子髙不以一毫利物後學靡然從之偏枯孤止無愛利之大用非道也夫朋至而吾樂善之心油然而生乃道心之變化非思慮之所及是為聖人之大道舉天下萬古之人皆有此而人自不知之自不信之自偏溺之不溺於動則溺於止朋來而樂不溺於静止之穽矣然又慮其復溺於動樂於人之知己不知則愠則亦非君子之道君子朋至而樂自生者非動也朋不至人不知而不愠非勉强抑止也清明之性自爾寂然夫是之謂學夫是之謂天下何思何慮夫是之謂不習之習論語謂之時習中庸謂之時中無時而不中也無時而不中即無時而不習有意則必有倚著不可謂之中故曰時中即時習子曰學而時習之不亦説乎有朋自逺方來不亦樂乎人不知而不愠不亦君子乎學者多疑所習者何事必有其説吁使所習之有説則必能時習矣時習者言乎時時而習無時而不習使所習有説則必有意意作必有時而息至於息也非時習也非時時而習也惟其無意也故能時時而習時時而習乃不習之習易曰不習無不利今學者患乎習之不能時時者正以其思慮而習以智力而習故不能時也使果有説果有可言之事則孔子已明言之矣孔子無所言正以明時習之習非學者作輟之習也正以明學者本有之心即道而無俟乎復為也作輟之學安得有悦非智非力無作無輟之學故有無窮之悦樂也或者又曰孔子又言弟子入則孝出則弟謹而信汎愛衆而親仁行有餘力則以學文若斯之類是乃所習之説吁此孔子言弟子之事言豈一端而足然事似異而實非異孔子曰心之精神是謂聖孟子亦曰仁人心也此心即道故舜曰道心心無形體故變化無方孝之心何状弟之心又何状謹之心又何状信者不詐欺而已不詐欺之心又何状汎愛之心又何状親仁之心又何状學文雖不可勝紀闕之心精神變化又何状孔子謂孝者天之經地之義闕禮斷然本於大一分而為天地轉而為隂陽變而為四時然則百姓日用之妙果有不可得而思不可得而言者伯成子髙不以一毫利物後學靡然從之偏枯孤闕自古學者率求於無思無為之説而不悟無思無為之實乃人心之精神妙用易曰變化云為日月之光闕所不照而無思也無為也溺於沉寂而不達日用之妙故子曰知者動知道之謂智夫朋至而吾樂善之心油然而生乃道心之變化非思慮之所及是謂聖人之大道舉天下萬古人皆有此大道之常而人自不知之自不信之自偏溺之不溺於動則溺於止朋來而樂不溺於静止之穽矣然而又慮復溺於動樂於人之知己不知則愠則亦非君子之道君子朋至而樂自生者非動也朋不至人不知而不愠非勉强抑止清明之性自然寂然夫是之謂學夫是之謂天下何思何憂夫是之謂不習之習論語謂之時習中庸謂之時中時中無時而不中也有意則必有倚著不可謂中有説則必有倚著不可謂中無時而不習即無時而不中子曰巧言令色鮮矣仁又曰剛毅木訥近仁雍也仁而不佞大抵精神外浮此心放逸則安得仁仁人心也動則失之而况於外浮乎放逸乎由心而發為事親為從兄為衆善為百行如四時之錯行如日月之代明隨物而動為昏迷為機巧為詐妄曽子曰吾日三省吾身盖曽子有此三過故日以自省此三語者乃問心之辭人若不自闕其不覺又陷乎此也嘗讀檀弓見曽子出祖之遽以告從者裼裘之譏遽以示人而實未嘗學習觀此則知曽子有傳而不習之過特無所考見君子不以過為諱而以不能改過為恥人心即道自靈自明過失蔽之始昏始亂觀過則知仁矣無過則此心清明廣大如故矣雲氣散釋而太空澄碧矣汲古問子曰道千乗之國敬事而信節用而愛人使民以時此亦是聖人治天下之道而孔子止言千乗之國者其義何也先生曰千乗謂侯國其時王室㣲諸侯寖彊盛而多故此言其多者古之治天下者必聖人諸侯難遽責以聖度其能行者言之事不敬必失必害不信無以出令民無信不立而况於君乎敬生信治國之道敬信為大其次節用節用則可以推有餘以補助斯民不節用則厚歛於民矣民為邦本厚歛於民是自伐其邦本民離國亡君隨以亡愛民而後能使民以時國君愛民乃所以自愛其國自愛其身見誨語孔子曰君子不重則不威學則不固主忠信無友不如己者過則勿憚改又曰君子正其衣冠尊其瞻視儼然人望而畏之子思亦曰齋明盛服非禮勿動所以脩身也盖嚴重則此心不放逸自然有德威所學亦固此要當知主於忠信忠信即吾之心吾心日用平常無詐偽是為忠信是即吾之主本非吾心之外復有忠信也人皆有此忠信之心而不自知其為吾之主本故孔子明以告之使勿外求學者既自省主本又當親賢以求助不可友不如己者若不如己者來親於我固不可拒若不來求而我自友之好之與勝己者疏與不如己者親畏人之壓已樂人之奉己此學者大患又有雖親能勝己之友謙虚樂善而止於此憚於改過此尤切身大害學道無他改過而已髙明之士往往不無過而改過之士誠為難得此心虚明一無所有安得有過因起意故生過見訓語誨語子貢曰夫子温良恭儉讓記者曰子温而厲威而不猛恭而安此非夫子學温又學良學恭又學儉也亦非學温而厲又學威而不猛又學恭而安也初學者則然至於適道則不然矣而况於聖人乎人心自神人心自靈人心自備衆德不學而能不慮而知自温自良自恭自儉自温而厲自威而不猛自恭而安人不自知因物有遷故昏故失自適道而上則自知自信孟懿子問孝夫子對以無違孟武伯問孝夫子對以父母唯其疾之憂子㳺問孝夫子對以敬子夏問孝夫子對以色難所問則一所荅則異夫子之意安在哉盖曰孝者人之良心也人人之所自有也人之所自有而有不足焉者有以蔽之也孟懿子蔽處在違禮孟武伯蔽處在父母不以疾而憂子㳺蔽處在不敬子夏蔽處在色各去其蔽則數子之心固自全也數子之孝固未始不足也聖人不能予人以其所無能去人之蔽而已子曰為政以德為政之道無出於德吾夫子以一語盡之甚明白甚簡易更無餘論而自兩漢以來至于五代無一人信得及者豈夫子欺罔天下後世哉盖後世不識所謂德者習聞其號未燭厥理故輙疑德之外更有事在如法令如禮樂如任選如賞罰如兵財科條殆紛紛未易一二數嗚呼有是哉有是言也是豈德之散殊哉謂德之外自有無窮之事不惟不知德亦不知事政事不出於德非德政也政非德政苟非安即危亂矣法令不出於德則将以遏民之不善反以長民之不善民有良心不可賊也不可擾也衰世之法唯便利之從増之削之唯己意所欲非有臯陶之胷中何足定天下之刑一失其中則賊民之良性多矣禮樂不出於德則禮文不足以導民心之正而反以起民心之偽樂音不足以導民心之和而反以感民心之淫任選不出於德則我既無德亦不知何者為德以賢為不肖以不肖為賢後世法度壊禮樂崩風俗浮蕩雖有賢才亦難於不隨其間無文王而自興者幾人故賢才多不成就不缺則瑕然賢者雖有瑕缺大槩誠慤不肯習詐故過失亦不隠小人終日為不善見人則掩然去其不善而著其善又善於佞媚使人君無德其以賢為不肖以不肖為賢也則宜賞罰不出於德則賞以行一人之私喜罰以行一人之私怒兵財不出於德則将不肖而兵惰兵雖多而蠧財兵多財匱雖周公不能為也善為財者如劉晏王者之佐乎晏之術三代之法乎苟道耳人君無德而欲為政無一可者然漢唐治績亦有可稱者亦其君不至於全無德也是德之在人心人皆有之非惟君天下者獨有也聖人先得我心之所同然耳得其所同然者謂之德同然者天下同此一心同此一機治道之機緘總於人君之一心得其大總則萬目必隨一正君而國定矣選任自明教化自行庶政自舉如水之有源也何患其無流如木之有本也何慮其無枝葉凡後世君臣之所憂不足憂也不知後世何為不及此而為是紛紛子曰為政以德譬如北辰居其所而衆星共之大哉德乎天以此覆地以此載日月以此明四時以此行百物以此生君以此尊臣以此卑父以此慈子以此孝家以此齊國以此治故曰孝弟之至通於神明光于四海無所不通詩云自西自東自南自北無思不服何以能至此也天下同此一德故也孟子曰聖人先得我心之所同然耳人皆有此德性患上之人無以感之則民之應也如響易曰聖人以神道設教而天下服矣以德施教其妙如神故曰神道禹謨謂后克艱臣克艱而政即乂民即敏德亦神速矣孔子又曰正者正也子帥以正孰敢不正又曰其身正不令而行其身不正雖令不從曰德曰孝弟曰神明曰克艱曰正其名不同其實一也秦漢以來不復知有此矣權謀縱横唯利是務張良發八難謂漢髙必不能行仁義娄敬謂漢不當比隆成周君臣相與規圖乃如此故髙帝斷弃詩書慢罵陸賈及賈説曰使秦行仁義法先聖漢安得而有之於是心動始聽賈言頼有此耳故漢家規模本以覇王道雜之使賈果能開明正德帝明逹易曉導而入王道不難也賈亦唯義利為言耳故僅足小補子曰吾十有五而志于學三十而立四十而不惑五十而知天命六十而耳順七十而從心所欲不踰矩孔子之學異乎他人之學他人之學㝠行而妄學孔子之學明行而實學子曰吾嘗終日不食終夜不寝以思無益不如學也孔子扵此深省天下何思何慮實無可思慮者經禮三百曲禮三千皆吾心中之物無俟乎復思無俟乎復慮至於發憤忘食雖憤而非起意也好謀而成雖謀而非動心也終日變化云為而至静也終身應酬交錯而如一日也是謂適道之學子曰可與共學未可與適道可與適道未可與立孔子如是者乆之至於三十而後有立所謂立非於學之外後有立也學乆而固如木之生乆則堅立非有二木也成就之叙也困苦患難之足以動其心非立也富貴聲名之足以動其心非立也白刃鼎鑊之足以動其心非立也此非勉强而為立也立非强力之所能致也以强力而立立於暫不至於乆不以强力而立者吾心之所自有也吾心未始不剛健也戕而賊之始弱始不立立非孔子之所獨能而他人無之也人皆有之而未明也未學也是以未立也明乎已故立通乎物故不惑物已一貫而進德有序知己而不知物者有矣天下古今物情事理利害本末虚實衆寡曲折萬状不可勝窮自古明智之士至此一無惑者有幾孔子既明乎已又明乎物物已一貫利害一貫本末一貫虚實一貫衆寡一貫夫是以惑無從而生也一則虚虚則明明則無所不照故凡物之情理昭然自明凡事之利害曉然自辯雖詢謀不廢而明德内徹學道而至於不惑可謂光明洞徹内外矣而舊習之氣或未能盡泯感物而動日用百為猶有謂吾之所為不知其為天也非不知也習氣間興而偶昏則雖謂之不知天命可也孔子至五十則舊習之氣消盡無有或昏者矣必至是而後可以言知天命嗚呼至矣日用百為如四時之錯行如日月之代明如水鑑之永無塵矣天而不人矣物之拂違乎我者不知其幾也順適乎我者不知其幾也進德之純至於六十則凡物之順乎我不復㣲動其意凡物之逆乎我阻乎我亦不㣲動其意順逆一物物我一體明之非難常明為難常純純然而無間則耳順矣目之所見猶寡耳之所接為多莫夜無月與燭目力所不及而耳接其聲又自近而逺四方萬里目所不及而言辭之所傳事物情状不勝其多舉不足以動其意又自此而上極于逺古簡册之所載言辭之所及亦屬乎聞無不融然而一怡然而順純然而和是謂耳順耳順則無不順矣無不純一矣而亦非一無所辯如鑑焉妍醜萬状纎㣲畢見而鑑無動也自志學而已黙造斯妙矣至是而純乎純也孔子曰加我數年五十以學易可以無大過矣聞蘧伯玉使者寡過之言而歎美之寡過之難如此㣲動乎意即謂之過㣲有不一即謂之過故六十而始耳順至七十雖從心之所欲未嘗踰矩焉純乎純不足以言之矣至矣盡矣不可以有加矣非謂未七十而猶踰矩因言從心而及乎此釋學者之疑也然聖人至此初無以異於志學之道道無先後精粗之間而進德則有先後精粗之序如謂道果有先後精粗之不同則何以謂一以貫之汲古問人既知覺則無不通逹何孔子謂五十而知天命先生曰此聖人之學也自十五而志於學三十而立四十而不惑學力進進有次第志學之初雖已知天性之本然而習氣間起未純乎天日用應酬人為未盡釋至五十始知皆天命無俟乎人為六十而耳順無所不順有順無逆純乎天矣汲古又問耳目同體何以言耳順而不及目先生曰目之所見者寡耳之所接者多莫夜無月與燭目力所不及而耳接其聲又自近而逺四方萬里事物情状目力所不及而耳皆聞之又自此而上極于逺古方䇿之所傳言辭之所及亦屬乎聞見誨語先生曰子曰温故而知新可以為師矣温故則善有進而無退知新則善愈益而愈通道不在他善而已矣人性自善又能盡集天下之善則道在我矣學者自少至壮由壮至老所知不勝其多惟其旋得旋失是以終為無成誠能已知者不失其善未知者又知之則此心無非善日用無非善學者如無頓覺之明當自此入雖覺而未能無過亦不可無學汲古云嘗見周子通書云曷為天下善曰師故先覺覺後覺闇者求於明而師道立矣師道立則善人多善人多則朝廷正而天下治矣先生曰是如此汲古問曰道者所以明徳也德者所以尊道也是故非德不尊非道不明此夫子答曽子之問其分道與德而為尊與明之義如何先生曰道德非二道者言其無所不通謂如道路之四通人心之善謂之德此德即道也苟不通逹則已雖有德而不自知故曰道所以明德非德外復有道道外復有德也然人亦有雖明乎道而已德猶有不善則人心終未服故孔子曰知及之仁不能守之雖得之必失之又曰不在於善而皆在於㓙德雖得之君子所不貴君子行斯可樂德義可尊是以其民畏而愛之原壤孔子之故人母死而歌其德不脩則人咸賤之聖人以學者於道未洞明或㣲明而未全則德行多虧故循循善誘見誨語子曰君子不器偏則器不偏則不器止則器不止則不器有意必固我則器無意必固我則不器見訓語君子周而不比君子之心無私好無私惡如天地太虛然萬物縱横紛乎其中孰為反我者孰為順我者反我順我在物則爾天地太虛安知哉惟其若此故周而無可比者也小人之心奪於物倚於物又從而為血氣所使有順我者喜之反我者惡之喜則比惡則否比左則遺其右比此則失乎彼安得周天下哉此無他本心一失坐血氣紛擾之中吾固知其然也君子以天下為一家中國為一人如日月之光然日月之光容光則及何所取捨知此則可以知君子之心矣故親親而仁民仁固殺於親而君子非私也仁民而愛物愛固殺於仁而亦非私也惟其義爾故君子之愛銖分錙别而天下不以為私固非如墨氏兼愛而二本也小人以利合爾汝愛昵相濡以沬胡越可使一家一旦臨小利害父子有疑心焉私欲之為害如此血氣之能奪本真如此子曰由誨汝知之乎知之為知之不知為不知則多矣以不知為知非曰飾其辭之謂飾辭以欺人者不足道固有胷中自以為有見自以為知道如斯而已不復求知若此者多矣然非真知詰之則窮用之必不繼似是而非似明而昏似真而偽以此知為知殆不若不知之愈也然能自知其不知不認偽為真不執昏為明此亦明者也此雖不知乃所以為知也其進於真知也有日矣以不知為知是無時而知也子張亦有此病故夫子誨之曰多聞闕疑蓋子張以疑為不疑而言者有矣此子張所以難與竝為仁而由知德者鮮子謂子路曰由誨女知之乎知之為知之不知為不知是知也大哉聖言夫不知而曰是知何也子曰道不逺人人之為道而逺人不可以為道又曰心之精神是謂聖又謂忠信為大道又曰吾有知乎哉無知也不知為不知誠實無他無思無為非道而何聖言善於明道如此子曰由誨汝知之乎知之為知之不知為不知是知也聖訓至矣惜乎子路之不領也不知為不知何以曰知孔子謂忠信大道見於大戴記中庸曰誠者天之道也子又曰主忠信又誨子張見其參前倚衡者指忠信也學者於此所以多疑者以於平常實直心之外復求之也孔子曰中庸庸常也平常也箕子曰王道平平孔子又曰心之精神是謂聖人皆有是心即平常實直之心空洞無形體無際畔變化云為不可度思矧可斁思誠實之妙如此復何求即此即知見訓語哀公問曰何為則民服孔子對曰舉直錯諸枉則民服舉枉錯諸直則民不服直與服同一機緘枉與不服同一源流天下之道二善與不善而已矣善者天下之公道不善者非天下之公道直者善道為公為民心之所服枉者不善道為不公為民心之所不服一開其端其類咸應於戯直者民心之所同然枉者非民心之所同然聖人得我心之所同然舉之於上而天下之同然者應矣此之謂要道見訓語或謂孔子曰子奚不為政子曰書云孝乎惟孝友于兄弟施於有政是亦為政奚其為為政學者隨文釋義皆能言之而能深知孔子之心者有幾後世學者其能於平居事親從兄時與出而事君臨民果一而無二乎于以驗孔子之心常一而無二變化云為日用萬殊而道心常一此一人人所自有而自不知自不信見訓語人而無信不知其可也實為信實則不偽不偽則直無矯揉無支曲蕩蕩坦坦可與天地同鬼神合人生天地間所以相處羣而不亂者以其有此心也無是則相誣相罔相詐相奪亦安能一日而處今日平居暇日所與人交苟未覩利害往往皆誠實語有物奪之則偽耳人惟不知自有良昏蔽既乆姦詐日熾至以機變為巧不復知恥見偽詐之巧者則喜見信實之人則竊笑又從而譏侮甚至父子兄弟之間無所不用其詐此與禽獸鬼魅等耳尚何可齒以為人哉林放問禮之本子曰大哉問禮與其奢也寧儉喪與其易也寧戚儉則不放逸奢則放逸戚則不放逸易則放逸不放逸之心至矣哉為孝為弟為謹為信為忠為恕為敬為恭為剛健為中正為萬善順而無失應而無窮不識不知何思何慮儉與戚人皆有之而不自信其為大本孔子又曰禮本於天所謂天道在此又曰禮本於大一所謂大一者在此不放逸之心至矣哉孟子亦曰學問之道無他求其放心而已矣堯曰欽哉禹曰克艱臯陶曰兢兢周公曰無逸孔子七十而從心所欲不踰矩一也汲古問聖門言禮者非一子張問禮之損益曽子問婚祭之禮言偃問禮之急也惟林放問禮之本而夫子乃答云大哉問禮與其奢也寧儉喪與其易也寧戚因其問禮之本而有奢易儉戚之分非禮有本末歟先生曰孔子答門人之問每每不同各去其蔽爾或有非切要者唯林放問禮之本子曰大哉問以禮之本難言禮即人心之妙用奢易放逸則非道使放即儉戚而忽覺焉虛明澄一即太一即天地即四時即鬼神即經理三百曲禮三千無本無末匪異匪同匪有匪無不可度思矧可射思見誨語子夏問巧笑倩兮美目盼兮素以為絢兮子曰繪事後素曰禮後乎子曰起予者商也始可與言詩已矣絢文也巧笑美目之文不俟外飾以質素為文也孔子於是明質素之為本而曰繪事後素子夏稔聞夫子一貫之教故曰禮後乎疑不可以禮為後也文質一致也本末一貫也他日以子㳺本末之論為非即此意也子夏蔽在溺於文故孔子示之以質素子夏之論又髙焉夫子安得不是之曰起予者商也非子夏能發夫子之所未知謂能發夫子之所未言也子夏不為詩所拘則庶乎善觀詩矣他日子夏以有若似聖人欲以所事孔子事之曽子不可則子夏猶不無蔽汲古問子夏問曰巧笑倩兮美目盼兮素以為絢兮何謂也子曰繪事後素曰禮後乎子曰起予者商也始可與言詩已矣因觀衞人閔荘姜之詩止有巧笑倩兮美目盼兮而無素以為絢兮一句恐此詩之闕文何聖人又據以子夏之對而為起予耶先生曰碩人詩四章章七句若益素以為絢兮一句則八句矣他章皆七句又此章文勢不應繼此一句此疑當闕孔子答以繪事後素者謂繪畫之事後於素功質素為本也其㫖欲潜消子夏尚文無實之蔽子夏不領孔子之㫖而為大言如此則禮後乎言文與質一也無本末先後孔子於是因而善之曰起予者商也聖心虚明廣大一無意必見誨語子曰夏禮吾能言之杞不足徴也殷禮吾能言之宋不足徴也文獻不足故也足則吾能徴之矣杞宋二國文獻既皆不足無所徴驗則孔子何所攷而能知夏商之禮既無所攷又何所據而能言大哉禮言本於大一分為天地轉為隂陽變為四時生而為萬物行而為萬務為經禮三百曲禮三千父以此慈子以此孝君以此尊臣以此卑兄弟以此篤夫婦以此和是謂天則是謂帝則是豈以有文與獻而存無文與獻而亡近在人心本非外物賢獻知之愚衆惑之唯孔子自知自信故自能言但無文䇿可證無賢獻能證則庸衆必疑必不信也然則禮豈禮家之所能知祭如在祭神如神在此門弟子紀録之辭若夫孔子之心則知鬼神之實在也不止於如在何以明鬼神之實在知人則知鬼神矣知我則知彼矣人不自知我故亦不知鬼神季路問事鬼神子曰未能事人焉能事鬼問死曰未知生焉知死于以明死即生人即鬼神鬼神者無形之人人者有形之鬼神夫人之所以為人者以其神也神無形無形故無限量易大傳言範圍天地之化中庸言聖人之道發育萬物聖人與人同耳聖人先覺我心之所同然耳舉天下萬古之人皆能範圍天地發育萬物而人自不知也知人之神心無方無體無所不在則知鬼神亦無所不在孔子自信故亦信鬼神以為鬼神實在非意之也子曰闗雎樂而不淫哀而不傷此師摯之始亂洋洋盈耳之音也師摯能知其音不逹其道孔子能知其音又逹其道此樂而不淫即人之樂而不淫此哀而不傷即人之哀而不傷此不淫不傷之妙至矣哉至坦明至簡易從心所知自樂自不淫自哀自不傷自怒自不遷自懼自不懾人之本心自如此不昏不放則常如此㣲昏㣲放則不如此意起則昏意起則放子曰為禮不敬臨喪不哀吾何以觀之哉此惟指人心放逸之病至於子張祭思敬喪思哀其可已矣思敬思哀雖異乎不知恥者然亦偽已導學者為偽不可子㳺曰喪致乎哀而止此亦意説曽子曰吾聞諸夫子人未有自致者也必也親喪乎夫子發明人之道心如此端的亦異乎子㳺矣人之本心臨喪自哀臨祭自敬敬與哀乃道心之變化遷於物動乎意則昏矣肆矣子曰知者利仁深知仁之為美為利故好之好德不如好色未知仁之為美為利故也何思何慮之妙静虚純明如天地日月融融和樂無始無終如春風和氣此唯知者知之仁者安之子曰富與貴是人之所欲也不以其道得之不處也貧與賤是人之所惡也不以其道得之不去也君子去仁惡乎成名君子無終食之間違仁造次必於是顛沛必於是仁者欲惡與衆人同至於不以其道得之則不處不去則與衆人異志扵仁用力於仁則必不處不去自古知道者大不易得比一二十年覺者寖多子曰君子去仁惡乎成名勉學者用力於仁也蓋知者雖覺而舊習乆固未精未一唯純明無間輟始能盡仁知者所覺造次顛沛已無非妙用矣然蒙養未精一與已精一者不同此曰必於是者明精一也聖言一字不苟學者感聖訓明切罔極之恩何以報也子曰君子無終食之間違仁造次必於是顛沛必於是嗚呼聖言至矣造次顛沛始信不可置意必固我於其中始信忠信即我之道心始信涉河丈人出入風波之中不過忠信無他竒巧孔子使弟子志其事者此也子曰知者動惟得天下之至動斯可以言知及之惟吾心之喜怒哀樂造次顛沛如天地之變化四時之錯行而未始不寂然而後知知者之動而後知丈人出入于風波之中即仁即忠信學者觀孔子曰君子無終食之間違仁往往切意飲食之外自有所謂仁之道以此求仁却行而求前也不知夫舉匙施筴仁也咀嚼厭飫仁也别味知美惡仁也但於其中㣲起意焉則心始動始遷始不仁矣仁人心也人心清明澄然如鑑萬象畢照而不動焉互見訓語子曰我未見好仁者知仁者鮮好仁尤鮮既知而後可以言好不知則安所好仁人心也何知之難求仁於心外故難求仁於心内亦難心無實體安有内外㣲起意象輙昏輙迷意實非意象實非象直心直意實無内外變化萬状實無作止智者知之故得動中之妙無所似之托之樂水仁者不惟知之又能好之斯好非意斯好非為常静常明山或似之好仁固鮮知不仁而惡之者亦鮮何以明之仁既難知則不仁亦未易知不仁之粗者易知不仁之㣲者難知意象㣲起即為不仁意象㣲止亦為不仁此類無窮不可備述孔子絶四止絶學者四病意必固我無越四者病本不去禍流無窮衆蔽百惡皆自此出盡知不仁之病則不仁漸除仁道漸著矣顔子曰仰之彌髙鑚之彌堅蓋嘗自以為道如是矣又知以為如是者意也非道也既知以為如是者非道矣又知以為如是非道者亦意也非道也窮之而益逺測之而益深夫是以有彌髙彌堅之歎以為如是者皆未離乎意知其尤為不仁而惡之也又曰雖欲從之末由也已夫欲從未離乎意夫子之所絶而惡之者惡其不仁也惟顔子知夫不仁之病如此其㣲故他日獲至三月不違之妙用力於仁之力異乎他人之所謂力他人之用力乃意必固我之力故有不足用於仁之力乃不識不知之力故無不足蓋有之矣謂他人子曰有能一日用其力於仁矣乎我未見力不足者蓋有之矣我未之見也雖已聞道而未精未一奚可不用其力是力非思非為故孔子未見力不足蓋有之矣謂他人他人不知道用思為之力故有不足孔子得道道心無思無為而如日月之光無所不照故其力未見不足君子道心初明舊習未釋斷不可不用力未精未熟豈能遽絶思為久而精純冺然無際孔子曰用力其㫖甚明特其初不免於思為然亦至平至易過失之泯如雪入水道心發光如大陽洞照無擬議無漸次不可度思矧可斁思自然無力不足之患彼小人之中庸蕩然無忌憚者則以為無所用其力此學者之大患孔子教學者惟言仁曰知及之仁不能守之雖得之必失之仁則常覺常明如日月如水鑑如天地中庸曰力行近乎仁仁非徒知不行之謂果實核中之所藏曰仁此仁無思無為而能發生仁道亦然聖人正名百物而寓教焉其㫖㣲矣曽㸃詠歸之妙夫子所與而逮大杖撻曽子氣絶幾死則亦不用力之故也孔子曰我學不厭孔子猶用力而况於他人乎至於耳順從心所欲不踰矩則無所用其力見訓語子曰人之過也各於其黨觀過斯知仁矣説者曰黨偏也簡年六十四始省偏與黨相近而㣲不同黨者意好所向人心本清明動於意欲始有過知意欲之為過則知意欲之不作為仁矣仁者復其本心之清明如鑑如日月萬物畢照而未嘗思為也子曰人之過也各於其黨觀過斯知仁矣黨偏也動乎意則有所倚故曰黨倚則有過觀動意有倚有過則知不動乎意庸常平直虚明日用非思非為斯仁矣中庸矣大過易知小過難知知過不盡以過為仁見訓語子曰朝聞道夕死可矣子曰心之精神是謂聖精神虚明無體未嘗生未嘗死人患不自覺耳一日洞覺則知死生之非二矣則為不虚生矣見訓語子曰士志於道而恥惡衣惡食者未足與議也此心在道則不在物在物則不在道恥惡衣惡食是墮在事物中為事物移換未能格物而欲致之是無理也格物不可以窮理言文曰格耳雖有至義何為乎轉而為窮文曰物耳初無理字義何為乎轉而為理據經直説格有去義格去其物耳程氏倡窮理之説其意蓋謂物不必去去物則反成偽既以去物為不可故不得不委曲遷就而為窮理之説不知書不盡言言不盡意古人謂欲致知者在乎格物深病學者之溺於物而此心不明故不得己為是説豈曰盡取事物屏而去之耶豈曰去物而就無物耶有去有取猶未離乎物也格物之論論吾心中事耳吾心本無物忽有物焉格去之可也物格則吾心自瑩塵去則鑑自明滓去則水自清矣天髙地下物生之中十百千萬皆吾心耳本無物也天下同歸而殊塗一致而百慮天下何思何慮事物之紛紛起於慮念之動耳思慮不動何者非一何者非我思慮不動尚無一與我孰為衣與食必如此而後可以謂之格物格物而動扵思慮是其為物愈紛紛耳尚何以為格若曰今日格一物明日又格一物窮盡萬理乃能知至吾知其不可也程氏自窮理有得遂以為必窮理而後可不知其不可以律天下也子曰君子之於天下也無適也無莫也義之與比無適無莫非學而至者也君子之心本如此也豈獨君子之心如此舉天下人心皆本如此也本如此而或者蔽之故有偏倚有適莫若曰我欲如此我不欲如此吾方寸中窒矣礙矣安能惟義之從君子之心如太虚安得有適與莫也人心皆然識我之心則識君子之心見訓語汲古問子曰君子懐德小人懐土君子懐刑小人懐惠先儒謂君子安安而能遷小人則懐居矣君子以刑為體小人則惟利之從而又謂樂善惡不善所以為君子苟安務得所以為小人其説是否先生曰上之德政則一而懐之者不同君子懐其德又懐其刑以其不及無辜小人則懐其土得安土不擾故懐其惠見誨語曽子曰夫子之道忠恕而已矣忠恕之意正不必推大之深求之若曰忠譬則流而不息恕譬則萬物散殊皆未得曽子之意曽子見夫子之道只尋常忠恕之心便是故曰忠恕而已言不必外求只此已足且何以知其已足夫子之道窮之則無窮究之則難盡曽子何所見而謂盡在於此此非君子胷中洞徹無疑豈敢為此斷然之論向者曽子之有孝悌而已知事吾親而已他不知也事親之心自是事親之心與他人之心自是與他人之心斷不相似一旦聞夫子一貫之誨正觸此機忽通其礙向之二今之一也忠恕之心即吾孝友之心即吾事親之心也一而不二通而無間不可别擇漫舉一事言之即夫子之道何淺何深何内何外不曰孝悌而曰忠恕蓋曽子從其所通處言之使曽子縱言之則曰仁義而已矣亦可也曰禮敬而已矣亦可也曰和樂而已矣亦可也曰中而已矣曰正而已矣曰順而已矣亦可也曰洒掃應對而已矣亦可也曰事親從兄而已矣亦可也讀書不可只讀紙上語曽子曰夫子之道忠恕而已矣此語甚善子思曰忠恕違道不逺此語害道忠恕即道豈可外之以忠恕為違道則何由一貫或問吾道一以貫之而曰忠恕而已矣則所謂一者即仁否程正叔曰然此一字當子細體認一還多在忠上多在恕上曰多在恕上曰不然多在忠上纔忠便是一恕即忠之用此論殊為蔽窒既已謂之一矣何多何少體認兩字便見用意積力之状孔子未嘗教人體認惟曰一以貫之别無注脚曽子曰忠恕發明亦坦夷明白不謂後世學者穿鑿撰造至於此其病甚著夫子之道忠恕而已矣善求夫子之道者不求諸夫子而求諸吾之心夫子之忠恕固夫子之心也亦吾之心也天下同然者謂之心或者賤己而貴聖人平時妄慮紛紜惡習深固織織藩蘺複複限閾一旦語夫子之道固望而驚畏而遁慊然自以為不敢企及聞曽子之言曰忠恕而已固以為曽子姑以其淺者告之不然則夫子之忠恕必非常人之所謂忠恕也是不可不推而大之曰忠猶流而不息恕猶萬物散殊又曰忠則無我恕則無物嗚呼此夫子之道所以愈昏昏於天下乾坤易簡之理所以戛戛乎始返而為難善乎孟子之言曰道在邇而求諸逺事在易而求諸難又曰仁人心也可謂大明白而無隠情知堯舜之道無出於孝弟則知夫子之道無出於忠恕堯舜之道不出乎徐行後長之間夫子之忠恕固不出於衆人之日用衆人日用此心苟與人而誠孰非此忠苟待人以寛孰非此恕忠則忠直恕則平恕夫子之道坦然甚明無有餘藴謂之一貫信乎其為一貫何往而非此心何往而非此忠恕天得此忠恕而髙明地得此忠恕而博厚日月得此而明四時得此而行鬼神得此而靈萬物得此而散殊於天地之間人得此忠恕而為君臣父子兄弟夫婦長㓜人惟裂於其私囿於所見奪於其形執於其名斷斷然謂天地必不與我相似萬物必不與我一本心體之間其喜其怒其哀其樂與夫語黙意慮少壮衰老尚不得而一而况自身之外如天地萬物之紛錯又烏得而一略不思天地之所以施生運化者不可得而知日月之所以明四時之所以行亦不可得而知鬼神之吉㓙萬物之生生不窮飛鳴蠢動走伏濳躍者亦不可得而知人之能視能聽能言能動能思能慮能喜怒能哀樂能愛敬恤睦者亦不可得而知可以知則可以異不可以知則不可以異可以異則二不可以異固一也自夫不可以異者而觀之則天之氣地之形與萬殊之不可勝窮與人之位乎兩間皆同體而異形同機而異用如人之耳目鼻口手足而一身也如木之根幹枝葉華實而一木也順是而逹之曰仁曰義曰禮曰智曽子之謂忠恕又謂之孝子思之謂中庸又謂之誠逆是而行之則為不仁不義不禮不智為愚為小人亦曰不忠恕然而此私也非公也妄也非誠也曽子指其誠者而告人故曰忠恕孟子指其全體而告之故曰仁人心也人雖甚不肖忠恕之心蓋每發見是心之發不由矯激不由要譽悠然出於其天而不由乎人此固夫子之大全天地之大用堯舜之大德而非曽子一人之論也人皆有此心皆聞曽子之言往往直信而不疑者千百無一二若信而忠以為未必然者皆是也此非曽子之言猶有隠乎爾也指金而告人曰此金也識者固信不識者固疑然則奈何曰夜半爨火息㓕饑者索食對燭而坐不知燭之為火也則亦終饑而已忠恕之論燭喻也子曰參乎吾道一以貫之曽子曰唯子出門人問曰何謂也曽子曰夫子之道忠恕而已矣天地内外人物有無變化萬状未始不一不必言貫以曽子未覺姑言貫以啓之曽子既唯既覺悟此心日用無非此道與人忠信恕人如己此道也日用見於忠恕者多故曰忠恕孝此道也弟此道也禮此道也樂此道也不必貫而本一也中庸篇曰忠恕違道不逺者子思記言之訛歟見訓語先生問汲古曰忠恕二字曉得否汲古對曰忠以盡已恕以及人此合體用而言只是一道汲古又問曽子曰指忠恕為夫子一貫之道則忠恕即道矣至中庸却謂忠恕違道不逺如何先生曰曽子言夫子之道忠恕而已矣此語甚善子思言忠恕違道不逺此言未安忠恕即道豈可外之以忠恕為違道則何由一貫一貫是一片無間斷汲古謂易云德不孤者以其敬義之立也語曰德不孤者以必有隣未曉此所謂德不孤者如何先生曰人心之善謂之德此心天下之所同同然之機翕然而應衆所共服苟動乎意則邪枉而民不服子曰為政以德譬如北辰居其所而衆星拱之又曰君子之德風小人之德草草上之風必偃又曰德之流行速於置郵而傳命直心感動之妙如此互見誨語子㳺曰事君數斯辱矣朋友數斯疏矣數生於放心心苟不放逸日用常在不識不知中安得有繁數之事事君與朋友而數雖出於忠未離私慾見訓語汲古問子貢問曰賜也何如子曰女器也曰何器也曰瑚璉也未逹聖人何以取其器質之美先生曰明堂位云夏后氏之四璉殷之六瑚周之八簋皆黍稷器也子貢逹於事理而未逹其道故不及君子之不器汲古又問子曰君子不器此言君子之廣大無方非拘於一用是否先生曰器則可名生於有意無意必固我則不器先生曰子使漆雕開仕對曰吾斯之未能信子説汝曉此否汲古對曰漆雕開自以為其學未能見信於人未可以仕故夫子喜其知己而篤學先生曰漆雕開可以仕而不仕故子使之仕夫聖人以為可以仕則仕異乎子張之干禄仲弓子路之為季氏宰矣乃曰吾斯之未能信唯曰斯者以所覺不可信而言也曰道曰德則可得而言而非漆雕開之所覺孔子以覺為知及之又必仁能守之漆雕開雖已覺此不可容言之妙可曰知及而用力於仁蒙養之功未至純明雖顔子三月不違而三月之外亦或違雖不逺復終未純明漆雕開未自信其純明歟唯曰未信不復詳言䝉養之妙非思非為略言即泯不可度思矧可射思是宜子説互見誨語夫子之文章也性也天道也其名言不同而一物也而子貢以為三又以文章為可聞以性天道為不可聞是安知可聞之即不可聞不可聞之即可聞也哉故夫子曰二三子以我為隠乎吾無隠乎爾吾無行而不與二三子者是丘也羣弟子率求夫子之道於日用之外率以不一之見見夫子夫是以得其門者寡矣天地間何物不一人自不一起思起意絶然殊異不知一貫無二季文子三思而後行子聞之曰再斯可矣張横渠以為聖人深美之辭若曰再斯可矣况能三耶所以明夫思之可貴所以明夫思之不可不深曰思曰睿睿作聖曰思無邪曰思之弗得弗措也周公仰而思之夜以繼日何止於三而已乎又曰思之一門其大矣哉横渠之論甚有味乎其言但聖賢立言不必以一定論執言語以求聖人之道非但聖人所望於學者横渠發揮思之一義盡美盡妙而不可以此論再斯可矣之㫖聖賢之言有時如此論有時乎不如此論要當㑹聖賢之意不可執聖賢之言况季文子之思乃每事必三思而後行思曰睿終身思可也思之弗得弗措終年思可也周公思兼三王以施四事夜以繼日思之可也至於日用之事苟每事必三思而後行則過矣滯矣不通矣隨遇輙應而不思固不可思之思之又思之每事如此亦不可隨遇輙應謂之太簡每事三思謂之太詳太簡謂之不及太詳謂之過太簡未是太詳亦未是太簡則有簡之意太詳則有詳之意皆非無意無必大中至正之道也是道也初非絶思慮之謂得此中雖終日思慮終年思慮不可謂動心也失此中雖終日不思慮終年不思慮不可謂不動心也周公日夜以思乃聖人之道原壤登木之歌乃反而用之智者知其動心也聖人扣之以為老賊此非得聖人大中之道未易辯此見訓語子曰寗武子邦有道則知邦無道則愚其知可及也其愚不可及也其知有才智者或能之其愚非有道者不能有一㸃動心處便不能愚也故寗武子之不可及至於愚乃見子在陳曰歸與歸與吾黨之小子狂簡狂是過簡是不及狂是為簡是不為狂是動簡是静狂是進簡是止過非此道不及亦非此道為非此道不為亦非此道動非此道静亦非此道進非此道止亦非此道此道甚坦夷惟人動其心斯失之矣子曰巧言令色足恭左邱明恥之丘亦恥之匿怨而友其人左邱明恥之丘亦恥之聖人何為深恥乎此人皆有此良心有此質直心此質直心即道心而合也昏迷顛倒馳放不返為詐為變為巧為機為鬼為魅故聖人深惡深羞之或者曰此聖人深誅小人變詐之心耳未可遽謂發明道心道心恐不止於質直而已是不然獨不聞聖人曰主忠信忠信之心乃大本使聖人於此姑言其淺者則其深者為如何聖人之言無淺深無本末吾聖人之道所以至于今不明于天下正以學者不知孝弟忠信即天下大道夫是以聖人之道往往以平易見卑於髙明之士而異端空虚寂滅之論滿天下孔子曰莫我知也夫又曰知我者其天乎言人不我知也見訓語子曰十室之邑必有忠信如丘者焉不如丘之好學也觀聖人此語益信聖人之道不為難也夫子亦嘗曰主忠信是忠信聖人之主本今十室之邑即有忠信如聖人則苟誠實無詐偽即已得聖人之主本但以不好學不能通逹耳然則聖人之道朴實無詐偽而已豈不甚易觀此則忠信之士不可不自信然此自信亦復難常以語人人終未信非直不信終不無疑者亦多矣固有天資純朴確誠無偽宛然有聖人之質而自不知良可惜哉子曰雍也可使南面仲弓問子桑伯子子曰可也簡仲弓曰居敬而行簡以臨其民不亦可乎居簡而行簡無乃大簡乎子曰雍之言然由道心而發其居自敬其行自簡居不敬則慢行不簡則擾居敬行簡乃道心之常意念㣲作即有㣲偏君子不器以其無意無必無固無我故人不得名之以器子桑伯子則為孔子所名故孔子亦以此㣲貶之使不可以簡名則善矣敬簡不偏本於無意好惡㣲偏人即得以名之哀公問弟子孰為好學孔子對曰有顔囘者好學不遷怒不貳過知道者有之好學者難得如閔子騫冉伯牛仲弓與夫曽子諸賢不可謂無日至月至至於三月不違非顔子不能顔子縱有怒過怒不遷而旋止過不貳而旋釋意念㣲動便自寝息他人豈無志於學者往往不能旋止旋釋怒過以暴露而不可掩乃徐救之或自以為小過無傷於義姑縱而遲之此皆怠惰之故雖已至於道者猶有此病則聖人謂獨顔子一人好學他人不與信乎他人不可得而與也此病惟曽閔諸公知之未至於道者亦不知怒已動於心矣顔子何為而能不遷過已作於心矣顔子何為而能不貳以顔子之心本無怒動乃有怒顔子之心本無過動乃有過今顔子既知其動而改矣則復不動如故不動則尚不知心之為心孰為怒孰為過曽子曰江漢以濯之秋陽以暴之皜皜無際蕩蕩無涯融融無止是中安得有怒與過也孔門諸賢孰不願學何獨稱顔子好學日至者終一日不動於意純明精一是為至道月至者終一月如此亦非衆人之所能矣猶不得謂之好學盖比於三月不違仁者勤惰有間矣好學之所勤非思慮之所到非繼續之可言本一也本不動也本清明也此學日至月至者之所共知惟弗如顔子之勤爾孔子學不厭亦此勤也子華使於齊孔子不與之粟者君子周急不繼富也冉子不知此道乃為其母請粟孔子亦不以其不當與而固執不可之義蓋冉子來請又生變通之義焉與之釡釡六斗四升亦兼示不當與之義冉子又不悟而請益孔子亦不執不與之義又益之以庾庾十六斗既不深絶冉子之請又兼明不當與之義此與堯試鯀同道雖明知鯀方命圮族不可用以僉岳竝薦諭之不從而姑從衆於戯此堯之所以如天孔子所以亦如天也冉子擅與粟五秉孔子亦不怒唯曰君子周急不繼富亦略明大㫖而已於戯孔子真如天矣冉求曰非不説子之道力不足也子曰力不足者中道而廢今女畫學者常情往往多與冉有同而孔子斷然不以為力不足以為自畫止者何也斯道無不通人自阻礙斯道無思無為人自起意意起則礙矣道本無所礙孔子所謂力不足者非謂學道者於斯道之中有力不足也謂徒步逺行而力不足則中道而廢負任而行而力不足則中道而廢謂此類也夫斯道忠信而已矣何思何為何阻何礙而曰力不足乎足與不足皆人心自作此見道初不如此不作足不足之見則人心之靈未始不一貫非力不足而自不學者謂之畫地而曰止於此吾不進也學者多此類也唯聖人則不畫日月至者亦不畫餘皆畫也見訓語學道安得有力足不足足與不足皆人心自作此見道初不如此不作足不足之見則人心之靈未始不一貫冉有乃自畫汲古問學者用力果有不足處否先生曰學道安得有力不足足與不足是人心自為之如冉求曰非不説子之道力不足也故孔子曰力不足者中道而廢今汝畫汲古問用力於仁又如何先生曰用力於仁無思無為精明純一子曰誰能出不由户何莫由斯道也聖人如此明告不知學者何為乎不省視聽言動者道也俯仰屈伸者道也寐如此寤如此動如此止如此徒以學者起意欲明道反致昏塞若不起意妙不可言若不起意則變化云為如四時之錯行如日月之代明故孔子每每戒學者毋意子曰誰能出不由户何莫由斯道也聖言如此明告不知學者何為乎不醒日用云為無非變化無非斯道視者斯道所視之形色亦斯道聽者斯道所聽之音聲亦斯道思者斯道所思之人情事理亦斯道自清濁未分以至于既分隂陽交而四時行百物生皆斯道動静有無皆斯道不勞思索念念皆妙曰天曰地曰人曰物曰事名謂不同爾何者不妙學者惟毋動乎意見訓語野不可史亦不可何故野偏史亦偏偏皆未離乎意惟文質彬彬庶乎無意子曰人之生也直罔之生也幸而免此直非剛直不温和之謂乃直正之直子又曰一物失理亂亡之端又曰苟違此道民叛如歸人惟覩不直而生者滿天下故翫忽以未必然而妄言妄行者多略不思聖人曰此乃幸免爾其不免者皆不直也聖言無不驗天下後世當深思幸免警告切至之㫖孔子曰知之者不如好之者好之者不如樂之者自古學者幾千萬人解釋論辯自以為知之矣而實不可以為知此知不屬思慮有思慮不可以言知知者孔子謂知及之好如顔子好學日至月至者可以言知之不可以言好學不如好之者專為日至月至者發言其怠也若孔子則好而樂之矣子曰為之不厭亦好也知斯好好斯樂好與樂孔子謂仁能守之互見訓語孟子曰人皆可以為堯舜而孔子曰中人以上可以語上中人以下不可以語上何也蓋孔子之言非謂中人以下不可以為堯舜但其氣質昏甚難以語上不可云者難之之辭也又曰唯上智與下愚不移亦非謂其斷不可移也特甚言下愚之不可告語不肯為善亦猶上智之不肯為不善故曰不移然又曰性相近習相逺孟子亦曰堯舜與人同耳又曰聖人先得我心之所同然耳孔子又曰心之精神是謂聖然則所謂中人以下者自昏自迷耳一日内明忽開方悟吾性本與聖賢同殊不相逺心之精神是謂聖乃孔子所以告子思此可謂聖人至言而論語不載首篇乃多載有子之言有子乃曽子之所不可者則記論語者固不足以知聖人之至言也見誨語慈湖遺書巻十
