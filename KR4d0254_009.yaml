body:
  text: 慈湖遺書卷九宋楊簡撰家記三論春秋禮樂春秋於魯桓書至至者以禮至于廟也春秋之時典禮大壞時君能以禮至于廟者無幾史書之聖人無敢削焉是知也說者謂危之鑿矣左氏近之矣而未有以明其為道魯桓天下之大惡也何道之有蓋百姓日用而不自知也聖人如天焉無私好無私惡魯威大惡聖人已著其罪所以明其非道非私惡也至於至廟一節猶知遵禮之善猶知有祖廟也雖其中心之藏未必果出於誠而其事則禮也聖人知所是也是者是道非者非道春秋不以善掩惡不以惡掩善終不以威公彌天之惡掩其毫毛之善以善者道之所在聖人不得不明之也春秋借二百四十二年之行事以明斯道非為春秋之君臣設也為萬世設也春秋為明道而作所以使天下後世知是者是道非者非道而諸儒作傳不勝異說或以為尊王賤霸或以為謹華夷之辨或以為正名分或以為誅心凡此固春秋所有然皆指其一端大㫖終不明白子曰吾志在春秋于二百四十二年擾擾顛倒錯亂中而或因或作是是非非靡不曲當所是是道所非非道如四時之錯行如日月之代明皆所以明彰大道古諸侯無私史周官小史掌邦國之志費誓周書漢汝江沱之詩編諸二南自晉之乘楚之檮杌魯之春秋三史作而諸侯有私史矣孔子因之道之變也春秋左氏傳襄四年穆叔如晉一章與國語大同小異其異為義不甚同大戴記與家語言等篇亦大同小異義亦大殊以是知盡信書不如無書書難盡信于是甚明春秋人物多賢而吳季子晉成鱄其言簡尤心敬焉季子請觀周樂使工為之歌至歌頌曰至矣哉直而不倨曲而不屈邇而不逼逺而不擕遷而不淫復而不厭哀而不愁樂而不荒用而不匱廣而不宣施而不費取而不貪處而不底行而不流五聲和八風平節有度守有序盛德之所同也季子非有道安能為此言成鱄曰詩曰唯此文王帝度其心莫其德音其德克明克明克類克長克君王此大國克順克比比于文王心能義制曰度德正應和曰莫照臨四方曰明勤施無私曰類教誨不倦曰長賞慶刑威曰君慈和遍服曰順擇善而從之曰比經緯天地曰文簡甚有味乎應和之莫照臨之明經緯天地之文也秦穆公欲立重耳穆公之心本善也公子縶以利說之而移晉夷吾欲從兄于翟夷吾之心本善也冀芮以利說之而移茲利也乃害也韓原之戰穆公幾為韓簡所止狥縶之說以至于此也夷吾雖以不正得國身陷于惡子不免戮害孰甚焉汲古問春秋經有書王正月有不書王正月此是略闕文否先生曰十一公之元年皆書王正月唯桓公三年而後不書王定公元年不書正月而書王三月汲古云未逹其義先生曰不書者非脫闕也孔子削之也子曰知我者其惟春秋乎罪我者其惟春秋乎即此類也蓋春秋其甚嚴而亦甚寬魯桓弒君周王當誅之至三年而王不能誅始不書王魯昭公之見逐于三家薨于乾侯逐雖輕于弒既七年矣故定公元年不書王正月明王不能正三家之罪而討之汲古見莊子云仲尼曰天下有大戒二其一命也其一義也子之愛親命也臣之事君義也事其親者不擇地而安之孝之至也事其君者不擇事而安之忠之盛也汲古謂忠孝名雖異而實無異如以有二言之恐非聖人語孔子曰資于事父以事君而敬同又曰以孝事君則忠又曰君子之事親孝故忠可移于君莊子以一命一義而分忠孝以為聖人語誠難取信先生曰忠孝一心無惑于異論如周曰以無為首又曰物不勝天久矣是皆自紛紛于意慮之間豈知乎孔子曰天下何思何慮又曰汝神將守形形乃長生既諄諄言無物之妙而又曰守形陋矣又自矛盾矣汲古問昭公十九年夏五月戊辰許世子止弒其君買以進藥致禍何春秋書弒其君左氏曰許悼公飲太子止之藥卒太子奔晉書曰弒其君公羊曰曷為加弒譏子之道不盡也穀梁曰弒正卒也正卒則止不弒也何三傳皆言止不弒君先生曰禮醫不三世不服其藥如君有疾飲藥臣先嘗之親有疾飲藥子先嘗之許止不慎不敬輕果進藥致此大禍雖奔而棄位未踰年而卒足明其心而春秋猶加之以弒名者所以明道也夫人心自善自清明謹重必不輕進其藥于君親惟其意動而昏不敬不謹故輕進藥于君親而不免此禍許止雖未踰年而死亦不足以贖弒君之罪者孔子不削欲使後世深思力索求免此罪必至于復吾本有之道心則靜重敬謹自備萬善自絶萬過自信其可以免矣見誨語曲禮曰無不敬儼若思安定辭安民哉人心即道不假外求放逸慢易則失之故曰毋不敬毋不敬則常清常明儼然若有所思而非思也無思非冥然而昏如日月無所不照而非思也孔子不知老之將至皓皓乎不可尚已純然渾然即此妙也顔子三月不違仁即此妙也月至者終月如此日至者終日如此老子曰我獨怕兮其未兆未兆者念慮之未形也學者求斯須思慮暫止不能而老子能久持之曽子戰戰兢兢亦入此也儼若思未言之時也至發于言辭亦安亦定則動靜純一其德全矣故可以安民見訓語小戴曲禮篇曰太上貴德其次務施報施報非德乎又曰博聞强識而讓敦善行而不怠謂之君子戴不思孔子之言曰行有餘力則以學文乎行為先文為後天下之常理聖賢之常言而戴先文而後行蓋戴以文為本務其心不王于善行是謂本以文行雜之正猶漢宣帝曰本以霸王道雜之大抵自漢以來天下風俗本以利而雜以義歷千載而不變皆戴之徒助成其俗也此無他人欲盛于中度實行非已所長姑從其所長于博聞强識而尚之人之常情多言已所長爾論語曰子以四教文行忠信此非孔子之言亦非德行諸賢之言也至于戴記之博聞强識益陋益鄙矣論語所謂文者詎如是乎夫聖孔子不居而戴以聖自名其矜大昏暗之狀備見于此禮曰死而不吊者三畏壓溺畏死于兵壓死于巖墻溺死于水非不弔也不忍為吊辭不忍言之也使孔子果死于匡則亦不可吊乎屈原之死亦不可吊乎而先儒有謂直賤之而不弔此乃固陋執言失意人心之所不安也禮在人心故雖先王未之有而可以義起者義生于人心之所同然也户開亦開户闔亦闔有後入者闔而勿遂此禮也豈生于人心之外乎智者即心而言禮愚者自外而言禮曰禮自外作者非聖人之言也以五禮防萬民之僞謂是也見訓語伯髙死于衛訃於孔子孔子曰吾惡乎哭諸兄弟吾哭諸廟父之友吾哭之廟門外師吾哭諸寢朋友吾哭諸寢門之外所知吾哭諸野于野則已疏于寢則已重夫由賜也見我吾哭諸賜氏遂命子貢為之主猗與聖哉惟得道乃能爾變化萬狀皆道心之為而不知其所自來也竊笑夫好古不通之士錙銖比方分寸量度其何以應方來無窮之變哉孔子適衛遇舊館人之喪入而哭之哀出使子貢脫驂而賵之子貢曰於門人之喪未有所脫驂脫驂于舊館無乃已重乎孔子曰豫向者入而哭之遇于一哀而出涕吾惡夫涕之無從也小子行之于是窺見聖人日用變化之妙即天地四時不無愆陽伏隂之妙是謂大德則無踰也小德則出入可也子夏謂大德不踰間小德出入可也是殆聞夫子之誨而微失其辭德本無小大小大之言因學者而隨施初無實意也天地變化何大何小子曰小德川流大德敦化是蓋孔門誠有是論然小大之論因人而遇施謂其果有小大不可也謂其果無小大亦不可也孔子曰無可無不可此誠有不可以言語解釋之妙不可以心思測識之㫖孔子自謂莫我知也夫比世好古學禮之士觀脫驂于舊館之事使不知其為孔子必以為輕重失倫已所不為今雖知其為孔子亦莫喻孔子之心往往以為流傳之失實夫流傳之訛妄者有之矣如謂子鼓琴見猫取鼠欲其得之遂有幽沈貪得之音此則訛妄矣如謂堯瞽瞍北面朝舜孔子曰殆哉此則訛妄矣脫驂之事非訛也無妄之疾勿藥有喜孔子曰無妄之藥不可試也利欲之過內訟可也脫驂之過隂陽寒暑之為偏也聖人日用不識不知純純皓皓不知老至遇于一哀而脫驂天道之變也不可度思矧可射思而後學以輕重多寡觀之陋矣見訓語檀弓下篇云祭祀之禮主人自盡焉爾豈知神之所饗亦以主人有齊敬之心也又子遊曰始死脯醢之奠既葬而食之未有見其饗之者也自上世以來未之有舍也為使人勿倍也嗚乎鬼神之道不如是也孔子曰未能事人焉能事鬼蓋曰知人則知鬼矣以形觀人則人固可見以神觀人則人固不可見也神者人之精形者人之粗孔子曰心之精神是謂聖神無方無體範圍天地發育萬物無所不通無所不在故孔子之祭知鬼神之實在而羣弟子觀孔子之祭時精神以為如在也今子遊以為未見其饗之是求鬼神之道於形也死生一致人神一貫此孔子之自知非子游之所知而况於戴聖乎見訓語檀弓下篇君臨臣喪以巫祝桃茢執戈惡之也此非聖人之言夫君臨臣喪親愛之心也人不能皆聖人聖人則無畏常人安能皆無所畏桃茢執戈所以安夫人君之心也聖人不敢盡去此禮慮夫畏心之勝并與夫臨喪之禮而不行也巫祝所以接夫鬼神者桃鬼之所畏茢萑苕蓋曰掃不祥鬼亦惡鐵戈益足以抗之矣聖人安以此為禮因人情而為故有此謂畏之猶可也而曰惡之豈君臨臣喪之本心哉記者誤釋賊其君所以親愛其臣之心夫聖人不得已而存是禮記者又從而增益其不善之心奚可見訓語魯悼公之喪季昭子問于孟敬子曰為君何食敬子曰食粥天下之逹禮也吾三臣者之不能居公室也四方莫不聞矣勉而為瘠則吾能毋乃使人疑夫不以情居瘠者乎哉我則食食記者記此蓋有是敬子之意是啓人臣無君之心也不可以為訓學者斷斷乎不可讀非聖之書孔子殁邪說又作先儒莫能辨其非致國家行其書列于六經殊為巨害有子與子遊立見孺子慕者有子謂子遊曰豫一不知夫喪之踊也豫欲去之久矣情在于斯其是也夫子遊曰禮有微情者有以故興物者有直情而徑行者戎狄之道也禮道則不然人喜則斯陶陶斯咏咏斯猶猶斯舞舞斯愠愠斯戚戚斯嘆嘆斯辟辟斯踊矣品節斯斯之謂禮人死斯惡之矣無能也斯倍之矣是故制絞衾設蔞翣為使人勿惡也始死脯醢之奠將行遣而行之既葬而食之未有見其饗之者也自上世以來未之有舍也為使人勿倍也故子之所刺于禮者亦非禮之訾也嗚乎非聖之言殊為害道直情徑行戎狄之道也放肆無禮固不可而子遊言禮於心外唯曰微情曰故興物不言此心本有之正謂人死斯惡之矣此謂他人則可謂其子則不可孔子曰人未有自致者也必也親喪乎人雖至不肖其喪親也哀痛略同而子遊曰斯惡之矣誣矣夫人皆有至孝之情而子遊誣之以為死而惡之是奚可是奚可設蔞翣所以飾也為使他人之勿惡猶之可也若夫絞衾所以愛之非謂他人而設行人子哀痛忠愛之心而已矣聖人因人本有忠愛切至之心而為之節文故禮非自外至人心之所自有也至于又曰無能也斯倍之矣其誣汚人子之孝心滋甚始死之奠朝奠夕奠殷奠啓奠祖奠遣奠虞祭接祭卒哭祭祔祭練祥祭禫祭皆人子篤愛之誠見諸禮文者如此亦非自外至也亦聖人因人心而為之節也至于又曰未見其有饗之者也噫其甚矣孔子曰未知生焉知死未能事人焉能事鬼生死一人鬼一孔子未嘗言無鬼神而子遊敢于言無鬼神是奚可人惟不知生故不知死不知人故不知鬼神人寢不離床而夢登天夢之千里之外豈七尺之軀所能囿哉人執氣血以為己執七尺以為已故裂死生判有無殊人鬼而不知其未始小異也不知其未始不一也孔子曰夫孝天之經地之義又曰禮本于大一分而為天地轉而為隂陽變而為四時列而為鬼神逹于喪祭射御冠昏朝聘又曰吾道一以貫之孔子祭如在知鬼神之實在記者無以著孔子誠恪之心故再言之而子游以為未有見其饗之者也是奚可是奚可衛有太史曰柳莊寢疾獻公曰若疾革雖當祭必告再拜稽首請于尸曰有臣柳莊也者非寡人之臣社稷之臣也聞之死請往不釋服而往遂以襚之與之邑裘氏與縣潘氏書而納諸棺曰世世子孫毋變也檀弓下篇具載如右無譏焉斯足以著衛獻公好賢報忠之心矣簡初亦為之起敬而無疑他日讀之乃覺其非道似是而非不可以無辨洪範曰無有作好遵王之道獻公深感柳莊之弭禍念之不忘故至于此而非大公之道也非禮也似善矣而私也作好也柳莊雖賢臣所祭則君也臣也當祭而廢者唯天子崩後之喪爾臣攝其事則君薨夫人之喪亦廢不聞卿卒而廢也曽子問諸侯旅見天子入門不得終禮廢者孔子曰后之喪爾不聞以公卿之喪而廢也公大賢盛德猶不以其喪廢禮而况于當祭乎禮所本無而預戒之使當祭必告私也不釋服而往異乎易羔裘𤣥冠之禮矣遂以禭之與之邑亦可怪不可少緩乎知孔子不以車為伯魚顔子之椁則大道清明人欲消釋非禮之禮不足以動其心矣襄公朝于荆康王卒荆人曰必請襲魯人曰非禮也荆人强之巫先拂柩荆人悔之荆與魯皆非禮檀弓篇不必記可也記者蓋有不平荆人之强魯以非禮亦快魯以巫祓殯足以挫荆人之心也嗚呼衰世人子所以事其君治其國者多此類不能輔君以道興其國家而使朝楚徒求勝于末節亦可羞矣亦危矣季子臯葬其妻犯人之禾申祥以告曰請庚之子臯曰孟氏不以是罪豫朋友不以是棄豫以吾為邑長于斯也買道而葬後難繼也且既無葬可犯人禾之禮而不庚之是子臯之過也記者既不明言其非而卒記難繼之說是殆許之也檀弓記者衰世之士禮樂浸廢之論也載哀公妻我之言載容居不敢忘其祖之言皆不明言其非可以勿記而備記徒啓後世廢禮之端又記軍有憂赴車不載櫜韔意示將報也嗚呼此豈先王典禮舜命禹征有苗苗逆命班師振旅其載櫜韔也必矣衰世所為遂著為禮此甚不可魯莊公之喪既葬而絰不入庫門士大夫既卒哭麻不入此亂國之為也檀弓記焉而不言其非禮則後世將有倣而為之者矣今削之慶父弒子般閔公與士大夫不敢申其哀懼慶父之不悅也申哀盡禮則不悅慶父矣閔公畏禍而不絰亦卒不免絰麻于庫門之外者畏魯人之公論也不敢以絰麻入畏慶父也曲禮檀弓多言喪禮頗合孔子所重民食喪祭之意重喪祭禮其感動人之善性也易喪祭者斯人天性之發于文為而先聖王因為之節制者也見誨語訓語月令孟春行夏令則雨水不時草木早落國時有恐行秋令則其民大疫焱風暴雨總至藜莠蓬蒿竝興行冬令則水潦為敗雪霜大摯首種不入月令此類衰世之文也衰世君昏政亂不知唐虞三代盛世初無是事孔子曰聖人有國日月不食星辰不悖河不滿溢川澤不竭古者風不鳴條雨不破塊今月令云云是使衰世君臣安于衰亂不復反身修省謂月令所著乃古之常非政之疵也豈不大誤後世耶凡月令此類宜削見訓語月令真秦人之書盡斂君臣之職而總之天子天子之職當中心無為以守至正羣臣各盡其職事之大者則請于上而行之何至事無小大一命于天子秦尊君卑臣罷侯置守斂天下之權而盡總之其弊至是為天子者亦勞矣安能中心無為以守至正三代有司馬無太尉太尉秦官仲冬之月農有不收藏積聚者馬牛畜獸有放逸者取之不詰此啓人盜心載季秋為來年受朔日真秦書也文見吕不韋春秋子游問曰喪慈母如母禮與孔子曰非禮也古者男子外有傅內有慈母君命所使教子也何服之有魯之有司亦曰古之禮慈母無服而小記言為慈母之父母無服是為慈母有服子夏之傳喪服也亦曰慈母如母傳曰妾之無子者妾子之無母者父命妾曰女以為子命子曰女以為母若是則生養之終其身如母死則喪之如母貴父之命也子夏所傳又與孔子不同蓋未聞孔子之言故為俗禮作傳孔子之射於矍相之圃也使子路執弓矢延射曰賁軍之將亡國之大夫與為人後者不入其餘皆入然則為人後者得罪於先聖如此而子夏傳委曲而為之說何也道之不明于天下也久矣事慈母如母非道也父命為子母非正命也從父母之命焉得為孝乎子夏隨俗為說孔子固嘗鄙之曰女為君子儒母為小人儒子夏非知道之士後世不宗本孔子之訓而雜用俗習之說不知子夏之說而尊信之蓋非聖人則多溺私情多違公道故世傳喪慈母如母之禮今又載之國法嗚呼道之不明也久矣孝道不明人心滋亂幸有先聖之言在鄭康成必欲合孔子子夏之言為一故為孔子所言指國君之子康成好牽合衆說不知孔子初未嘗言大夫士之慈母異禮姑舉君家餘可類通况父母亦稱嚴君子夏委曲為父命為母子之說乃愛妾之私情非天下之公道子夏所謂喪服傳害道者良多不可不削以釋人心之惑復人心之正小記亦有可削者曽子問曰卿大夫將為尸于公受宿矣而有齊衰內喪則如之何孔子曰出舍於公館以待事禮也鄭康成云吉凶不可以同處正義云待事畢然後歸哭二說皆未安禮必明其義鄭徒曰吉凶不可同處不本諸人心非義之正夫有君喪服於身尚不敢私服以類通之則卿大夫為尸於公既受宿不敢廢為尸之事宜也出舍于公館者患哀情之亂齊敬也待事者待祭日已為尸之事也齊衰不可比於君父故雖內喪不廢尸事惟聖人能辨微决疑文王世子曰樂所以修內也禮所以修外也禮樂交錯于中吁聖人之言未嘗有此唯曰吾道一以貫之又曰豫一以貫之未嘗裂內外如斯辨截不通也樂者吾心之和順禮者吾心之等節無二心也所謂交錯者何哉簡每見學者多不知道意慮萬狀不知其未始不一也見訓語文王世子篇曰凡語于郊者必取賢斂才焉或以德進或以事舉或以言揚曲藝皆誓之以待又語三而一有焉乃進其等以其序謂之郊人逺之於成均以其爵於上尊也鄭注曰郊人賤技藝殊未安夫所謂三者有德進焉何得以技藝賤之况賢能之書道藝在其中王再拜受之登于天府三代之制未嘗賤藝鄭强加技一字形容藝之賤蓋不明逺之之意逺之之意謂未及語姑誓而教之故曰郊人明未登于賢能之書爾非賤其藝也且其為言亦未當聖人之于人無所不敬愛惟有罪乃逺之郊人方教而進之不當言逺之六卿在郊野卿大夫考德行道藝而興賢者能者又曰立太傅少傅以養之欲其知父子君臣之道也太傅審父子君臣之道以示之吁斯言似是而非雖正而不通父子君臣固其大倫而道無不通斯言使人雜而不一曰示之則意在于事不啓人之心又曰師也者教之以事而喻諸道者也皆似是而非與周禮師氏保氏曰德曰道同而其㫖異是皆求道于外不知人心即道孟子于齊宣王曰是心足以王矣魯哀公曰是非吾道也吾一聞于師也孔子曰君行道矣公曰道耶子曰道也聖賢皆啓人本心之善故人心易明記者之說無益于人徒爾惑人唯道後學同人于迷而不知其非此禮記之言有是有非而後世一尊之今以為經以此取士違爾者黜故學士大夫千載一律意說紛然道心滋蔽吁可痛矣知其蔽者有幾又曰設四輔及三公不必備惟其人語使能也三公坐而論道經邦燮理隂陽當尊而禮之而曰使能亦不敬矣文王世子篇首叙文王所以事王季武王之所以事文王者善矣餘言禮事亦多善惟以意說厠其間則有不善前已辨數端後又曰有司告以樂闋王乃命公侯伯子男及羣吏曰反養老幼于東序終之以仁也是故聖人之記事也慮之以大愛之以敬行之以禮修之以孝養紀之以義終之以仁又曰古之君子舉大事必慎其終始吁仁道之難明也久矣學者無輕言之孔子言仁豈曰惠而已哉今論語一書具在學者能通之者有幾孔子曰若聖與仁則吾豈敢此雖謙辭亦足明仁道之大矣此止以養老幼言仁亦不知仁矣仁如桃有仁杏有仁梅有仁寂然無思為而能發生知此之謂智常明而不昏謂之仁由是而日用萬變無不中禮謂之聖此可謂大矣豈思慮之所及始終一道大小一道此曰大事則謹其終始徒亂後學文王世子篇曰若內豎言疾則世子親齊𤣥而養既夕禮記養者皆齊夫𤣥冠𤣥端固齊服而親疾必𤣥者忌素也非齊也親有疾子憂懼方興何暇齊耶因𤣥而曰齊乃禮家不知道者溺心于文為之曲失其本心者也此當削齊字庶不壞人心不損孝德聖人復起當不易斯言士喪禮雖本于孔子而既夕禮乃為别篇此又其記斷非孔子之言汲古問記曰政者君之所以藏身也未曉政何以藏身先生曰聖人言此政即禮也故曰禮者君之大柄所以治政安君也夫天生蒸民有欲無禮則亂而君據其崇髙富貴豈容廢禮以危其身周以禮廢故衰魯以禮廢故亂惟禮行義明而人心安于禮義乃有尊君敬上之心無犯分干正之意故謂政者君之所以藏身也經曰安上治民莫善于禮見誨語古列聖之于禮器有不說之至教焉而諸儒莫之知也犧尊有沙牛之象焉嘗官楚東知彼俗以牛之大者為沙牛牛之為獸重遲而順者也人之所以去道逺者以其輕肆放逸故多違也覩犧之象必不作乎輕肆放逸之心心不輕肆放逸則道固未嘗不在我而陸德明輒更之曰娑尊蓋因毛詩傳犧尊有沙飾孔疏不知牛之為沙誤謂羽飾改讀沙為娑陸承其誤又并改犧為娑差之又差妄謂本之毛鄭毛鄭受誣甚矣大和中魯郡于地中得齊大夫子尾送女器有犧尊為牛形厥驗明著禮經曰犧尊者不勝其多何得每更曰娑殊滋後人之惑周禮司尊彛云朝踐兩獻尊鄭司農又讀獻為犧明堂位曰犧象周尊也為一代之所尚獻必首之故亦曰獻尊何以改讀為象尊為象形象之為獸其重厚為至其入水毅然悠然險莫能陷人之道心似之自道心已明者觀之足以默證聖心之精微矣大尊有虞氏之尊也大之為言非物也當為至質無文之形或曰瓦尊也豈不似道歟山尊夏后氏之尊也明堂位曰山罍山寂然未嘗動也發生草木其用無窮人之道心寂然事親從兄事上臨下變化云為神用無窮豈不似之著尊商人之尊也商人質其輅則木其尊則著于土而無足爵以斚灌尊亦以斚皆不復寓象是謂無象無所取象聖人之示人也亦明矣兩口殆兩耳而狀類口歟體狀如斗故又從斗歟而先儒外求音類謂為禾稼之形者殆鑿也字畫無此義焉壺尊以壺為尊亦無所取象也亦猶著尊之謂歟人之所以不明乎道意說蔽之也覩著尊壺尊之形則意說無從而作庶乎道心之忽明矣此維內明者自知之不可以言語解也可以言語解者皆意說也非道也犧尊山尊與夫雞彛虎彛鳥彛蜼彛黃目之彛皆不可以言說解也以為可以言說解者不識犧象山尊與夫雞彛虎彛鳥彛蜼彛黃目之彛也雞之知時不以思而得之也不思而自知豈不足以證道心之寂然而無所不知乎鳯鳥之知時也亦然又有鳴聲至和宛然道心之默契故樂音取之有道者必有德威其靜重剛毅之威似虎而其文也發于自然亦似虎蜼之為獸健捷而有智鼻仰尾修末有兩岐雨則自懸於木以尾岐塞鼻或以兩指蜼有智有健捷自道心而發智者似之道心之智如水鑑如日月光明洞照何思慮凝滯之有故曰不學而能不慮而知黃中也中無體質無作好無作惡則自無所倚無所偏畔矣目清明也禮家之說曰言酌於中而清明于外者陋矣此豈足以知黃目之㫖哉道心無思無為無偏無倚自然清明奚分內外萬物畢照不可以意度也而曰酌於中而清明于外皆窒者之意說非道心之實說也方道心發用豈曰吾今酌于中而清明于外也使果有此意則倚于此意不可以言中矣此意窒之何清明之有黃目之象誠可以默㑹不可以言盡也尊之為言言是道之可尊也彛常也惟道為常書言典常惟常故一老氏之言駁矣亦曰知常人之道心未始不一未始不常未始不清明未始有偏倚唯其微動于意焉故失之實未嘗失也昏也如日月而雲氣蔽之雖足以塞其明而明未嘗息也自不知爾明堂位曰灌尊夏后氏以雞彛殷以斚周以黃目罍之為象雷也古雷三田字雷猶雲也禮物多為雲象皆古聖列勤啓誨後人之至震動變化如雷如雲皆足以為道心變化之默證非訓詁所能殫孔子曰風雨霜露神氣風霆無非教也見訓語郊特牲曰黃目鬱氣之上尊也黃者中也目者氣之清明者也言酌于中而清明於外也此非聖人之言禮家之意說也黃中是也目言其清明亦是也而專以氣言則非也至於曰酌於中而清明於外則幾於可笑矣不知道者之言固宜其委曲于意象文義之末而不悟本有之中也是中天地以之位萬物以之育人以之靈是中人之所自有中無實體虛明發光視聽言動喜怒哀樂皆其妙用純然渾然何內何外何思何慮而言酌於中而清明于外惡有是理也哉黃目之道即犧尊之道犧之為物重厚而不浮人心之未遷于物則皆厚也此厚即道心也人皆有是道心而自不省也犧尊猶象尊也象之重厚不浮猶犧也山尊亦猶是也山寂然而不動而又非無用也草木生焉水泉出焉人之道心本無體狀無體狀則動靜不足以言之山其似也禮物多取雲雷之象是又黃目之道也人與天地名曰三才言其一體也道心虛明云為變化即雲雷之用也即天地之道也古聖人即禮象以垂教其啓後人至矣而先儒未有默識其㫖者孔子識之故曰仁者樂山又曰知者樂水皆此妙也玉藻凡祭不諱廟中不諱何也事死如事生歟古者卒哭乃諱則生事之時未嘗諱也康成為說穿鑿孔子佩象環五寸而綦組綬至矣哉大矣哉可謂斡旋天地運動四時發育萬物而照映千古者也鄭康成謂謙不比德坐井觀天至矣哉象環之無聲乎佩無不玉古之制也行則聞佩玉之音君子之禮也吾聖人獨異于是佩無聲之象環後學莫之曉也嗚呼至矣舉天下之所共視而莫之見也舉天下之所共聽而莫之聞也清明而健行者是也博厚而靜止者是也春秋冬夏風雨霜露皆此也風霆流形庶物露生皆此也山以是峙川以是流草木以是華以是實禽以是飛獸以是走蟲魚以是動躍天地間變化萬狀皆象環之文理也混圎而無端也五寸五行也五常也錯綜成章綦組綬也天地萬物萬化非彼孔子非此也玉非有聲象非無聲也一以貫之也一非寡萬非衆也是故天數五地數五一也十百千萬億以至于無窮一也所以事親是也所以事君是也所以尊卑所以長幼所以夫婦所以朋友是也無庸加思焉而未嘗離也愈思而愈莫之及也及不及一也思不思一也至矣哉大矣哉孔子之象環乎可謂斡旋天地運動四時發育萬物而照映千古者也不可贊也不可論也而愚不肖之所同有也不自知其有爾顔氏之子其知之乎月至日至者其知之乎知不知一也知不知一者孔子之象環也明堂位云昔者周公朝諸侯于明堂之位又云周公踐天子之位且書曰周公相成王不曰踐天子位明堂位之書非君子之言也孟子曰周公之封于魯為方百里也今明堂位曰七百里雖以附庸通之亦不及此閟宫公車千乘乃方百里竭作之數或并附庸記之若方七百里則為方百里者四十九為車四千九百乘矣明堂位多誣小記大夫不主士之喪其衰世之禮乎古者不降上下各以其親其情宜無此大傳武王追王大王王季文王不以卑臨尊也此為大傳者之意說非武王之心也孝子順孫敬其祖考尊而大之之道也武王至是始得以申其尊而大之之心也大傳又曰聖人南面而聽天下所宜先者五民不與焉一曰治親二曰報功三曰舉賢四曰使能五曰存愛夫所謂民不與焉異乎孔子所重民食喪祭矣大傳意雖在民而言則不中又異乎中庸之九經曰修身也尊賢也親親也敬大臣也體羣臣也子庶民也來百工也柔逺人也懷諸侯也堯典克明峻德以親九族大傳以治親先於舉賢猶云可也至於以舉賢列報功之後不知命何人酌所以報之也矧存問愛人者事亦偏小若此類多矣何止於五大傳又曰立權度量考文章改正朔易服色殊徽號異器械别衣服夫欲齊一天下之心則改正朔易服色考文章亦足矣考諸古志未聞更立權度量異器械既易服色又别衣服紛更如此三代器服誠有不同蓋積世之久風俗浸變器服浸異非創業之聖人遽紛然盡革朝野之器服也大傳又曰服術有六一曰親親二曰尊賢三曰名四曰出入五曰長幼六曰從服簡竊謂其五者皆當惟名未安鄭康成謂世母叔母之屬夫名固有之而亦豈無尊尊親親之心乎不然則謂君之母妻之屬而亦豈無尊尊之心乎古者后夫人亦與其臣為禮亦豈略無親義子夏謂士為庶母緦以名服也豈無尊尊之心乎親親之心乎從母昆弟緦子夏又曰以名服也豈無親親之心乎大抵不知道者多好為分裂殊異之說其末流至此豈不壞亂人心學記亦非知道者作泛泛外務謂知類通逹强立而不反辭氣非真通逹果通逹豈九年所可限又曰君子之於學也藏焉修焉息焉游焉夫游息孰非修習之地善修者無動靜之殊又曰凡學之道嚴師為難師嚴然後道尊是皆人為之故非道也尊師道也詔於天子無北面禮也何必加嚴何難之有學記古之教者家有孰黨有庠術有序國有學鄭康成求術之說不獲乃曰術當為遂聲之誤也此說殊未安按周禮六鄉設官掌書德行道藝書有學者六遂設官修稼改趨稼事蓋士居六鄉農居六遂遂非建學之所說文術邑中道也夫鄉學自五百家之黨有序之外不聞别有講學之地則道路之旁設序可以講學為宜為便則術序為鄉學明矣何必改讀改讀又礙汲古問學記云學者有四失或失其多或失其寡或失其易或失其止人惟意固情放而有此失一失而不救則何止于四先生曰人心圓融廣大虛明應感無所不逹安得有失人于其間加以私意則本心始失矣失之多則繁而無統失之寡則知一不知其二失之易則大輕易而不詳審失之止則無志而怠惰惟溺於靜止而惡動作此四者足以盡學者之失先生又謂記云學者四失教者必知之故孔門問答率隨人之失而答之各救其失而已子游事親有徒養而未敬之失孔子教之以敬而使之盡救其失則子游之孝心未始不全也仲弓未敬未恕之失孔子告以出門如見大賔使民如承大祭已所不欲勿施于人所以救其失使其失盡去則仲弓之心未始不仁也人無過失則道心融明先生曰常情多責人而不責已君子則反省諸身懼已德之未善上不敢怨天下不敢尤人自責而已汲古謂聖賢誨人皆以反身修行為要夫子曰君子求諸已小人求諸人孟子曰愛人不親反其仁治人不治反其知禮人不答反其敬行有不得反求諸已先儒亦曰道學之要正已以感人人未之信反躬自治先生曰此言是患學者但能言而不行見誨語樂記亦非知道者作其曰人心之動物使之然也此語固然庸衆皆不知其非而知道者不肯為是言蓋知道則信百姓日用斯道而自不知百姓日用無非妙者惟不自知故昏亂也故曰物使之然則全以為非裂物我析動靜害道多矣禮樂無二道吾心發于恭敬品節應酬文為者人名之曰禮其恭敬文為之間有和順樂易之情人名之曰樂庸衆生而執形動意形不勝其多意亦不勝其多不知夫不執不動則大道清明廣博天地位其中萬物育其中萬事萬理交錯其中形殊而體同名殊而實同而樂記諄諄言禮樂之異分裂太甚由乎其本心之未明故其言似通而實塞似大而實小是謂以其昏昏使人昭昭已自疑阻安能使人不疑阻其引孔子之言善矣其曰禮樂之情同亦庶幾焉要其本㫖不為大道故曰似通實塞其情狀尤著者曰禮樂極乎天而蟠乎地蟠之為言乃記禮者之意態而禮樂之道非動靜之可言而况于蟠乎又曰窮髙極逺而測深厚皆意說又曰樂者敦和率神而從天禮者别宜居鬼而從地尤其可笑孔子曰禮本于大一分而為天地轉而為隂陽變而為四時嗚呼聖言至矣聖人雖因人心以天地為二故曰分以隂陽為流轉故曰轉今人心本無禮樂蟠乎地之意何為又增益之以起其意乎辭意甚明與聖言霄壤矣樂記又曰鐘以立號號以立橫橫非正音也又曰君子聽鐘聲則思武臣亦偏矣失中和之道矣又曰磬以立辨辨以致死君子聽磬聲則思死封疆之臣死節雖正而尊言于此益偏矣失和矣又曰絲聲哀哀非中正之聲也竹聲濫濫亦非正音又曰君子聽竽笙簫管之聲則思蓄聚之臣吁異哉大學曰與其有聚斂之臣寧有盜臣而作樂記者反思之乎樂記曰其本在人心之感于物也吁亦末矣夫樂之道無本末無始終如欲啓誘庸衆姑言其本則人心之未感於物者其本也易曰乾元萬物資始樂者樂也樂說何自而生乎知此則知樂矣則知宫商角徴羽上下抑揚之妙矣則知動靜一矣感與未感一矣今也專指感于物為本則蔽惑人心害其本然之妙矣即實而言樂即禮禮即樂名殊而實一姑循學者進德次序而言則由禮節以入于和樂之妙故曰修禮以耕之播樂以安之而樂記曰知樂則幾于禮矣尤其失言樂記又曰仁近于樂義近于禮樂率神而從天禮居鬼而從地于大道一貫之中而妄立町畦至此重復又曰樂由中出禮自外作樂由中出故靜禮自外作故文又曰樂章德禮報情反始又曰樂統同禮辨異分裂堅定如此害道為甚嘽慢邪也簡節正也猛厲邪也剛毅正也樂記乃一之何也樂有所謂九夏夏大也大哉樂乎樂音生于人心播於歌詩鍾鼓管絃笙磬通於天地感于鬼神節于四時明於日月動散於雷霆風雨發育于萬物大矣哉王出入奏王夏王之一出一入至大也出入之時大矣哉孔子曰正明目而視之不可得而見也傾耳而聽之不可得而聞也不特王之出入至大也尸之出入亦大也故尸出入奏肆夏不特尸之出入至大也牲之出入亦大也故牲出入奏昭夏牲之為物微也疑不可以言大也烏乎大哉天地之間何一物之不大也何一物之可以明目而視可以傾耳而聽也是故賔來則奏納夏者明乎賔之來主之納皆大也皆孔子之所謂不可見不可聞也臣有功奏章夏明乎臣之有功君之章之至大也亦不可見不可聞也夫人祭奏齊夏齊敬之心又何其至大也族人侍奏族夏又何其至大也至于客醉而出或者以為醉而已出而已何足以為大也而奏祴夏焉聖人于是特明其至大而無以加也是故有牘焉有應焉有雅焉雖在乎陶陶之中而步步應四時之節公之出入也奏騖夏又以明公之一出一入其大與天地同與四時同與鬼神同與古列聖同天下無二道也是故天下無二大也人皆有是大而自謂不能者自賊者也謂其君不能者賊其君者也謂人不能者賊夫人者也聖人先覺我心之所同然耳一日覺之何所不通何所不同是故九夏一夏也于以明天下之無二大也聖人于禮樂一名一物而致其深㫖焉其啓佑萬世至矣見訓語汲古謂樂記者以其記樂之義是否先生曰樂記非聖人之言曰樂由中出禮自外作又曰樂由天作禮以地制夫道一而已矣樂記之書似髙深而實不知道徒惑亂後學又曰禮樂極乎天而蟠乎地窮髙極逺而測深厚曰蟠曰測意狀益露汲古謂樂者聖人所以善民心移風俗何周之旄人掌舞夷樂而祭祀賔客亦舞之先生曰聖人之心天地之心也聖人為天地兩間之主雖四夷之民皆吾赤子也人心皆天地之心也四夷之樂以中正之音一之皆可以同天地之和感人心之善互見誨語祭法王立七廟一壇一墠曰考廟曰王考廟曰皇考廟曰顯考廟曰祖考廟皆月祭之逺廟為祧有二祧享嘗乃止去祧為壇去壇為墠壇墠有禱焉祭之無禱乃止去墠曰鬼孔子家語子羔問廟制于孔子孔子曰天子立七廟三昭三穆與太祖之廟而七太祖近廟皆月祭之逺廟為祧有二祧焉享嘗乃止王制亦曰天子七廟三昭三穆與太祖之廟而七而鄭康成據禮緯謂夏五廟殷六廟周七廟康成豈未見商書之咸有一德七世之廟可以觀德則殷七廟甚明謂周七廟大槩是矣而亦有始末禮器曰夏立尸而卒祭殷坐尸周旅酬六尸六尸六廟也周之始享嘗之廟六而已而康成之注曰后稷發爵不受旅鑿說也禮器方言尸豈有發爵之尸而獨不及乎康成不思武王欲祖文王之心而執七廟之常說也又忘祭法周人祖文王而宗武王歟康成禮學詳審然不無差失其甚病者不善屬文而好穿鑿牽合此注周旅酬六尸謂后稷發爵之尸不言亦不善屬文之驗也康成改醴賔為禮賔改醴婦為禮婦以唯舒武為唯舒冠禮𤣥端𤣥裳黃裳雜裳可也强注作上士𤣥裳中士黃裳下士雜裳其不善屬文之狀若此者衆孔子家語雖曰孔子觀周遂入太廟后稷之廟然此乃記者之言非孔子之言况家語所記多誤是時其以文王未正太祖之名位而周人或以稱后稷之廟耶祭法及孔子家語皆曰周人祖文王而宗武王則文王為太祖甚明家語及祭法皆曰逺廟為祧而康成以有功德者為二祧夫逺廟不以功德言也孔子謂以功德見祖宗者其廟不毀則殷之太宗中宗髙宗皆當不毁康成又將何以處之天子之廟七而周旅酬六尸六廟者武王將以祖文王虛其位以待之也太祖不可遷也是故周之始享嘗之廟六而已后稷雖以始祖亦有廟而不與六廟同其所郊則及焉大祭則及焉有禱則及焉惟四時享嘗祫不及旅酬六尸享嘗祫祭也周家推本姜嫄大司樂首言享先妣謂姜嫄也閟宫有侐謂姜嫄之廟也姜嫄有廟則后稷宜亦有廟姜嫄之生后稷也神后稷始封則后稷始祖也周禮守祧奄八人每廟一人則當有八廟武王周公之時廟惟姜嫄后稷三昭三穆是為八歟家語又曰不及太祖雖在禘郊其廟則毀者謂鯀之類爾無功德不祖不宗以親故郊故其後去祧而壇是為毀歟周至共王時文王始正太祖之位而三昭三穆至懿王時始復三昭三穆至孝王時武王之廟不遷不毀太祖及三昭三穆及武王及后稷其廟九矣而曽子問古者師行必以遷廟主行乎孔子曰天子巡守以遷廟主行載于齊車言必有尊也今也取七廟之主以行則失之矣當七廟五廟無虛主言五廟者謂諸侯也言七廟者因彼失禮而生文爾不可遂執此以為周止七廟祭義曰致愛則存致慤則著未知鬼神之無所不在也人自知德之無所不在則信鬼神之無所不在矣祭義曰殷人貴富而尚齒此非聖人之言也富非道之所貴也而家語謂孔子之言豈記者之差乎聖言之傳訛記謬者亦多矣君執干戚就舞位君為東上冕而總干率其羣臣以樂皇尸孝敬之誠發于中逹于外者自爾也而曰此與境內樂之之義也非也禮家之說也失其誠敬支離而為是說也又曰所以假於外而以增君子之志也此又祭統之意說也求道於心外而溺沒於故智者也孔子燕居子張子貢言游侍縱言至于禮子曰居女三人者吾語女禮使女以禮周流無不遍也人心之禮本周流無不遍三子未明今啓之教之故曰使夫言以啓人因言而後生名而人以名而致惑天下之名衆矣不可不思其故也曰道曰德曰仁曰義曰禮曰樂悉而數之奚有窮盡所謂道者聖人特將以言夫人所共由無所不通之妙故假借道路之名以明之非有其體之可執也所謂德者特以言夫直心而行者即道之在我者也非道之外復有德也所謂直心而行亦非有實體之可執也仁者知覺之稱疾者以四體不覺為不仁所謂仁者何思何慮此心虛明如日月之照爾亦非有實體也禮者特理而不亂之名樂者特和樂而不淫之名以是觀上數名者則不為名所惑不為名所惑則上數名者乃所以發明本無名言之妙而非有數者之異也是故道即禮禮即樂樂即詩書易春秋孔子又曰禮本于太一分而為天地轉而為隂陽變而為四時列而為鬼神又曰人者天地之德隂陽之交鬼神之㑹五行之秀孔子不為名言所惑洞見貫道至一之妙故確然曰禮周流無不遍也見訓語孔子曰志之所至詩亦至焉詩之所至禮亦至焉禮之所至樂亦至焉樂之所至哀亦至焉哀樂相生是故正明目而視之不可得而見也傾耳而聽之不可得而聞也孔子斯言見小戴記學者厭觀熟誦聖誨切的如是而未聞有表而明之者此無他無意之可解無說之可求如空之不可升如金石之不可鑽或者强為之說則曰其相生有義焉噫嘻異哉孔子曰樂之所至哀亦至焉未有相生之言也而亦曰至者又何耶至即不見不可聞彼惟不知可見即不可見可聞即不可聞故棄粗而求精棄一而求二哀樂必有物人以為必可見哭笑必有聲人以為必可聞而孔子則曰不可見不可聞非棄形而言義也形即無形無形即形聲即無聲無聲即聲正不必作意以離之也據實而論不見其為二也意作而始離始二也自孔門諸賢猶率病乎意故孔子諄諄止絶之曰母意而况於後世乎意積見牢故雖聞正實之言反駭怪以為不可解今學者誠盡屏胸中之意說則自明自信矣見訓語孔子閒居子張子貢言遊侍論及于禮子曰慎聽之女三人者吾語女禮猶有九焉大饗有四焉苟知此矣雖在畎畝之中是亦聖人已兩君相見揖讓而入門入門而縣興揖讓而升堂升堂而樂闋下管象武家語作舞夏籥序興陳其薦俎序其禮樂備其百官如此而後君子知仁焉行中規還中矩和鸞中采齊家語作薺客出以雍徹以振羽是故君子不必親相與言也以禮樂相示而已孔子又曰入門而金作示情也然則縣興而金作鏗然而鳴即吾之情也何以言為也又曰升歌清廟示德也然則人聲由中而發文德由中而暢即吾之德也何以言為也又曰下而管象示事也然則堂下管籥武舞文舞次序而興又即吾之事也何必身親之也渾然天地萬物皆吾之體也純然宫商節奏皆吾之用也薦俎非外百官非彼行非行夫孰知其所以行而自中規還非還夫孰知其所以還而自中矩和鸞車之和鸞也而即吾之中采齊也客出以雍其徹也以振羽莊敬和樂之妙又何其始始終終而不可致詰也畎畝之中無兩君相見之禮也而即兩君相見之禮也無金聲之樂也無管象夏籥也而管象夏籥之音舞未嘗不日奏于其前而昧者不見不聞也耒耜之器耕藝之勤良禾之欣榮耘耔之仁兩目散日月之明四體運天地之神步中和鸞之節聲諧韶濩之音此豈說合而强同之哉默而識之當自知自信也不可思也不可言也學道者率以言而離默而近孔子引三子歸之一默之中庶乎默而成之矣見訓語孔子謂子貢曰女以豫為多學而識之者與對曰然非與子曰非也豫一以貫之孔子曰天有四時春秋冬夏風雨霜露無非教也地載神氣神氣風霆風霆流形庶物露生無非教也清明在躬氣志如神嗜欲將至有開必先天降時雨山川出雲其在詩曰嵩髙惟嶽峻極于天惟嶽降神生甫及申惟申及甫維周之翰四國于蕃四方于宣此文武之德也孔子曰豫欲無言子貢曰子如不言則小子何述焉子曰天何言哉四時行焉百物生焉天何言哉孔子曰人者天地之德隂陽之交鬼神之㑹五行之秀孔子曰夫禮必本於太一分而為天地轉而為隂陽變而為四時列而為鬼神孔子曰射之以樂也何以聽何以射人皆曰所以聽者以耳而所謂耳者膚與肉而已膚肉能聽乎孔子于是致其問曰何以聽人皆曰所以射者心與手而已而所謂心者何狀方其挽弓挾矢而心已注于鵠及其射已心又若入而執之無得視之無見窮之無鄉域卒不知其所孔子于是又致其問曰何以射烏乎至哉射者即聽者聽者即視者視者即思者是數者雜出而並用何末何本何始何終無所不通是之謂大同其間髙者曰天厚者曰地明者曰日月暄凉寒暑曰四時震動者曰風霆潤澤者曰雨露凝結者曰霜雪恍惚變化者曰鬼神其事親曰孝其事君曰忠其事長曰順其撫下曰慈其節曰禮其和曰樂言之則無窮思之則無說其謂之事物也非粗其謂之道德性命也非精粒我蒸民莫匪爾極設官分職莫匪爾極哀樂相生孔子以為不可見不可聞則精粗之名何所置之知春秋冬夏風雨霜雪之無非教則知之矣知神氣風霆庶物露生之無非教則知之矣知孔子之一貫則知之矣知則不知不知則知知即不知不知即知見訓語深衣曰古者深衣蓋有制度以應規矩準繩權衡短毋見膚長無被土此言其縱也又曰續衽鉤邉此言其衡也自旁而數之衽居其端也古之衽今之襟亦曰袂也深衣屬裳則當續衣之衽使之長與裳齊也上狹下廣其邊如鉤言其旁曲也於體為宜玉藻曰衽當旁此之謂也衽亦修廣矣矧當衣前故首言之喪服言喪衣裳負適袂祛廣博尺寸靡不備載獨不見所謂襟焉而有曰衽二尺而有五寸是衽即襟也喪服言衣二尺有二寸襟與衣齊而衽二尺有五寸何也言衣帶下尺則衣之長略可知袂幅屬衣之處曰二尺二寸此言袂之度而衣之長大略三尺二寸內闕中八寸偏前以安項衽綴于前領平衡之下則衽長二尺五寸正其度也通乎喪服之衽則深衣之衽與衣齊是為襟昭昭矣郭璞注方言亦謂衽為襟鄭康成既誤釋之孔頴逹復誤疏之謂深衣十二幅幅即衽也且援魯哀公以衽受齊餽為證而深衣之篇未嘗以幅為衽又與玉藻衽當旁之文不符蓋孔思不及此故不知此下廣之衽正足以受餽不為不寬古志四夷左衽喪記斂衣左衽咸謂襟也左傳結衽若訟者結此衽也古棺有衽是謂小要以鉤邊如衽也古曰衽度度左斂右斂如衽也詳考衽制無所不通深衣曰要縫半下玉藻曰深衣三袪縫齊倍要袪尺二寸袪袂口也袂今之袖也三袪言其大略謂深衣之長也非恰言必三尺六寸古尺短蓋侈乎衰衣矣康成之注曲矣齊下也其縫倍要即要縫半下也深衣曰袂之髙下可以運肘言乎當掖之度也又曰袂之長短反詘之及肘帶下無厭髀上無厭脅當無骨者制十有二幅以應十有二月袂圜以應規曲夾如矩以應方祫交領也夫衰衣上古之制也領正方其前平衡故可綴六寸之衰後儒不䆒古者制衣之始自然之體若是而曰如今中衣邪領之交亦近于方也使古表衣之領果邪則六寸之衰于何所制之也邪綴于前領則非宜也非正也古初制衣惟取闕中之方以安項爾簡嘗為方領深衣久則前墜近于今之圓領則後世變而為圓領亦其勢之自然又變而為邪領其當暑之為歟以是為中衣不敢以為表衣人心之靈不敢向巧而下朴也不敢貴末而忘本也深衣曰負繩及踝以應直下齊如權衡以應平故規者行舉手以為容負繩抱方以直其正方其義也故坤六二之動直以方也下齊如權衡者以安志而平心也五法已施故聖人服之故規矩取其無私繩取其直權衡取其平故先王貴之故可以為文可以為武可以擯相可以治軍旅完且弗費善衣之次也深哉衣乎奚止次而已矣十有二幅即十有二月也𬒮圓天也祫方地也負繩及踝直也下齊如權衡平也奚止于應之而已也人性自善自直自平自廣大自神明自無所不通自與天地同有毫釐不平者不可以服是衣也有毫釐不直者不可以服是衣也有毫釐與天地有間者不可以服是衣也深衣惟曰抱方時已圓其所負之方歟中古之制歟抑闕中偏前故為抱方歟循頸而勢同故獨言抱方歟深衣曰具父母大父母衣純以繢具父母衣純以青如孤子衣純以素純𬒮緣純邊廣各寸半玉藻曰朝𤣥端夕深衣深衣𬒮可以回肘長中繼掩尺祫二寸謂長衣中衣則繼𬒮之長掩乎不露復一尺而已反詘不及肘也微短于深衣之𬒮也家語小戴記並載儒行一篇其間可疑者良多最其甚者曰其過失可微辨而不可面數也其剛毅有如此者殆非孔子之言舜命伯夷典禮而告之曰夙夜惟寅直哉惟清何謂也寅敬者禮之道禮曲折萬狀而由道心行之實未嘗曲折故曰直實未嘗萬狀故曰清曰直曰清曰寅以三言明禮之一道後世道不明此等語多莫曉禮儀三百威儀三千皆自道心中流出人皆有道心苟不明而徒執迹必至失道玉藻戎容暨暨言容詻詻色容厲肅與皇矣臨衝間間攸馘安安之容異矣天下之事不可執定論也久矣于是益信惟聖人之言禮貫通無阻大戴禮小辨篇哀公曰多與我言忠信而不可以入患子曰母乃既不明忠信之備而口倦其君則不可有明忠信之備而又能行之則可立待也君朝而行忠信百官承事忠滿於中而發于外刑于民而放于四海天下其孰能患之公曰請學忠信之備子曰惟社稷之主實知忠信若丘也綴學之徒安知忠信公曰非吾子問之而焉知也子三辭公曰强避子曰强侍丘聞大道不隱丘言之丘聞忠有九知知忠必知中知中必知恕知恕必知外知外必知德知德必知政知政必知官知官必知事知事必知患知患必知備若動而無備患而弗知死亡而弗知安與知忠信簡讀孔子之書至此不勝敬嘆大哉聖人之善於明道如此夫忠信人所忽以為至平至近不可以為大道而孔子大而言之三辭而後言且曰大道不隱是明忠信之為大道也嗚呼知忠信之為大道則日用庸平無他之心皆大道也喜怒哀樂皆大道也是謂中庸無所不通用之不窮剛健中正虛明瑩融何思何慮如鏡如空見訓語大戴記公與孔子言而善孔子曰君之言善就國之節也公曰是非吾之言也吾一聞於師也子吁焉其色曰嘻君行道矣公曰道耶子曰道也大哉聖言發明道心坦夷明白至于此也惜乎不載之論語使萬世人人知之庶其有覺者道心人所自有無俟乎求惟私意蔽之始昏始惑今公曰是非吾言也吾一聞於師也私意盡無純誠著見即道也而公不自知其為道故孔子吁焉其色發歎而告曰君行道矣惟孔子知之公乃不自知故驚曰道耶孔子安得不正言曰道也此豈惟啓明魯公之道心亦足以啓明萬世之道心簡常讀大戴所載孔子之言謂忠信為大道簡不勝喜樂其深切著明簡自總角承先大夫訓迪已知天下無他事唯有道而已矣窮髙究深年三十有二于富陽簿舍雙明閣下侍象山陸先生坐問答之間忽覺簡心清明澄然無滓又有不疾而速不行而至之神用此心乃我所自有未始有間斷于是知舜曰道心明心即道孟子曰仁人心也其㫖同孔子又曰心之精神是為聖簡人人本心知皆與堯舜禹湯文武周公孔子同得聖賢之言為證以告學子謂吾心即道不可更求曽子謂夫子之道忠恕而已矣程伯淳求之太過曰忠譬則流而不息恕譬則萬物散殊簡謂忠者與人忠恕者己所不欲勿施于人即吾庸常之心即道孔子曰主忠信謂忠信即主本渡河丈人亦曰吾之入于波流忠信而已其出也亦忠信而已孔子使二三子識之烏乎至哉即吾與人忠不妄語之心即道丈人當日之言未必果曰忠信往往曰吾出入波流吾心如是而已無說也無術也始吾之入也如是而入其出也亦如是而出世以如是而往實直無他之心謂之忠信故二三子識之或傳録失真而微差歟後讀大戴記孔子忠信大道之言如獲至寶蓋深喜得聖言為證正平常實直之心即道孟子亦以徐行後長即堯舜之道箕子曰無有作好遵王之道無有作惡遵王之路無偏無黨王道蕩蕩無黨無偏王道平平人心至靈至神虛明無體如日如鑑萬物畢照故日用平常不假思為靡不中節是為大道微動意焉為非為僻始失其性意消則本清本明神用變化之妙固自若也無體無際範圍天地發育萬物之妙固自若也即視聽言動即事親事君兄弟夫婦朋友慈愛恭敬喜怒哀懼惡欲未始不妙固自若也而實不離乎庸常聖人曰中庸所以昭示萬世深切著明矣而學者猶曰我未有道吁大戴所記誥志篇孔子曰古之治天下者必聖人聖人有國則日月不食星辰不悖堯舜禹之時歷年多無日食至大康失邦始日食歷家雖謂日月薄蝕可以術推者衰世之術也而亦不能一一皆中僧一行歸之君德頗與孔子之言合一行之術精矣而有此論則誠不可盡委之數胡康侯于春秋誤解日食殆未讀大戴記孔子斯言世罕誦習故表而出之見訓語小戴記孔子云禮必本于大一陸德明音泰學者咸讀為太一簡一日忽省其非自孔殁學者罕知道奚止千無一萬無一故靡然作太一自鄭康成謂本於太一與天而况于天乎以太一與天為二則必讀大為太太之為義始也言始而不該終非大全也非大道也不當音太當如字一明無二大明無外有外焉不足以言大曰大曰一所以明道亦猶曰中曰庸所以明道大一道之異名異用于筮百姓所日用故權以諭俗曰乾元曰資始道人推始庶其易覺覺始無始則無始無終渾然大通繫辭間有聖言大統多非聖正言乾知大始是讀作太始又曰易有大極是生兩儀辭意亦音太自作繫辭者已失孔子大㫖而况于後世乎又曰鼓萬物而不與聖人同憂裂易與聖人為二豈孔子一以貫之之㫖簡嘗曰幽明本無故何必仰觀而俯察也死生本無說何必原始而反終也皆指繫辭之蔽易天地一也何必言易與天地凖凖平也言二者平齊其辭意謂實二物而强齊之也又曰形而上者謂之道形而下者謂之器裂道與器謂器在道之外邪自作繫辭者其蔽猶若是尚何望後世之學者乎然人性皆善此性皆與堯舜禹湯文武周公孔子同皆與天地日月四時鬼神同與亦非二因形與氣與名之異而姑言與因人情而姑言亦猶孔子言何莫由斯道非我自我道自道也亦因人之常情而姑言也孔子曰言不盡意謂是歟天下事理誠不可以執一論周官大司冦之職曰刑新國用輕典刑平國用中典刑亂國用重典土均曰禮俗喪紀祭祀皆以地媺惡為輕重之法而行之洪範曰平康正直彊弗友剛克燮友柔克沈潜剛克髙明柔克然則天下事理誠不可以執一論必如此而後可行周官卿老二卿則公一人夫六官之長不過卿而已而卿老則以公焉何也三公論道經邦燮理隂陽官不必備惟其人不必常也夫六卿之治而以備道經邦燮理隂陽者臨之則古之所以治其近者若是其至大司徒以鄉三物教萬民以鄉八刑紏萬民鄉大夫每鄉卿一人六鄉之民皆教之以德行道藝而後世尹京都者其說曰輦轂之下先彈壓無惑乎後世之治不如三代人心無古今之異政教有古今之殊周官職方氏辨其邦國都鄙四夷八蠻七閩八貉五戎六狄之人民與其財用九榖六畜之數要周知其利害畢命四夷左祍罔不咸賴孔子曰聖人以天下為一家中庸曰日月所照霜露所墜凡有血氣者莫不尊親左傳天子有道守在四夷自漢以來士大夫有知此理者絶少不思夫上帝一視同仁有國家者不視夷狄如赤子使無罪之民肝腦塗地大違上帝之心無乃不可乎見訓語行人之職掌朝覲宗遇之禮其朝位賔主之間公九十步立當車軹侯伯七十步立則車前子男五十步立當車衡不曰宗覲遇有别義則知通言朝位其制同夫諸侯立不離車則王不可負斧扆於户牖間如覲禮所云王當出在應門之內以受諸侯之禮如康王之誥參驗事狀則與今儀禮之中覲禮不合意者周官乃周公所為有所損益而成王未之行歟遷都洛邑封建益地成王皆不能行以此類知之記曰覲禮不下堂而見諸侯由夷王以下諸儒率以周家所行之禮與周公所著之書合而論之故多不通或者又過疑覲禮漢儒所為則又不然孔子曰昔者周公攝政踐阼而治阼非王之常位惟覲諸侯為賔主之禮則王踐阼則王有東序西嚮之位其常朝皆南鄉周公不敢南鄉不得已而踐阼也周禮大行人諸侯朝位主賔之間若干步是踐阼之禮也司士正朝儀之位惟曰王南鄉以是知常朝皆南鄉周禮司服掌王之吉凶衣服凡凶事服辨服凡弔事服絰服凡喪王為諸侯緦衰為大夫士疑衰其首服皆辨絰不聞爵辨緇衣也而檀弓篇天子之哭諸侯也爵辨絰緇衣此殆衰世之禮而鄭康成又謂絰衍字也無乃不可乎康成之學率牽合羣書雜說為一說故至于此檀弓篇記曰或曰使有司哭之為之不以樂食觀此則檀弓所記衰世之禮亦明使有司哭之益薄矣檀弓所說多衰世之禮汲古問古之族黨州鄉皆有相保相賔之義今日之州鄉族黨徒有相兩相靡之習豈非古今之制不同而風俗人情之變所致如此耶先生曰周禮伍家為比為鄰即今之五家結為一甲又如州長黨正族師閭胥亦今之小保長大保長保正保副之類古者設官分職得賢久任行鄉舉里選德行道義之法是以比閭族黨之制修而有長有師皆儒士故曰師以賢得民儒以道得民使其法復行于今則士民亦何敢為不善而德行孝悌之俗自成三代之治復見于今此勢之所必至也見誨語汲古曰嘗見周禮夏官多有侍御僕從之職皆以端人正士為之大僕掌正王之服位而小臣上士四人御僕掌王之燕令下士十二人頴僕掌掃除糞灑洗乘石而下士二人其職雖卑而以士人為之者謂王之前後左右關繫尤重不可以非其人故穆王命伯冏為大僕正曰正于羣僕侍御之臣無以巧言令色便辟側媚其惟吉士後世則失其制矣雖漢時宿衛之人猶有光祿勳考其德行而進退之終不免具文如孔安國掌唾壺揚子雲為執㦸初非古人以德詔爵之意厥後侍御多宦寺衛士皆武夫良可惜哉先生曰此言是見誨語慈湖遺書卷九
