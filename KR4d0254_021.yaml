body:
  text: 慈湖遺書後序余少讀性理羣書未能折諸聖也見有所謂楊慈湖氏者不知其學不知其為象山髙弟今巡按江右秦公道出信州手是編以示余曰慈湖吾鄉先正也其遺書尚存顧多舛訛子盍正之俾世之學者窺其淵源余始得而玩之知先生之學受之庭訓吾之扇訟而大有得於静觀體㑹之餘求諸心之精神則曰聖在是見孔子絶四曰無意則欲不起念自謂學者舎是皆第二義也故鞭辟處如捍强敵一至融液脫落殆晴雲麗空舒巻自如而光風化日有莫測其端倪者然余嘗聞之孔子語諸子之求仁其義不一曰克已復禮曰敬曰恕曰恭曰忠曰言訒曰先難曰愛人曰寛信敏惠因材而篤使之㑹萬為一慈湖豈不屑是也蓋學者分量不同夫敬以直内義以方外萬世心學精一之綱要也不然又獨不聞太極無朕而萬象森然已具乎此一貫之㫖也未至慈湖者當自考矣余也莾裂何足語此特承示以識一言若篇章謬複多所散逸而大意藴苞釐校彚稡終以成集而梓行之以不違秦公詔世之初心斯同寅查原慱之緒餘余無庸焉謹序
