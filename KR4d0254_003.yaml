body:
  text: 慈湖遺書卷三宋楊簡撰書學者請書某嘗讀大戴所記孔子之言謂忠信為大道某不勝喜樂不勝喜樂樂其深切著明某自總角承先大夫訓迪已知天下無他事惟有此道而已矣窮髙究深年三十有二於富陽簿舍雙明閣下侍象山先生坐問答之間某忽覺某心清明澄然無畔又有不疾而速不行而至之神此心乃我所自有未始有間斷扵是知舜曰道心明心即道孟子曰仁人心也其㫖同孔子又曰心之精神是謂聖某知人人本心皆與堯舜禹湯文武周公孔子同得聖賢之言為證以告學子謂吾心即道不可更求曾子謂夫子之道忠恕而已程伯淳求之太過曰忠譬則流而不息恕譬則萬物散殊某謂忠信者與忠恕者已所不欲勿施扵人即吾庸常平直之心即道孔子曰主忠信謂忠信即主本渡河丈人亦曰吾之入扵波流忠信而已其出也亦忠信而已孔子使二三子識之烏乎至哉即吾與人忠不妄語之心即道已丈人當日之言未必果曰忠信往往曰吾出入扵波流吾心如是而已無説也無術也始吾之入也如是而入其出也如是而出世以如是而往實直無偽謂之忠信忠信措吾軀是波流之中而不敢用其私焉故能入又能出也此措非措此不敢無意露學者每熟靜縱談惟心悟後實大戴所記孔子忠信為大道之言益喜得聖言為證證平常實直之即道孟子亦以徐行後長即堯舜之道箕子曰無有作好遵王之道無有作惡遵王之蹃無偏無黨王道蕩蕩無黨無偏王道平平人心至靈至神虛明無體如日如鑑萬物畢照故日用平常不假思為靡不中節是謂大道㣲動意焉為悲為僻始失其性意消則本清本明神用變化之妙固自若也無體無際範圍天地發育萬物之妙固自若也即視聽言動即事親事君兄弟夫婦朋友慈愛恭敬喜怒哀懼愛惡欲未始不妙固自若也而實不離庸常聖人曰中庸所以昭示萬世深切著明矣而學者猶曰我未有道吁吁學者請書孔子曰主忠信諸儒未有知其㫖者盖意謂忠信淺者爾非道舎淺而求深離近而求逺置忠信於道之外不知道一而已矣忠信即道何淺何深何近何逺又有學者知忠信不可淺求遂深求之推廣其意髙妙其説謂忠信必不止扵不妄語而已吁其謬哉舍不妄語何以為道人心即道故書曰道心此心無體清明無際直心而發為事親為從兄為事長上為夫婦為朋友仕則事君臨民其愛人曰仁其處事得宜曰義其恭敬曰禮其不欺不妄曰忠信視聽言動喜怒哀樂無所不通無所不妙孔子即不欺不妄而言之曰此即主本主本者乃道之異名非忠信之外復有道也離此不欺不妄實直之心而外求道者斯乃妄也先聖之言如此明白而學者尚疑其有他焉學者自起意起疑自蔽其清也不起意起疑則日用常心神明清明無體無際原始不知其所始反終不知其所終其妙無窮先聖病學者率離此而求深故曰中庸庸常也言不可求諸髙深也又曰王道平平又曰百姓日用而不知此心無體段無際畔不可測知故學者謂之髙深孔子又曰言忠信行篤敬立則見其參扵前在輿則見其倚扵衡忠信篤敬無二心無二道孔子告人皆開明人之道心而學者率以忠信為淺者大孤負聖人啓告之本㫖也今學者莫妙扵無思無為其不詐不妄之時何思何為自旁者觀之但可以言變化神明而已如此發明可謂昭然了然而學者猶疑貳更起意求深入荆棘入坎吾末如之何也已過庭書訓世謂王逸少書為天下第一吾謂逸少書俗字爾異日嘗以白象山先生先生驚曰何故予是時對曰鄉間有一富户為桃枝細器寸盈二十篾縁以小黒漆誠極精巧里人或識之曰是某家器物也故士大夫恥效之今逸少之書何以異此孔門安得如許暇逸用力扵字畫也先生笑而無語予又曰逸少如傾國之色麗則麗矣而少荘敬中正之容君子所不道故吾字畫惟方正古朴和平近扵𨽻盖今之楷即𨽻之訛𨽻者篆之變篆極善𨽻庶幾楷猶庶幾至於草去古逺矣孔門之所惡今世通行之書不用篆𨽻故予為楷而似𨽻庶幾乎三代荘敬中正之遺風不遂泯絶也歐陽正矣和矣而不古病在於不方而媚虞柳病與歐同而又弱顔方正荘敬古質善矣所少者和爾蔡與歐虞柳同凡是去取非吾一人之獨見乃萬古黙同之心其自晉以來學王之徒其中心之隠當亦黙同此黙同之心即道心顧知之者鮮女既知之矣其敬之戒之母荒墜慶元二年中冬之十三日付恪汪文子請書文子界紙求書所欲言某思古學字為􅥽􅥽即今孝字本音孝借音學于此見古者造字本㫖以為學者孝而已矣自孝之外無他道後世始加兩羽之習又加冖象學舍焉孔子曰夫孝天之經地之義民之行然則晨省昏定出告反面無非道者即天之經地之義也適父母之所下氣怡聲視食問衣燠寒無非道者即天之經地之義也父母杖屨祗敬之無敢近巵􅓢非餕無敢用無非道者即天之經地之義也應唯敬對不敢噦噫嚏咳欠伸不敢唾咦癢不敢搔無非道者即天之經地之義也學者不知道往往求道扵孝之外孔子曰孝弟之至通扵神明光扵四海無所不通以此事君則忠以此事長則順以此扵夫婦則有禮以此與朋友交則信以此使下則惠一以貫之聞文子於事親之間有省焉敬之敬之兢兢孜孜毋忽詹亨甫請書論語謂孔子每每教學者忠信今學者當思其㫖聖人豈姑以淺者教人哉曰主忠信謂忠信者主本也答樊遲問仁曰居處恭執事敬與人忠答子張問行曰言忠信行篤敬所謂非扵忠信之外復有其道也即是心而已矣是心之不欺罔謂之忠信是心之不放肆謂之敬不放肆之心即不欺罔之心乃庸常平正之心古先聖人深明此心之即道故曰中庸庸常也又曰庸德之行庸言之謹又曰王道平平初無髙深幽逺孔子又謂是忠信篤敬立則見其參扵前在輿則見其倚扵衡嗚呼至哉兹所見者豈思慮之云乎忠信篤敬不欺罔不放肆而已矣不假思慮而後能蕩蕩平平融融混混大禹謂之安女止非止之也人之心本自靜止也喜怒哀樂變化云為如四時之錯行如日月之代明其事親名曰孝其從兄名曰弟其恭敬曰禮其羞惡曰義其是是非非曰智其雖千變萬化而常明曰仁百姓日用而不知不省庸常正平之即道離心求外去道及逺殊可惜也千尤萬過皆生扵離心而起意謂之安女止謂之忠信謂之篤敬謂之時習之學謂之中庸子思謂之至誠夫忠信即誠實而已矣殆不必加至之一字加至一字則是扵平常誠實之外有又至焉者無乃不可乎是猶未信百姓日用之即道子思賢者之言也孔子聖人之言也胡不觀孔子曰夫孝天之經地之義民之行夫孝事親而已人往往不信其為天經地義惟自信本心之虚明無限際天者吾之髙明地者吾之博厚日月四時吾之變化萬物吾之散殊而後自信吾之事親即天之經地之義吾之忠信即天下之大道而非有未至焉者而後信孔子曰吾道一以貫之而曽子謂之忠恕忠即忠信恕即恕物先儒乃曰忠譬則流而不息恕譬則萬物散殊是猶未信忠信寛恕之即道未信忠信寛恕自廣大通融故為是譬喻推廣之説嗚呼忠信之心無精粗無本末無内外無所不通但㣲起意即失之矣親家詹亨甫以象軸累紙命某書所欲書某謹書某日用進學之大畧願與同志者共講絶四記人心自明人心自靈意起我立必固礙塞始喪其明始失其靈孔子日與門弟子從容問答其諄諄告戒止絶學者之病大畧有四曰意曰必曰固曰我門弟子有一于此聖人必止絶之毋者止絶之辭知夫人皆有至靈至明廣大聖智之性不假外求不由外得自本自根自神自明㣲生意焉故蔽之有必焉故蔽之有固焉故蔽之有我焉故蔽之昏蔽之端盡由扵此故每每隨其病之所形而止絶之曰毋如此毋如此聖人不能以道與人能去人之蔽爾如太虚未始不清明有雲氣焉故蔽之去其雲氣則清明之性人之所自有不求而獲不取而得故中庸曰誠者自成也而道自道也孟子曰惻隠之心人皆有之羞惡之心人皆有之恭敬之心人皆有之是非之心人皆有之仁義禮智非由外鑠我固有之也何謂意㣲起焉皆謂之意微止焉皆謂之意意之為状不可勝窮有利有害有是有非有進有退有虚有實有多有寡有散有合有依有違有前有後有上有下有體有用有本有末有此有彼有動有靜有今有古若此之類雖窮日之力窮年之力縱説横説廣説備説不可得而盡然則心與意奚辨是二者未始不一蔽者自不一一則為心二則為意直則為心支則為意通則事事有條理得已即已不得已則知㣲知彰知柔知剛一一中節矣人心即道日用不知因物有遷至喪親而復始純一不雜永嘉張直翁求居處恭發揮數語直翁見告以居處恭至難且求其説某曰直翁恭愿其察之也久豈直翁燕居亦不敢申申夭夭邪觀聖言當通其道恭言大槩至燕居申申夭夭非不恭也殆直翁求之過也此心至靈惟無放逸或恭恭或申申變化神明不可度思矧可射思日本國僧俊芿求書日本俊芿律師請言于宋朝著庭楊子楊子舉聖人之言而告之曰心之精神是謂聖此心虚明無體象廣大無際量日用云為虚靈變化實不曽動不曽靜不曽生不曽死而人謂之動謂之靜謂之生謂之死晝夜常光明起意則昏則非贈陳伯量都昌陳伯量主平陽簿同寅幾兩周星從容話别次復求數語以行某深知忠信正直大戴記孔子之言忠信大道主簿亦已自信乎孔子又嘗告子張以言忠信行篤敬立見其叅於前在輿見其倚扵衡所見者何状耶每每念曰此忠信篤敬忠信之時心無他意篤敬之時心亦無他意所見非意象昭明有融蕩蕩平庸學者往往率起意求説不思聖人每每戒學者毋意忠信篤敬即道心人皆有之而不自知不自信惜哉與張元度臨川張元度以郷舉至禮部持陸先生書踵門就見接其辭氣已知其誠確可敬及復見益知其篤志已學盖夜則收拾精神使之扵靜某曰元度所自有本自全成何暇更求視聽言動不學而能惻隠羞惡恭敬是非隨感輒應不待詔告清明在躳廣大無際精神四發不疾而速不行而至收之拾之乃成造意休之靜之猶是放心學問之道無他求其放心而已矣吾心本無妄舍無妄而更求乃成有妄故曰無妄之往何之矣元度猶自以為未能無過某曰有過惡即改元度精神何罪而收拾之元度既以為然矣告别復求書數語以歸某索之胷中實無説足以稱塞來意辭之不獲乃叙其略而又告之曰元度好賢樂善孜孜如不及某堅謂元度自賢自善何所更疑而猶待他人為淳熈丁未正月二十二日書于寳蓮山官舍贈毛誼夫畫畫皆妙㸃㸃皆妙小學家日用其妙而不自知毛誼夫克承先志研精脩潤餘二十年比年相親近忽自知是知匪思是知匪知知及之敬之敬之書遺項吉甫吉甫既有覺善養毋怠荒匪思匪為澄然有光是為用力闕非助長非忘送子之官闕舜禹皆聖人猶相告以執中又曰惟精惟一又曰安女止而况扵後學乎女既扵道有覺又嗜欲淡薄不以死生為畏甚不易得臯陶猶曰兢兢業業女切冝克艱以守中庸此守非思慮言語所及可惜可惜敬之敬之兢業不兢業即禍福榮辱之樞機贈錢誠甫誠甫逺訪從容近月問答亦詳矣将歸侍復求言孔子曰天有四時春秋冬夏風雨霜露無非教也地載神氣神氣風霆風霆流形庶物露生無非教也誠甫領斯教矣毋或昏孔子曰心之精神是謂聖又曰改而止謂過即改止無復他求易曰變化云為又曰百姓日用而不知顔淵問仁子曰克己復禮為仁克能也能以已復我本有之禮禮非私意皆道心之變化已上甲藁慈湖遺書巻三
