body:
  text: 慈湖遺書卷六宋楊簡撰賦廣居賦四明楊子家本三江之口徙居西嶼之麓緑野橫其前青巒維其外東海之水不憚餘百里之勞遙﨑嶇委蛇日致兩潮之勤於其門輸清納潤曽不少懈北山之桃李方春盛時相與聨比參紅錯白間青厠翠組織西蜀之錦環石魚之樓而屏之美於畫繪南園之竹櫛櫛差差如立萬琅玕踈踈剪剪微風過之簫然如奏天上之樂於碧雲之端竹之南有水水之中有荷青圓有蒲緑纎水仙微酣而立炯若出塵之風度而隔以雲煙逰鱗戲涼羣羣然圉圉然至於芙蓉秋紅菊金布錢橘梢之黃未垂而葡萄堆架擁千萬夜光之珠而爭先雖朔颷之戒寒爛丹邱於四山而壓氷之梅獨出其竒吐孤芳而盤旋玄冥又從而佐之剪玉鏤瑶雨花其間有家如此亦可謂竒矣而楊子方悠然而笑曰吾又有廣居焉益竒吾所謂廣居非棄此而他之特前所陳有目者之所共瞻有口者之所共言吾今所敘有目者之所不暏有口者雖欲言而無所廣居之上天所不覆胡為乎天莫之覆也天可指天可語吾之廣居不可指不可語廣居之下地所不載胡為乎地莫之載也地有所寄有所止吾之廣居無所寄無所止廣居之東其東無窮胡為乎無窮扶桑有名欲往莫從陽精陽升猶在青冥之中青冥有象有象有窮無象無窮吾廣居不可以象言奚窮廣居之西其西無窮胡為乎無窮崑崙而西其逺益迷雖極夫日入焉之涯道阻且修已莫之躋矧其日外之冥冥與東則齊有涯有冥冥有窮無涯無冥冥無窮吾廣居不可以涯言不可以冥冥焉奚窮廣居之南滄溟渺漫海外有國國外有水水之外人莫得而觀可觀者必有所窮吾廣居尚不可得而觀奚窮廣居之北沙漠無極骨利幹近日出之所北距大海海又無窮海雖大不逃乎形有形之物終窮吾廣居不可以形其窮廣居之中天生其中地生其中日月經其中星辰羅其中雷霆風雨霜雪變化其中人與鳥獸蟲魚萬彚盡産其中然則所謂楊子者居於其中之何所哉三江之口乎西嶼之麓乎室乎堂乎序乎孰乎石魚之樓乎南園之竹塢乎謂不居乎三江之口不可謂果居乎三江之口亦不可謂不徙乎西嶼之麓不可謂果徙乎西嶼之麓亦不可堂無中邊室無戶牖序豈東西孰非左右樓雖可登而難升塢雖可逰而莫有大哉乎廣居以文宣至聖猶莫知其鄉以洙泗諸賢猶不得其門學者愈行而愈逺智者愈言而昏者愈不聞壁闥四闢而宗廟之美百官之富非立牆之外者所捫是中有不求自有之至樂宮商日奏金石日諧油油而溶溶易直子諒莊敬正中高明而有融泰和而粹沖世樂有窮斯樂靡終舉視聽心知之屬不以為有旦暮有古今有始終而寂然莫之移洞焉乎空空緝熙靈府之光明混涵聖域之冥濛而圓首橫目之子方且日持鑽堅之錐力運鑿深之鋤進寸而退尺欲前而倒趨嘻嘻吁吁南園賦光風兮靜明林塘兮翠深雲間兮不動景妙兮莫尋泰和融凝兮非浮而非沈萬化迭奏兮豈去曩而來今不知吾足之所如往兮不覺吾口之自吟百草千木兮散蒼然之球琳紛禽鳥之飛鳴兮盡成韶頀之音樂悠悠以自生兮孰究其所始究其所終微覺其略如萬象兮森羅雜錯于止水之上明鑑之中纎洪短修畢陳互映兮有不可勝窮之容而澄光瑩然兮曽莫省其聚散矧復判其西東厥沈兮匪卑厥高兮豈窮其驟焉輻輳兮非積其忽焉以遁遂至於無兮詎空斯妙兮可言而不可語惟可弄明月兮歌清風不索自獲兮愈思愈窮古之人何以命之曰中庸東山賦吾之日用何如哉如東山之曉色蒼茫無際不可攬取其間雲氣隱見陽輝粲發霞舒金錦愈變而愈竒雲拖玉龍出沒夭矯於萬峰羣翠之間可觀可駭而須臾忽化千態萬狀莫繪莫畫又如江上之秋光清空爽明若甚近也而不可執若逺也而不可追而及清露濡之霜月炯之而無所損無所益又如松間之溪聲玲玲其鳴其音甚清的然可以聽而聞而不得夫音之形又如巖前之月明其潔如玉其流光凝止若可以斂而掬入松為松入竹為竹隨物賦形而終不得其機軸此豈吾之所私有獨妙獨化他人不得而與哉舉遐近通萬古夫孰者之不然惟昏明之不齊是非之迭出所以有知有不知有協於極於不極粒我蒸民莫非爾極孰謂吾日用而非極乎孰謂吾日用而可以知可以識乎孔子曰哀樂相生正明目而視之不可得而見也傾耳而聽之不可得而聞也孰謂吾日用而可以見而可以聞乎偶書如右他日名之曰東山賦或疑當名日用賦應之曰如此問不惟不識東山亦不識日用慶元丙辰仲秋書於石魚竹房蛙樂賦至矣乎至矣乎音聲之妙有如此不可以言道不可以意傳者乎靜夜兮寂然發機兮捷然有唱輒酬兮翕然驟然千鼗競奏萬珠紛聨此斷兮彼續甲洪兮乙纎各出其竒互發其妙離離然粲粲然若星辰之綴懸泠泠然激激然若巖隈之溜澗下之泉又若急雨過瀟湘之上織錦濯蜀江之芳鮮宮商迭播角羽相先律不知其何律兮呂不知其何呂唯覩夫大積焉而不苑並行而不謬隨之不見其後迎之不見其前如彼萬象森羅參錯畢見其瑩然之鑑澄然之淵至動矣而靜至繁矣而不喧是音也可聞而不可聽可以默識而不可口宣孔聖遇之而忘齊國之肉味黃帝得之而大張於洞庭之原胡為乎獨不見省於橫目之士至憎而不煩甚以為寃寃矣乎寃矣乎俯不覩其為地仰莫知其為天雖百師曠何所措其耳雖千子期惡從探其源然則是其要妙終而不出其祕以啓後來之惓惓者乎西嶼楊子於是為之歌曰竹風之蕭然松月之炯然佐以絲桐之灑然繼以是歌之油油然可謂昭然灼然月賦山月兮騰騰千峰兮畢明入林度嶺兮疏爽而散清浮波泛流兮又何其縈回瀲灩湛湛渟渟雲氣盡伏太虛碧澄不疾而速不行而至忽一輪之驟升珠無得以肖其圓玉不可以齊其瑩神光獨竒萬古一靈遁星辰之失色截天漢之欲傾虛明之妙彌滿六合擬攬之而無得姑觸之而莫零入竹則與之為竹入松則與之為松到几盈几透窗可櫺徹酒涵杯跨絃詣琴大巧造微至於此而無所用其力至潔非染而如留若凝却之似止而非止進之似臨而匪臨自古幽人雅士孰不仰止玩止樂之詠之不知其幾千萬語矣終莫能贊其不可摹寫之竒探其造化機緘之情廣寒宮殿近在吾方寸之地而有目者無覩有耳者未聆西嶼楊子女知之乎楊子曰豫惟無知故若是樂也故若是融融皓皓迎之不見其首隨之不見其後也且不自知其為無知而况於知乎子仰而觀之清明者何乎俯而履之博厚者何乎從子目之所視所視者何乎從子耳之所聞所聞者何乎彼乎此乎巨乎細乎虛乎實乎衆乎寡乎有乎無乎子乎我乎可言乎不可言乎可思乎不可思乎洙泗聖人所以無得而稱姑託之以水曰知者樂之又託之以山曰仁者樂之某今亦姑賦之以月而某樂之子信之乎心畫賦硯者天池也墨者玄雲也筆者龍也乘龍者不知其為何神也迎之不見其首隨之不見其後操則存舍則亡出入無時莫知其鄉忽焉有感而動乘龍飲天池之水運磨玄雲須臾下膏澤以潤洽萬物隨物為形為圎為方為正為旁或直而遂或曲而疆或來或往如飛如翔如金如缶如齊如莊變化萬狀衆善中藏粹然之容燁然之光其不可窮盡之妙豈鍾王歐虞諸子所能夢而見覺而望彼方且馳騖矜衒乎放蕩之晉世以文飾姦可恥可歎之唐後世又從而祖述之不復知三代之王古列聖人典章鍾鼎刻畫具在覩之使人溫良恭敬中正精粹之德生今觀蘭亭遺藁亦有油然感動於中者乎亡吁吁嘻嘻壞人心敗風俗使成人鮮德小子無造享國者不長皆斯類有以共成其殃而天下猶不知其故反相與助其狂瀾擷其餘芳詩明堂禮成詩嘉定二年秋九月辛丑皇帝祀上帝於明堂禮成館職祗承舊比作詩以奏忠朝請郎祕書省著作郎兼權兵部郎官臣楊簡上進後不上去臘陳三劄兹秋奉九筵羣英俱有賦孤迹敢無篇宗祀新隆禮宸衷上格天虛明融寂寞大化合敷宣近駭邊烽急前驚內寇連鬼神雖然佑刑政謹將然咸謂公私雜希聆宰輔賢積深千萬弊任止二三年苟且姑循舊嗟咨亦屢傳旱蝗難熟視殍墐慘相聫寒後裘方索薪間火已然冕旒幾咫尺軒陛隔天淵善頌無諛語愚衷有至虔願兢兢業業安止出剛乾內丹歌某聞內丹不可見不待施工自成煉羲皇以上幾春秋何啻千千萬萬轉到今晝夜流光湧金烏夜照廣寒殿餘輝散發綴碧落稀稠紛糾珠玉濺沖氣祥精騰太虛舒卷飛浮態纍變映空曉景緑拖藍錯綺晚凝紅染茜有時震響轟冥濛有時熠耀盤飛線有時清潤垂氷絲有時忽舞瓊花片其間秀結成山川密木繁林飛鳥蟲魚次第現龍翔鳯鳴寶藏興絪緼孕瑞生羣英四明之麓鄞之曲育神含和備五福中有祥光兩派明內虛外應無不燭能聽能言能往復屈伸俯仰天然竒不知手舞蹈與足二十年前忽轉移驀過慈川天寶山之西翠微曲復煙霞深變化逰徙誰復知端倪石魚樓閣雲氣低比年往往暫此棲御風兩渡浙河去又尋歸路從桃蹊桃源深處無人識縱復經從當面迷天實祕此丹所見惟童顔暫時一語露一班不直知音又復還登石魚樓樓欄倚碧空緑樹正搖風我獨來從容笑歌於其中微涼吹我衣碧袂紗玲瓏詩成自長吟宛轉音和融此意無人會祇許清風同亦許空間雲悠然西又東亦許林間禽幽囀聲無蹤亦許山間翁笑語天機通前山對我吟突兀青重重終日賡我歌知音無瞽宗知音自古少日月空臨照天地終不祕造化今未了石魚樓多謝天工意已勤四時換樣示吾人碧桃丹杏分明了緑艾紅榴次第陳秋鴈聲中休雪梅枝上莫因循機關踏著元非彼正是吾家固有身又箇裏包坤更括乾精神微動便紛然桃紅柳緑春無迹魚躍鳶飛妙不傳菱浪豈緣風衮衮荷珠不為露涓涓分明是了何言否此事難容鄭氏箋寶蓮官舍偶作雲海湖山有主人寶蓮峰頂露精神有時領客登髙去親手挑窗對景新萬里蒼茫融妙意三杯虛白浴天真出門更有殷勤在為奏松風又絶倫逰樂平明巖西風吹作明巖去石屋髙虛滴如乳是誰不是洞中仙無人自信吾為主嘉泰昭陽大淵獻築室董孝君祠之西下有湖焉某曰溪以董君慈孝而得名縣又以是名則是湖冝亦以慈名作詩曰惜也天然一假竒如何萬古罕人知只今煙水平軒檻觸目無非是孝慈惜也天然一假竒如何萬古罕人知只今弄月吟風處孔子明言是孝慈惜也天然一假竒如何萬古罕人知只今山色連深翠孔子明言是孝慈又惜也天然一假竒如何萬古罕人知只今步步雲生足底用思為底用疑惜也天然一假竒如何萬古罕人知只今講學從逰地一聽思為一聽疑惜也天然一假竒如何萬古罕人知殷勤為語從逰子孰是思為孰是疑送黃文叔侍郎赴三山某請違判府安撫殿撰侍郎之次始知同館有詩某惶恐捉茟遽成謹申上告毋罪老拙某信人心即大道先聖遺言兹可考心之精神是謂聖詔告昭昭復皓皓如何後學尚滋疑職由起意而支離自此濫觴至滔襄毋惑懷玉不自知何思何慮心思靈不識不知洞光明意萌微動雪沾水泯然無際澄且清侍郎日用所自有總是本原非左右舉而措之於三山的然民仰如父母鑑明水止燭絲釐變化云為竒復竒斯妙可言不可思矧可傾耳有聽之然而臯禹尚兢業不作好惡生枝葉聖賢相與告戒尚有斯某也何敢不於侍郎之前獻此詩熙光兢業初無蹊徑緝熙本有光明自覺自知自信何思何慮何營鏡裏人情喜怒空中雲氣紆縈孔訓於仁用力箕疇王道平平眀融妙妙融明樂未央山川人物獻文章縱橫組織無邊巧變化委蛇不可商北麓林塘秋靜瑩南山景氣曉蒼茫欲吟無句方徐步忽報相從注早香又妙絶虛明萬里光融融靜靜渺茫茫其間變化無蹤迹却有方圓與短長仰首看空間顧盻聚頭竊語足商量竹稍忽作瀟然韻正是雲門第一章又淨几橫琴晚寒梅花落在絃間我欲清吟無句轉煩門外青山詠春日日看山不厭山白雲吞吐翠微間靜明光裏無窮樂只是令人下語難丙子夏偶書風從槐市過來涼絲竹金英尚在堂惟有慈湖親聽得近來吾黨亦専芳如何鑽仰徒勞苦要説精粗與短長神氣風霆俱是教四時代謝儘彰彰又行年七十有六隨世名言則然應酬衮衮萬狀變化離坎坤乾人情曲折參錯動靜多寡後先孰有孰虛孰實無髙無下無邊清明靡所不照一語不可措焉先聖為是發憤忘食某也何敢空度嵗年偶作此道元來即是心人人拋却去求深不知求却翻成外若是吾心底用尋誰省吾心即是仁荷他先哲為人深分明説了猶疑在更問如何是本心若問如何是此心能思能索又能尋汝心底用他人説只是尋常用底心此心用處沒蹤由擬待思量是討愁但只事親兼事長只如此去莫回頭可笑禪流錯用心或思或罷兩追尋窮年費煞精神後陷入泥途轉轉深心裏虛明著太空乾坤日月總包籠從來箇片間田地難定西南與北東莫將愛敬復雕鐫一片真純幸自全待得將心去鈎索旋栽荆棘向芝田勿認胸中一團氣一團氣裏空無地既空何地更何義此無廣狹無一二惡習起時能自訟誰知此是天然勇多少禪流妄詆訶不知此勇元不動回心三月不違仁已後元曽小失真一片雪花輕著水冥冥不復省漓醇有心切勿去鈎玄鈎得玄來在外邊何似罷休依本分孝慈忠信乃天然此天然處不亦妙費盡思量却不到有時父召急趨前不覺不知造淵奧此時合勒承認狀從古癡頑何不曉曩疑先聖嗇於言何不明明細細傳今醒從前都錯認更加詳後即紛然夫子文章不可為從心到口沒參差咄哉韓子休汙我却道詩葩與易竒雪月風花總不知雕竒鏤巧學支離四時多少間光景無箇間人領略伊勿學唐人李杜癡作詩須作古人詩世傳李杜文章伯問著關雎恐不知詩癡正自不煩攻只為英才輒墮中今日已成風俗後後生箇箇入樊籠儒風一變至於道此是堯夫未識儒除却儒風如更有將驢騎了復求驢道心非動靜學者何難易癡雲欲掃除迅霆無異擬無妄而微疾勿藥斯有喜一輪秋月明云為豈思慮太極奚可圖可圖非太極矧復贅無極哀哉可太息何不觀古聖一一已默識胡為復作圖交擾而曲屈是孰知五行五行皆妙質不可離合論渾渾體自一安得孔子生邪説俱蕩滌哀哉復哀哉太息復太息當敬不敬謂之悖當正不正謂之諛是中適莫俱難著意態微生已覺疏丁丑詠春偶成葉葉枝枝都教女紅紅白白儘呈人如何自古知音少方到而今得句新既遣鳥啼頻囑付又令鶴舞出精神便將天作一張紙難畫慈湖二月春天造慈湖逈出塵無冬無夏只長春四山桃李圍新錦一邑風光讓絶倫澗水簷傍談妙理山禽栁外説天真杏壇無限難傳意付與慿欄寓目人丁丑偶書新年七十七是虛不是實我心包太空有無混然一比日腑臟作示病而無疾慿欄拱翠峯可詠不可詰又物物皆吾體心心是我思四時非代謝萬説不支離澗水談顔樂松風詠晳詞仲尼親許可實語斷非欺孔子曰正明目而視之不可得而見也傾耳而聽之不可得而聞也此孔子許可之言也乾道撫琴有作蕭蕭指下生秋風漸漸幽響颼寒空月眀夜氣清入骨何處仙佩搖丁東野鶴驚起舞流水噎復鳴一唱三歎意未已幽幽話出太古情龍吟虎嘯遽神怪千山萬壑風雨晦海濤震蕩林木響亂撒金盤氷雹碎和氣回春陽縹眇孤鸞翔三江五湖煙水濶波聲飋飋鳴漁榔悲猿臨澗欲渡不敢渡但聞澗下蕭颯松風長間雲曵碧落勢去還回薄神仙恍惚無定所微吟似欲止所作御風一笑歸蓬瀛猶有餘音繞寥廓侍象山先生逰西湖舟中胥必先周元忠奕百里平湖十里隄新蕪苒苒緑齊齊水晶宫裏光風靜碧玉壺中逺近迷局外有棊輸與我口邊得句豈須題流鶯却會幽人意故向人間一兩啼又淺紅深翠緑髙低各出精神不肯齊山色好時新雨沐湖光逺處淡煙迷不知醉後無言句逼近前來乞品題我亦未能勤領略只煩鶯囀與烏啼偶成春入園林種種竒化工施巧太精微山禽説我胸中事煙栁藏他物外機既遣杏桃呈似了又令蜂蝶近前飛如何有眼無人見只解西郊看落暉又腳踏和風步步春石魚樓上等間人興來衝口都成句眼去逰山不動塵李白誰知他意思桃紅漏泄我精神忽逢借問難酬對只恐流鶯説得真又桃紅栁緑簇春華燕語鶯啼盡日佳誰信聲聲沂水詠又知處處杏壇家又可惜有生都衮衮如何終日只紛紛滿前妙景無人識到處清音獨我聞又我吟詩處鶯啼處我起行時蝶舞時踏著此機何所似陶然如醉又如癡夜蚊夜蚊告教一何竒妙語都捐是與非偏向耳旁呈雅奏直來面上發深機惜哉頑固終難入多是聾迷聽者希費盡諄諄無領略更煩明月到窗扉奉檄往哭象山復會葬及歸自金溪留宿本縣仙樂觀歸而作是詩膏露奚為降傳聞不偶然兩晨呈瑞處萬葉繞爐前嘗審如飴味誰操動物權天權非逺近不可向人宣道士清晨喜告余昨朝膏露降濡濡夜來輿從留山觀此瑞端呈邑大夫我聞之言半疑信踏破曉光上孤峻巍然古殿漢天師水繞丹爐葉明潤旁觀復折取以前連日祥應詎偶然我亦嘗審甘如飴是誰執此變化權益信人心自靈妙莫執人神定名號此機不動萬象沈此機一發靡不到此機不屬上下中此機非西南北東此機無逺亦無近此機至正而大公此機夫人之所有何不自貴自善守寸善微萌天地知小惡開元禍隨後皇天無親亦無常願言孜孜兢兢悠久而無疆張時可惠示甲乙藁凌晨帶月上竹輿荷君封送兩卷書朦朧未省何文字中道曉色來徐徐乃是約齋甲乙稿驚喜遽讀味新好一篇一篇竒益竒間姿雅態雲生島石泉竹月風蕭蕭斗牛劍氣秋空髙意度橫出不可速灑灑落落真詩豪殷勤厚意何以報熟復謹藏永為好大雅不作繼者誰恐非少陵所可到君心自是思無邪何假於中植竒葩男兒要當追配古聖賢豈能更與凡卉爭春華富春龍門桑麻迤邐入髙原級級差差水落田樹色自分深淺緑山光都在淡濃煙竹輿漸近鐘鳴處詩句來從鳥語邊又是一畨新樣致如何寫得十分全丹桂世眼紛紛丹與黃廣寒宮裏亦如常目前不作兩般見筆下方騰萬丈光且莫錙銖深淺色也休斤兩淡濃香靈根已入詩人手不許姮娥擅此芳和胡鼓院郊臺致齋即事新編下貺率性賡歌老拙僅可發莞爾之笑聫篇傑作大音稀雲朵低垂向巧枝鈍學久嗟人去速癡腸一任句來遲斷無錦向詩中織但有春從筆底滋盡日齋宮雲聚散不知步武是誰移虛口徐行上短廊拂簷中角觸山光髙簷踴躍爭竒怪巨笋逢迎效短長山木剪裁青玉色茶甌問答素馨香是中空洞無邊際收拾山川盡括囊和陳大著追九日之集起興家山翠作圍紫宸垂旨未容歸千峯來獻無窮妙萬影相從不敢違碧玉壺中丹葉舞水晶宮裏白雲飛慿欄相與謀荒政第一言無罪嵗飢題將作軍器二監出入雲從二監中新來盤薄翠玲瓏飽觀大景金星洞喚作慈湖鬢雪翁石怪山竒誰造化鳶飛魚躍我家風只今笑語難聞見灼與人心萬古同伏蒙提舉祕書郎中以留題縣驛新篇封示惻隱惠愛之意自然著見可謂發情止義無愧古作道中不得即具申謝之儀夜還舍秉燭亟次崇韻庸見不敢虛辱大賜之誠非敢為文某惶恐敬上我學如畎澮纎流未距川何如作難邑衮衮膏火煎學力未純固誠不能不遷所喪逮尋丈所補無塵涓是則百煉金無復畏巨燃不聞曽氏子兢兢而虔虔一貫融終始虛明萬慮捐此道甚簡易勞苦無禹胼體妙用亦妙揚州十萬纒不熟愧稊稗未免世纍攣使者臨舊治盛禮修同年所道惟政事握手意留連車行眼偏矚粟畦暨麥阡父老亟來迎喜色津津然我非當世才亦復見謂賢臨違語益稠不覺膝自前更願所以諳教我理婚田賀朱倅舉杯話别幾時逢此事分明鑑象中到處風光無逺近毋言易道有西東輕輕衣濕梅坡雨欵欵舟行栁岸風忽憶從逰談笑處蘇公隄上躍花驄送章大著出守衡陽濟濟衆賢俱徐徐五馬驅中司親鳫序南嶽佩魚符吳楚從今異參辰幸小殊他時羣玉聚相與話踟蹰賀王使君南風頌王使君也使君有寬裕和樂之德如南風焉南風薰兮如其仁兮盎乎惠和物之樂且欣兮南風薰兮人之近兮天溫厚之氣以幸吾鄱江之民兮南風薰兮於誕之辰兮何以夀之有南山之椿兮南風薰兮我不靳兮無請弗獲以幸吾樂平之民兮南風四章章四句上耿泉生朝雲臺夀泉使顯謨太監公也瞻彼雲臺有那其武祝阿發迹中興元輔歷世數十有孫惟良愷悌君子之紀之綱柔亦不茹剛亦不吐有志而寬夫誰敢侮天子曰於亟來輔豫實彼周行為上大夫乃眷西顧畀之節符是司九府爰總數路爰究爰度阜豐化布國用是裕江左矜刑獄平訟清惟清惟明民用以寧姦宄亦懲乃撫徽人惠綏千里匪亟匪除匪作匪異而郡亦治泉課復艱屬任斯難闕斧扆節至纍頒公毋憚煩洎陽為邑實惟所臨寬簡雖至威信亦深敢不兢兢治所賦金以謹以程以恪以忱惟公誕彌良月惟時地數盈成夢維熊羆何以夀之南山維基松柏維滋毋祝毋祈公自有之某也作詩于以敬之雲臺十一章三章章四句一章章六句四章章五句一章八句一章十一句上鄧憲生晨岷源夀江東使者司諫鄧公也樂平令楊某有祝頌之辭于誕晨以獻焉維彼岷源維深且長是為大江潤澤南方維江之東有賢使者惠德似之溥澤潤下使者維公有祖高密雲臺第一流芳泌泌有孫維良秉德正方天子曰於實彼周行古之遺直亟輔豫德疾風徑草嵗寒松柏乃眷西顧金節畀之禮樂光華亦王近畿欽哉祥刑克寬克明民罹旱虐焦勞發情民飢毋恐惠澤方湧適兼郡符民有天寵首白蠲租寬博其模大公靡私匪畏匪拘僵者起之骨者肉之知幾千萬父之母之洎陽為邑罹旱則甚故維私邑蒙澤亦甚維公誕彌端月維時夢維熊羆何以夀之南山維基大椿植之毋祝毋祈公自有之某也作頌于以敬之岷源十二章十一章章四句一章十句代馮似宗夀樓文昌維公夀宮使閣學尚書樓公也表弟馮某作是詩再拜以獻焉維山四明涵竒孕英或曰降神為今甫申倬彼雲漢昭回其文鳯鳴朝陽決河崑崙代天而言粹其德音補衮大手石色五有砥柱中流屹屹其守為人所難一辭萬口文昌大名太山北斗雲歸星駕持麾東下乘流御風琳宮燕暇山水清暉親戚情話不間遐賤如某某者肆筵設席獲教蒙益繾綣綢繆問遺不息萬金良藥再生大德陽復之望惟公誕辰何以貺之秉國之鈞何以夀之南山之椿維山五章一章章十句二章章八句二章章六句嘉定改元久旱得雨詩呈張令君底事焦勞偃室中耕農臯月未施工兩龍會合千山暗數日霖零百里同舉手盡稱知縣雨何心領略大王風再生天造奚為報海有窮時此不窮兩日長憂積滿中感深令禱格天工欣欣處處人人喜渺渺茫茫畝畝同不至傷如無極雅韓詩雨無極正大夫刺幽王也首曰雨無其極傷我稼穡行當改賦黍離風邑民頌德千和萬毫楮如何可以窮王風黍離本旨為譏今取其有年禾黍豐故擬改喜雪次陳書韻簾垂不覺夜窗明清曉從容始下平推戶忽驚瓊作地登樓笑指玉為京暫停枰上猶賢奕時子臯敬甫對奕來作絃間太古聲時琴撫白雪操甚念衣單塵甑者毋令彼此有虧成蒙檢討封送所與諸同朝倡酬盛作某老拙愧後礫某祗拜以呈原廟陪祠曉色開從容復指綴衣來花填輦路驚何早春向皇都特亟回聲贊俯躬千冠帶香浮夾道萬樓臺傳聞歸燕隆親睦天上雲韶拱玉杯夀倅生晨某欽值府判直閣誕生令辰率爾以二章章八句為夀老拙不文告略關聽官州家和氣藹新春得所親賢蔚豹文天遣星辰為二屏我將風月作三分碧梧翠竹來華胄嶽鳯溟鯤駕慶雲敬為同寅香一瓣願言臭味等爐薰方飲屠蘇慶嵗元五開歷草又生賢沈檀鬭品來樽底梅竹交光闖水邊好把緋魚追舊事肯同螃蟹話當年聖賢德業歸方寸穩取崇名上潑天賀傅憲生辰某恭承提刑國史郎中慶誕令辰謹修祝頌之章上贊崇髙之算繕寫左方伏乞賜覽奚必生申向嶽求卧龍山水瑞光浮御風天上騎箕尾持節人間占斗牛巖下光芒驚走電筆端河漢瀉新秋精神已致鳴山雨更願為霖遍九州鄱陽江上是瀛洲中有神仙暫此逰明月襟懷民善頌浮雲喜怒我無留蟠桃一熟三千嵗玉陛重瞻十二旒諳盡民情並世道從容借筯屬君侯夀趙泉使孕秀鍾鼎慶源長屬近親依日月光弧矢影侵槐隂緑熊羆夢入藕花香詩書博雅今平獻政事精明古趙張九府本根關大體故分華節到鄱陽來迎父老喜相扶才大能令惠愛孚十道山川新約束三樓風月舊規模巖巖氣貌踰嵩華坦坦胸襟有典謨仰止光華申善頌何當斂版向庭趨臨安張帥生辰詩山野書生百不知同官元有誕辰詩怪他衙報來何晚笑我詞源發處遲坐想鼎來門下士爭雄盡吐腹中竒如何獨有關西後只解揄揚撫恤辭為恐他人未必知故推善意入歌詩非誇輦轂先彈壓肯把寬仁作鈍遲不但輿情都喜愜亦聞天語有褒竒鋪張才美終難了只此今朝祝頌辭次韻吳機宜十里松湖乘鴈歸酒鄉近處一驚飛頗聞水月中泉石笑我年來杖履稀次韻吳天機洪範論時常心官職雨暘分龍何效竭負扆久憂傷禾稿幾於白苖蘇尚可蒼焦勞殊未已詔旨欲盈箱已上甲藁偶成風雲雨雪自何來我有乾元大矣哉萬景出竒供杖履羣峯環翠拱樓臺興來吟詠誰裁剪飯罷逰行豈去回信口道來俱妙妙教人尋訪幾枝梅偶成中堂此景亦不惡疊嶂窮林張翠幄有時雲氣間出沒誰能繪畫得此樂詩人如麻筆如椽擬待索紙莫莫莫孔子明目尚不見枉費精神去摸􅟥示葉元吉元吉三更非鼓聲慈湖一夜聽鵝鳴是同是異難聲説何慮何思自混成爐炭幾畨來暖熱天窗一點吐圓明起來又覩無窮景水檻澄光萬里清偶書君子不必相與言禮樂相示甚昭然禮樂相示無一言物物事事妙莫宣此妙自覺不可傳可傳非覺亦非玄風雨霜露無非教哀樂相生先聖篇偶書無聲之樂聞四方純德孔明即就將哀樂相生不可見衾裘非燠箑非涼秋毫莫大泰山小殤子上夀彭祖夭入門金作示吾情於衛磬聲今不了春秋冬夏風雨霜露無非教胡為自古學者恁莫曉二十年來䆮多曉是殆天欲亨吾道屈指何止數十人知及仁守或可保曲禮三千不可思至哉忠信與孝慈水哉水哉也大竒孔聖無語孟不知偶書自古挑才揚暨漢多書木才木雖不同一音貫吳蜀大道無異同奚庸析耳目千載覺者幾邇來帝錫福所知餘百人宗祖慈湖麓天地吾施生四時吾繼續日月吾光明變化吾機軸夫人同此機宇內皆吾族惟日用不知被褐而懷玉禮三百三千是誰不備足父母誰不愛弟幼誰不育事上誰不敬對賔誰不肅步步在杏壇句句香芬馥羣峯穿白雲碧流響松谷諄諄帝誨我敢不拱承囑夙興筆此詩既復從首讀此讀人不聞惟有庭前菊慈溪金沙岡歌岡湧金沙來幾里貼天衮衮白雲裏雄峯健隴四奔馳每每回顧慈溪水慈溪慈溪孝名美即天之經地之義子思不知萬物我發育推與聖人自固蔽己自固蔽禍猶小固蔽後學禍甚大孔子沒近二千年未有一人指其愆汨汨昏昏到今日所幸慈溪却不然灼見子思孟子病同源不得已指其蔽寫出世所不傳大道蕩蕩而平平聖訓至明至坦夷一無荆棘相維纒學子首肯斑斑焉靜明莊敬非強參學者多覺近二百事體大勝於己前學徒轉相啓告又未已大道行乎詎非天大哉大哉孔聖之言哀樂相生不可見傾耳聽之不可聞不見乃真見不聞乃真聞子夏雖曰敢不承實莫之承終於昏誤認有子為師道曾子覺雖小而悟孔聖之皓皓濯之暴之覺之虧即濯即暴無不妙子思孟子亦近之惜乎小覺而大非其言多害道二子名聲滿天下指其非者何其少滋惑後學何時了安得朝家専主孔聖言盡削異説明大道比一二十年覺者䆮䆮多幾二百人其天乎春秋冬夏風雨霜露無非教風霆流形庶物露生無非教君子不必相與言雖在畎畝之中默然即聖無他巧大哉孔聖之至言罔極之德何以報謁泰伯廟三以天下讓先聖謂至德某也拜廟下太息復太息三辭不難知泰伯無人識胡為無得稱萬象妙無極或曰泰伯之神無形體何故言象又曰萬通大道者匪有匪無象即無萬即一一即萬尚不可思而可言乎即無言天地內外皆泰伯人實見之而不識偶作處處青山人不識步步踏著此巖石妙妙妙妙不可言可惜可惜大可惜贈野牛曽將大手挽恆河引得龍來地起波何待硯池藏滴水工夫元不費揩磨湍水巖禱雨詩戊辰之夏天久不雨農嗟失時孰不傍徨邑人余崇因幹到縣之石臺鄉遇一老人曰此地龍潭靈甚名湍水巖居士胡不祈於此崇回視間老人已不復見其神矣繼到湍巖果是聖迹禱而歸告于邑之士庶令君張君潤之齋宿同詣潭所化龍隨見甘雨沛然吾邑無不種之畝惠至渥也崇號湍巖居士一力經營刻立碑記裝飾神像龍天感應嵗斯上熟不可不記慈湖楊某湍水龍潭古迹遺不因老叟有誰知鄉人禱雨無靈日雲魃常暘尚在時説與縣家誠且信去從潭所宿為期回頭甘澤蘇枯稿插種工夫未是遲精禱何須到處臨只祈湍水沛甘霖驅除旱魃無餘事感召靈神在寸忱庭砌已酣行蟻戰山川能動老龍吟當知一飽皆公賜雷地何人無喜心蒙訓父母生子身身是父母箇如何却言我言我大不可父母在此坐子則不敢坐不坐乃當然父母如天大男兒立父旁女兒立母旁男兒拱手立女兒斂衣裳捧盥兼灑掃將茶及奉湯言語須低軟依前立正方兄娣惟恭敬弟妹常愛慈飲食先尊長不敢遽有之尊長若嗔我嗔我是愛我欲我為君子所以約束我語話須誠實步履學踈遲頭容常正直四體莫邪欹金明池燕語鶯啼杏壇春色為甚無人領略又添箇山青水緑是多多少少明明白白對面不識方且蕩然放逸不亦文辭雕琢聖人道君子不必相與言但示以禮樂禮樂無言莫穿鑿一味融融無窮靜樂步步行行皆妙用言言句句俱寂寞舜曰道心眀心即道百姓日用不知不覺從學者再三勤勤有請也只不可説著歷代詩三皇五帝混沌鑿開知幾嵗洪荒莫考傳承裔但聞前史載三皇伏羲神農及黃帝三皇之後五帝傳少昊顓頊髙辛繼唐堯虞舜又繼之天下於斯為盛際夏堯舜天位傳禹王禹之子啓傳太康仲康王相少康後王寧王槐及王芒王泄不降王扄立王厪孔甲何淫荒王臯之後有王發桀放南巢夏始亡十七君餘四百嵗夏之天下遂為商商商湯興時民戴后外丙仲壬繼其後太甲沃丁及太􅏤小甲雍己及太戊仲丁外壬河亶甲祖乙祖辛傳沃甲祖丁相繼有南庚陽甲之後是盤庚盤庚能復興商邑不幸小辛小乙立武丁有德號髙宗祖庚祖甲又無功廪辛庚丁逢武乙太丁帝乙衰王室末有紂辛名曰受民心遂歸周武后六百餘年三十主周得天下商遂亡西周后稷文王世幾傳武王方得天下全成康昭穆及共懿孝夷之後厲兼宣幽王見殺平王立以上凡經四百年東周平王避難遷洛陽桓莊僖惠襄頃匡定簡靈景兼悼敬二百餘年春秋王春秋之後周之晚元王貞定相承纂哀考威烈遂傳安夷烈顯聖慎靚赧三十七主始為秦八百餘年誰謂短秦始皇繼周稱皇帝傳子胡亥為二世子嬰灞上降漢王四十餘年非久計西漢即前漢西漢十二君髙惠呂后文景帝傳于武遂及昭宣元成哀平帝後王莽乃為君昌邑兼孺子二人不足云東漢即後漢東漢之光武髙皇九世孫誅莾中興後依前十二傳明章稱顯肅乃及和殤安順賢沖與質桓靈極不君終當孝獻帝漢室遂三分三國兩漢四百載分為魏蜀吳曹操始居鄴劉備據成都孫權在金陵鼎足互相圖蜀從劉備傳後主四十餘年為魏虜吳傳孫亮至孫休晉封孫皓歸命侯魏有文明俱稱帝齊王髙貴還相繼陳留王立共五君大業卒傳司馬懿西晉晉人司馬氏相魏敢専權懿師昭不帝追諡宣景文武帝受魏禪惠帝實童昏劉聰害懷愍由此失中原東晉夷狄陷河洛元帝南渡江宣帝之曽孫立號都建康明成康與穆哀廢最堪傷簡文武安後桓玄暫稱王卒聞恭帝世遜位宋武皇兩晉十五主二百年而亡宋宋武是劉裕傳位從東晉滎陽與文帝遂傳武帝駿前廢乃有眀後廢乃立順八主六十年蕭齊因繼運齊齊主蕭道成乃是蕭何孫武帝鬱林王海陵鳴帝鸞東昏至和帝七主不足論二十有四年蕭梁遂建元梁蕭衍梁武帝其子號簡文孝元恭皇帝前後共四君五十有六載大位俱于陳陳陳武名霸先文帝廢帝傳宣帝及後主共三十二年六朝至此滅天下歸楊堅隋楊堅隋髙皇煬帝遂淫荒恭帝不足道四海正擾攘三主四十年天下禪于唐唐唐祖是李淵太宗髙則天中宗曽見廢睿宗傳與玄肅代德順憲穆敬文武宣懿僖及昭哀二十一君傳二百九十四朱梁稱元年五代梁主是朱溫篡唐都汴宋友圭及末帝滅于李克用莊宗克用子滅梁又稱唐明宗與愍潞滅于石敬塘敬塘晉髙祖其子號少主虜為負義侯契丹入中土晉亡漢始立知逺實姓劉傳子稱隱帝二世遂為周周家有太祖姓郭乃名威世宗及恭帝僅能十載期共五十三年天命遂有歸宋太祖太宗兄授弟兩派天源稱善繼真宗嗣位及仁宗以子傳孫皆聖裔英宗有詔嗣濮王次及神宗哲宗世徽宗行道付欽宗髙宗南渡中興帝孝宗之末嗣秀王揖遜兩朝誠鮮儷慈湖遺書卷六
